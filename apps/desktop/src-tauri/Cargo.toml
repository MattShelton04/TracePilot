[package]
name = "tracepilot-desktop"
version = "0.1.0"
description = "TracePilot desktop application"
edition = "2024"
default-run = "tracepilot-desktop"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tracepilot-core = { path = "../../../crates/tracepilot-core" }
tracepilot-indexer = { path = "../../../crates/tracepilot-indexer" }
tracepilot-export = { path = "../../../crates/tracepilot-export" }
tracepilot-tauri-bindings = { path = "../../../crates/tracepilot-tauri-bindings" }
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }

[[bin]]
name = "tracepilot-desktop"
path = "src/main.rs"
