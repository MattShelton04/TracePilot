[package]
name = "tracepilot-desktop"
description = "TracePilot desktop application"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
default-run = "tracepilot-desktop"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tracepilot-core = { workspace = true }
tracepilot-indexer = { workspace = true }
tracepilot-tauri-bindings = { path = "../../../crates/tracepilot-tauri-bindings" }
tauri = { version = "2", features = [] }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tauri-plugin-dialog = "2.6.0"
tauri-plugin-log = "2"
tauri-plugin-opener = "2"
tauri-plugin-process = "2"
tauri-plugin-updater = "2"
log = "0.4"

[[bin]]
name = "tracepilot-desktop"
path = "src/main.rs"
