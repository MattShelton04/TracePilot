<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — Preset Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/design-system-c.css">
  <style>
    /* =============================================================
       TracePilot v2 — Preset Manager
       Manage reusable AI agent task templates.
       Aesthetic: Linear/Raycast — dark-first, crisp.
       ============================================================= */

    /* --- Ambient Background Gradients --- */
    .main-content::before {
      content: '';
      position: fixed;
      top: -40%;
      right: -20%;
      width: 80vw;
      height: 80vh;
      background: radial-gradient(ellipse at center, rgba(99,102,241,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    .main-content::after {
      content: '';
      position: fixed;
      bottom: -30%;
      left: -10%;
      width: 60vw;
      height: 60vh;
      background: radial-gradient(ellipse at center, rgba(167,139,250,0.025) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }
    .page-content { position: relative; z-index: 1; }

    /* --- Page Header --- */
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .page-header-left { display: flex; flex-direction: column; gap: 6px; }
    .page-header-title {
      font-size: 1.375rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .page-header-title .title-icon {
      width: 34px;
      height: 34px;
      border-radius: var(--radius-md);
      background: var(--gradient-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      color: #fff;
      box-shadow: 0 2px 12px rgba(99,102,241,0.35);
      flex-shrink: 0;
    }
    .page-header-subtitle {
      font-size: 0.8125rem;
      color: var(--text-tertiary);
      padding-left: 46px;
    }
    .page-header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    /* --- Filter Bar --- */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-bar .search-container { max-width: 280px; }
    .category-pills {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .category-pill {
      padding: 5px 12px;
      border-radius: var(--radius-full);
      font-size: 0.75rem;
      font-weight: 500;
      background: transparent;
      border: 1px solid var(--border-default);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition-fast);
      white-space: nowrap;
    }
    .category-pill:hover {
      background: var(--neutral-subtle);
      color: var(--text-primary);
    }
    .category-pill.active {
      background: var(--accent-muted);
      color: var(--accent-fg);
      border-color: var(--accent-emphasis);
    }
    .filter-spacer { flex: 1; }
    .view-toggle {
      display: flex;
      gap: 0;
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .view-toggle-btn {
      padding: 5px 8px;
      background: transparent;
      border: none;
      color: var(--text-tertiary);
      cursor: pointer;
      transition: all var(--transition-fast);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .view-toggle-btn:hover { color: var(--text-primary); background: var(--neutral-subtle); }
    .view-toggle-btn.active { color: var(--accent-fg); background: var(--accent-subtle); }
    .view-toggle-btn + .view-toggle-btn { border-left: 1px solid var(--border-default); }

    /* --- Preset Grid --- */
    .preset-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    @media (max-width: 1280px) { .preset-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 900px) {
      .preset-grid { grid-template-columns: 1fr; }
      .filter-bar .search-container { max-width: 100%; flex: 1; }
    }
    @media (max-width: 768px) {
      .sidebar { display: none !important; }
      .detail-panel { width: 100% !important; }
    }

    /* --- Preset Card --- */
    .preset-card {
      background: var(--canvas-subtle);
      background-image: var(--gradient-card);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      padding: 16px;
      cursor: pointer;
      transition: all var(--transition-normal);
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(8px);
      animation: cardStagger 0.35s ease forwards;
    }
    .preset-card:nth-child(1) { animation-delay: 0.04s; }
    .preset-card:nth-child(2) { animation-delay: 0.08s; }
    .preset-card:nth-child(3) { animation-delay: 0.12s; }
    .preset-card:nth-child(4) { animation-delay: 0.16s; }
    .preset-card:nth-child(5) { animation-delay: 0.20s; }
    .preset-card:nth-child(6) { animation-delay: 0.24s; }
    @keyframes cardStagger {
      to { opacity: 1; transform: translateY(0); }
    }
    .preset-card:hover {
      border-color: var(--border-accent);
      box-shadow: var(--shadow-md), 0 0 0 1px var(--border-glow);
      transform: translateY(-2px);
    }
    .preset-card.disabled {
      opacity: 0.5;
    }
    .preset-card.disabled:hover { opacity: 0.65; }
    .preset-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .preset-card-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }
    .preset-card-icon {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      background: var(--accent-muted);
    }
    .preset-card-icon.review { background: var(--warning-muted); }
    .preset-card-icon.report { background: var(--done-muted); }
    .preset-card-icon.tracking { background: var(--success-muted); }
    .preset-card-icon.custom { background: var(--neutral-muted); }
    .preset-card-icon.health { background: var(--danger-muted); }
    .preset-card-name-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .preset-card-name {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color var(--transition-fast);
    }
    .preset-card:hover .preset-card-name { color: var(--accent-fg); }
    .preset-card-badges {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .badge-version {
      background: var(--accent-muted);
      color: var(--accent-fg);
      font-size: 0.625rem;
      padding: 1px 6px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .badge-builtin {
      background: var(--done-muted);
      color: var(--done-fg);
      font-size: 0.625rem;
      padding: 1px 6px;
      border-radius: var(--radius-sm);
      font-weight: 500;
    }
    .preset-card-toggle {
      flex-shrink: 0;
    }

    /* Toggle switch */
    .toggle-switch {
      position: relative;
      width: 32px;
      height: 18px;
      cursor: pointer;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--neutral-muted);
      border-radius: var(--radius-full);
      border: 1px solid var(--border-default);
      transition: all var(--transition-fast);
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--text-tertiary);
      transition: all var(--transition-fast);
    }
    .toggle-switch input:checked + .toggle-track {
      background: var(--accent-muted);
      border-color: var(--accent-emphasis);
    }
    .toggle-switch input:checked + .toggle-track::after {
      transform: translateX(14px);
      background: var(--accent-fg);
    }

    .preset-card-desc {
      font-size: 0.75rem;
      color: var(--text-tertiary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .preset-card-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .tag-pill {
      padding: 2px 8px;
      border-radius: var(--radius-full);
      font-size: 0.625rem;
      font-weight: 500;
      background: var(--neutral-subtle);
      color: var(--text-tertiary);
      border: 1px solid var(--border-subtle);
    }
    .preset-card-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.6875rem;
      color: var(--text-placeholder);
      border-top: 1px solid var(--border-subtle);
      padding-top: 10px;
      margin-top: auto;
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .meta-item svg { opacity: 0.5; }
    .preset-card-footer {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .preset-card-footer .btn { flex: 1; justify-content: center; }
    .btn-icon {
      padding: 5px 7px;
      flex: none;
    }

    /* More menu */
    .more-menu-wrap { position: relative; }
    .more-menu {
      position: absolute;
      right: 0;
      bottom: calc(100% + 4px);
      background: var(--canvas-overlay);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      min-width: 160px;
      padding: 4px;
      z-index: var(--z-overlay);
      opacity: 0;
      transform: translateY(4px);
      pointer-events: none;
      transition: all var(--transition-fast);
    }
    .more-menu.open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .more-menu-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      font-size: 0.8125rem;
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition-fast);
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .more-menu-item:hover { background: var(--neutral-subtle); color: var(--text-primary); }
    .more-menu-item.danger { color: var(--danger-fg); }
    .more-menu-item.danger:hover { background: var(--danger-subtle); }
    .more-menu-sep { height: 1px; background: var(--border-subtle); margin: 4px 0; }

    /* --- List View --- */
    .preset-list { display: none; }
    .preset-list.active { display: block; }
    .preset-grid.active { display: grid; }
    .preset-list-row {
      display: grid;
      grid-template-columns: 36px 1.5fr 2fr 1fr 0.8fr 0.6fr 0.7fr 100px;
      gap: 10px;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 0.8125rem;
      transition: background var(--transition-fast);
      cursor: pointer;
    }
    .preset-list-row:hover { background: var(--neutral-subtle); }
    .preset-list-row.disabled { opacity: 0.45; }
    .preset-list-header {
      display: grid;
      grid-template-columns: 36px 1.5fr 2fr 1fr 0.8fr 0.6fr 0.7fr 100px;
      gap: 10px;
      padding: 8px 14px;
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--border-default);
      position: sticky;
      top: 0;
      background: var(--canvas-default);
      z-index: 2;
    }
    .list-name-cell {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .list-name-cell .preset-card-icon { width: 26px; height: 26px; font-size: 13px; }
    .list-name-text { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .list-desc-cell { color: var(--text-tertiary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .list-tags-cell { display: flex; gap: 3px; flex-wrap: nowrap; overflow: hidden; }
    .list-actions-cell { display: flex; gap: 4px; justify-content: flex-end; }

    /* --- Slide-over Detail Panel --- */
    .detail-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: calc(var(--z-overlay) - 1);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .detail-backdrop.open { opacity: 1; pointer-events: auto; }
    .detail-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 420px;
      height: 100vh;
      background: var(--canvas-subtle);
      border-left: 1px solid var(--border-default);
      z-index: var(--z-overlay);
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .detail-panel.open { transform: translateX(0); }
    .detail-panel-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-default);
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }
    .detail-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .detail-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .detail-close-btn {
      background: none;
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    .detail-close-btn:hover { background: var(--neutral-subtle); color: var(--text-primary); }
    .detail-header-name {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .detail-header-meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .detail-panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }
    .detail-section {
      border-bottom: 1px solid var(--border-subtle);
    }
    .detail-section:last-child { border-bottom: none; }
    .detail-section-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      cursor: pointer;
      transition: background var(--transition-fast);
      user-select: none;
    }
    .detail-section-trigger:hover { background: var(--neutral-subtle); }
    .detail-section-title {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-tertiary);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .detail-section-chevron {
      transition: transform var(--transition-fast);
      color: var(--text-placeholder);
    }
    .detail-section-trigger.expanded .detail-section-chevron {
      transform: rotate(90deg);
    }
    .detail-section-body {
      padding: 0 20px 16px;
      display: none;
    }
    .detail-section-body.open { display: block; }

    /* Detail content styles */
    .prompt-block {
      background: var(--canvas-default);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: 12px;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.6875rem;
      line-height: 1.7;
      color: var(--text-secondary);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 180px;
      overflow-y: auto;
      margin-bottom: 10px;
    }
    .prompt-block .var-highlight {
      color: var(--accent-fg);
      font-weight: 600;
      background: var(--accent-subtle);
      padding: 0 3px;
      border-radius: 3px;
    }
    .prompt-label {
      font-size: 0.6875rem;
      font-weight: 600;
      color: var(--text-tertiary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .var-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
      margin-top: 10px;
    }
    .var-table th {
      text-align: left;
      padding: 6px 8px;
      font-size: 0.625rem;
      font-weight: 500;
      color: var(--text-placeholder);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      border-bottom: 1px solid var(--border-default);
    }
    .var-table td {
      padding: 6px 8px;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-secondary);
    }
    .var-table .var-name {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.6875rem;
      color: var(--accent-fg);
      font-weight: 500;
    }
    .var-type-badge {
      font-size: 0.5625rem;
      padding: 1px 5px;
      border-radius: var(--radius-sm);
      background: var(--neutral-subtle);
      color: var(--text-tertiary);
      font-family: "JetBrains Mono", monospace;
    }
    .required-dot {
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--danger-fg);
      margin-left: 4px;
    }

    .source-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--canvas-default);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      margin-bottom: 6px;
    }
    .source-icon {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }
    .source-info { flex: 1; min-width: 0; }
    .source-type {
      font-size: 0.75rem;
      font-weight: 500;
      font-family: "JetBrains Mono", monospace;
      color: var(--text-primary);
    }
    .source-label { font-size: 0.6875rem; color: var(--text-tertiary); }

    .budget-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--canvas-default);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      margin-top: 8px;
    }
    .budget-label { font-size: 0.6875rem; color: var(--text-tertiary); }
    .budget-value {
      font-size: 0.8125rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--text-primary);
    }

    .exec-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .exec-item {
      padding: 10px 12px;
      background: var(--canvas-default);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
    }
    .exec-item-label {
      font-size: 0.625rem;
      font-weight: 500;
      color: var(--text-placeholder);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 4px;
    }
    .exec-item-value {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .schema-block {
      background: var(--canvas-default);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: 12px;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.6875rem;
      line-height: 1.6;
      color: var(--text-secondary);
      max-height: 200px;
      overflow-y: auto;
      white-space: pre;
    }

    .detail-panel-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border-default);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .detail-panel-footer .btn { flex: 1; justify-content: center; }

    /* --- Create/Edit Modal --- */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: var(--z-modal);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { opacity: 1; pointer-events: auto; }
    .modal {
      width: 720px;
      max-width: 95vw;
      max-height: 85vh;
      background: var(--canvas-overlay);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      transform: scale(0.96) translateY(8px);
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .modal-backdrop.open .modal {
      transform: scale(1) translateY(0);
    }
    .modal-header {
      padding: 18px 24px 14px;
      border-bottom: 1px solid var(--border-default);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .modal-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .modal-body {

    function getFilteredPresets() {
      let list = [...PRESETS];

      // Tab filter
      if (currentTab === 'builtin') list = list.filter(p => p.builtin);
      else if (currentTab === 'user') list = list.filter(p => !p.builtin);

      // Category filter
      if (currentCategory !== 'all') {
        list = list.filter(p => p.tags.some(t => t === currentCategory));
      }

      // Search
      if (currentSearch) {
        const q = currentSearch.toLowerCase();
        list = list.filter(p =>
          p.name.toLowerCase().includes(q) ||
          p.description.toLowerCase().includes(q) ||
          p.tags.some(t => t.includes(q))
        );
      }

      // Sort
      if (currentSort === 'updated') {
        list.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
      } else {
        list.sort((a, b) => a.name.localeCompare(b.name));
      }

      return list;

      return text.replace(/\{\{(\w+)\}\}/g, '<span class="var-highlight">{{$1}}</span>');

    function formatChars(n) {
      if (n >= 1000) return (n / 1000).toFixed(0) + 'K';
      return n.toString();
    }

            </span>

                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="4" width="8" height="8" rx="1.5"/><path d="M4 10H3a1.5 1.5 0 01-1.5-1.5V3A1.5 1.5 0 013 1.5h5.5A1.5 1.5 0 0110 3v1"/></svg>

    function renderList() {
      const list = getFilteredPresets();

      if (!list.length) {
        body.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-title">No presets found</div></div>`;
        return;
      }
      body.innerHTML = list.map(p => `
        <div class="preset-list-row ${p.enabled ? '' : 'disabled'}" onclick="openDetail('${p.id}')">

            <div class="preset-card-icon ${p.iconClass}" style="width:26px;height:26px;font-size:13px">${p.icon}</div>

    function updateTabCounts() {
      const all = PRESETS.length;
      const builtin = PRESETS.filter(p => p.builtin).length;
      const user = PRESETS.filter(p => !p.builtin).length;
      document.getElementById('tabCountAll').textContent = all;
      document.getElementById('tabCountBuiltin').textContent = builtin;
      document.getElementById('tabCountUser').textContent = user;
    }

    function renderAll() {
      renderGrid();
      renderList();
      updateTabCounts();
    }

    // =====================================================
    // INTERACTIONS
    // =====================================================
    function setView(view) {
      currentView = view;
      document.getElementById('gridViewBtn').classList.toggle('active', view === 'grid');
      document.getElementById('listViewBtn').classList.toggle('active', view === 'list');
      const grid = document.getElementById('presetGrid');
      const list = document.getElementById('presetList');
      if (view === 'grid') {
        grid.classList.add('active');
        grid.style.display = '';
        list.classList.remove('active');
        list.style.display = 'none';
      } else {
        grid.classList.remove('active');
        grid.style.display = 'none';
        list.classList.add('active');
        list.style.display = '';
      }
    }

    function setTab(el) {
      document.querySelectorAll('#presetTabs .tab-nav-item').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      currentTab = el.dataset.tab;
      renderAll();
    }

    function setCategory(el) {
      document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      currentCategory = el.dataset.category;
      renderAll();
    }

    function filterPresets() {
      currentSearch = document.getElementById('presetSearch').value;
      currentSort = document.getElementById('sortSelect').value;
      renderAll();
    }

    function togglePreset(id, enabled) {
      const p = PRESETS.find(x => x.id === id);
      if (p) {
        p.enabled = enabled;
        renderAll();
        showToast(`${p.name} ${enabled ? 'enabled' : 'disabled'}`, enabled ? 'success' : 'info');
      }
    }

    function toggleMenu(id) {
      if (openMenuId && openMenuId !== id) {
        const old = document.getElementById('menu-' + openMenuId);
        if (old) old.classList.remove('open');
      }
      const menu = document.getElementById('menu-' + id);
      if (menu) {
        menu.classList.toggle('open');
        openMenuId = menu.classList.contains('open') ? id : null;
      }
    }

    document.addEventListener('click', (e) => {
      if (openMenuId && !e.target.closest('.more-menu-wrap')) {
        const menu = document.getElementById('menu-' + openMenuId);
        if (menu) menu.classList.remove('open');
        openMenuId = null;
      }
    });

    function duplicatePreset(id) {
      const p = PRESETS.find(x => x.id === id);
      if (p) {
        showToast(`Duplicated '${p.name}'`, 'success');
        toggleMenu(id);
      }
    }

    function exportPreset(id) {
      const p = PRESETS.find(x => x.id === id);
      if (p) {
        showToast(`Exported '${p.name}' as JSON`, 'info');
        toggleMenu(id);
      }
    }

    function deletePreset(id) {
      const p = PRESETS.find(x => x.id === id);
      if (p && confirm(`Delete preset "${p.name}"? This cannot be undone.`)) {
        const idx = PRESETS.findIndex(x => x.id === id);
        if (idx >= 0) PRESETS.splice(idx, 1);
        renderAll();
        showToast(`Deleted '${p.name}'`, 'danger');
        closeDetail();
      }
      toggleMenu(id);
    }

              </div>

            <div class="budget-bar">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="4" width="12" height="6" rx="1.5"/><path d="M4 4V3a3 3 0 016 0v1"/></svg>

            </span>

    function closeDetail() {
      document.getElementById('detailBackdrop').classList.remove('open');
      document.getElementById('detailPanel').classList.remove('open');
    }

    function toggleSection(trigger) {
      const body = trigger.nextElementSibling;
      const chevron = trigger.querySelector('.detail-section-chevron');
      const isOpen = body.classList.contains('open');
      body.classList.toggle('open');
      trigger.classList.toggle('expanded', !isOpen);
      if (chevron) chevron.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(90deg)';
    }

    // MODAL
    // =====================================================

            <label class="form-label">Paste JSON</label>
            <textarea class="form-input" rows="12" placeholder='{"id": "...", "name": "...", ...}'></textarea>

          <div class="form-section-label">Basic Information</div>
          <div class="form-row">

              <input type="text" class="form-input" placeholder="e.g. Session Summary" value="${isEdit ? p.name : ''}">

          <div class="form-group">

            <label class="form-label">User Prompt</label>
            <textarea class="form-input" rows="3" placeholder="Analyze {{sessionId}}...">${isEdit ? p.prompt.user : ''}</textarea>
            <span class="form-hint">Use {{variableName}} for template variables</span>
          </div>

          <div class="form-section-label" style="margin-top:4px">Variables</div>
          <div class="var-rows" id="varRows">
            ${(isEdit ? p.prompt.variables : [{ name: '', type: 'string', required: true, description: '', default: null }]).map((v, i) => `
              <div class="var-row">
                <input type="text" class="form-input" placeholder="name" value="${v.name}">
                <select class="form-select" style="padding:5px 24px 5px 8px;font-size:0.75rem">
                  <option ${v.type === 'string' ? 'selected' : ''}>string</option>
                  <option ${v.type === 'number' ? 'selected' : ''}>number</option>
                  <option ${v.type === 'boolean' ? 'selected' : ''}>boolean</option>
                  <option ${v.type === 'session_ref' ? 'selected' : ''}>session_ref</option>
                  <option ${v.type === 'session_list' ? 'selected' : ''}>session_list</option>
                </select>
                <input type="text" class="form-input" placeholder="default" value="${v.default || ''}">
                <label class="checkbox-inline"><input type="checkbox" ${v.required ? 'checked' : ''}> Req</label>
                <button class="var-remove-btn" onclick="this.closest('.var-row').remove()">
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="3" x2="11" y2="11"/><line x1="11" y1="3" x2="3" y2="11"/></svg>
                </button>
              </div>
            `).join('')}
          </div>
          <button class="add-var-btn" onclick="addVariableRow()">+ Add Variable</button>

          <div class="form-section-label" style="margin-top:4px">Context Sources</div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Max Context Chars</label>
              <input type="number" class="form-input" placeholder="50000" value="${isEdit ? p.context.maxChars : '50000'}">
            </div>
            <div class="form-group">
              <label class="form-label">Context Format</label>
              <select class="form-select">
                <option ${(isEdit && p.context.format === 'markdown') ? 'selected' : ''}>markdown</option>
                <option ${(isEdit && p.context.format === 'json') ? 'selected' : ''}>json</option>
              </select>
            </div>
          </div>

          <div class="form-section-label" style="margin-top:4px">Output</div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Output Format</label>
              <select class="form-select">
                <option ${(isEdit && p.output.format === 'json') ? 'selected' : ''}>json</option>
                <option ${(isEdit && p.output.format === 'markdown') ? 'selected' : ''}>markdown</option>
                <option ${(isEdit && p.output.format === 'text') ? 'selected' : ''}>text</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Validation</label>
              <select class="form-select">
                <option ${(isEdit && p.output.validation === 'strict') ? 'selected' : ''}>strict</option>
                <option ${(isEdit && p.output.validation === 'warn') ? 'selected' : ''}>warn</option>
                <option ${(isEdit && p.output.validation === 'none') ? 'selected' : ''}>none</option>
              </select>
            </div>
          </div>

          <div class="form-section-label" style="margin-top:4px">Execution</div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Model Override</label>
              <select class="form-select">
                <option value="" ${!(isEdit && p.execution.modelOverride) ? 'selected' : ''}>Default (no override)</option>
                <option value="claude-opus-4.6" ${(isEdit && p.execution.modelOverride === 'claude-opus-4.6') ? 'selected' : ''}>claude-opus-4.6</option>
                <option value="claude-sonnet-4.6" ${(isEdit && p.execution.modelOverride === 'claude-sonnet-4.6') ? 'selected' : ''}>claude-sonnet-4.6</option>
                <option value="claude-haiku-4.5" ${(isEdit && p.execution.modelOverride === 'claude-haiku-4.5') ? 'selected' : ''}>claude-haiku-4.5</option>
                <option value="gpt-5.4" ${(isEdit && p.execution.modelOverride === 'gpt-5.4') ? 'selected' : ''}>gpt-5.4</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Priority</label>
              <select class="form-select">
                <option ${(isEdit && p.execution.priority === 'low') ? 'selected' : ''}>low</option>
                <option ${(!isEdit || p.execution.priority === 'normal') ? 'selected' : ''}>normal</option>
                <option ${(isEdit && p.execution.priority === 'high') ? 'selected' : ''}>high</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Timeout (seconds)</label>
              <input type="number" class="form-input" placeholder="120" value="${isEdit ? p.execution.timeoutSeconds : '120'}">
            </div>
            <div class="form-group">
              <label class="form-label">Max Retries</label>
              <input type="number" class="form-input" placeholder="2" value="${isEdit ? p.execution.maxRetries : '2'}">
            </div>
          </div>
        `;
      }

      document.getElementById('modalBackdrop').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modalBackdrop').classList.remove('open');
    }

    function savePreset() {
      closeModal();
      showToast('Preset saved successfully', 'success');
    }

    function addVariableRow() {
      const rows = document.getElementById('varRows');
      const row = document.createElement('div');
      row.className = 'var-row';
      row.innerHTML = `
        <input type="text" class="form-input" placeholder="name">
        <select class="form-select" style="padding:5px 24px 5px 8px;font-size:0.75rem">
          <option>string</option><option>number</option><option>boolean</option><option>session_ref</option><option>session_list</option>
        </select>
        <input type="text" class="form-input" placeholder="default">
        <label class="checkbox-inline"><input type="checkbox"> Req</label>
        <button class="var-remove-btn" onclick="this.closest('.var-row').remove()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="3" x2="11" y2="11"/><line x1="11" y1="3" x2="3" y2="11"/></svg>
        </button>
      `;
      rows.appendChild(row);
    }

    // =====================================================
    // TOASTS
    // =====================================================
    function showToast(message, type) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type || 'info'}`;
      const icons = { success: '✓', danger: '✕', info: 'ℹ' };
      toast.innerHTML = `<span style="font-weight:600">${icons[type] || 'ℹ'}</span> ${message}`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3200);
    }

    // =====================================================
    // KEYBOARD
    // =====================================================
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeDetail();
        closeModal();
      }
    });

    // =====================================================
    // INIT
    // =====================================================
    renderAll();
    // Initialize list view as hidden
    document.getElementById('presetList').style.display = 'none';
  </script>
</body>
</html>
