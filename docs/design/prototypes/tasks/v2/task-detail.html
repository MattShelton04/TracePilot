<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Detail — Summarize auth refactor session — TracePilot</title>
  <link rel="stylesheet" href="../../shared/design-system-c.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ================================================================
       Task Detail v2 — Page-specific styles
       Extends design-system-c.css for /tasks/:id deep-dive
       ================================================================ */

    /* --- Status badge colours --- */
    .status-pending    { --status-color: #a1a1aa; }
    .status-claimed    { --status-color: #60a5fa; }
    .status-in-progress{ --status-color: #6366f1; }
    .status-done       { --status-color: #34d399; }
    .status-failed     { --status-color: #f87171; }
    .status-cancelled  { --status-color: #fbbf24; }
    .status-expired    { --status-color: #a78bfa; }
    .status-dead-letter{ --status-color: #ef4444; }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 16px;
      border-radius: var(--radius-md);
      font-size: 0.8125rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      background: color-mix(in srgb, var(--status-color) 15%, transparent);
      color: var(--status-color);
      border: 1px solid color-mix(in srgb, var(--status-color) 25%, transparent);
    }
    .status-badge .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--status-color);
    }
    .status-badge.status-in-progress .status-dot {
      animation: statusPulse 2s ease-in-out infinite;
    }
    @keyframes statusPulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 color-mix(in srgb, var(--status-color) 40%, transparent); }
      50%      { opacity: 0.6; box-shadow: 0 0 0 4px transparent; }
    }

    /* --- Page header --- */
    .detail-header {
      padding: 20px 28px 18px;
      border-bottom: 1px solid var(--border-default);
      background: var(--canvas-subtle);
      background-image: var(--gradient-surface);
      flex-shrink: 0;
    }
    .detail-header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }
    .detail-header-left {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
    }
    .detail-title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .detail-title {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: var(--text-primary);
      line-height: 1.3;
    }
    .detail-meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: var(--radius-sm);
      font-size: 0.6875rem;
      font-weight: 500;
      background: var(--neutral-subtle);
      color: var(--text-secondary);
      border: 1px solid var(--border-subtle);
    }
    .meta-chip .chip-icon { opacity: 0.5; font-size: 11px; }
    .meta-chip.type-chip { background: var(--done-subtle); color: var(--done-fg); border-color: var(--done-muted); }
    .meta-chip.priority-chip { background: var(--accent-subtle); color: var(--accent-fg); border-color: var(--accent-muted); }
    .meta-chip.id-chip { font-family: "JetBrains Mono", monospace; font-size: 0.625rem; letter-spacing: 0; }
    .meta-sep {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--text-placeholder);
      flex-shrink: 0;
    }
    .detail-header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
      padding-top: 2px;
    }

    /* --- Tab bar --- */
    .detail-tabs {
      display: flex;
      gap: 0;
      padding: 0 28px;
      border-bottom: 1px solid var(--border-default);
      background: var(--canvas-subtle);
      flex-shrink: 0;
      overflow-x: auto;
    }
    .detail-tab {
      padding: 10px 16px;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-tertiary);
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all var(--transition-fast);
      white-space: nowrap;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .detail-tab:hover { color: var(--text-primary); }
    .detail-tab.active {
      color: var(--text-primary);
      border-bottom-color: var(--accent-emphasis);
    }
    .detail-tab .tab-icon { font-size: 13px; opacity: 0.5; }
    .detail-tab.active .tab-icon { opacity: 0.8; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* --- Stagger animation --- */
    @keyframes slideUpFade {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .stagger { animation: slideUpFade 0.35s cubic-bezier(0.23, 1, 0.32, 1) both; }
    .stagger:nth-child(1) { animation-delay: 0.03s; }
    .stagger:nth-child(2) { animation-delay: 0.08s; }
    .stagger:nth-child(3) { animation-delay: 0.13s; }
    .stagger:nth-child(4) { animation-delay: 0.18s; }
    .stagger:nth-child(5) { animation-delay: 0.23s; }
    .stagger:nth-child(6) { animation-delay: 0.28s; }

    /* --- Section card --- */
    .section {
      background: var(--canvas-subtle);
      background-image: var(--gradient-card);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .section + .section { margin-top: 16px; }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border-default);
      gap: 10px;
    }
    .section-label {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-tertiary);
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .section-label .s-icon { font-size: 13px; opacity: 0.5; }
    .section-body { padding: 18px; }

    /* --- Result summary card --- */
    .summary-card {
      background: var(--canvas-default);
      border: 1px solid var(--border-muted);
      border-radius: var(--radius-md);
      padding: 18px 20px;
      font-size: 0.875rem;
      line-height: 1.7;
      color: var(--text-primary);
      position: relative;
    }
    .summary-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--gradient-accent);
      border-radius: 3px 0 0 3px;
    }
    .summary-label {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-tertiary);
      margin-bottom: 8px;
    }

    /* --- Findings cards --- */
    .finding-card {
      background: var(--canvas-default);
      border: 1px solid var(--border-muted);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      transition: all var(--transition-normal);
    }
    .finding-card:hover {
      border-color: var(--border-accent);
      box-shadow: 0 0 0 1px var(--border-glow);
    }
    .finding-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .finding-category {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-tertiary);
    }
    .impact-badge {
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      font-size: 0.625rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .impact-critical { background: rgba(248,113,113,0.15); color: #f87171; border: 1px solid rgba(248,113,113,0.25); }
    .impact-high     { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.25); }
    .impact-medium   { background: rgba(96,165,250,0.15); color: #60a5fa; border: 1px solid rgba(96,165,250,0.25); }
    .impact-low      { background: var(--neutral-subtle); color: var(--neutral-fg); border: 1px solid var(--neutral-muted); }
    .finding-text {
      font-size: 0.8125rem;
      line-height: 1.6;
      color: var(--text-primary);
    }

    /* --- Stat grid --- */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }
    .mini-stat {
      background: var(--canvas-default);
      border: 1px solid var(--border-muted);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      text-align: center;
    }
    .mini-stat-value {
      font-size: 1.375rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      line-height: 1.2;
    }
    .mini-stat-value.accent { color: var(--accent-fg); }
    .mini-stat-value.success { color: var(--success-fg); }
    .mini-stat-value.warning { color: var(--warning-fg); }
    .mini-stat-value.done { color: var(--done-fg); }
    .mini-stat-label {
      font-size: 0.6875rem;
      color: var(--text-tertiary);
      margin-top: 4px;
      font-weight: 500;
    }

    /* --- Recommendations list --- */
    .rec-list { list-style: none; padding: 0; margin: 0; }
    .rec-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 0.8125rem;
      line-height: 1.6;
      color: var(--text-primary);
    }
    .rec-item:last-child { border-bottom: none; }
    .rec-num {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--accent-muted);
      color: var(--accent-fg);
      font-size: 0.6875rem;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* --- Schema badge --- */
    .schema-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius-md);
      font-size: 0.8125rem;
      font-weight: 600;
    }
    .schema-valid {
      background: var(--success-muted);
      color: var(--success-fg);
      border: 1px solid rgba(52,211,153,0.25);
    }
    .schema-invalid {
      background: var(--danger-muted);
      color: var(--danger-fg);
      border: 1px solid rgba(251,113,133,0.25);
    }

    /* --- Export buttons row --- */
    .export-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* --- Context tab --- */
    .prompt-block {
      background: var(--canvas-inset);
      border: 1px solid var(--border-muted);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .prompt-block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: var(--canvas-default);
      border-bottom: 1px solid var(--border-muted);
      font-size: 0.6875rem;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .prompt-block-body {
      padding: 14px 16px;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.6875rem;
      line-height: 1.8;
      color: var(--text-secondary);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 220px;
      overflow-y: auto;
    }
    .var-highlight {
      background: var(--accent-muted);
      color: var(--accent-fg);
      padding: 1px 5px;
      border-radius: 3px;
      font-weight: 500;
    }

    /* Variables table */
    .var-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 0.8125rem;
    }
    .var-table th {
      text-align: left;
      padding: 8px 14px;
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--border-default);
      background: var(--canvas-default);
    }
    .var-table td {
      padding: 9px 14px;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-primary);
    }
    .var-table tbody tr { transition: background var(--transition-fast); }
    .var-table tbody tr:hover { background: var(--neutral-subtle); }

    /* Context source cards */
    .ctx-source {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border-subtle);
      transition: background var(--transition-fast);
    }
    .ctx-source:last-child { border-bottom: none; }
    .ctx-source:hover { background: var(--neutral-subtle); }
    .ctx-source-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .ctx-source-icon {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }
    .ctx-source-icon.session { background: var(--accent-muted); color: var(--accent-fg); }
    .ctx-source-icon.analytics { background: var(--done-muted); color: var(--done-fg); }
    .ctx-source-icon.code { background: var(--success-muted); color: var(--success-fg); }
    .ctx-source-name {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-primary);
    }
    .ctx-source-desc {
      font-size: 0.6875rem;
      color: var(--text-tertiary);
      margin-top: 2px;
    }
    .ctx-source-size {
      font-size: 0.6875rem;
      color: var(--text-tertiary);
      font-variant-numeric: tabular-nums;
      font-weight: 500;
    }

    /* Token budget bar */
    .budget-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: var(--canvas-default);
      border: 1px solid var(--border-muted);
      border-radius: var(--radius-md);
    }
    .budget-label {
      font-size: 0.75rem;
      color: var(--text-tertiary);
      font-weight: 500;
      white-space: nowrap;
    }
    .budget-track {
      flex: 1;
      height: 10px;
      background: var(--neutral-muted);
      border-radius: var(--radius-full);
      overflow: hidden;
    }
    .budget-fill {
      height: 100%;
      border-radius: var(--radius-full);
      background: var(--gradient-accent);
      transition: width 0.8s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .budget-value {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    /* --- Timeline tab --- */
    .tl {
      position: relative;
      padding-left: 32px;
    }
    .tl::before {
      content: '';
      position: absolute;
      left: 11px;
      top: 8px;
      bottom: 8px;
      width: 2px;
      background: var(--border-default);
      border-radius: 1px;
    }
    .tl-step {
      position: relative;
      padding-bottom: 24px;
    }
    .tl-step:last-child { padding-bottom: 0; }
    .tl-dot {
      position: absolute;
      left: -25px;
      top: 3px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2.5px solid var(--canvas-subtle);
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tl-dot .dot-inner {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .tl-dot.created  { background: var(--neutral-fg); }
    .tl-dot.queued   { background: #a1a1aa; }
    .tl-dot.claimed  { background: #60a5fa; }
    .tl-dot.context  { background: var(--accent-fg); }
    .tl-dot.spawned  { background: var(--done-fg); }
    .tl-dot.running  { background: var(--warning-fg); animation: tlPulse 2s ease-in-out infinite; }
    .tl-dot.written  { background: var(--accent-fg); }
    .tl-dot.ingested { background: var(--success-fg); }
    .tl-dot.done     { background: var(--success-fg); box-shadow: 0 0 0 4px var(--success-muted); }
    @keyframes tlPulse {
      0%, 100% { box-shadow: 0 0 0 3px var(--warning-muted); }
      50%      { box-shadow: 0 0 0 6px rgba(251,191,36,0.06); }
    }
    .tl-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 3px;
    }
    .tl-title {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    .tl-time {
      font-size: 0.6875rem;
      color: var(--text-tertiary);
      font-variant-numeric: tabular-nums;
      font-family: "JetBrains Mono", monospace;
    }
    .tl-detail {
      font-size: 0.75rem;
      color: var(--text-tertiary);
      margin-top: 2px;
      line-height: 1.6;
    }
    .tl-detail code {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.6875rem;
      background: var(--canvas-default);
      padding: 1px 5px;
      border-radius: 3px;
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
    }
    .tl-duration {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      background: var(--neutral-subtle);
      border-radius: var(--radius-sm);
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--text-tertiary);
      font-variant-numeric: tabular-nums;
      margin-top: 6px;
    }
    .tl-expand-btn {
      font-size: 0.6875rem;
      color: var(--text-link);
      cursor: pointer;
      background: none;
      border: none;
      padding: 2px 0;
      margin-top: 4px;
      transition: color var(--transition-fast);
    }
    .tl-expand-btn:hover { color: var(--accent-fg); text-decoration: underline; }
    .tl-expand-content {
      display: none;
      margin-top: 8px;
      padding: 10px 14px;
      background: var(--canvas-default);
      border: 1px solid var(--border-muted);
      border-radius: var(--radius-md);
      font-size: 0.75rem;
      color: var(--text-tertiary);
      line-height: 1.6;
    }
    .tl-expand-content.open { display: block; animation: slideUpFade 0.25s ease; }

    /* --- Subagent tab --- */
    .agent-card {
      background: var(--canvas-default);
      border: 1px solid var(--border-muted);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .agent-card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .agent-avatar {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-md);
      background: var(--gradient-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(99,102,241,0.3);
    }
    .agent-info { flex: 1; min-width: 0; }
    .agent-name {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--text-primary);
      font-family: "JetBrains Mono", monospace;
      letter-spacing: -0.01em;
    }
    .agent-subtitle {
      font-size: 0.6875rem;
      color: var(--text-tertiary);
      margin-top: 2px;
    }
    .agent-card-body {
      padding: 18px 20px;
    }
    .agent-meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    @media (max-width: 760px) {
      .agent-meta-grid { grid-template-columns: 1fr; }
    }
    .agent-meta-item {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 0.8125rem;
    }
    .agent-meta-item:nth-child(odd) { padding-right: 16px; border-right: 1px solid var(--border-subtle); }
    .agent-meta-item:nth-child(even) { padding-left: 16px; }
    @media (max-width: 760px) {
      .agent-meta-item:nth-child(odd) { padding-right: 0; border-right: none; }
      .agent-meta-item:nth-child(even) { padding-left: 0; }
    }
    .agent-meta-label {
      color: var(--text-tertiary);
      font-weight: 500;
      min-width: 100px;
      flex-shrink: 0;
    }
    .agent-meta-value {
      color: var(--text-primary);
      word-break: break-word;
    }
    .agent-meta-value .font-mono {
      font-size: 0.75rem;
    }

    /* --- Raw tab --- */
    .raw-block {
      background: var(--canvas-inset);
      border: 1px solid var(--border-muted);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .raw-block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: var(--canvas-default);
      border-bottom: 1px solid var(--border-muted);
    }
    .raw-block-title {
      font-size: 0.6875rem;
      font-weight: 600;

  function fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function fmtTime(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  }

  function fmtDateTime(iso) {
    if (!iso) return '—';
    return `${fmtDate(iso)} at ${fmtTime(iso)}`;
  }

  function fmtDuration(startIso, endIso) {
    if (!startIso || !endIso) return '—';
    const ms = new Date(endIso) - new Date(startIso);
    const s = Math.floor(ms / 1000);
    if (s < 60) return `${s}s`;
    const m = Math.floor(s / 60);
    const rem = s % 60;
    return rem > 0 ? `${m}m ${rem}s` : `${m}m`;
  }

  function escHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function syntaxJson(obj) {
    const raw = JSON.stringify(obj, null, 2);
    return raw
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"([^"]+)":/g, '<span class="json-key">"$1"</span>:')
      .replace(/: "([^"]*)"/g, ': <span class="json-str">"$1"</span>')
      .replace(/: (-?\d+\.?\d*)/g, ': <span class="json-num">$1</span>')
      .replace(/: (true|false)/g, ': <span class="json-bool">$1</span>')
      .replace(/: (null)/g, ': <span class="json-null">$1</span>')
      .replace(/([[\]{}])/g, '<span class="json-bracket">$1</span>');
  }

      done: 'status-done', failed: 'status-failed', cancelled: 'status-cancelled',
      expired: 'status-expired', dead_letter: 'status-dead-letter'

    return map[s] || 'status-pending';
  }

      done: 'Done', failed: 'Failed', cancelled: 'Cancelled',
      expired: 'Expired', dead_letter: 'Dead Letter'

    return map[s] || s;

  function formatDetail(text) {
    return text.replace(/(sha256:[a-f0-9…]+|orch_[a-z0-9]+|tp-tsk_[a-z0-9]+|~\/[^\s]+)/g,
      '<code>$1</code>');
  }

  function toggleExpand(id, btn) {
    const el = document.getElementById(id);
    if (!el) return;
    const isOpen = el.classList.contains('open');
    el.classList.toggle('open');
    btn.textContent = isOpen ? 'Show details ›' : 'Hide details ‹';
  }

  // ================================================================
  // UTILITY FUNCTIONS
  // ================================================================

  function exportTask() {
    const data = { task, subagent, preset };
    downloadFile(`task-${task.id}.json`, JSON.stringify(data, null, 2));
    showToast('Exported task data');
  }

  function downloadFile(filename, content) {
    const blob = new Blob([content], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }

  function generateMarkdown() {
    const r = task.resultParsed;
    let md = `# ${r.title}\n\n`;
    md += `## Overview\n\n${r.overview}\n\n`;
    md += `## Key Findings\n\n`;
    r.keyFindings.forEach((f, i) => {
      md += `${i + 1}. **[${f.impact.toUpperCase()}] ${f.category}**: ${f.finding}\n`;
    });
    md += `\n## Metrics\n\n`;
    md += `| Metric | Value |\n|--------|-------|\n`;
    Object.entries(r.metrics).forEach(([k, v]) => {
      md += `| ${k.replace(/([A-Z])/g, ' $1').trim()} | ${v} |\n`;
    });
    md += `\n## Recommendations\n\n`;
    r.recommendations.forEach((rec, i) => {
      md += `${i + 1}. ${rec}\n`;
    });
    md += `\n---\n*Generated by TracePilot · Task: ${task.id} · ${fmtDateTime(task.completedAt)}*\n`;
    return md;
  }

  // Keyboard shortcut: 1-5 to switch tabs
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    const num = parseInt(e.key);
    if (num >= 1 && num <= 5) {
      const tabBtns = document.querySelectorAll('.detail-tab');
      if (tabBtns[num - 1]) tabBtns[num - 1].click();
    }
  });
  </script>
