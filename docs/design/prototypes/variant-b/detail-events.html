<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — Events</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/design-system-b.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <div class="page-header-bar">
        <nav class="breadcrumb">
          <a href="session-list.html">Sessions</a>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-current">OAuth Login Implementation</span>
        </nav>
      </div>
      <div class="page-content">
        <div class="page-content-inner">

          <!-- Tab Nav -->
          <nav class="tab-nav">
            <a class="tab-nav-item" href="detail-overview.html">Overview</a>
            <a class="tab-nav-item" href="detail-conversation.html">Conversation <span class="tab-count">3</span></a>
            <a class="tab-nav-item active" href="detail-events.html">Events <span class="tab-count">20</span></a>
            <a class="tab-nav-item" href="detail-todos.html">Todos <span class="tab-count">6</span></a>
            <a class="tab-nav-item" href="detail-metrics.html">Metrics</a>
          </nav>

          <!-- Events Table -->
          <div class="section-panel">
            <table class="data-table" style="font-size:0.75rem;">
              <thead>
                <tr>
                  <th style="width:60px;">#</th>
                  <th style="width:180px;">Type</th>
                  <th>Timestamp</th>
                  <th style="width:100px;">ID</th>
                </tr>
              </thead>
              <tbody id="eventsBody"></tbody>
            </table>
          </div>

          <!-- Pagination -->
          <div class="pagination mt-4">
            <button class="btn btn-sm btn-ghost" disabled>← Prev</button>
            <span class="pagination-info">1–20 of 20 events</span>
            <button class="btn btn-sm btn-ghost" disabled>Next →</button>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="../shared/shared.js"></script>
  <script>
    document.getElementById('sidebar').innerHTML = generateSidebar('sessions');

    const tbody = document.getElementById('eventsBody');
    MOCK_EVENTS.forEach((evt, i) => {
      const tr = document.createElement('tr');
      tr.className = 'fade-in';
      tr.innerHTML = `
        <td style="color:var(--text-placeholder);font-variant-numeric:tabular-nums;">${i + 1}</td>
        <td><span class="${eventBadgeClass(evt.eventType)}">${evt.eventType}</span></td>
        <td class="font-mono" style="font-size:0.6875rem;color:var(--text-tertiary);">${formatDate(evt.timestamp)}</td>
        <td class="font-mono" style="font-size:0.6875rem;color:var(--text-placeholder);">${evt.id}</td>
      `;
      tbody.appendChild(tr);
    });
  </script>
</body>
</html>
