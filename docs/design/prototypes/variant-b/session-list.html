<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — Sessions</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/design-system-b.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <div class="page-header-bar">
        <div>
          <div class="page-title" style="font-size:1.125rem;">Sessions</div>
          <div class="page-subtitle" style="font-size:0.75rem; margin-top:1px;">Recent coding sessions</div>
        </div>
      </div>
      <div class="page-content">
        <div class="page-content-inner">

          <!-- Toolbar -->
          <div class="toolbar mb-4">
            <div class="search-container">
              <span class="search-icon" id="searchIcon"></span>
              <input type="text" class="search-input" placeholder="Search sessions…" id="searchInput">
              <span class="search-shortcut">⌘K</span>
            </div>
            <select class="filter-select">
              <option>All repos</option>
              <option>acme/web-platform</option>
              <option>acme/api-server</option>
              <option>acme/infrastructure</option>
            </select>
            <select class="filter-select">
              <option>All models</option>
              <option>claude-opus-4.6</option>
              <option>gpt-5.4</option>
              <option>claude-sonnet-4.6</option>
            </select>
            <select class="filter-select">
              <option>Newest first</option>
              <option>Oldest first</option>
              <option>Most events</option>
              <option>Most turns</option>
            </select>
          </div>

          <!-- Session Cards Grid -->
          <div class="grid-cards" id="sessionGrid"></div>

        </div>
      </div>
    </div>
  </div>

  <script src="../shared/shared.js"></script>
  <script>
    document.getElementById('sidebar').innerHTML = generateSidebar('sessions');

    // Fix search icon
    document.getElementById('searchIcon').innerHTML = ICONS.search;

    // Render session cards
    const grid = document.getElementById('sessionGrid');
    MOCK_SESSIONS.forEach(s => {
      const card = document.createElement('a');
      card.href = 'detail-overview.html';
      card.style.textDecoration = 'none';
      card.className = 'card card-interactive fade-in';
      card.innerHTML = `
        <div class="session-card-title">${s.summary}</div>
        <div class="session-card-badges">
          <span class="badge badge-accent">${s.repository.split('/')[1]}</span>
          <span class="badge" style="background:rgba(63,185,80,0.15);color:#3fb950;border:1px solid rgba(63,185,80,0.3);">${s.branch}</span>
          <span class="badge badge-neutral">${s.currentModel}</span>
          <span class="badge badge-neutral">${s.hostType}</span>
        </div>
        <div class="session-card-footer">
          <div class="flex gap-3">
            <span class="session-card-stat">${s.turnCount} turns</span>
            <span class="session-card-stat">${formatNumber(s.eventCount)} events</span>
          </div>
          <span>${formatRelativeTime(s.createdAt)}</span>
        </div>
      `;
      grid.appendChild(card);
    });

    // Search filter
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      grid.querySelectorAll('.card').forEach((card, i) => {
        const match = MOCK_SESSIONS[i].summary.toLowerCase().includes(q) ||
                      MOCK_SESSIONS[i].repository.toLowerCase().includes(q);
        card.style.display = match ? '' : 'none';
      });
    });
  </script>
</body>
</html>
