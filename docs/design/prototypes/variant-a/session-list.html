<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — Sessions</title>
  <link rel="stylesheet" href="../shared/design-system-a.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <div class="page-header-bar">
        <span class="breadcrumb-current">Sessions</span>
      </div>
      <div class="page-content">
        <div class="page-content-inner">
          <!-- Page Title -->
          <div class="mb-6">
            <h1 class="page-title">Sessions</h1>
            <p class="page-subtitle">Browse and inspect your Copilot CLI sessions</p>
          </div>

          <!-- Toolbar -->
          <div class="toolbar mb-4">
            <div class="search-container">
              <span class="search-icon">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg>
              </span>
              <input type="text" class="search-input" placeholder="Search sessions…">
              <span class="search-shortcut">/</span>
            </div>
            <select class="filter-select">
              <option>All Repositories</option>
              <option>acme/web-platform</option>
              <option>acme/api-server</option>
              <option>acme/infrastructure</option>
            </select>
            <select class="filter-select">
              <option>All Branches</option>
              <option>feat/oauth-login</option>
              <option>fix/db-pooling</option>
              <option>test/payments</option>
              <option>feat/graphql-migration</option>
              <option>fix/xss-vuln</option>
              <option>feat/ci-pipeline</option>
            </select>
            <select class="filter-select">
              <option>Newest First</option>
              <option>Oldest First</option>
              <option>Most Events</option>
              <option>Most Turns</option>
            </select>
            <div class="toolbar-divider"></div>
            <button class="btn btn-sm">↻ Reindex</button>
          </div>

          <!-- Status Bar -->
          <div class="mb-4" style="font-size: 0.75rem; color: var(--text-tertiary);">
            Showing <strong id="session-count" style="color: var(--text-secondary);">0</strong> sessions
          </div>

          <!-- Session Card Grid -->
          <div class="grid-cards" id="session-grid"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="../shared/shared.js"></script>
  <script>
    document.getElementById('sidebar').innerHTML = generateSidebar('sessions');

    // Render session cards
    const grid = document.getElementById('session-grid');
    MOCK_SESSIONS.forEach(session => {
      const card = document.createElement('a');
      card.href = 'detail-overview.html';
      card.style.textDecoration = 'none';
      card.style.color = 'inherit';
      card.className = 'card card-interactive fade-in';
      card.innerHTML = `
        <div class="session-card-title card-title">${session.summary}</div>
        <div class="session-card-badges">
          <span class="badge badge-accent">${session.repository}</span>
          <span class="badge badge-success">${session.branch}</span>
          <span class="badge badge-done">${session.currentModel}</span>
          <span class="badge badge-neutral">${session.hostType}</span>
        </div>
        <div class="session-card-footer">
          <div class="flex gap-3">
            <span class="session-card-stat">⚡ ${formatNumber(session.eventCount)} events</span>
            <span class="session-card-stat">💬 ${session.turnCount} turns</span>
          </div>
          <span>${formatRelativeTime(session.updatedAt)}</span>
        </div>
      `;
      grid.appendChild(card);
    });

    document.getElementById('session-count').textContent = MOCK_SESSIONS.length;
  </script>
</body>
</html>
