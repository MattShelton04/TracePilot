<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — Events</title>
  <link rel="stylesheet" href="../shared/design-system-a.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <div class="page-header-bar">
        <nav class="breadcrumb">
          <a href="session-list.html">Sessions</a>
          <span class="breadcrumb-sep">›</span>
          <span class="breadcrumb-current">OAuth Login Implementation</span>
        </nav>
      </div>
      <div class="page-content">
        <div class="page-content-inner">
          <!-- Session Title -->
          <div class="mb-4">
            <h1 class="page-title">Implemented OAuth login with GitHub and Google providers</h1>
            <div class="flex gap-2 mt-2" style="flex-wrap: wrap;">
              <span class="badge badge-accent">acme/web-platform</span>
              <span class="badge badge-success">feat/oauth-login</span>
              <span class="badge badge-done">claude-opus-4.6</span>
              <span class="badge badge-neutral">cli</span>
            </div>
          </div>

          <!-- Tab Nav -->
          <nav class="tab-nav">
            <a class="tab-nav-item" href="detail-overview.html">Overview</a>
            <a class="tab-nav-item" href="detail-conversation.html">Conversation <span class="tab-count">12</span></a>
            <a class="tab-nav-item active" href="detail-events.html">Events <span class="tab-count">2,450</span></a>
            <a class="tab-nav-item" href="detail-todos.html">Todos <span class="tab-count">6</span></a>
            <a class="tab-nav-item" href="detail-metrics.html">Metrics</a>
          </nav>

          <!-- Filter Bar -->
          <div class="toolbar mb-4">
            <select class="filter-select" id="event-type-filter">
              <option value="">All Event Types</option>
              <option value="session">Session</option>
              <option value="user">User</option>
              <option value="assistant">Assistant</option>
              <option value="tool">Tool</option>
            </select>
            <span style="font-size: 0.75rem; color: var(--text-tertiary);" id="event-count-display">
              Showing <strong style="color: var(--text-secondary);">20</strong> of <strong style="color: var(--text-secondary);">2,450</strong> events
            </span>
          </div>

          <!-- Data Table -->
          <div class="section-panel">
            <table class="data-table">
              <thead>
                <tr>
                  <th style="width: 50px;">#</th>
                  <th>Type</th>
                  <th>Time</th>
                  <th>ID</th>
                </tr>
              </thead>
              <tbody id="events-tbody"></tbody>
            </table>
          </div>

          <!-- Pagination -->
          <div class="pagination mt-4">
            <button class="btn btn-sm" disabled>← Previous</button>
            <span class="pagination-info">Page 1 of 25</span>
            <button class="btn btn-sm">Next →</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../shared/shared.js"></script>
  <script>
    document.getElementById('sidebar').innerHTML = generateSidebar('sessions');

    function renderEvents(events) {
      const tbody = document.getElementById('events-tbody');
      tbody.innerHTML = '';
      events.forEach((evt, i) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td style="color: var(--text-tertiary); font-size: 0.75rem;">${i + 1}</td>
          <td><span class="${eventBadgeClass(evt.eventType)}">${evt.eventType}</span></td>
          <td style="font-size: 0.8125rem;">${formatTime(evt.timestamp)}</td>
          <td><code class="font-mono" style="font-size: 0.75rem; color: var(--text-secondary);">${evt.id}</code></td>
        `;
        tbody.appendChild(row);
      });
    }

    renderEvents(MOCK_EVENTS);

    // Filter functionality
    document.getElementById('event-type-filter').addEventListener('change', function() {
      const val = this.value;
      if (!val) {
        renderEvents(MOCK_EVENTS);
      } else {
        renderEvents(MOCK_EVENTS.filter(e => e.eventType.startsWith(val)));
      }
    });
  </script>
</body>
</html>
