<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — Conversation</title>
  <link rel="stylesheet" href="../shared/design-system-a.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <div class="page-header-bar">
        <nav class="breadcrumb">
          <a href="session-list.html">Sessions</a>
          <span class="breadcrumb-sep">›</span>
          <span class="breadcrumb-current">OAuth Login Implementation</span>
        </nav>
      </div>
      <div class="page-content">
        <div class="page-content-inner">
          <!-- Session Title -->
          <div class="mb-4">
            <h1 class="page-title">Implemented OAuth login with GitHub and Google providers</h1>
            <div class="flex gap-2 mt-2" style="flex-wrap: wrap;">
              <span class="badge badge-accent">acme/web-platform</span>
              <span class="badge badge-success">feat/oauth-login</span>
              <span class="badge badge-done">claude-opus-4.6</span>
              <span class="badge badge-neutral">cli</span>
            </div>
          </div>

          <!-- Tab Nav -->
          <nav class="tab-nav">
            <a class="tab-nav-item" href="detail-overview.html">Overview</a>
            <a class="tab-nav-item active" href="detail-conversation.html">Conversation <span class="tab-count">12</span></a>
            <a class="tab-nav-item" href="detail-events.html">Events <span class="tab-count">2,450</span></a>
            <a class="tab-nav-item" href="detail-todos.html">Todos <span class="tab-count">6</span></a>
            <a class="tab-nav-item" href="detail-metrics.html">Metrics</a>
          </nav>

          <!-- Stats Bar -->
          <div class="grid-3 mb-4" style="max-width: 480px;">
            <div class="stat-card" style="padding: 12px 16px;">
              <div class="stat-card-value accent" style="font-size: 1.25rem;" id="turn-count">0</div>
              <div class="stat-card-label">Turns</div>
            </div>
            <div class="stat-card" style="padding: 12px 16px;">
              <div class="stat-card-value accent" style="font-size: 1.25rem;" id="tool-count">0</div>
              <div class="stat-card-label">Tool Calls</div>
            </div>
            <div class="stat-card" style="padding: 12px 16px;">
              <div class="stat-card-value danger" style="font-size: 1.25rem;" id="failed-count">0</div>
              <div class="stat-card-label">Failed</div>
            </div>
          </div>

          <!-- View Mode Toggle -->
          <div class="flex items-center justify-between mb-4">
            <div class="btn-group">
              <button class="btn btn-sm active" id="view-chat">Chat</button>
              <button class="btn btn-sm" id="view-compact">Compact</button>
              <button class="btn btn-sm" id="view-timeline">Timeline</button>
            </div>
          </div>

          <!-- Chat View -->
          <div class="turn-group" id="conversation"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="../shared/shared.js"></script>
  <script>
    document.getElementById('sidebar').innerHTML = generateSidebar('sessions');

    // Compute stats
    let totalTools = 0, totalFailed = 0;
    MOCK_TURNS.forEach(t => {
      totalTools += t.toolCalls.length;
      totalFailed += t.toolCalls.filter(tc => !tc.success).length;
    });
    document.getElementById('turn-count').textContent = MOCK_TURNS.length;
    document.getElementById('tool-count').textContent = totalTools;
    document.getElementById('failed-count').textContent = totalFailed;

    // View mode toggle
    document.querySelectorAll('.btn-group .btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.btn-group .btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    // Render conversation
    const conv = document.getElementById('conversation');
    MOCK_TURNS.forEach((turn, idx) => {
      const toolCallsId = `tools-${idx}`;
      const toolCallsHtml = turn.toolCalls.map(tc => `
        <div class="tool-call-item">
          <span class="tool-call-icon">${toolIcon(tc.toolName)}</span>
          <span class="tool-call-name">${tc.toolName}</span>
          <span class="tool-call-args font-mono">${tc.args}</span>
          <span class="tool-call-status ${tc.success ? 'success' : 'failed'}">${tc.success ? '✓' : '✗'}</span>
          <span class="tool-call-duration">${formatDuration(tc.durationMs)}</span>
        </div>
      `).join('');

      conv.innerHTML += `
        <!-- User Turn -->
        <div class="turn-item fade-in">
          <div class="turn-avatar user">👤</div>
          <div class="turn-body">
            <div class="turn-header">
              <span class="turn-author">User</span>
              <span class="turn-meta">Turn ${turn.turnIndex} · ${formatTime(turn.timestamp)}</span>
            </div>
            <div class="turn-bubble user">${turn.userMessage}</div>
          </div>
        </div>

        <!-- Assistant Turn -->
        <div class="turn-item fade-in">
          <div class="turn-avatar assistant">🤖</div>
          <div class="turn-body">
            <div class="turn-header">
              <span class="turn-author">Assistant</span>
              <span class="badge badge-done" style="font-size: 0.625rem;">${turn.model}</span>
              <span class="turn-meta">${formatDuration(turn.durationMs)}</span>
            </div>
            <div class="turn-bubble assistant">${turn.assistantMessages[0]}</div>

            <!-- Tool Calls (Collapsible) -->
            <div class="tool-calls-container mt-2">
              <div class="tool-call-header" data-collapse="${toolCallsId}" style="cursor: pointer;">
                <span class="chevron" style="transition: transform 0.2s; display: inline-flex;">${ICONS.chevronRight}</span>
                <span>${turn.toolCalls.length} tool call${turn.toolCalls.length !== 1 ? 's' : ''}</span>
                ${totalFailed > 0 ? '' : ''}
              </div>
              <div id="${toolCallsId}" style="display: none;">
                ${toolCallsHtml}
              </div>
            </div>
          </div>
        </div>
      `;
    });

    // Re-init collapsibles for dynamically generated content
    initCollapsibles();
  </script>
</body>
</html>
