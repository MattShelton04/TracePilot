<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — Sessions</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/design-system-c.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" role="navigation" aria-label="Main navigation" id="sidebar"></aside>
    <div class="main-content">
      <div class="page-header-bar">
        <div>
          <h1 class="page-title" style="font-size:1.125rem;">Sessions</h1>
          <p class="page-subtitle" style="font-size:0.75rem; margin-top:1px;">Recent coding sessions</p>
        </div>
      </div>
      <div class="page-content">
        <div class="page-content-inner">

          <!-- Toolbar -->
          <div class="toolbar mb-4">
            <div class="search-container">
              <span class="search-icon" id="searchIcon"></span>
              <input type="text" class="search-input" placeholder="Search sessions…" id="searchInput" aria-label="Search sessions">
              <span class="search-shortcut">⌘K</span>
            </div>
            <select class="filter-select" id="filterRepo" aria-label="Filter by repository">
              <option value="">All Repos</option>
              <option>acme/web-platform</option>
              <option>acme/api-server</option>
              <option>acme/infrastructure</option>
            </select>
            <select class="filter-select" id="filterBranch" aria-label="Filter by branch">
              <option value="">All Branches</option>
              <option>feat/oauth-login</option>
              <option>fix/db-pooling</option>
              <option>test/payments</option>
              <option>feat/graphql-migration</option>
              <option>fix/xss-vuln</option>
              <option>feat/ci-pipeline</option>
              <option>feat/ws-notifications</option>
              <option>feat/dashboard</option>
              <option>perf/webpack-optimize</option>
            </select>
            <select class="filter-select" id="sortSelect" aria-label="Sort sessions">
              <option>Newest first</option>
              <option>Oldest first</option>
              <option>Most events</option>
              <option>Most turns</option>
            </select>
          </div>

          <!-- Status Bar -->
          <div class="mb-4" style="font-size: 0.75rem; color: var(--text-tertiary);">
            Showing <strong id="sessionCount" style="color: var(--text-secondary);">0</strong> sessions
          </div>

          <!-- Session Cards Grid -->
          <div class="grid-cards" id="sessionGrid"></div>

        </div>
      </div>
    </div>
  </div>

  <script src="../shared/shared.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('sidebar').innerHTML = generateSidebar('sessions');
      document.getElementById('searchIcon').innerHTML = ICONS.search;

      const grid = document.getElementById('sessionGrid');
      const countEl = document.getElementById('sessionCount');

      function renderCards(sessions) {
        grid.innerHTML = '';
        sessions.forEach(s => {
          const card = document.createElement('a');
          card.href = 'detail-overview.html';
          card.style.textDecoration = 'none';
          card.className = 'card card-interactive fade-in';
          card.dataset.repo = s.repository;
          card.dataset.branch = s.branch;
          card.dataset.summary = s.summary.toLowerCase();
          card.innerHTML = `
            <div class="session-card-title">${s.summary}</div>
            <div class="session-card-badges">
              <span class="badge badge-accent">${s.repository}</span>
              <span class="badge badge-success">${s.branch}</span>
              <span class="badge badge-done">${s.currentModel}</span>
              <span class="badge badge-neutral">${s.hostType}</span>
            </div>
            <div class="session-card-footer">
              <div class="flex gap-3">
                <span class="session-card-stat">${formatNumber(s.eventCount)} events</span>
                <span class="session-card-stat">${s.turnCount} turns</span>
              </div>
              <span>${formatRelativeTime(s.createdAt)}</span>
            </div>
          `;
          grid.appendChild(card);
        });
        countEl.textContent = sessions.length;
      }

      renderCards(MOCK_SESSIONS);

      // Search filter
      function filterCards() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const repo = document.getElementById('filterRepo').value;
        const branch = document.getElementById('filterBranch').value;
        let visible = 0;
        grid.querySelectorAll('.card').forEach(card => {
          const matchSearch = !q || card.dataset.summary.includes(q) || card.dataset.repo.toLowerCase().includes(q);
          const matchRepo = !repo || card.dataset.repo === repo;
          const matchBranch = !branch || card.dataset.branch === branch;
          const show = matchSearch && matchRepo && matchBranch;
          card.style.display = show ? '' : 'none';
          if (show) visible++;
        });
        countEl.textContent = visible;
      }

      document.getElementById('searchInput').addEventListener('input', filterCards);
      document.getElementById('filterRepo').addEventListener('change', filterCards);
      document.getElementById('filterBranch').addEventListener('change', filterCards);
    });
  </script>
</body>
</html>
