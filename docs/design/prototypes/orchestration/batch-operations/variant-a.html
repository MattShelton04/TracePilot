<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Batch Operations — Pipeline Flow | TracePilot</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/design-system-c.css">
  <style>
    /* ── Stats row ─────────────────────────────────────── */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }

    /* ── Batch selector tabs ───────────────────────────── */
    .batch-tabs { display: flex; gap: 10px; margin-bottom: 22px; }
    .batch-tab {
      flex: 1; max-width: 380px; padding: 12px 16px;
      background: var(--canvas-raised); border: 1px solid var(--border-default);
      border-radius: var(--radius-lg); cursor: pointer;
      transition: border-color var(--transition-normal), box-shadow var(--transition-normal);
    }
    .batch-tab:hover { border-color: var(--border-muted); }
    .batch-tab.active { border-color: var(--accent-emphasis); box-shadow: var(--shadow-glow-accent); }
    .batch-tab-title { font-size: .875rem; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
    .batch-tab-meta { font-size: .75rem; color: var(--text-tertiary); display: flex; gap: 12px; align-items: center; }

    /* ── Toolbar row ───────────────────────────────────── */
    .toolbar-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
    .concurrency-control { display: flex; align-items: center; gap: 10px; font-size: .8125rem; color: var(--text-secondary); }
    .concurrency-control input[type=range] {
      -webkit-appearance: none; width: 110px; height: 4px;
      background: var(--border-default); border-radius: 2px; outline: none;
    }
    .concurrency-control input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: var(--accent-emphasis); cursor: pointer;
      border: 2px solid var(--canvas-default);
    }
    .concurrency-value { font-weight: 600; color: var(--accent-fg); min-width: 14px; text-align: center; }

    /* ── Aggregate progress ────────────────────────────── */
    .aggregate-progress { margin-bottom: 22px; }
    .aggregate-progress-label { font-size: .75rem; color: var(--text-tertiary); margin-bottom: 6px; display: flex; justify-content: space-between; }
    .aggregate-progress .progress-bar { height: 8px; }

    /* ── Pipeline ──────────────────────────────────────── */
    .pipeline { display: grid; grid-template-columns: 1fr auto 1fr auto 1fr auto 1fr; gap: 0; align-items: stretch; }
    .pipeline-stage {
      background: var(--canvas-subtle); border: 1px solid var(--border-default);
      border-radius: var(--radius-lg); padding: 16px 14px; min-height: 220px;
      display: flex; flex-direction: column; transition: border-color var(--transition-normal);
    }
    .pipeline-stage.highlight { border-color: var(--accent-emphasis); }
    .pipeline-stage-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .pipeline-stage-icon {
      width: 28px; height: 28px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .pipeline-stage-icon.configure { background: var(--accent-muted); color: var(--accent-fg); }
    .pipeline-stage-icon.queue { background: var(--warning-muted); color: var(--warning-fg); }
    .pipeline-stage-icon.running { background: var(--success-muted); color: var(--success-fg); }
    .pipeline-stage-icon.complete { background: var(--done-muted); color: var(--done-fg); }
    .pipeline-stage-name { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--text-tertiary); }
    .pipeline-stage-count { margin-left: auto; font-size: .6875rem; color: var(--text-placeholder); }
    .pipeline-stage-body { flex: 1; display: flex; flex-direction: column; gap: 10px; }

    /* Running stage lanes */
    .running-lanes { display: flex; flex-direction: column; gap: 10px; }
    .lane-slot {
      border: 1px dashed var(--border-muted); border-radius: var(--radius-md);
      padding: 6px; min-height: 60px; display: flex; align-items: center; justify-content: center;
      transition: all var(--transition-normal);
    }
    .lane-slot.occupied { border-style: solid; padding: 0; border-color: transparent; }
    .lane-slot.empty-slot { opacity: .35; }
    .lane-label { font-size: .6875rem; color: var(--text-placeholder); }

    /* ── Arrow connector ──────────────────────────────── */
    .pipeline-arrow {
      display: flex; align-items: center; justify-content: center;
      width: 36px; position: relative;
    }
    .pipeline-arrow::before {
      content: ''; display: block; width: 20px; height: 2px;
      background: var(--border-muted);
    }
    .pipeline-arrow::after {
      content: ''; position: absolute; right: 4px;
      border: 5px solid transparent; border-left-color: var(--border-muted);
    }

    /* ── Target card ──────────────────────────────────── */
    .target-card {
      background: var(--canvas-raised); border: 1px solid var(--border-default);
      border-radius: var(--radius-md); padding: 10px 12px;
      transition: border-color var(--transition-normal), transform var(--transition-normal);
    }
    .target-card:hover { border-color: var(--border-muted); transform: translateY(-1px); }
    .target-card-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .target-card-repo { font-size: .8125rem; font-weight: 600; color: var(--text-primary); }
    .target-card-branch { font-size: .6875rem; color: var(--text-tertiary); display: flex; align-items: center; gap: 3px; }
    .target-card-branch svg { width: 12px; height: 12px; }
    .target-card-footer { display: flex; align-items: center; gap: 10px; font-size: .6875rem; color: var(--text-tertiary); }
    .target-card-footer .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--border-muted); flex-shrink: 0; }

    /* Status-specific card accents */
    .target-card.status-running { border-left: 3px solid var(--success-fg); }
    .target-card.status-queued { border-left: 3px solid var(--warning-fg); }
    .target-card.status-completed { border-left: 3px solid var(--done-fg); }
    .target-card.status-failed { border-left: 3px solid var(--danger-fg); }

    /* ── Config display ───────────────────────────────── */
    .config-block { font-size: .8125rem; color: var(--text-secondary); }
    .config-block .config-label { font-size: .6875rem; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
    .config-block .config-value { margin-bottom: 10px; line-height: 1.5; word-break: break-word; }
    .config-block .config-prompt {
      background: var(--canvas-inset); border-radius: var(--radius-sm);
      padding: 8px 10px; font-size: .75rem; line-height: 1.5;
      border: 1px solid var(--border-subtle); color: var(--text-secondary);
      max-height: 80px; overflow-y: auto;
    }

    /* ── Pulse animation for running dot ──────────────── */
    @keyframes pulseDot { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
    .dot-running { width: 7px; height: 7px; border-radius: 50%; background: var(--success-fg); animation: pulseDot 1.4s ease-in-out infinite; flex-shrink: 0; }
    .dot-queued { width: 7px; height: 7px; border-radius: 50%; background: var(--warning-fg); flex-shrink: 0; }
    .dot-completed { width: 7px; height: 7px; border-radius: 50%; background: var(--done-fg); flex-shrink: 0; }
    .dot-failed { width: 7px; height: 7px; border-radius: 50%; background: var(--danger-fg); flex-shrink: 0; }

    /* ── Empty stage message ──────────────────────────── */
    .stage-empty { font-size: .75rem; color: var(--text-placeholder); text-align: center; padding: 20px 8px; }

    /* ── All-complete banner ──────────────────────────── */
    .all-complete-banner {
      display: flex; align-items: center; gap: 8px; padding: 10px 14px;
      background: var(--success-subtle); border: 1px solid var(--success-muted);
      border-radius: var(--radius-md); font-size: .8125rem; color: var(--success-fg); margin-bottom: 18px;
    }
    .all-complete-banner svg { width: 16px; height: 16px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <!-- Page header -->
      <div class="page-header-bar">
        <div class="breadcrumb">
          <span class="text-secondary" style="font-size:.8125rem;">Orchestration</span>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-current">Batch Operations</span>
        </div>
        <div style="margin-left:auto;">
          <button class="btn btn-primary btn-sm" id="btnNewBatch"></button>
        </div>
      </div>

      <div class="page-content">
        <div class="page-content-inner" style="max-width:1120px;">
          <h1 class="page-title">Batch Operations</h1>
          <p class="page-subtitle" style="margin-bottom:22px;">Pipeline view — watch targets flow through configure, queue, run, and complete stages.</p>

          <!-- Aggregate stats -->
          <div class="stats-row" id="statsRow"></div>

          <!-- Batch selector tabs -->
          <div class="batch-tabs" id="batchTabs"></div>

          <!-- Banner (shown when all complete) -->
          <div class="all-complete-banner hidden" id="completeBanner"></div>

          <!-- Aggregate progress -->
          <div class="aggregate-progress" id="aggregateProgress"></div>

          <!-- Toolbar: filters + concurrency -->
          <div class="toolbar-row" id="toolbar">
            <div class="btn-group" id="stageFilters">
              <button class="btn btn-sm active" data-filter="all">All Stages</button>
              <button class="btn btn-sm" data-filter="configure">Configure</button>
              <button class="btn btn-sm" data-filter="queue">Queue</button>
              <button class="btn btn-sm" data-filter="running">Running</button>
              <button class="btn btn-sm" data-filter="complete">Complete</button>
            </div>
            <div class="concurrency-control" id="concurrencyControl">
              <span>Concurrency</span>
              <input type="range" id="concurrencySlider" min="1" max="5" value="2">
              <span class="concurrency-value" id="concurrencyVal">2</span>
            </div>
          </div>

          <!-- Pipeline visualization -->
          <div class="pipeline" id="pipeline"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="../orchestration-shared.js"></script>
  <script>
    /* ── State ──────────────────────────────────────── */
    let activeBatchId = 'batch-1';
    let concurrency = 2;
    let activeFilter = 'all';

    /* ── Simulated per-target detail ────────────────── */
    const TARGET_DETAILS = {
      'batch-1': {
        prompt: 'Update ESLint config to use flat config format across all repositories. Migrate .eslintrc files to eslint.config.js and update any deprecated rule references.',
        concurrency: 2,
        targets: [
          { repo: 'web-platform', branch: 'batch/eslint-update', status: 'completed', turns: 6, elapsed: 314000, result: 'success' },
          { repo: 'api-server',   branch: 'batch/eslint-update', status: 'running',   turns: 4, elapsed: 202000, result: null },
          { repo: 'shared-libs',  branch: 'batch/eslint-update', status: 'queued',     turns: 0, elapsed: 0,      result: null },
        ],
      },
      'batch-2': {
        prompt: 'Add standard Apache-2.0 LICENSE header comment to every source file missing one. Preserve existing headers.',
        concurrency: 3,
        targets: [
          { repo: 'web-platform',  branch: 'batch/license-headers', status: 'completed', turns: 4, elapsed: 182000, result: 'success' },
          { repo: 'api-server',    branch: 'batch/license-headers', status: 'completed', turns: 3, elapsed: 145000, result: 'success' },
          { repo: 'shared-libs',   branch: 'batch/license-headers', status: 'completed', turns: 5, elapsed: 267000, result: 'success' },
          { repo: 'tracepilot',    branch: 'batch/license-headers', status: 'completed', turns: 4, elapsed: 198000, result: 'success' },
          { repo: 'infrastructure', branch: 'batch/license-headers', status: 'completed', turns: 3, elapsed: 130000, result: 'success' },
        ],
      },
    };

    /* ── Helpers ────────────────────────────────────── */
    function getBatch(id) { return ORCH_BATCH_JOBS.find(b => b.id === id); }
    function getModel(id) { return ORCH_MODELS.find(m => m.id === id); }

    function statusDotHtml(status) {
      const cls = { running: 'dot-running', queued: 'dot-queued', completed: 'dot-completed', failed: 'dot-failed' };
      return `<span class="${cls[status] || 'dot-completed'}"></span>`;
    }

    function targetCardHtml(t) {
      const elapsedStr = t.elapsed ? formatDuration(t.elapsed) : '—';
      const turnStr = t.turns > 0 ? `${t.turns} turns` : 'waiting';
      let badge = '';
      if (t.result === 'success') badge = '<span class="badge badge-success" style="font-size:.6875rem;padding:1px 6px;">success</span>';
      else if (t.result === 'fail') badge = '<span class="badge badge-danger" style="font-size:.6875rem;padding:1px 6px;">failed</span>';
      return `
        <div class="target-card status-${t.status}">
          <div class="target-card-header">
            ${statusDotHtml(t.status)}
            <span class="target-card-repo">${t.repo}</span>
            ${badge}
          </div>
          <div class="target-card-branch">${ORCH_ICONS.gitBranch} ${t.branch}</div>
          <div class="target-card-footer">
            <span>${turnStr}</span>
            <span class="dot"></span>
            <span>${elapsedStr}</span>
          </div>
        </div>`;
    }

    /* ── Render: Stats ─────────────────────────────── */
    function renderStats() {
      const jobs = ORCH_BATCH_JOBS;
      const total = jobs.length;
      const running = jobs.filter(j => j.status === 'running').length;
      const completed = jobs.filter(j => j.status === 'completed').length;
      const allTargets = Object.values(TARGET_DETAILS).flatMap(d => d.targets);
      const successCount = allTargets.filter(t => t.result === 'success').length;
      const doneCount = allTargets.filter(t => t.status === 'completed').length;
      const rate = doneCount > 0 ? Math.round((successCount / doneCount) * 100) : 0;

      document.getElementById('statsRow').innerHTML = `
        <div class="stat-card"><div class="stat-card-value">${total}</div><div class="stat-card-label">Total Jobs</div></div>
        <div class="stat-card"><div class="stat-card-value accent">${running}</div><div class="stat-card-label">Running</div></div>
        <div class="stat-card"><div class="stat-card-value success">${completed}</div><div class="stat-card-label">Completed</div></div>
        <div class="stat-card"><div class="stat-card-value" style="color:var(--done-fg)">${rate}%</div><div class="stat-card-label">Success Rate</div></div>`;
    }

    /* ── Render: Batch tabs ────────────────────────── */
    function renderBatchTabs() {
      const html = ORCH_BATCH_JOBS.map(job => {
        const active = job.id === activeBatchId ? ' active' : '';
        const model = getModel(job.model);
        const modelName = model ? model.name : job.model;
        const p = job.progress;
        const total = p.completed + p.running + p.queued + p.failed;
        const statusBadge = job.status === 'running'
          ? `<span class="badge badge-accent" style="font-size:.6875rem;padding:1px 6px;">running</span>`
          : `<span class="badge badge-success" style="font-size:.6875rem;padding:1px 6px;">completed</span>`;
        return `
          <div class="batch-tab${active}" data-batch="${job.id}">
            <div class="batch-tab-title">${statusBadge} ${job.name}</div>
            <div class="batch-tab-meta">
              <span>${total} targets</span>
              <span>${modelName}</span>
            </div>
          </div>`;
      }).join('');
      document.getElementById('batchTabs').innerHTML = html;

      document.querySelectorAll('.batch-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          activeBatchId = tab.dataset.batch;
          const detail = TARGET_DETAILS[activeBatchId];
          if (detail) concurrency = detail.concurrency;
          document.getElementById('concurrencySlider').value = concurrency;
          document.getElementById('concurrencyVal').textContent = concurrency;
          renderAll();
        });
      });
    }

    /* ── Render: Progress bar ──────────────────────── */
    function renderProgress() {
      const detail = TARGET_DETAILS[activeBatchId];
      if (!detail) return;
      const total = detail.targets.length;
      const done = detail.targets.filter(t => t.status === 'completed').length;
      const pct = Math.round((done / total) * 100);
      document.getElementById('aggregateProgress').innerHTML = `
        <div class="aggregate-progress-label">
          <span>${done} of ${total} targets complete</span>
          <span>${pct}%</span>
        </div>
        <div class="progress-bar"><div class="progress-bar-fill" style="width:${pct}%;"></div></div>`;
    }

    /* ── Render: Complete banner ────────────────────── */
    function renderBanner() {
      const batch = getBatch(activeBatchId);
      const el = document.getElementById('completeBanner');
      if (batch && batch.status === 'completed') {
        const detail = TARGET_DETAILS[activeBatchId];
        const dur = detail ? formatDuration(detail.targets.reduce((s, t) => s + t.elapsed, 0)) : '';
        el.innerHTML = `${ORCH_ICONS.check} All targets completed successfully — total elapsed ${dur}`;
        el.classList.remove('hidden');
      } else {
        el.classList.add('hidden');
      }
    }

    /* ── Render: Pipeline ──────────────────────────── */
    function renderPipeline() {
      const detail = TARGET_DETAILS[activeBatchId];
      const batch = getBatch(activeBatchId);
      if (!detail || !batch) return;

      const model = getModel(batch.model);
      const modelName = model ? model.name : batch.model;
      const queued   = detail.targets.filter(t => t.status === 'queued');
      const running  = detail.targets.filter(t => t.status === 'running');
      const complete = detail.targets.filter(t => t.status === 'completed');

      const show = s => activeFilter === 'all' || activeFilter === s;
      const hl = s => activeFilter === s ? ' highlight' : '';

      // Configure stage
      const configHtml = `
        <div class="pipeline-stage${hl('configure')}" ${show('configure') ? '' : 'style="opacity:.3"'}>
          <div class="pipeline-stage-header">
            <div class="pipeline-stage-icon configure">${ORCH_ICONS.config}</div>
            <span class="pipeline-stage-name">Configure</span>
          </div>
          <div class="pipeline-stage-body">
            <div class="config-block">
              <div class="config-label">Prompt</div>
              <div class="config-prompt">${detail.prompt}</div>
            </div>
            <div class="config-block" style="margin-top:6px;">
              <div class="config-label">Model</div>
              <div class="config-value">${modelName}</div>
            </div>
            <div class="config-block">
              <div class="config-label">Concurrency</div>
              <div class="config-value">${concurrency}</div>
            </div>
          </div>
        </div>`;

      // Queue stage
      const queueBody = queued.length
        ? queued.map(targetCardHtml).join('')
        : '<div class="stage-empty">No targets queued</div>';
      const queueHtml = `
        <div class="pipeline-stage${hl('queue')}" ${show('queue') ? '' : 'style="opacity:.3"'}>
          <div class="pipeline-stage-header">
            <div class="pipeline-stage-icon queue">${ORCH_ICONS.box}</div>
            <span class="pipeline-stage-name">Queue</span>
            <span class="pipeline-stage-count">${queued.length}</span>
          </div>
          <div class="pipeline-stage-body">${queueBody}</div>
        </div>`;

      // Running stage — lanes
      let lanesHtml = '';
      for (let i = 0; i < concurrency; i++) {
        if (running[i]) {
          lanesHtml += `<div class="lane-slot occupied">${targetCardHtml(running[i])}</div>`;
        } else {
          lanesHtml += `<div class="lane-slot empty-slot"><span class="lane-label">Lane ${i + 1} — idle</span></div>`;
        }
      }
      const runningHtml = `
        <div class="pipeline-stage${hl('running')}" ${show('running') ? '' : 'style="opacity:.3"'}>
          <div class="pipeline-stage-header">
            <div class="pipeline-stage-icon running">${ORCH_ICONS.play}</div>
            <span class="pipeline-stage-name">Running</span>
            <span class="pipeline-stage-count">${running.length}</span>
          </div>
          <div class="pipeline-stage-body">
            <div class="running-lanes">${lanesHtml}</div>
          </div>
        </div>`;

      // Complete stage
      const completeBody = complete.length
        ? complete.map(targetCardHtml).join('')
        : '<div class="stage-empty">No targets completed yet</div>';
      const completeHtml = `
        <div class="pipeline-stage${hl('complete')}" ${show('complete') ? '' : 'style="opacity:.3"'}>
          <div class="pipeline-stage-header">
            <div class="pipeline-stage-icon complete">${ORCH_ICONS.check}</div>
            <span class="pipeline-stage-name">Complete</span>
            <span class="pipeline-stage-count">${complete.length}</span>
          </div>
          <div class="pipeline-stage-body">${completeBody}</div>
        </div>`;

      const arrow = '<div class="pipeline-arrow"></div>';
      document.getElementById('pipeline').innerHTML =
        configHtml + arrow + queueHtml + arrow + runningHtml + arrow + completeHtml;
    }

    /* ── Render all ────────────────────────────────── */
    function renderAll() {
      renderStats();
      renderBatchTabs();
      renderBanner();
      renderProgress();
      renderPipeline();
    }

    /* ── Event: filter buttons ─────────────────────── */
    document.getElementById('stageFilters').addEventListener('click', e => {
      const btn = e.target.closest('[data-filter]');
      if (!btn) return;
      activeFilter = btn.dataset.filter;
      document.querySelectorAll('#stageFilters .btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderPipeline();
    });

    /* ── Event: concurrency slider ─────────────────── */
    document.getElementById('concurrencySlider').addEventListener('input', e => {
      concurrency = parseInt(e.target.value, 10);
      document.getElementById('concurrencyVal').textContent = concurrency;
      renderPipeline();
    });

    /* ── Init ──────────────────────────────────────── */
    document.getElementById('sidebar').innerHTML = generateOrchSidebar('batch');
    document.getElementById('btnNewBatch').innerHTML = `${ORCH_ICONS.plus} New Batch Job`;
    initTheme();
    renderAll();
  </script>
</body>
</html>
