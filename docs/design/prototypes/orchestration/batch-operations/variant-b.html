<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — Batch Operations (List with Progress Bars)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/design-system-c.css">
  <style>
    .batch-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .batch-tab {
      flex: 1; padding: 14px 18px; border-radius: var(--radius-lg); cursor: pointer;
      background: var(--canvas-subtle); border: 1px solid var(--border-default);
      transition: all var(--transition-normal); display: flex; align-items: center; gap: 12px;
    }
    .batch-tab:hover { border-color: var(--border-accent); }
    .batch-tab.active {
      border-color: var(--accent-emphasis); background: var(--accent-subtle);
      box-shadow: var(--shadow-glow-accent);
    }
    .batch-tab-name { font-size: 0.8125rem; font-weight: 600; }
    .batch-tab-meta { font-size: 0.6875rem; color: var(--text-tertiary); margin-top: 2px; }
    .batch-tab-progress { margin-left: auto; text-align: right; }
    .batch-tab-progress-label { font-size: 0.6875rem; color: var(--text-secondary); font-weight: 500; }
    .batch-header-card {
      background: var(--canvas-raised); border: 1px solid var(--border-default);
      border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px;
    }
    .batch-header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
    .batch-header-title { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
    .batch-header-prompt {
      font-size: 0.75rem; color: var(--text-secondary); line-height: 1.5;
      max-width: 600px; margin-bottom: 12px;
    }
    .batch-meta-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .batch-meta-item {
      display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--text-tertiary);
    }
    .batch-meta-item strong { color: var(--text-secondary); font-weight: 500; }
    .concurrency-control { display: flex; align-items: center; gap: 8px; }
    .concurrency-slider {
      -webkit-appearance: none; appearance: none; width: 80px; height: 4px;
      background: var(--border-default); border-radius: 2px; outline: none; cursor: pointer;
    }
    .concurrency-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; width: 14px; height: 14px;
      background: var(--accent-emphasis); border-radius: 50%; cursor: pointer;
      border: 2px solid var(--canvas-raised);
    }
    .concurrency-val {
      font-size: 0.75rem; font-weight: 600; color: var(--accent-fg);
      min-width: 16px; text-align: center;
    }
    .status-filters { display: flex; gap: 6px; margin-bottom: 16px; }
    .status-filter-btn {
      padding: 5px 12px; border-radius: var(--radius-full); font-size: 0.6875rem;
      font-weight: 500; cursor: pointer; border: 1px solid var(--border-default);
      background: transparent; color: var(--text-secondary); transition: all var(--transition-fast);
    }
    .status-filter-btn:hover { border-color: var(--border-accent); color: var(--text-primary); }
    .status-filter-btn.active {
      background: var(--accent-subtle); border-color: var(--accent-emphasis); color: var(--accent-fg);
    }
    .filter-count {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 16px; height: 16px; padding: 0 4px; border-radius: 8px;
      font-size: 0.5625rem; font-weight: 600; margin-left: 4px;
      background: var(--canvas-subtle); color: var(--text-tertiary);
    }
    .status-filter-btn.active .filter-count { background: var(--accent-muted); color: var(--accent-fg); }

    .target-list {
      background: var(--canvas-raised); border: 1px solid var(--border-default);
      border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 16px;
    }
    .target-row {
      display: grid; grid-template-columns: 180px 100px 1fr 90px 80px 40px;
      align-items: center; gap: 12px; padding: 14px 20px;
      border-bottom: 1px solid var(--border-subtle); transition: background var(--transition-fast);
    }
    .target-row:last-child { border-bottom: none; }
    .target-row:hover { background: var(--canvas-subtle); }
    .target-row-header {
      font-size: 0.6875rem; font-weight: 600; color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.04em; background: var(--canvas-subtle);
    }
    .target-row-header:hover { background: var(--canvas-subtle); }
    .target-repo { display: flex; align-items: center; gap: 8px; }
    .target-repo-icon { color: var(--text-tertiary); flex-shrink: 0; }
    .target-repo-name { font-size: 0.8125rem; font-weight: 600; }

    .status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: var(--radius-full); font-size: 0.6875rem; font-weight: 500;
    }
    .status-badge-queued { background: rgba(113, 113, 122, 0.15); color: var(--text-tertiary); }
    .status-badge-running {
      background: var(--accent-subtle); color: var(--accent-fg);
      animation: statusPulse 2s ease-in-out infinite;
    }
    .status-badge-completed { background: var(--success-subtle); color: var(--success-fg); }
    .status-badge-failed { background: var(--danger-subtle); color: var(--danger-fg); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; }
    .status-dot-queued { background: var(--text-placeholder); }
    .status-dot-running { background: var(--accent-fg); }
    .status-dot-completed { background: var(--success-fg); }
    .status-dot-failed { background: var(--danger-fg); }
    @keyframes statusPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

    .target-progress { display: flex; flex-direction: column; gap: 4px; }
    .progress-track {
      width: 100%; height: 6px; background: var(--border-default);
      border-radius: 3px; overflow: hidden;
    }
    .progress-fill-bar {
      height: 100%; border-radius: 3px; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .progress-fill-completed { background: var(--success-emphasis); }
    .progress-fill-running {
      background: var(--accent-emphasis);
      background-image: linear-gradient(-45deg,
        rgba(255,255,255,0.1) 25%, transparent 25%, transparent 50%,
        rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.1) 75%, transparent 75%);
      background-size: 20px 20px; animation: progressStripe 0.8s linear infinite;
    }
    .progress-fill-queued { background: var(--border-default); width: 0 !important; }
    .progress-fill-failed { background: var(--danger-emphasis); }
    @keyframes progressStripe { 0% { background-position: 0 0; } 100% { background-position: 20px 0; } }
    .target-turns, .target-time {
      font-size: 0.75rem; color: var(--text-tertiary); font-variant-numeric: tabular-nums;
    }
    .target-action { display: flex; justify-content: center; }
    .target-action-btn {
      background: none; border: none; color: var(--text-placeholder); cursor: pointer;
      padding: 4px; border-radius: var(--radius-md); transition: all var(--transition-fast);
    }
    .target-action-btn:hover { color: var(--accent-fg); background: var(--accent-subtle); }

    .aggregate-card {
      background: var(--canvas-raised); border: 1px solid var(--border-default);
      border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px;
    }
    .aggregate-progress-row { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
    .aggregate-track {
      flex: 1; height: 10px; background: var(--border-default); border-radius: 5px; overflow: hidden;
    }
    .aggregate-fill {
      height: 100%; border-radius: 5px;
      background: linear-gradient(90deg, var(--success-emphasis), var(--accent-emphasis));
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .aggregate-pct {
      font-size: 0.9375rem; font-weight: 700; color: var(--text-primary);
      min-width: 44px; text-align: right;
    }
    .aggregate-label { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 14px; }
    .stat-pills { display: flex; gap: 10px; flex-wrap: wrap; }
    .stat-pill {
      display: flex; align-items: center; gap: 6px; padding: 6px 14px;
      border-radius: var(--radius-full); background: var(--canvas-subtle);
      border: 1px solid var(--border-subtle); font-size: 0.75rem; font-weight: 500;
    }
    .stat-pill-count { font-weight: 700; font-variant-numeric: tabular-nums; }
    .stat-pill-success .stat-pill-count { color: var(--success-fg); }
    .stat-pill-running .stat-pill-count { color: var(--accent-fg); }
    .stat-pill-queued .stat-pill-count { color: var(--text-tertiary); }
    .stat-pill-failed .stat-pill-count { color: var(--danger-fg); }
    .stat-pill-label { color: var(--text-tertiary); }
    .aggregate-eta {
      margin-top: 14px; font-size: 0.6875rem; color: var(--text-placeholder);
      display: flex; align-items: center; gap: 6px;
    }
    .batch-actions { display: flex; gap: 8px; align-items: center; justify-content: flex-end; }
    .btn-warning {
      background: var(--warning-subtle); color: var(--warning-fg);
      border: 1px solid var(--warning-muted);
    }
    .btn-warning:hover { background: var(--warning-muted); }
    .btn-danger-ghost {
      background: transparent; color: var(--danger-fg); border: 1px solid var(--danger-muted);
    }
    .btn-danger-ghost:hover { background: var(--danger-subtle); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
    .model-badge {
      display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px;
      border-radius: var(--radius-full); font-size: 0.6875rem; font-weight: 500;
      background: var(--accent-subtle); color: var(--accent-fg); border: 1px solid var(--accent-muted);
    }
    .target-row.hidden { display: none; }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <div class="page-header-bar">
        <div class="breadcrumb">
          <a href="../orchestration-home/variant-a.html">Orchestration</a>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-current">Batch Operations</span>
        </div>
        <div style="margin-left:auto;display:flex;gap:8px;">
          <a href="variant-a.html" class="btn btn-sm btn-ghost">Variant A</a>
          <a href="variant-c.html" class="btn btn-sm btn-ghost">Variant C</a>
          <button class="btn btn-sm btn-primary" onclick="alert('Opening new batch job dialog...')">
            + New Batch Job
          </button>
        </div>
      </div>

      <div class="page-content">
        <div class="page-content-inner" style="max-width:960px;">
          <h1 class="page-title">Batch Operations</h1>
          <p class="page-subtitle" style="margin-bottom:20px;">Run the same task across multiple repositories in parallel</p>

          <!-- Batch Job Selector Tabs -->
          <div class="batch-tabs" id="batchTabs"></div>

          <!-- Batch Header Card -->
          <div class="batch-header-card" id="batchHeader"></div>

          <!-- Status Filters -->
          <div class="status-filters" id="statusFilters"></div>

          <!-- Target List -->
          <div class="target-list" id="targetList"></div>

          <!-- Aggregate Summary -->
          <div class="aggregate-card" id="aggregateSummary"></div>

          <!-- Action Buttons -->
          <div class="batch-actions" id="batchActions"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="../orchestration-shared.js"></script>
  <script>
    let activeBatchId = 'batch-1';
    let activeFilter = 'all';

    // Per-target detailed mock data
    const TARGET_DETAILS = {
      'batch-1': {
        'web-platform': { status: 'completed', turns: 6, totalTurns: 6, elapsed: 314000, progress: 100 },
        'api-server':   { status: 'running', turns: 4, totalTurns: 8, elapsed: 202000, progress: 52 },
        'shared-libs':  { status: 'queued', turns: 0, totalTurns: null, elapsed: 0, progress: 0 },
      },
      'batch-2': {
        'TracePilot':     { status: 'completed', turns: 3, totalTurns: 3, elapsed: 180000, progress: 100 },
        'api-server':     { status: 'completed', turns: 4, totalTurns: 4, elapsed: 245000, progress: 100 },
        'web-platform':   { status: 'completed', turns: 2, totalTurns: 2, elapsed: 98000, progress: 100 },
        'infrastructure': { status: 'completed', turns: 3, totalTurns: 3, elapsed: 156000, progress: 100 },
        'shared-libs':    { status: 'completed', turns: 2, totalTurns: 2, elapsed: 87000, progress: 100 },
      },
    };

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('sidebar').innerHTML = generateOrchSidebar('batch');
      initTheme();
      renderAll();
    });

    function renderAll() {
      renderBatchTabs();
      renderBatchHeader();
      renderStatusFilters();
      renderTargetList();
      renderAggregate();
      renderActions();
    }

    function selectBatch(id) {
      activeBatchId = id;
      activeFilter = 'all';
      renderAll();
    }

    // Batch Tabs
    function renderBatchTabs() {
      const el = document.getElementById('batchTabs');
      el.innerHTML = ORCH_BATCH_JOBS.map(job => {
        const total = job.targets.length;
        const done = job.progress.completed;
        const pct = Math.round((done / total) * 100);
        const isActive = job.id === activeBatchId;
        const statusLabel = job.status === 'completed' ? 'Completed' : 'Running';
        return `<div class="batch-tab${isActive ? ' active' : ''}" onclick="selectBatch('${job.id}')">
          <div>
            <div class="batch-tab-name">${job.name}</div>
            <div class="batch-tab-meta">${total} targets · ${statusLabel}</div>
          </div>
          <div class="batch-tab-progress">
            <div class="batch-tab-progress-label">${done}/${total} (${pct}%)</div>
          </div>
        </div>`;
      }).join('');
    }

    // Batch Header
    function renderBatchHeader() {
      const job = ORCH_BATCH_JOBS.find(j => j.id === activeBatchId);
      const model = ORCH_MODELS.find(m => m.id === job.model);
      const modelLabel = model ? `${model.icon} ${model.name}` : job.model;
      const statusClass = job.status === 'completed' ? 'status-badge-completed' : 'status-badge-running';
      const statusText = job.status === 'completed' ? 'Completed' : 'Running';
      const concurrencyDisabled = job.status === 'completed' ? 'disabled' : '';

      document.getElementById('batchHeader').innerHTML = `
        <div class="batch-header-top">
          <div>
            <div class="batch-header-title">${job.name}</div>
            <div class="batch-header-prompt">${job.prompt}</div>
            <div class="batch-meta-row">
              <div class="batch-meta-item">
                <span class="model-badge">${modelLabel}</span>
              </div>
              <div class="batch-meta-item">
                <span class="status-badge ${statusClass}">
                  <span class="status-dot status-dot-${job.status === 'completed' ? 'completed' : 'running'}"></span>
                  ${statusText}
                </span>
              </div>
              <div class="batch-meta-item">
                <strong>Started:</strong> ${formatRelativeTime(job.startedAt)}
              </div>
              <div class="batch-meta-item concurrency-control">
                <strong>Concurrency:</strong>
                <input type="range" class="concurrency-slider" min="1" max="5" value="2"
                  oninput="this.nextElementSibling.textContent=this.value" ${concurrencyDisabled}>
                <span class="concurrency-val">2</span>
              </div>
            </div>
          </div>
        </div>`;
    }

    // Status Filters
    function renderStatusFilters() {
      const details = TARGET_DETAILS[activeBatchId];
      const counts = { all: 0, queued: 0, running: 0, completed: 0, failed: 0 };
      Object.values(details).forEach(d => {
        counts.all++;
        counts[d.status] = (counts[d.status] || 0) + 1;
      });
      const filters = [
        { key: 'all', label: 'All' },
        { key: 'queued', label: 'Queued' },
        { key: 'running', label: 'Running' },
        { key: 'completed', label: 'Completed' },
        { key: 'failed', label: 'Failed' },
      ];
      document.getElementById('statusFilters').innerHTML = filters.map(f => {
        const isActive = activeFilter === f.key;
        return `<button class="status-filter-btn${isActive ? ' active' : ''}"
          onclick="setFilter('${f.key}')">${f.label}<span class="filter-count">${counts[f.key]}</span></button>`;
      }).join('');
    }

    function setFilter(key) {
      activeFilter = key;
      renderStatusFilters();
      applyFilter();
    }

    function applyFilter() {
      document.querySelectorAll('.target-row[data-status]').forEach(row => {
        if (activeFilter === 'all' || row.dataset.status === activeFilter) {
          row.classList.remove('hidden');
        } else {
          row.classList.add('hidden');
        }
      });
    }

    // Target List
    function renderTargetList() {
      const job = ORCH_BATCH_JOBS.find(j => j.id === activeBatchId);
      const details = TARGET_DETAILS[activeBatchId];

      let html = `<div class="target-row target-row-header">
        <div>Repository</div>
        <div>Status</div>
        <div>Progress</div>
        <div>Turns</div>
        <div>Elapsed</div>
        <div></div>
      </div>`;

      job.targets.forEach(targetId => {
        const d = details[targetId];
        const repo = ORCH_REPOS.find(r => r.id === targetId || r.name === targetId);
        const repoName = repo ? repo.name : targetId;

        const statusBadge = `<span class="status-badge status-badge-${d.status}">
          <span class="status-dot status-dot-${d.status}"></span>
          ${d.status.charAt(0).toUpperCase() + d.status.slice(1)}
        </span>`;

        const turnsLabel = d.totalTurns
          ? `Turn ${d.turns}/${d.status === 'completed' ? d.totalTurns : '~' + d.totalTurns}`
          : '—';

        const elapsed = d.elapsed > 0 ? formatDuration(d.elapsed) : '—';

        html += `<div class="target-row" data-status="${d.status}">
          <div class="target-repo">
            <span class="target-repo-icon">${ORCH_ICONS.gitBranch}</span>
            <span class="target-repo-name">${repoName}</span>
          </div>
          <div>${statusBadge}</div>
          <div class="target-progress">
            <div class="progress-track">
              <div class="progress-fill-bar progress-fill-${d.status}" style="width:${d.progress}%"></div>
            </div>
          </div>
          <div class="target-turns">${turnsLabel}</div>
          <div class="target-time">${elapsed}</div>
          <div class="target-action">
            <button class="target-action-btn" title="View session" onclick="alert('Opening session for ${repoName}...')">
              ${ORCH_ICONS.eye}
            </button>
          </div>
        </div>`;
      });

      document.getElementById('targetList').innerHTML = html;
      applyFilter();
    }

    // Aggregate Summary
    function renderAggregate() {
      const job = ORCH_BATCH_JOBS.find(j => j.id === activeBatchId);
      const details = TARGET_DETAILS[activeBatchId];
      const total = job.targets.length;
      const counts = { completed: 0, running: 0, queued: 0, failed: 0 };
      Object.values(details).forEach(d => { counts[d.status] = (counts[d.status] || 0) + 1; });

      const pct = Math.round((counts.completed / total) * 100);
      const etaText = job.status === 'completed'
        ? 'All targets completed'
        : `~${Math.ceil((counts.running + counts.queued) * 4)}m remaining (estimated)`;

      document.getElementById('aggregateSummary').innerHTML = `
        <div class="aggregate-label">${counts.completed} of ${total} targets complete (${pct}%)</div>
        <div class="aggregate-progress-row">
          <div class="aggregate-track">
            <div class="aggregate-fill" style="width:${pct}%"></div>
          </div>
          <div class="aggregate-pct">${pct}%</div>
        </div>
        <div class="stat-pills">
          <div class="stat-pill stat-pill-success">
            <span class="stat-pill-count">${counts.completed}</span>
            <span class="stat-pill-label">Completed</span>
          </div>
          <div class="stat-pill stat-pill-running">
            <span class="stat-pill-count">${counts.running}</span>
            <span class="stat-pill-label">Running</span>
          </div>
          <div class="stat-pill stat-pill-queued">
            <span class="stat-pill-count">${counts.queued}</span>
            <span class="stat-pill-label">Queued</span>
          </div>
          <div class="stat-pill stat-pill-failed">
            <span class="stat-pill-count">${counts.failed}</span>
            <span class="stat-pill-label">Failed</span>
          </div>
        </div>
        <div class="aggregate-eta">${ORCH_ICONS.pulse} ${etaText}</div>`;
    }

    // Action Buttons
    function renderActions() {
      const job = ORCH_BATCH_JOBS.find(j => j.id === activeBatchId);
      const details = TARGET_DETAILS[activeBatchId];
      const hasFailed = Object.values(details).some(d => d.status === 'failed');
      const isRunning = job.status === 'running';

      document.getElementById('batchActions').innerHTML = `
        <button class="btn btn-warning btn-sm" ${!isRunning ? 'disabled' : ''}
          onclick="alert('Pausing all running targets...')">⏸ Pause All</button>
        <button class="btn btn-danger-ghost btn-sm" ${!isRunning ? 'disabled' : ''}
          onclick="alert('Cancelling batch job...')">✕ Cancel</button>
        <button class="btn btn-primary btn-sm" ${!hasFailed ? 'disabled' : ''}
          onclick="alert('Retrying failed targets...')">↻ Retry Failed</button>`;
    }
  </script>
</body>
</html>
