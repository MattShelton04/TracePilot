<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — Worktree Manager (Timeline)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/design-system-c.css">
  <style>
    /* === Summary Stats === */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .stats-row .stat-card { position: relative; overflow: hidden; }
    .stats-row .stat-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
    }
    .stat-accent-line::after { background: var(--gradient-accent); }
    .stat-success-line::after { background: var(--success-fg); }
    .stat-warning-line::after { background: var(--warning-fg); }
    .stat-done-line::after { background: var(--done-fg); }

    /* === Cleanup Alert Banner === */
    .cleanup-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--warning-subtle);
      border: 1px solid rgba(251,191,36,0.15);
      border-radius: var(--radius-lg);
      margin-bottom: 20px;
    }
    .cleanup-bar-icon { color: var(--warning-fg); display: flex; align-items: center; flex-shrink: 0; }
    .cleanup-bar-text { flex: 1; font-size: 0.8125rem; color: var(--warning-fg); }
    .cleanup-bar-text strong { font-weight: 600; }
    .cleanup-bar-disk {
      font-size: 0.75rem;
      color: var(--text-tertiary);
      font-variant-numeric: tabular-nums;
      margin-right: 8px;
    }

    /* === Timeline Section === */
    .timeline-section {
      background: var(--canvas-subtle);
      background-image: var(--gradient-card);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .timeline-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-default);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .timeline-header-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .timeline-legend {
      display: flex;
      gap: 14px;
      font-size: 0.6875rem;
      color: var(--text-tertiary);
    }
    .timeline-legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      display: inline-block;
    }
    .timeline-chart {
      position: relative;
      overflow-x: auto;
      overflow-y: hidden;
    }

    /* --- Axis --- */
    .timeline-axis {
      display: flex;
      padding: 0 0 0 160px;
      border-bottom: 1px solid var(--border-default);
      background: var(--canvas-inset);
    }
    .timeline-axis-label {
      flex: 1;
      text-align: center;
      font-size: 0.625rem;
      color: var(--text-placeholder);
      padding: 6px 0;
      font-variant-numeric: tabular-nums;
      border-left: 1px solid var(--border-subtle);
    }
    .timeline-axis-label:first-child { border-left: none; }

    /* --- Timeline Rows --- */
    .tl-row {
      display: grid;
      grid-template-columns: 160px 1fr;
      border-bottom: 1px solid var(--border-subtle);
      min-height: 48px;
      transition: background var(--transition-fast);
    }
    .tl-row:hover { background: var(--neutral-subtle); }
    .tl-row:last-child { border-bottom: none; }
    .tl-label {
      padding: 10px 12px;
      font-size: 0.75rem;
      font-weight: 500;
      border-right: 1px solid var(--border-default);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2px;
      overflow: hidden;
    }
    .tl-label-branch {
      color: var(--text-primary);
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tl-label-repo {
      color: var(--text-placeholder);
      font-size: 0.625rem;
    }
    .tl-track {
      position: relative;
      padding: 10px 4px;
      display: flex;
      align-items: center;
    }

    /* --- Bars --- */
    .tl-bar {
      position: absolute;
      height: 24px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      font-size: 0.625rem;
      font-weight: 500;
      color: white;
      cursor: pointer;
      transition: all var(--transition-fast);
      min-width: 24px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tl-bar:hover {
      filter: brightness(1.15);
      transform: scaleY(1.2);
      z-index: 2;
    }
    .tl-bar.active { background: var(--success-emphasis); }
    .tl-bar.stale { background: var(--warning-emphasis); }
    .tl-bar.completed { background: var(--done-emphasis); }

    /* Pulsing end-cap for active bars */
    @keyframes endcap-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(52,211,153,0.4); }
      50% { box-shadow: 0 0 0 5px rgba(52,211,153,0.08); }
    }
    .tl-bar.active::after {
      content: '';
      position: absolute;
      right: -4px;
      top: 50%;
      transform: translateY(-50%);
      width: 8px;
      height: 8px;
      background: var(--success-fg);
      border-radius: 50%;
      border: 2px solid var(--canvas-subtle);
      animation: endcap-pulse 2s ease-in-out infinite;
    }

    /* --- Hover Tooltip --- */
    .tl-tooltip {
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--canvas-overlay);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      font-size: 0.75rem;
      white-space: nowrap;
      box-shadow: var(--shadow-lg);
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transition: opacity var(--transition-fast);
      min-width: 180px;
    }
    .tl-bar:hover .tl-tooltip { opacity: 1; }
    .tl-tooltip-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 2px 0;
    }
    .tl-tooltip-label { color: var(--text-tertiary); }
    .tl-tooltip-value { color: var(--text-primary); font-weight: 500; }
    .tl-tooltip-divider {
      border-top: 1px solid var(--border-subtle);
      margin: 4px 0;
    }

    /* === Detail Table === */
    .detail-section {
      margin-top: 0;
    }
    .detail-section .section-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .table-count {
      font-size: 0.6875rem;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      color: var(--text-placeholder);
    }
    .disk-mini-container { display: inline-flex; align-items: center; gap: 6px; }
    .disk-mini {
      width: 50px;
      height: 5px;
      background: var(--neutral-muted);
      border-radius: var(--radius-full);
      overflow: hidden;
      display: inline-block;
    }
    .disk-mini-fill { height: 100%; border-radius: var(--radius-full); }
    .disk-mini-fill.low { background: var(--success-fg); }
    .disk-mini-fill.mid { background: var(--accent-fg); }
    .disk-mini-fill.high { background: var(--warning-fg); }
    .disk-mini-label {
      font-size: 0.6875rem;
      color: var(--text-tertiary);
      font-variant-numeric: tabular-nums;
    }
    .session-link { color: var(--accent-fg); text-decoration: none; }
    .session-link:hover { text-decoration: underline; }
    .stale-glow td:first-child {
      border-left: 3px solid var(--warning-fg);
    }

    /* === Disk Breakdown === */
    .disk-breakdown {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .disk-item {
      background: var(--canvas-subtle);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: 12px;
    }
    .disk-item-name { font-size: 0.75rem; font-weight: 500; color: var(--text-primary); margin-bottom: 4px; }
    .disk-item-bar { height: 4px; background: var(--neutral-muted); border-radius: var(--radius-full); overflow: hidden; margin-bottom: 4px; }
    .disk-item-fill { height: 100%; border-radius: var(--radius-full); }
    .disk-item-value { font-size: 0.6875rem; color: var(--text-tertiary); }

    @media (max-width: 900px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .disk-breakdown { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <div class="page-header-bar">
        <div>
          <h1 class="page-title">Worktree Manager</h1>
          <p class="page-subtitle">Timeline view — worktree lifespans and activity</p>
        </div>
        <span style="flex:1"></span>
        <select class="filter-select" id="repoFilter" onchange="render()">
          <option value="">All Repositories</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="openCreateDialog()">
          <span style="display:flex;align-items:center;" id="iconPlus"></span> Create Worktree
        </button>
      </div>
      <div class="page-content">
        <div class="page-content-inner">

          <!-- Summary Stats -->
          <div class="stats-row" id="statsRow"></div>

          <!-- Cleanup Alert -->
          <div class="cleanup-bar" id="cleanupBar"></div>

          <!-- Timeline Chart -->
          <div class="timeline-section">
            <div class="timeline-header">
              <span class="timeline-header-title">Worktree Lifespans</span>
              <div class="timeline-legend">
                <span class="timeline-legend-item"><span class="legend-swatch" style="background:var(--success-emphasis)"></span> Active</span>
                <span class="timeline-legend-item"><span class="legend-swatch" style="background:var(--warning-emphasis)"></span> Stale</span>
                <span class="timeline-legend-item"><span class="legend-swatch" style="background:var(--done-emphasis)"></span> Completed</span>
              </div>
            </div>
            <div class="timeline-chart">
              <div class="timeline-axis" id="timelineAxis"></div>
              <div id="timelineRows"></div>
            </div>
          </div>

          <!-- Disk Breakdown -->
          <div style="margin-bottom:4px;font-size:0.6875rem;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.04em;">Disk Usage by Worktree</div>
          <div class="disk-breakdown" id="diskBreakdown"></div>

          <!-- Detail Table Fallback -->
          <div class="section-panel detail-section">
            <div class="section-panel-header">
              <span>Worktree Details</span>
              <span class="table-count" id="tableCount"></span>
            </div>
            <div style="overflow-x:auto;">
              <table class="data-table" id="detailTable">
                <thead>
                  <tr>
                    <th>Branch</th>
                    <th>Repository</th>
                    <th>Session</th>
                    <th>Disk</th>
                    <th>Status</th>
                    <th>Created</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="detailBody"></tbody>
              </table>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- Create Worktree Dialog -->
  <div class="modal-overlay hidden" id="createDialog" onclick="if(event.target===this)closeCreateDialog()">
    <div class="modal">
      <div class="modal-header">
        <span class="text-title-md">Create Worktree</span>
        <button class="btn btn-ghost btn-sm" onclick="closeCreateDialog()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Repository</label>
          <select class="form-input" id="createRepo" onchange="updateBranches()"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Base Branch</label>
          <select class="form-input" id="createBase"></select>
        </div>
        <div class="form-group">
          <label class="form-label">New Branch Name</label>
          <input class="form-input" id="createBranch" placeholder="feat/new-feature">
        </div>
        <div class="form-group">
          <label class="form-label">Worktree Path</label>
          <input class="form-input font-mono" id="createPath" placeholder="C:\git\repo-wt-name">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-sm" onclick="closeCreateDialog()">Cancel</button>
        <button class="btn btn-primary btn-sm" onclick="closeCreateDialog()">Create Worktree</button>
      </div>
    </div>
  </div>

  <script src="../orchestration-shared.js"></script>
  <script>
    // Init
    document.getElementById('sidebar').innerHTML = generateOrchSidebar('worktrees');
    document.getElementById('iconPlus').innerHTML = ORCH_ICONS.plus;

    const maxDisk = Math.max(...ORCH_WORKTREES.map(w => w.diskMB));
    const totalDiskMB = ORCH_WORKTREES.reduce((s, w) => s + w.diskMB, 0);
    const totalDiskGB = (totalDiskMB / 1024).toFixed(2);

    // Populate repo filter
    const repoFilter = document.getElementById('repoFilter');
    [...new Set(ORCH_WORKTREES.map(w => w.repo))].forEach(r => {
      const o = document.createElement('option');
      o.value = r;
      o.textContent = r;
      repoFilter.appendChild(o);
    });

    function getFiltered() {
      const repo = repoFilter.value;
      return repo ? ORCH_WORKTREES.filter(w => w.repo === repo) : ORCH_WORKTREES;
    }

    function statusBadge(status) {
      const cls = { active: 'badge-success', stale: 'badge-warning', completed: 'badge-done' };
      return `<span class="badge ${cls[status] || 'badge-neutral'}">${status}</span>`;
    }

    function diskMini(mb) {
      const pct = Math.round((mb / maxDisk) * 100);
      const cls = pct < 40 ? 'low' : pct < 70 ? 'mid' : 'high';
      return `<span class="disk-mini-container">
        <span class="disk-mini"><span class="disk-mini-fill ${cls}" style="width:${pct}%"></span></span>
        <span class="disk-mini-label">${mb} MB</span>
      </span>`;
    }

    function renderStats() {
      const active = ORCH_WORKTREES.filter(w => w.status === 'active').length;
      const stale = ORCH_WORKTREES.filter(w => w.status === 'stale').length;
      const completed = ORCH_WORKTREES.filter(w => w.status === 'completed').length;

      document.getElementById('statsRow').innerHTML = `
        <div class="stat-card stat-accent-line">
          <div class="stat-card-value accent">${ORCH_WORKTREES.length}</div>
          <div class="stat-card-label">Total Worktrees</div>
        </div>
        <div class="stat-card stat-success-line">
          <div class="stat-card-value success">${active}</div>
          <div class="stat-card-label">Active</div>
          <div class="stat-card-trend up">● ${active} linked sessions</div>
        </div>
        <div class="stat-card stat-warning-line">
          <div class="stat-card-value warning">${stale}</div>
          <div class="stat-card-label">Stale</div>
          <div class="stat-card-trend down">⚠ Cleanup recommended</div>
        </div>
        <div class="stat-card stat-done-line">
          <div class="stat-card-value">${totalDiskGB} <span style="font-size:0.875rem;font-weight:500;">GB</span></div>
          <div class="stat-card-label">Total Disk Usage</div>
        </div>
      `;

      // Cleanup banner
      const staleMB = ORCH_WORKTREES.filter(w => w.status === 'stale').reduce((s, w) => s + w.diskMB, 0);
      const bar = document.getElementById('cleanupBar');
      if (stale > 0) {
        bar.style.display = 'flex';
        bar.innerHTML = `
          <span class="cleanup-bar-icon">${ORCH_ICONS.warning}</span>
          <span class="cleanup-bar-text"><strong>${stale} stale worktrees</strong> detected — no active sessions linked</span>
          <span class="cleanup-bar-disk">${staleMB} MB reclaimable</span>
          <button class="btn btn-sm" onclick="alert('Cleaning stale worktrees…')">Clean All Stale</button>
          <button class="btn btn-sm" onclick="alert('Pruning…')">Prune</button>
        `;
      } else {
        bar.style.display = 'none';
      }
    }

    function renderTimeline() {
      const wts = getFiltered().slice().sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
      const rowsEl = document.getElementById('timelineRows');
      const axisEl = document.getElementById('timelineAxis');

      if (wts.length === 0) {
        rowsEl.innerHTML = '<div class="empty-state" style="padding:30px;">No worktrees to display in timeline.</div>';
        axisEl.innerHTML = '';
        return;
      }

      const earliest = new Date(Math.min(...wts.map(w => new Date(w.createdAt).getTime())));
      const now = new Date('2026-03-19T01:00:00Z');
      const totalMs = now.getTime() - earliest.getTime();
      const dayMs = 86400000;
      const totalDays = Math.ceil(totalMs / dayMs) + 1;

      // Render axis labels
      let axisHtml = '';
      for (let i = 0; i < totalDays; i++) {
        const d = new Date(earliest.getTime() + i * dayMs);
        const label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        axisHtml += `<div class="timeline-axis-label">${label}</div>`;
      }
      axisEl.innerHTML = axisHtml;

      // Render rows
      let rowsHtml = '';
      wts.forEach(wt => {
        const start = new Date(wt.createdAt).getTime();
        const end = wt.status === 'completed' ? start + 2 * dayMs : now.getTime();
        const leftPct = ((start - earliest.getTime()) / totalMs) * 100;
        const widthPct = Math.max(((end - start) / totalMs) * 100, 3);
        const session = wt.session ? ORCH_ACTIVE_SESSIONS.find(s => s.id === wt.session) : null;
        const durationHrs = Math.round((end - start) / 3600000);

        rowsHtml += `
          <div class="tl-row">
            <div class="tl-label">
              <span class="tl-label-branch">${wt.branch}</span>
              <span class="tl-label-repo">${wt.repo}</span>
            </div>
            <div class="tl-track">
              <div class="tl-bar ${wt.status}" style="left:${leftPct}%;width:${widthPct}%;">
                <span>${wt.diskMB} MB</span>
                <div class="tl-tooltip">
                  <div class="tl-tooltip-row">
                    <span class="tl-tooltip-label">Branch</span>
                    <span class="tl-tooltip-value">${wt.branch}</span>
                  </div>
                  <div class="tl-tooltip-row">
                    <span class="tl-tooltip-label">Repository</span>
                    <span class="tl-tooltip-value">${wt.repo}</span>
                  </div>
                  <div class="tl-tooltip-divider"></div>
                  <div class="tl-tooltip-row">
                    <span class="tl-tooltip-label">Disk Usage</span>
                    <span class="tl-tooltip-value">${wt.diskMB} MB</span>
                  </div>
                  <div class="tl-tooltip-row">
                    <span class="tl-tooltip-label">Duration</span>
                    <span class="tl-tooltip-value">${durationHrs}h</span>
                  </div>
                  <div class="tl-tooltip-row">
                    <span class="tl-tooltip-label">Session</span>
                    <span class="tl-tooltip-value">${session ? session.id : 'None'}</span>
                  </div>
                  <div class="tl-tooltip-row">
                    <span class="tl-tooltip-label">Status</span>
                    <span class="tl-tooltip-value" style="text-transform:capitalize;">${wt.status}</span>
                  </div>
                  <div class="tl-tooltip-row">
                    <span class="tl-tooltip-label">Created</span>
                    <span class="tl-tooltip-value">${new Date(wt.createdAt).toLocaleString()}</span>
                  </div>
                </div>
              </div>
            </div>
          </div>`;
      });
      rowsEl.innerHTML = rowsHtml;
    }

    function renderDiskBreakdown() {
      const wts = getFiltered().slice().sort((a, b) => b.diskMB - a.diskMB);
      const colors = { active: 'var(--success-fg)', stale: 'var(--warning-fg)', completed: 'var(--done-fg)' };

      document.getElementById('diskBreakdown').innerHTML = wts.map(wt => {
        const pct = Math.round((wt.diskMB / maxDisk) * 100);
        return `<div class="disk-item">
          <div class="disk-item-name">${wt.branch} <span style="color:var(--text-placeholder);font-weight:400;">— ${wt.repo}</span></div>
          <div class="disk-item-bar"><div class="disk-item-fill" style="width:${pct}%;background:${colors[wt.status]}"></div></div>
          <div class="disk-item-value">${wt.diskMB} MB · ${wt.status}</div>
        </div>`;
      }).join('');
    }

    function renderTable() {
      const wts = getFiltered();
      document.getElementById('tableCount').textContent = `${wts.length} worktree${wts.length !== 1 ? 's' : ''}`;

      document.getElementById('detailBody').innerHTML = wts.map(wt => {
        const session = wt.session ? ORCH_ACTIVE_SESSIONS.find(s => s.id === wt.session) : null;
        const staleRow = wt.status === 'stale' ? ' class="stale-glow"' : '';

        return `<tr${staleRow}>
          <td>
            <div style="font-weight:500;">${wt.branch}</div>
            <div class="font-mono" style="font-size:0.6875rem;color:var(--text-placeholder);margin-top:1px;">${wt.path}</div>
          </td>
          <td>${wt.repo}</td>
          <td>${session
            ? `<a class="session-link" href="#">${session.id}</a><div style="font-size:0.625rem;color:var(--text-placeholder);margin-top:1px;">${session.statusLabel}</div>`
            : '<span style="color:var(--text-placeholder)">—</span>'}</td>
          <td>${diskMini(wt.diskMB)}</td>
          <td>${statusBadge(wt.status)}</td>
          <td style="font-size:0.75rem;color:var(--text-tertiary);">${formatRelativeTime(wt.createdAt)}</td>
          <td>
            <div style="display:flex;gap:2px;">
              <button class="btn btn-ghost btn-sm" title="Open Folder">${ORCH_ICONS.box}</button>
              <button class="btn btn-ghost btn-sm" title="Terminal">${ORCH_ICONS.terminal}</button>
              <button class="btn btn-ghost btn-sm" title="Link Session">${ORCH_ICONS.rocket}</button>
              <button class="btn btn-ghost btn-sm" title="Remove" style="color:var(--danger-fg)">${ORCH_ICONS.trash}</button>
            </div>
          </td>
        </tr>`;
      }).join('');
    }

    function render() {
      renderStats();
      renderTimeline();
      renderDiskBreakdown();
      renderTable();
    }

    // Create dialog
    function openCreateDialog() {
      const sel = document.getElementById('createRepo');
      sel.innerHTML = ORCH_REPOS.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
      updateBranches();
      document.getElementById('createBranch').value = '';
      document.getElementById('createPath').value = '';
      document.getElementById('createDialog').classList.remove('hidden');
    }
    function updateBranches() {
      const repoId = document.getElementById('createRepo').value;
      const repo = ORCH_REPOS.find(r => r.id === repoId);
      document.getElementById('createBase').innerHTML = repo
        ? repo.branches.map(b => `<option>${b}</option>`).join('')
        : '';
    }
    function closeCreateDialog() { document.getElementById('createDialog').classList.add('hidden'); }

    // Initial render
    render();
  </script>
