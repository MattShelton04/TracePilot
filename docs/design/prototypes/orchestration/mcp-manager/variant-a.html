<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — MCP Server Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/design-system-c.css">
  <style>
    .server-card { background: var(--canvas-subtle); border: 1px solid var(--border-default); border-radius: var(--radius-lg); padding: 20px; transition: all var(--transition-normal); }
    .server-card:hover { border-color: var(--border-accent); box-shadow: var(--shadow-md); }
    .server-card.selected { border-color: var(--accent-emphasis); box-shadow: var(--shadow-glow-accent); }
    .server-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .server-icon { width: 40px; height: 40px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 18px; background: var(--accent-subtle); color: var(--accent-fg); }
    .server-name { font-size: 0.9375rem; font-weight: 600; color: var(--text-primary); }
    .server-url { font-size: 0.6875rem; color: var(--text-tertiary); font-family: monospace; margin-top: 2px; }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.connected { background: var(--success-fg); animation: pulse 2s infinite; }
    .status-dot.disconnected { background: var(--danger-fg); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .server-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 12px 0; border-top: 1px solid var(--border-subtle); border-bottom: 1px solid var(--border-subtle); margin-bottom: 14px; }
    .stat-item { text-align: center; }
    .stat-value { font-size: 1rem; font-weight: 700; color: var(--text-primary); }
    .stat-label { font-size: 0.625rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
    .latency-bar-bg { width: 100%; height: 4px; background: var(--canvas-inset); border-radius: 2px; overflow: hidden; }
    .latency-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
    .latency-good { background: var(--success-fg); }
    .latency-medium { background: var(--warning-fg); }
    .latency-bad { background: var(--danger-fg); }
    .server-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .tools-section { margin-top: 14px; }
    .tools-toggle { display: flex; align-items: center; gap: 6px; background: none; border: none; font-size: 0.75rem; font-weight: 500; color: var(--text-secondary); cursor: pointer; padding: 0; transition: color var(--transition-fast); }
    .tools-toggle:hover { color: var(--text-primary); }
    .tools-toggle .chevron { transition: transform var(--transition-normal); font-size: 10px; }
    .tools-toggle.open .chevron { transform: rotate(90deg); }
    .tools-list { display: none; margin-top: 10px; }
    .tools-list.open { display: block; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    .tool-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; font-size: 0.75rem; border-radius: var(--radius-sm); color: var(--text-secondary); transition: background var(--transition-fast); }
    .tool-item:hover { background: var(--canvas-inset); }
    .tool-item .tool-name { font-weight: 500; color: var(--text-primary); }
    .tool-item .tool-desc { color: var(--text-tertiary); margin-left: auto; font-size: 0.6875rem; }
    .test-result { display: inline-flex; align-items: center; gap: 6px; font-size: 0.6875rem; font-weight: 500; padding: 4px 10px; border-radius: var(--radius-sm); animation: fadeIn 0.3s ease; }
    .test-result.success { background: var(--success-subtle); color: var(--success-fg); }
    .test-result.failure { background: var(--danger-subtle); color: var(--danger-fg); }
    .summary-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
    .summary-stat { background: var(--canvas-subtle); border: 1px solid var(--border-default); border-radius: var(--radius-lg); padding: 16px; text-align: center; }
    .summary-stat .stat-value { font-size: 1.5rem; font-weight: 700; }
    .summary-stat .stat-label { font-size: 0.6875rem; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity var(--transition-normal); }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal { background: var(--canvas-overlay); border: 1px solid var(--border-default); border-radius: var(--radius-xl); padding: 28px; width: 500px; max-width: 90vw; box-shadow: var(--shadow-lg); transform: scale(0.95); transition: transform var(--transition-normal); }
    .modal-overlay.open .modal { transform: scale(1); }
    .modal-title { font-size: 1.125rem; font-weight: 700; margin-bottom: 4px; color: var(--text-primary); }
    .modal-desc { font-size: 0.8125rem; color: var(--text-tertiary); margin-bottom: 20px; }
    .field-group { margin-bottom: 16px; }
    .field-label { display: block; font-size: 0.75rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
    .field-row { display: flex; gap: 12px; }
    .field-row > * { flex: 1; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border-subtle); }
    .config-editor { background: var(--canvas-inset); border: 1px solid var(--border-default); border-radius: var(--radius-lg); padding: 16px; margin-top: 14px; display: none; animation: fadeIn 0.2s ease; }
    .config-editor.open { display: block; }
    .config-textarea { width: 100%; min-height: 120px; background: var(--canvas-default); border: 1px solid var(--border-default); border-radius: var(--radius-md); color: var(--text-primary); font-family: "JetBrains Mono", "Fira Code", monospace; font-size: 0.75rem; line-height: 1.6; padding: 12px; resize: vertical; }
    .config-textarea:focus { outline: none; border-color: var(--accent-emphasis); box-shadow: var(--shadow-glow-accent); }
    .header-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
    .header-row .form-input { flex: 1; }
    .header-remove { background: none; border: none; color: var(--danger-fg); cursor: pointer; padding: 4px; }
    @media (max-width: 900px) { .summary-stats { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <div class="page-header-bar">
        <div class="breadcrumb">
          <a href="../orchestration-home/variant-a.html">Orchestration</a>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-current">MCP Servers</span>
        </div>
        <div style="margin-left:auto;display:flex;gap:8px;">
          <button class="btn btn-sm btn-ghost" onclick="refreshAll()">
            <span style="display:inline-flex;align-items:center;gap:4px;" id="refreshIcon"></span>
          </button>
          <button class="btn btn-sm btn-primary" onclick="openAddModal()">
            <span style="display:inline-flex;align-items:center;gap:4px;" id="addBtnIcon"></span>
          </button>
        </div>
      </div>
      <div class="page-content">
        <div class="page-content-inner">
          <h1 class="page-title">MCP Server Manager</h1>
          <p class="page-subtitle" style="margin-bottom:24px;">Configure, test, and monitor Model Context Protocol servers</p>
          <div class="summary-stats" id="summaryStats"></div>
          <div style="display:flex;flex-direction:column;gap:16px;" id="serverList"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add / Edit Server Modal -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <div class="modal-title" id="modalTitle">Add MCP Server</div>
      <div class="modal-desc" id="modalDesc">Configure a new Model Context Protocol server connection</div>
      <div class="field-group">
        <label class="field-label">Server Name</label>
        <input type="text" class="form-input" id="modalName" placeholder="e.g. GitHub MCP">
      </div>
      <div class="field-group">
        <label class="field-label">URL / Command</label>
        <input type="text" class="form-input" id="modalUrl" placeholder="stdio://my-server or https://...">
      </div>
      <div class="field-row">
        <div class="field-group">
          <label class="field-label">Auth Type</label>
          <select class="filter-select" id="modalAuth" style="width:100%;">
            <option value="none">None</option>
            <option value="token">Bearer Token</option>
            <option value="api-key">API Key</option>
            <option value="oauth">OAuth 2.0</option>
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">Transport</label>
          <select class="filter-select" id="modalTransport" style="width:100%;">
            <option value="stdio">stdio</option>
            <option value="sse">SSE (HTTP)</option>
            <option value="streamable-http">Streamable HTTP</option>
          </select>
        </div>
      </div>
      <div class="field-group" id="authTokenGroup" style="display:none;">
        <label class="field-label">Token / Key</label>
        <input type="password" class="form-input" id="modalToken" placeholder="Enter secret…">
      </div>
      <div class="field-group">
        <label class="field-label">Custom Headers <span style="color:var(--text-placeholder);font-weight:400;">(optional)</span></label>
        <div id="headersList">
          <div class="header-row">
            <input type="text" class="form-input" placeholder="Header name" style="font-size:0.75rem;">
            <input type="text" class="form-input" placeholder="Value" style="font-size:0.75rem;">
            <button class="header-remove" onclick="this.parentElement.remove()">✕</button>
          </div>
        </div>
        <button class="btn btn-sm btn-ghost" onclick="addHeaderRow()" style="margin-top:4px;font-size:0.6875rem;">+ Add Header</button>
      </div>
      <div class="modal-footer">
        <button class="btn btn-sm btn-ghost" onclick="closeAddModal()">Cancel</button>
        <button class="btn btn-sm btn-primary" onclick="saveServer()">Add Server</button>
      </div>
    </div>
  </div>

  <script src="../orchestration-shared.js"></script>
  <script>
    const SERVER_TOOLS = {
      github: [
        { name: 'get_file_contents', desc: 'Read file from repo' },
        { name: 'search_code', desc: 'Search across repositories' },
        { name: 'list_pull_requests', desc: 'List PRs with filters' },
        { name: 'create_issue', desc: 'Create a new issue' },
        { name: 'get_commit', desc: 'Get commit details' },
        { name: 'list_branches', desc: 'List repo branches' },
        { name: 'pull_request_read', desc: 'Read PR details & diff' },
        { name: 'search_issues', desc: 'Search issues by query' },
        { name: 'get_job_logs', desc: 'Get CI job logs' },
        { name: 'list_workflows', desc: 'List Actions workflows' },
        { name: 'create_pull_request', desc: 'Open a new PR' },
        { name: 'merge_pull_request', desc: 'Merge an open PR' },
      ],
      jira: [
        { name: 'search_issues', desc: 'JQL issue search' },
        { name: 'get_issue', desc: 'Get issue details' },
        { name: 'create_issue', desc: 'Create Jira ticket' },
        { name: 'update_issue', desc: 'Update issue fields' },
        { name: 'add_comment', desc: 'Comment on issue' },
        { name: 'list_projects', desc: 'List all projects' },
        { name: 'get_board', desc: 'Get sprint board' },
        { name: 'transition_issue', desc: 'Change issue status' },
      ],
      postgres: [
        { name: 'execute_query', desc: 'Run SQL query' },
        { name: 'list_tables', desc: 'List database tables' },
        { name: 'describe_table', desc: 'Get table schema' },
        { name: 'list_databases', desc: 'List all databases' },
        { name: 'explain_query', desc: 'EXPLAIN ANALYZE query' },
        { name: 'list_indexes', desc: 'List table indexes' },
      ],
    };
    const serverIcons = { github: '🐙', jira: '📋', postgres: '🐘' };
    let servers = JSON.parse(JSON.stringify(ORCH_MCP_SERVERS));
    let editingId = null;

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('sidebar').innerHTML = generateOrchSidebar('mcp');
      document.getElementById('refreshIcon').innerHTML = ORCH_ICONS.refresh + ' Refresh';
      document.getElementById('addBtnIcon').innerHTML = ORCH_ICONS.plus + ' Add Server';
      document.getElementById('modalAuth').addEventListener('change', (e) => {
        document.getElementById('authTokenGroup').style.display = e.target.value === 'none' ? 'none' : 'block';
      });
      renderAll();
    });

    function renderAll() { renderSummary(); renderServers(); }

    function renderSummary() {
      const total = servers.length;
      const connected = servers.filter(s => s.status === 'connected').length;
      const totalTools = servers.reduce((a, s) => a + s.tools, 0);
      const avgArr = servers.filter(s => s.latencyMs != null);
      const avg = avgArr.length ? Math.round(avgArr.reduce((a, s) => a + s.latencyMs, 0) / avgArr.length) : 0;
      const stat = (val, color, label) => `<div class="summary-stat"><div class="stat-value" style="color:var(--${color});">${val}</div><div class="stat-label">${label}</div></div>`;
      document.getElementById('summaryStats').innerHTML =
        stat(total, 'text-primary', 'Total Servers') + stat(connected, 'success-fg', 'Connected') +
        stat(totalTools, 'accent-fg', 'Available Tools') + stat(avg + 'ms', 'warning-fg', 'Avg Latency');
    }

    function renderServers() {
      document.getElementById('serverList').innerHTML = servers.map(s => {
        const icon = serverIcons[s.id] || '🔌', tools = SERVER_TOOLS[s.id] || [];
        const isConn = s.status === 'connected';
        const latPct = s.latencyMs != null ? Math.min(s.latencyMs / 200 * 100, 100) : 0;
        const latClass = s.latencyMs == null ? '' : s.latencyMs < 80 ? 'latency-good' : s.latencyMs < 150 ? 'latency-medium' : 'latency-bad';
        const errDisplay = s.errorRate != null ? (s.errorRate * 100).toFixed(1) + '%' : '—';
        return `<div class="server-card" id="card-${s.id}">
          <div class="server-header">
            <div class="server-icon">${icon}</div>
            <div style="flex:1;min-width:0;">
              <div class="server-name">${s.name}</div>
              <div class="server-url">${s.url}</div>
            </div>
            <div style="display:flex;align-items:center;gap:6px;">
              <span class="status-dot ${s.status}"></span>
              <span class="badge badge-${isConn ? 'success' : 'danger'}">${s.status}</span>
            </div>
          </div>
          <div class="server-stats">
            <div class="stat-item"><div class="stat-value">${s.tools}</div><div class="stat-label">Tools</div></div>
            <div class="stat-item">
              <div class="stat-value">${s.latencyMs != null ? s.latencyMs + 'ms' : '—'}</div>
              <div class="stat-label">Latency</div>
              <div class="latency-bar-bg" style="margin-top:6px;"><div class="latency-bar-fill ${latClass}" style="width:${latPct}%;"></div></div>
            </div>
            <div class="stat-item"><div class="stat-value">${errDisplay}</div><div class="stat-label">Error Rate</div></div>
          </div>
          <div class="server-actions">
            <button class="btn btn-sm btn-ghost" onclick="testConnection('${s.id}')">${ORCH_ICONS.pulse} Test</button>
            <button class="btn btn-sm btn-ghost" onclick="toggleConfig('${s.id}')">${ORCH_ICONS.config} Config</button>
            <button class="btn btn-sm btn-ghost" onclick="editServer('${s.id}')">${ORCH_ICONS.template} Edit</button>
            <button class="btn btn-sm btn-ghost" onclick="removeServer('${s.id}')" style="color:var(--danger-fg);">${ORCH_ICONS.trash} Remove</button>
            <span id="test-result-${s.id}" style="margin-left:auto;"></span>
          </div>
          <div class="tools-section">
            <button class="tools-toggle" onclick="toggleTools('${s.id}')">
              <span class="chevron" id="tools-chevron-${s.id}">▶</span> Browse ${tools.length} tool${tools.length !== 1 ? 's' : ''}
            </button>
            <div class="tools-list" id="tools-list-${s.id}">
              ${tools.map(t => `<div class="tool-item"><span style="color:var(--accent-fg);display:inline-flex;">${ORCH_ICONS.terminal}</span><span class="tool-name">${t.name}</span><span class="tool-desc">${t.desc}</span></div>`).join('')}
            </div>
          </div>
          <div class="config-editor" id="config-${s.id}">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
              <span class="field-label" style="margin:0;">Server Configuration (JSON)</span>
              <button class="btn btn-sm btn-ghost" onclick="saveConfig('${s.id}')">Save Config</button>
            </div>
            <textarea class="config-textarea" id="config-text-${s.id}">${getConfigJSON(s)}</textarea>
          </div>
        </div>`;
      }).join('');
    }

    function getConfigJSON(s) {
      return JSON.stringify({ name: s.name, url: s.url, transport: s.url.startsWith('stdio') ? 'stdio' : 'sse', auth: { type: 'none' }, headers: {}, timeout: 30000, retries: 3 }, null, 2);
    }

    function testConnection(id) {
      const el = document.getElementById(`test-result-${id}`);
      el.innerHTML = '<span style="font-size:0.6875rem;color:var(--text-placeholder);">Testing…</span>';
      const server = servers.find(s => s.id === id);
      setTimeout(() => {
        if (server.status === 'connected') {
          const ms = server.latencyMs + Math.floor(Math.random() * 20 - 10);
          el.innerHTML = `<span class="test-result success">${ORCH_ICONS.check} Connected · ${ms}ms</span>`;
        } else {
          el.innerHTML = `<span class="test-result failure">${ORCH_ICONS.x} Connection refused</span>`;
        }
        setTimeout(() => { el.innerHTML = ''; }, 5000);
      }, 800 + Math.random() * 600);
    }

    function toggleTools(id) {
      const list = document.getElementById(`tools-list-${id}`);
      const btn = document.getElementById(`tools-chevron-${id}`).closest('.tools-toggle');
      list.classList.toggle('open');
      btn.classList.toggle('open');
    }

    function toggleConfig(id) { document.getElementById(`config-${id}`).classList.toggle('open'); }

    function saveConfig(id) {
      try { JSON.parse(document.getElementById(`config-text-${id}`).value); showToast('Configuration saved'); }
      catch { showToast('Invalid JSON — fix syntax errors', 'error'); }
    }

    function removeServer(id) {
      if (!confirm(`Remove "${servers.find(s => s.id === id)?.name}"?`)) return;
      servers = servers.filter(s => s.id !== id);
      renderAll();
      showToast('Server removed');
    }

    function editServer(id) {
      const s = servers.find(x => x.id === id);
      if (!s) return;
      editingId = id;
      document.getElementById('modalTitle').textContent = 'Edit MCP Server';
      document.getElementById('modalDesc').textContent = `Update configuration for ${s.name}`;
      document.getElementById('modalName').value = s.name;
      document.getElementById('modalUrl').value = s.url;
      document.querySelector('#addModal .modal-footer .btn-primary').textContent = 'Save Changes';
      openAddModal();
    }

    function refreshAll() {
      const btn = document.getElementById('refreshIcon');
      btn.style.cssText = 'opacity:0.5;pointer-events:none;display:inline-flex;align-items:center;gap:4px;';
      servers.forEach(s => { if (s.status === 'connected' && s.latencyMs) s.latencyMs = Math.max(10, s.latencyMs + Math.floor(Math.random() * 30 - 15)); });
      setTimeout(() => { btn.style.cssText = 'display:inline-flex;align-items:center;gap:4px;'; renderAll(); showToast('All servers refreshed'); }, 1000);
    }

    function openAddModal() { document.getElementById('addModal').classList.add('open'); }

    function closeAddModal() {
      document.getElementById('addModal').classList.remove('open');
      if (!editingId) { document.getElementById('modalName').value = ''; document.getElementById('modalUrl').value = ''; }
      document.getElementById('modalTitle').textContent = 'Add MCP Server';
      document.getElementById('modalDesc').textContent = 'Configure a new Model Context Protocol server connection';
      document.querySelector('#addModal .modal-footer .btn-primary').textContent = 'Add Server';
      editingId = null;
    }

    function saveServer() {
      const name = document.getElementById('modalName').value.trim();
      const url = document.getElementById('modalUrl').value.trim();
      if (!name || !url) { showToast('Name and URL are required', 'error'); return; }
      if (editingId) {
        const s = servers.find(x => x.id === editingId);
        if (s) { s.name = name; s.url = url; }
        showToast('Server updated');
      } else {
        servers.push({ id: 'custom-' + Date.now(), name, url, status: 'disconnected', tools: 0, latencyMs: null, errorRate: null });
        showToast('Server added');
      }
      closeAddModal();
      renderAll();
    }

    function addHeaderRow() {
      const row = document.createElement('div');
      row.className = 'header-row';
      row.innerHTML = `<input type="text" class="form-input" placeholder="Header name" style="font-size:0.75rem;"><input type="text" class="form-input" placeholder="Value" style="font-size:0.75rem;"><button class="header-remove" onclick="this.parentElement.remove()">✕</button>`;
      document.getElementById('headersList').appendChild(row);
    }

    function showToast(msg, type = 'success') {
      document.querySelector('.toast')?.remove();
      const t = document.createElement('div');
      t.className = 'toast';
      const bg = type === 'success' ? 'var(--success-subtle)' : 'var(--danger-subtle)';
      const fg = type === 'success' ? 'var(--success-fg)' : 'var(--danger-fg)';
      t.style.cssText = `position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:var(--radius-md);font-size:0.8125rem;font-weight:500;background:${bg};color:${fg};border:1px solid ${fg};z-index:2000;animation:fadeIn 0.2s ease;`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
    }

    document.getElementById('addModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeAddModal(); });
  </script>
</body>
</html>
