<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — Orchestration Home (Guided Onboarding)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/design-system-c.css">
  <style>
    /* Welcome Banner */
    .welcome-banner {
      padding: 28px 32px; border-radius: var(--radius-lg); margin-bottom: 24px;
      background: linear-gradient(135deg, var(--accent-muted), var(--canvas-subtle) 70%);
      border: 1px solid var(--border-accent); position: relative; overflow: hidden;
    }
    .welcome-banner::after {
      content: ''; position: absolute; top: -40px; right: -20px; width: 200px; height: 200px;
      background: radial-gradient(circle, color-mix(in srgb, var(--accent-fg) 8%, transparent), transparent 70%);
      border-radius: 50%; pointer-events: none;
    }
    .welcome-title {
      font-size: 1.5rem; font-weight: 700; color: var(--text-primary); margin-bottom: 4px;
    }
    .welcome-subtitle {
      font-size: 0.875rem; color: var(--text-secondary); max-width: 520px; line-height: 1.5;
    }

    /* Progress Stepper */
    .progress-section { margin-bottom: 28px; }
    .progress-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
    }
    .progress-header h2 { font-size: 0.9375rem; font-weight: 600; color: var(--text-primary); }
    .progress-header .progress-pct {
      font-size: 0.8125rem; font-weight: 600; color: var(--accent-fg);
      background: var(--accent-muted); padding: 3px 10px; border-radius: 99px;
    }
    .stepper-track {
      width: 100%; height: 6px; background: var(--canvas-inset); border-radius: 3px;
      overflow: hidden; margin-bottom: 16px;
    }
    .stepper-fill {
      height: 100%; background: var(--accent-fg); border-radius: 3px;
      transition: width 0.6s ease;
    }
    .stepper-steps {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    }
    .stepper-item {
      padding: 14px 16px; border-radius: var(--radius-lg); border: 1px solid var(--border-muted);
      background: var(--canvas-subtle); transition: all var(--transition-normal);
      position: relative; cursor: default;
    }
    .stepper-item.done {
      border-color: color-mix(in srgb, var(--success-fg) 30%, transparent);
      background: var(--success-muted);
    }
    .stepper-item.current {
      border-color: var(--warning-fg);
      background: var(--warning-muted);
    }
    .stepper-item.pending {
      border-color: var(--border-muted);
      opacity: 0.7;
    }
    .stepper-item:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .step-status {
      font-size: 1.125rem; margin-bottom: 6px;
    }
    .step-name {
      font-size: 0.8125rem; font-weight: 600; color: var(--text-primary); margin-bottom: 2px;
    }
    .step-desc {
      font-size: 0.6875rem; color: var(--text-tertiary); line-height: 1.3;
    }
    .step-action {
      display: inline-block; margin-top: 8px; font-size: 0.6875rem; font-weight: 600;
      color: var(--accent-fg); cursor: pointer; text-decoration: none;
    }
    .step-action:hover { text-decoration: underline; }
    .stepper-item.done .step-action { color: var(--success-fg); cursor: default; }

    /* Compact Stats Row */
    .stats-row {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px;
    }
    .stat-compact {
      display: flex; align-items: center; gap: 12px; padding: 14px 16px;
      border-radius: var(--radius-lg); border: 1px solid var(--border-muted);
      background: var(--canvas-subtle); transition: all var(--transition-normal);
    }
    .stat-compact:hover { border-color: var(--border-accent); transform: translateY(-1px); }
    .stat-icon {
      width: 36px; height: 36px; border-radius: var(--radius-md); display: flex;
      align-items: center; justify-content: center; flex-shrink: 0;
    }
    .stat-icon.accent { background: var(--accent-muted); color: var(--accent-fg); }
    .stat-icon.success { background: var(--success-muted); color: var(--success-fg); }
    .stat-icon.warning { background: var(--warning-muted); color: var(--warning-fg); }
    .stat-icon.done { background: var(--done-muted); color: var(--done-fg); }
    .stat-number { font-size: 1.25rem; font-weight: 700; color: var(--text-primary); line-height: 1; }
    .stat-label { font-size: 0.6875rem; color: var(--text-tertiary); }

    /* Feature Discovery Cards */
    .features-section { margin-bottom: 28px; }
    .features-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
      padding-bottom: 10px; border-bottom: 1px solid var(--border-muted);
    }
    .features-header h2 { font-size: 0.9375rem; font-weight: 600; color: var(--text-primary); }
    .feature-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .feature-card {
      padding: 18px 20px; border-radius: var(--radius-lg); border: 1px solid var(--border-muted);
      background: var(--canvas-subtle); transition: all var(--transition-normal);
      display: flex; align-items: flex-start; gap: 14px; cursor: pointer;
    }
    .feature-card:hover {
      border-color: var(--border-accent); transform: translateY(-1px); box-shadow: var(--shadow-md);
    }
    .feature-card.configured { border-color: color-mix(in srgb, var(--success-fg) 25%, transparent); }
    .feature-emoji {
      font-size: 1.5rem; flex-shrink: 0; width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      background: var(--canvas-default); border-radius: var(--radius-md);
      border: 1px solid var(--border-muted);
    }
    .feature-card.configured .feature-emoji {
      background: var(--success-muted); border-color: color-mix(in srgb, var(--success-fg) 30%, transparent);
    }
    .feature-body { flex: 1; min-width: 0; }
    .feature-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
    .feature-name { font-size: 0.875rem; font-weight: 600; color: var(--text-primary); }
    .feature-status {
      font-size: 0.6875rem; font-weight: 600; padding: 2px 8px; border-radius: 99px;
    }
    .feature-status.configured { background: var(--success-muted); color: var(--success-fg); }
    .feature-status.setup { background: var(--accent-muted); color: var(--accent-fg); }
    .feature-desc {
      font-size: 0.75rem; color: var(--text-tertiary); line-height: 1.4; margin-bottom: 6px;
    }
    .feature-link {
      font-size: 0.75rem; font-weight: 600; color: var(--accent-fg); text-decoration: none;
    }
    .feature-link:hover { text-decoration: underline; }
    .feature-card.configured .feature-link { color: var(--success-fg); }

    /* Activity Feed */
    .feed-section { margin-bottom: 28px; }
    .feed-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
      padding-bottom: 10px; border-bottom: 1px solid var(--border-muted);
    }
    .feed-header h2 { font-size: 0.9375rem; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
    .feed-badge {
      font-size: 0.6875rem; font-weight: 600; padding: 2px 8px; border-radius: 99px;
      background: var(--accent-muted); color: var(--accent-fg);
    }
    .feed-list { max-height: 280px; overflow-y: auto; }
    .feed-item {
      display: flex; align-items: flex-start; gap: 10px; padding: 10px 0;
      border-bottom: 1px solid var(--border-muted); font-size: 0.8125rem;
    }
    .feed-item:last-child { border-bottom: none; }
    .feed-icon {
      flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: var(--canvas-subtle); border: 1px solid var(--border-muted); color: var(--text-secondary);
    }
    .feed-item[data-type="session_error"] .feed-icon { color: var(--danger-fg); background: var(--danger-muted); border-color: var(--danger-fg); }
    .feed-item[data-type="session_launched"] .feed-icon { color: var(--accent-fg); background: var(--accent-muted); border-color: var(--accent-fg); }
    .feed-item[data-type="budget_alert"] .feed-icon { color: var(--warning-fg); background: var(--warning-muted); border-color: var(--warning-fg); }
    .feed-item[data-type="batch_completed"] .feed-icon { color: var(--success-fg); background: var(--success-muted); border-color: var(--success-fg); }
    .feed-msg { flex: 1; color: var(--text-primary); line-height: 1.4; }
    .feed-time { flex-shrink: 0; font-size: 0.6875rem; color: var(--text-tertiary); padding-top: 2px; }

    /* System Info footer */
    .sys-footer {
      display: flex; align-items: center; gap: 20px; padding: 12px 16px;
      background: var(--canvas-subtle); border: 1px solid var(--border-muted);
      border-radius: var(--radius-lg); font-size: 0.75rem; color: var(--text-tertiary);
    }
    .sys-item { display: flex; align-items: center; gap: 6px; }
    .sys-dot { width: 6px; height: 6px; border-radius: 50%; }
    .sys-dot.ok { background: var(--success-fg); }
    .sys-dot.warn { background: var(--warning-fg); }
    .sys-divider { width: 1px; height: 14px; background: var(--border-muted); }

    /* Tips Section */
    .tips-section { margin-bottom: 28px; }
    .tips-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
      padding-bottom: 10px; border-bottom: 1px solid var(--border-muted);
    }
    .tips-header h2 { font-size: 0.9375rem; font-weight: 600; color: var(--text-primary); }
    .tips-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .tip-card {
      padding: 16px 18px; border-radius: var(--radius-lg); border: 1px solid var(--border-muted);
      background: var(--canvas-subtle); transition: all var(--transition-normal);
    }
    .tip-card:hover { border-color: var(--border-accent); transform: translateY(-1px); }
    .tip-emoji { font-size: 1.25rem; margin-bottom: 8px; }
    .tip-title { font-size: 0.8125rem; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
    .tip-desc { font-size: 0.75rem; color: var(--text-tertiary); line-height: 1.4; }

    /* Quick start command box */
    .quickstart-box {
      margin-bottom: 28px; padding: 18px 20px; border-radius: var(--radius-lg);
      background: var(--canvas-inset); border: 1px solid var(--border-muted);
    }
    .quickstart-label { font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
    .quickstart-cmd {
      display: flex; align-items: center; gap: 12px; padding: 10px 14px;
      background: var(--canvas-default); border: 1px solid var(--border-muted);
      border-radius: var(--radius-md); font-family: 'JetBrains Mono', 'Cascadia Code', monospace;
      font-size: 0.8125rem; color: var(--text-primary);
    }
    .quickstart-cmd .cmd-prompt { color: var(--success-fg); font-weight: 600; user-select: none; }
    .quickstart-cmd .cmd-text { flex: 1; }
    .quickstart-cmd .cmd-copy {
      cursor: pointer; color: var(--text-tertiary); transition: color var(--transition-normal);
      background: none; border: none; padding: 4px;
    }
    .quickstart-cmd .cmd-copy:hover { color: var(--accent-fg); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .fade-in { animation: fadeIn 0.4s ease both; }
    .fade-in-d1 { animation-delay: 0.05s; }
    .fade-in-d2 { animation-delay: 0.10s; }
    .fade-in-d3 { animation-delay: 0.15s; }
    .fade-in-d4 { animation-delay: 0.20s; }
    .fade-in-d5 { animation-delay: 0.25s; }
    .fade-in-d6 { animation-delay: 0.30s; }
    .fade-in-d7 { animation-delay: 0.35s; }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <div class="content-area" style="max-width: 1100px;">

        <!-- Welcome Banner -->
        <div class="welcome-banner fade-in" id="welcomeBanner"></div>

        <!-- Progress Stepper -->
        <div class="progress-section fade-in fade-in-d1" id="progressSection"></div>

        <!-- Quick Start Command -->
        <div class="quickstart-box fade-in fade-in-d2" id="quickstartBox"></div>

        <!-- Compact Stats Row -->
        <div class="stats-row fade-in fade-in-d3" id="statsRow"></div>

        <!-- Feature Discovery Cards -->
        <div class="features-section fade-in fade-in-d4" id="featuresSection"></div>

        <!-- Tips Section -->
        <div class="tips-section fade-in fade-in-d5" id="tipsSection"></div>

        <!-- Activity Feed -->
        <div class="feed-section fade-in fade-in-d6" id="feedSection"></div>

        <!-- System Info Footer -->
        <div class="sys-footer fade-in fade-in-d7" id="sysFooter"></div>

      </div>
    </main>
  </div>

  <script src="../orchestration-shared.js"></script>
  <script>
    // --- Sidebar ---
    generateOrchSidebar('orch-home');

    // --- Getting Started Steps ---
    const SETUP_STEPS = [
      { id: 'import',   name: 'Import Sessions',      desc: 'Index existing Copilot CLI sessions', status: 'done',    emoji: '✅' },
      { id: 'agents',   name: 'Configure Agents',     desc: 'Customize agent definitions & tools', status: 'done',    emoji: '✅' },
      { id: 'launch',   name: 'Launch First Session',  desc: 'Start your first orchestrated session', status: 'current', emoji: '⚠️' },
      { id: 'worktree', name: 'Set Up Worktrees',      desc: 'Enable isolated git worktrees', status: 'pending', emoji: '❌' },
    ];

    const completedCount = SETUP_STEPS.filter(s => s.status === 'done').length;
    const progressPct = Math.round((completedCount / SETUP_STEPS.length) * 100);

    // --- Welcome Banner ---
    (function renderWelcome() {
      document.getElementById('welcomeBanner').innerHTML = `
        <div class="welcome-title">👋 Welcome back, Developer</div>
        <div class="welcome-subtitle">
          You're ${progressPct}% through setup. Complete the remaining steps to unlock the full power of TracePilot's orchestration features.
        </div>
      `;
    })();

    // --- Progress Stepper ---
    (function renderProgress() {
      document.getElementById('progressSection').innerHTML = `
        <div class="progress-header">
          <h2>Getting Started</h2>
          <span class="progress-pct">${completedCount}/${SETUP_STEPS.length} complete (${progressPct}%)</span>
        </div>
        <div class="stepper-track"><div class="stepper-fill" style="width:${progressPct}%"></div></div>
        <div class="stepper-steps">
          ${SETUP_STEPS.map(s => `
            <div class="stepper-item ${s.status}">
              <div class="step-status">${s.emoji}</div>
              <div class="step-name">${s.name}</div>
              <div class="step-desc">${s.desc}</div>
              <a class="step-action" onclick="event.preventDefault(); ${s.status !== 'done' ? `alert('Navigate to: ${s.name}')` : ''}">
                ${s.status === 'done' ? 'Completed' : s.status === 'current' ? 'Continue →' : 'Set up →'}
              </a>
            </div>
          `).join('')}
        </div>
      `;
    })();

    // --- Quick Start Command ---
    (function renderQuickStart() {
      document.getElementById('quickstartBox').innerHTML = `
        <div class="quickstart-label">🚀 Quick Start — Launch your first orchestrated session:</div>
        <div class="quickstart-cmd">
          <span class="cmd-prompt">$</span>
          <span class="cmd-text">copilot session launch --template bug-fix --repo TracePilot --model claude-sonnet-4.6</span>
          <button class="cmd-copy" onclick="navigator.clipboard.writeText('copilot session launch --template bug-fix --repo TracePilot --model claude-sonnet-4.6'); this.innerHTML='✅'; setTimeout(()=>this.innerHTML='${ORCH_ICONS.copy.replace(/'/g, "\\'")}',1500)" title="Copy">${ORCH_ICONS.copy}</button>
        </div>
      `;
    })();

    // --- Compact Stats ---
    (function renderStats() {
      const sessions = ORCH_ACTIVE_SESSIONS;
      const worktrees = ORCH_WORKTREES;
      const budget = ORCH_BUDGET;
      const pctUsed = Math.round((budget.premiumRequests.used / budget.premiumRequests.limit) * 100);
      const staleCount = worktrees.filter(w => w.status === 'stale').length;

      const stats = [
        { value: sessions.length, label: 'Active Sessions', icon: ORCH_ICONS.rocket, cls: 'accent' },
        { value: worktrees.length, label: `Worktrees (${staleCount} stale)`, icon: ORCH_ICONS.gitBranch, cls: 'success' },
        { value: `${pctUsed}%`, label: 'Budget Used', icon: ORCH_ICONS.dollar, cls: 'warning' },
        { value: '135', label: 'Total Sessions', icon: ORCH_ICONS.dashboard, cls: 'done' },
      ];

      document.getElementById('statsRow').innerHTML = stats.map(s => `
        <div class="stat-compact">
          <div class="stat-icon ${s.cls}">${s.icon}</div>
          <div>
            <div class="stat-number">${s.value}</div>
            <div class="stat-label">${s.label}</div>
          </div>
        </div>
      `).join('');
    })();

    // --- Feature Discovery ---
    (function renderFeatures() {
      const features = [
        { emoji: '🚀', name: 'Session Launcher',   desc: 'Launch AI coding sessions with templates, model selection, and custom prompts.', configured: true,  link: '../session-launcher/variant-a.html', linkText: '✅ Configured' },
        { emoji: '📊', name: 'Mission Control',     desc: 'Real-time dashboard showing all active sessions, health, and resource usage.', configured: false, link: '../mission-control/variant-a.html', linkText: 'Set up →' },
        { emoji: '🔧', name: 'Config Injector',     desc: 'Inject project context, agent definitions, and custom instructions automatically.', configured: true,  link: '../config-injector/variant-a.html', linkText: '✅ Configured' },
        { emoji: '🌳', name: 'Worktree Manager',    desc: 'Manage isolated git worktrees for parallel session branches.', configured: false, link: '../worktree-manager/variant-a.html', linkText: 'Set up →' },
        { emoji: '💰', name: 'Cost Tracker',        desc: 'Monitor token spend, set budgets, and track costs per model and session.', configured: true,  link: '../cost-tracker/variant-a.html', linkText: '✅ Configured' },
        { emoji: '🧩', name: 'Extension Manager',   desc: 'Install and configure lifecycle extensions for pre/post tool hooks.', configured: false, link: '../extension-manager/variant-a.html', linkText: 'Set up →' },
        { emoji: '🧠', name: 'Knowledge Base',      desc: 'Browse and manage memories learned across all coding sessions.', configured: true,  link: '../knowledge-base/variant-a.html', linkText: '✅ Configured' },
        { emoji: '🔬', name: 'A/B Testing',         desc: 'Compare models and prompts side-by-side for optimal results.', configured: false, link: '../ab-testing/variant-a.html', linkText: 'Set up →' },
      ];

      const configuredCount = features.filter(f => f.configured).length;
      document.getElementById('featuresSection').innerHTML = `
        <div class="features-header">
          <h2>Feature Discovery</h2>
          <span style="font-size:0.75rem; color:var(--text-tertiary)">${configuredCount}/${features.length} features configured</span>
        </div>
        <div class="feature-grid">
          ${features.map(f => `
            <div class="feature-card ${f.configured ? 'configured' : ''}" onclick="alert('Navigate to: ${f.name}')">
              <div class="feature-emoji">${f.emoji}</div>
              <div class="feature-body">
                <div class="feature-title-row">
                  <span class="feature-name">${f.name}</span>
                  <span class="feature-status ${f.configured ? 'configured' : 'setup'}">
                    ${f.configured ? '✅ Ready' : '⚙️ Setup'}
                  </span>
                </div>
                <div class="feature-desc">${f.desc}</div>
                <a class="feature-link" href="${f.link}" onclick="event.stopPropagation(); event.preventDefault(); alert('Navigate to: ${f.name}')">
                  ${f.linkText}
                </a>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    })();

    // --- Tips Section ---
    (function renderTips() {
      const tips = [
        { emoji: '💡', title: 'Use Templates', desc: 'Pre-built templates save time by configuring models, tools, and prompts for common tasks like bug fixes and refactors.' },
        { emoji: '🔀', title: 'Parallel Sessions', desc: 'Run multiple sessions on different branches simultaneously using worktrees for maximum productivity.' },
        { emoji: '🧠', title: 'Knowledge Base', desc: 'TracePilot remembers patterns from past sessions. The more you use it, the smarter it gets about your codebase.' },
        { emoji: '📉', title: 'Budget Alerts', desc: 'Set up budget thresholds to get warned before hitting your premium request limits each month.' },
        { emoji: '🔌', title: 'Extensions', desc: 'Add lifecycle hooks that run automatically — auto-lint after edits, inject context on start, guard against dangerous commands.' },
        { emoji: '🔬', title: 'A/B Test Models', desc: 'Not sure which model is best for your task? Run the same prompt on two models and compare results side-by-side.' },
      ];

      document.getElementById('tipsSection').innerHTML = `
        <div class="tips-header">
          <h2>💡 Tips & Best Practices</h2>
        </div>
        <div class="tips-grid">
          ${tips.map(t => `
            <div class="tip-card">
              <div class="tip-emoji">${t.emoji}</div>
              <div class="tip-title">${t.title}</div>
              <div class="tip-desc">${t.desc}</div>
            </div>
          `).join('')}
        </div>
      `;
    })();

    // --- Activity Feed ---
    (function renderFeed() {
      const feed = ORCH_ACTIVITY;
      document.getElementById('feedSection').innerHTML = `
        <div class="feed-header">
          <h2><span>${ORCH_ICONS.pulse}</span> Recent Activity</h2>
          <span class="feed-badge">${feed.length} events</span>
        </div>
        <div class="feed-list">
          ${feed.map(ev => `
            <div class="feed-item" data-type="${ev.type}">
              <div class="feed-icon">${ev.icon}</div>
              <div class="feed-msg">${ev.message}</div>
              <div class="feed-time">${formatRelativeTime(ev.time)}</div>
            </div>
          `).join('')}
        </div>
      `;
    })();

    // --- System Footer ---
    (function renderSysFooter() {
      document.getElementById('sysFooter').innerHTML = `
        <div class="sys-item"><span class="sys-dot ok"></span> Copilot CLI v1.0.8</div>
        <div class="sys-divider"></div>
        <div class="sys-item"><span class="sys-dot warn"></span> Auto-update: disabled</div>
        <div class="sys-divider"></div>
        <div class="sys-item"><span class="sys-dot ok"></span> SDK: available</div>
        <div class="sys-divider"></div>
        <div class="sys-item" style="margin-left:auto; color:var(--text-tertiary)">
          TracePilot Orchestration v0.1.0
        </div>
      `;
    })();

    // --- Theme ---
    initTheme();
  </script>
</body>
</html>
