<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — Knowledge Base (Card List)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/design-system-c.css">
  <style>
    /* Toolbar */
    .kb-toolbar {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
      padding: 14px 16px; background: var(--canvas-subtle);
      border: 1px solid var(--border-default); border-radius: var(--radius-lg);
      margin-bottom: 18px;
    }
    .kb-search {
      flex: 1; min-width: 200px; display: flex; align-items: center; gap: 8px;
      background: var(--canvas-inset); border: 1px solid var(--border-default);
      border-radius: var(--radius-md); padding: 0 10px; transition: border-color var(--transition-fast);
    }
    .kb-search:focus-within { border-color: var(--accent-emphasis); }
    .kb-search input {
      flex: 1; background: none; border: none; color: var(--text-primary);
      font-size: 0.8125rem; padding: 7px 0; outline: none; font-family: inherit;
    }
    .kb-search input::placeholder { color: var(--text-placeholder); }
    .kb-search .search-icon { color: var(--text-tertiary); flex-shrink: 0; }
    .filter-select {
      background: var(--canvas-inset); border: 1px solid var(--border-default);
      color: var(--text-secondary); font-size: 0.75rem; padding: 7px 10px;
      border-radius: var(--radius-md); font-family: inherit; cursor: pointer;
    }
    .filter-select:focus { border-color: var(--accent-emphasis); outline: none; }

    /* Stats bar */
    .stat-bar {
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 18px;
    }
    .stat-chip {
      display: flex; align-items: center; gap: 6px; padding: 6px 12px;
      background: var(--canvas-subtle); border: 1px solid var(--border-default);
      border-radius: var(--radius-md); font-size: 0.75rem; color: var(--text-secondary);
    }
    .stat-chip .chip-val { font-weight: 700; color: var(--text-primary); }

    /* Bulk actions */
    .bulk-bar {
      display: flex; gap: 8px; align-items: center;
      padding: 10px 16px; background: var(--accent-subtle);
      border: 1px solid var(--accent-muted); border-radius: var(--radius-lg);
      margin-bottom: 14px; font-size: 0.75rem; color: var(--accent-fg);
    }
    .bulk-bar .bulk-count { font-weight: 700; margin-right: 6px; }
    .bulk-bar .btn { font-size: 0.6875rem; }

    /* Memory card stack */
    .memory-list { display: flex; flex-direction: column; gap: 10px; }
    .memory-card {
      display: flex; flex-direction: column; gap: 10px;
      padding: 16px 18px; background: var(--canvas-subtle);
      border: 1px solid var(--border-default); border-radius: var(--radius-lg);
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
      position: relative;
    }
    .memory-card:hover { border-color: var(--border-accent); box-shadow: var(--shadow-md); }
    .memory-card.selected { border-color: var(--accent-emphasis); box-shadow: var(--shadow-glow-accent); }

    .memory-card-header {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .memory-card-header .subject-badge {
      font-size: 0.75rem; font-weight: 600; padding: 3px 10px;
      border-radius: var(--radius-md); background: var(--accent-subtle);
      color: var(--accent-fg); border: 1px solid var(--accent-muted);
    }
    .memory-card-header .scope-badge {
      font-size: 0.625rem; font-weight: 600; padding: 2px 8px;
      border-radius: var(--radius-sm);
    }
    .scope-universal { background: var(--accent-subtle); color: var(--accent-fg); border: 1px solid var(--accent-muted); }
    .scope-repo { background: var(--success-subtle); color: var(--success-fg); border: 1px solid var(--success-muted); }
    .repo-badge {
      font-size: 0.625rem; font-weight: 600; padding: 2px 8px;
      border-radius: var(--radius-sm); background: var(--canvas-inset);
      color: var(--text-tertiary); border: 1px solid var(--border-default);
      font-family: monospace;
    }
    .category-badge {
      font-size: 0.625rem; padding: 2px 8px; border-radius: var(--radius-sm);
      background: var(--canvas-inset); color: var(--text-placeholder);
      border: 1px solid var(--border-subtle);
    }

    .memory-card-fact {
      font-size: 0.8125rem; color: var(--text-primary); line-height: 1.65;
    }

    .memory-card-footer {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      font-size: 0.6875rem; color: var(--text-tertiary);
    }
    .memory-card-footer .session-link {
      color: var(--accent-fg); text-decoration: none; font-family: monospace;
      font-size: 0.6875rem;
    }
    .memory-card-footer .session-link:hover { text-decoration: underline; }
    .footer-sep { color: var(--border-default); }

    .memory-card-actions {
      display: flex; gap: 6px; margin-left: auto;
    }
    .memory-card-actions .btn { font-size: 0.6875rem; padding: 3px 10px; }

    /* Checkbox for bulk select */
    .card-checkbox {
      position: absolute; top: 16px; right: 16px; width: 18px; height: 18px;
      border: 1.5px solid var(--border-default); border-radius: 4px;
      background: var(--canvas-inset); cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: all var(--transition-fast);
    }
    .card-checkbox:hover { border-color: var(--accent-emphasis); }
    .card-checkbox.checked {
      background: var(--accent-emphasis); border-color: var(--accent-emphasis);
    }
    .card-checkbox.checked::after {
      content: '✓'; font-size: 11px; font-weight: 700; color: #fff;
    }

    /* Sort control */
    .sort-control {
      display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--text-tertiary);
    }
    .sort-control select { background: none; border: none; color: var(--accent-fg); font-size: 0.75rem; cursor: pointer; font-family: inherit; }

    /* Highlight matching text */
    .highlight { background: var(--warning-subtle); color: var(--warning-fg); border-radius: 2px; padding: 0 2px; }

    /* Empty state */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 60px 20px; color: var(--text-tertiary); text-align: center;
    }
    .empty-state .empty-icon { font-size: 36px; opacity: 0.4; margin-bottom: 12px; }
    .empty-state .empty-text { font-size: 0.875rem; margin-bottom: 4px; }
    .empty-state .empty-sub { font-size: 0.75rem; color: var(--text-placeholder); }

    /* Citation block */
    .citation-block {
      font-size: 0.6875rem; font-family: monospace; color: var(--text-placeholder);
      background: var(--canvas-inset); padding: 4px 8px; border-radius: var(--radius-sm);
      border: 1px solid var(--border-subtle); margin-top: 4px; display: none;
    }
    .memory-card.expanded .citation-block { display: block; }
    .memory-card .expand-toggle {
      font-size: 0.6875rem; color: var(--accent-fg); background: none; border: none;
      cursor: pointer; padding: 0; font-family: inherit;
    }
    .memory-card .expand-toggle:hover { text-decoration: underline; }

    /* Keyboard shortcut hints */
    .kbd { 
      display: inline-block; padding: 1px 5px; font-size: 0.625rem; font-family: monospace;
      background: var(--canvas-inset); border: 1px solid var(--border-default);
      border-radius: 3px; color: var(--text-placeholder); line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <div class="page-header-bar">
        <div class="breadcrumb">
          <a href="../orchestration-home/variant-a.html">Orchestration</a>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-current">Knowledge Base</span>
        </div>
        <div style="margin-left:auto;display:flex;gap:8px;">
          <a href="variant-a.html" class="btn btn-sm btn-ghost">Graph View</a>
          <span class="badge badge-accent" style="font-size:0.6875rem;">Card List</span>
        </div>
      </div>
      <div class="page-content">
        <div class="page-content-inner">

          <h1 class="page-title">Knowledge Base</h1>
          <p class="page-subtitle" style="margin-bottom:18px;">Stored memories and facts aggregated across all sessions</p>

          <!-- Stats -->
          <div class="stat-bar" id="statBar"></div>

          <!-- Toolbar -->
          <div class="kb-toolbar">
            <div class="kb-search">
              <span class="search-icon">🔍</span>
              <input type="text" id="searchInput" placeholder="Search memories by keyword…" oninput="applyFilters()">
            </div>
            <select class="filter-select" id="scopeFilter" onchange="applyFilters()">
              <option value="all">All Scopes</option>
              <option value="universal">Universal</option>
              <option value="repo-specific">Repo-specific</option>
            </select>
            <select class="filter-select" id="categoryFilter" onchange="applyFilters()">
              <option value="all">All Categories</option>
              <option value="general">General</option>
              <option value="user_preferences">User Prefs</option>
              <option value="file_specific">File Specific</option>
            </select>
            <select class="filter-select" id="repoFilter" onchange="applyFilters()">
              <option value="all">All Repos</option>
            </select>
            <div class="sort-control">
              Sort:
              <select id="sortSelect" onchange="applyFilters()">
                <option value="newest">Newest first</option>
                <option value="oldest">Oldest first</option>
                <option value="subject">By subject</option>
              </select>
            </div>
            <span style="font-size:0.75rem;color:var(--text-tertiary);white-space:nowrap;" id="memCount"></span>
          </div>

          <!-- Bulk actions (shown when items selected) -->
          <div class="bulk-bar" id="bulkBar" style="display:none;">
            <span class="bulk-count" id="bulkCount">0</span> selected
            <div style="margin-left:auto;display:flex;gap:6px;">
              <button class="btn btn-sm btn-ghost" onclick="bulkAction('inject')">💉 Mark for Injection</button>
              <button class="btn btn-sm btn-ghost" onclick="bulkAction('tag')">🏷️ Tag All</button>
              <button class="btn btn-sm btn-ghost" onclick="bulkAction('export')">📥 Export</button>
              <button class="btn btn-sm btn-ghost" style="color:var(--danger-fg);" onclick="bulkAction('delete')">🗑️ Delete</button>
              <button class="btn btn-sm btn-ghost" onclick="clearSelection()">Clear</button>
            </div>
          </div>

          <!-- Memory list -->
          <div class="memory-list" id="memoryList"></div>

        </div>
      </div>
    </div>
  </div>

  <script src="../orchestration-shared.js"></script>
  <script>
    document.getElementById('sidebar').innerHTML = generateOrchSidebar('knowledge');

    const memories = ORCH_MEMORIES;
    let filtered = [...memories];
    let selectedIds = new Set();

    // Populate repo filter
    const repos = [...new Set(memories.filter(m => m.repo).map(m => m.repo))];
    const repoSel = document.getElementById('repoFilter');
    repos.forEach(r => { const o = document.createElement('option'); o.value = r; o.textContent = r; repoSel.appendChild(o); });

    // Render stats
    function renderStats() {
      const universal = memories.filter(m => m.scope === 'universal').length;
      const repoSpec = memories.filter(m => m.scope === 'repo-specific').length;
      const cats = [...new Set(memories.map(m => m.category))].length;
      document.getElementById('statBar').innerHTML = `
        <div class="stat-chip"><span class="chip-val">${memories.length}</span> Total memories</div>
        <div class="stat-chip"><span class="chip-val">${universal}</span> Universal</div>
        <div class="stat-chip"><span class="chip-val">${repoSpec}</span> Repo-specific</div>
        <div class="stat-chip"><span class="chip-val">${cats}</span> Categories</div>
        <div class="stat-chip"><span class="chip-val">${repos.length}</span> Repos</div>
        <div class="stat-chip" style="border-color:var(--success-muted);">
          <span class="chip-val" style="color:var(--success-fg);">${memories.length}</span> Injection-ready
        </div>
      `;
    }
    renderStats();

    // Filters
    function applyFilters() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const scope = document.getElementById('scopeFilter').value;
      const cat = document.getElementById('categoryFilter').value;
      const repo = document.getElementById('repoFilter').value;
      const sort = document.getElementById('sortSelect').value;

      filtered = memories.filter(m => {
        if (q && !m.fact.toLowerCase().includes(q) && !m.subject.toLowerCase().includes(q)) return false;
        if (scope !== 'all' && m.scope !== scope) return false;
        if (cat !== 'all' && m.category !== cat) return false;
        if (repo !== 'all' && m.repo !== repo) return false;
        return true;
      });

      // Sort
      if (sort === 'newest') filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      else if (sort === 'oldest') filtered.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
      else if (sort === 'subject') filtered.sort((a, b) => a.subject.localeCompare(b.subject));

      document.getElementById('memCount').textContent = `${filtered.length} of ${memories.length}`;
      renderCards();
    }

    // Highlight search term in text
    function highlightText(text, query) {
      if (!query) return text;
      const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return text.replace(new RegExp(`(${escaped})`, 'gi'), '<span class="highlight">$1</span>');
    }

    // Card rendering
    function renderCards() {
      const list = document.getElementById('memoryList');

      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <div class="empty-text">No memories match your filters</div>
            <div class="empty-sub">Try adjusting your search or filter criteria</div>
          </div>`;
        return;
      }

      list.innerHTML = filtered.map(m => {
        const scopeCls = m.scope === 'universal' ? 'scope-universal' : 'scope-repo';
        const scopeLabel = m.scope === 'universal' ? '🌐 Universal' : '📁 Repo';
        const catLabel = m.category === 'user_preferences' ? 'User Prefs' : m.category === 'file_specific' ? 'File Specific' : 'General';
        const date = new Date(m.createdAt).toLocaleDateString();
        const checked = selectedIds.has(m.id) ? ' checked' : '';
        const selClass = selectedIds.has(m.id) ? ' selected' : '';
        const q = document.getElementById('searchInput').value.toLowerCase();
        const factHtml = highlightText(m.fact, q);
        const subjectHtml = highlightText(m.subject, q);
        const citation = m.citations || 'No citations recorded';

        return `
          <div class="memory-card fade-in${selClass}" data-id="${m.id}" id="card-${m.id}">
            <div class="card-checkbox${checked}" onclick="toggleSelect('${m.id}', event)"></div>
            <div class="memory-card-header">
              <span class="subject-badge">${subjectHtml}</span>
              <span class="scope-badge ${scopeCls}">${scopeLabel}</span>
              ${m.repo ? `<span class="repo-badge">${m.repo}</span>` : ''}
              <span class="category-badge">${catLabel}</span>
            </div>
            <div class="memory-card-fact">${factHtml}</div>
            <div class="citation-block">${citation}</div>
            <div class="memory-card-footer">
              <span>Session: <a href="#" class="session-link">${m.sourceSession}</a></span>
              <span class="footer-sep">·</span>
              <span>${date}</span>
              <span class="footer-sep">·</span>
              <button class="expand-toggle" onclick="toggleExpand('${m.id}')">Citations ▾</button>
              <span class="footer-sep">·</span>
              <span style="color:var(--success-fg);">● Injection active</span>
              <div class="memory-card-actions">
                <button class="btn btn-sm btn-ghost" onclick="editMemory('${m.id}')">Edit</button>
                <button class="btn btn-sm btn-ghost" onclick="injectMemory('${m.id}')">💉 Inject</button>
                <button class="btn btn-sm btn-ghost" style="color:var(--danger-fg);" onclick="deleteMemory('${m.id}')">Delete</button>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    // Selection & bulk
    function toggleSelect(id, event) {
      event.stopPropagation();
      if (selectedIds.has(id)) {
        selectedIds.delete(id);
      } else {
        selectedIds.add(id);
      }
      updateBulkBar();
      renderCards();
    }

    function clearSelection() {
      selectedIds.clear();
      updateBulkBar();
      renderCards();
    }

    function updateBulkBar() {
      const bar = document.getElementById('bulkBar');
      const count = selectedIds.size;
      if (count > 0) {
        bar.style.display = 'flex';
        document.getElementById('bulkCount').textContent = count;
      } else {
        bar.style.display = 'none';
      }
    }

    function bulkAction(action) {
      const count = selectedIds.size;
      const actions = {
        inject: `Marked ${count} memories for injection into new sessions`,
        tag: `Tag dialog would open for ${count} memories`,
        export: `Exporting ${count} memories as JSON…`,
        delete: `Delete confirmation for ${count} memories`,
      };
      alert(actions[action] || 'Action: ' + action);
    }

    // Card actions
    function editMemory(id) {
      const m = memories.find(x => x.id === id);
      alert(`Edit memory:\n\nSubject: ${m.subject}\nFact: ${m.fact}\nScope: ${m.scope}`);
    }

    function injectMemory(id) {
      const m = memories.find(x => x.id === id);
      alert(`Memory "${m.subject}" will be injected into the next session.`);
    }

    function deleteMemory(id) {
      const m = memories.find(x => x.id === id);
      if (confirm(`Delete memory "${m.subject}"?\n\n"${m.fact}"`)) {
        alert('Memory deleted (prototype only).');
      }
    }

    // Expand/collapse citations
    function toggleExpand(id) {
      const card = document.getElementById('card-' + id);
      if (card) card.classList.toggle('expanded');
    }

    // Select all visible
    function selectAllVisible() {
      filtered.forEach(m => selectedIds.add(m.id));
      updateBulkBar();
      renderCards();
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
        e.preventDefault();
        document.getElementById('searchInput').focus();
      }
      if (e.key === 'Escape') {
        document.getElementById('searchInput').blur();
        if (selectedIds.size > 0) clearSelection();
      }
      if (e.ctrlKey && e.key === 'a' && document.activeElement.tagName !== 'INPUT') {
        e.preventDefault();
        selectAllVisible();
      }
    });

    // Initial render
    applyFilters();
  </script>
</body>
</html>
