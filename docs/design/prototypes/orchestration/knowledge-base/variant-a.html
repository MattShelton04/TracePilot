<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — Knowledge Base (Graph)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/design-system-c.css">
  <style>
    /* Layout */
    .kb-split { display: flex; gap: 20px; min-height: 0; }
    .kb-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 20px; }
    .kb-detail {
      width: 340px; flex-shrink: 0; background: var(--canvas-subtle);
      border: 1px solid var(--border-default); border-radius: var(--radius-lg);
      padding: 20px; display: flex; flex-direction: column; gap: 14px;
      position: sticky; top: 0; max-height: calc(100vh - 140px); overflow-y: auto;
    }
    .kb-detail.empty { align-items: center; justify-content: center; color: var(--text-tertiary); text-align: center; }
    .kb-detail .detail-label { font-size: 0.6875rem; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; }
    .kb-detail .detail-value { font-size: 0.8125rem; color: var(--text-primary); line-height: 1.6; }
    .kb-detail .detail-section { display: flex; flex-direction: column; gap: 4px; }
    .kb-detail .detail-actions { display: flex; gap: 8px; margin-top: 6px; }

    /* Toolbar */
    .kb-toolbar {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
      padding: 14px 16px; background: var(--canvas-subtle);
      border: 1px solid var(--border-default); border-radius: var(--radius-lg);
    }
    .kb-search {
      flex: 1; min-width: 180px; display: flex; align-items: center; gap: 8px;
      background: var(--canvas-inset); border: 1px solid var(--border-default);
      border-radius: var(--radius-md); padding: 0 10px; transition: border-color var(--transition-fast);
    }
    .kb-search:focus-within { border-color: var(--accent-emphasis); }
    .kb-search input {
      flex: 1; background: none; border: none; color: var(--text-primary);
      font-size: 0.8125rem; padding: 7px 0; outline: none; font-family: inherit;
    }
    .kb-search input::placeholder { color: var(--text-placeholder); }
    .kb-search .search-icon { color: var(--text-tertiary); flex-shrink: 0; }
    .filter-select {
      background: var(--canvas-inset); border: 1px solid var(--border-default);
      color: var(--text-secondary); font-size: 0.75rem; padding: 7px 10px;
      border-radius: var(--radius-md); font-family: inherit; cursor: pointer;
    }
    .filter-select:focus { border-color: var(--accent-emphasis); outline: none; }
    .kb-count { font-size: 0.75rem; color: var(--text-tertiary); margin-left: auto; white-space: nowrap; }

    /* Graph container */
    .graph-container {
      background: var(--canvas-inset); border: 1px solid var(--border-default);
      border-radius: var(--radius-lg); position: relative; height: 380px; overflow: hidden;
    }
    .graph-container svg { width: 100%; height: 100%; }
    .graph-edge { stroke: var(--border-default); stroke-width: 1.5; fill: none; opacity: 0.5; }
    .graph-edge.active { stroke: var(--accent-emphasis); opacity: 1; stroke-width: 2; }
    .graph-node { cursor: pointer; transition: transform 0.15s ease; }
    .graph-node:hover .node-circle { filter: brightness(1.25); }
    .graph-node.selected .node-circle { stroke: var(--accent-fg); stroke-width: 3; filter: drop-shadow(0 0 8px var(--accent-emphasis)); }
    .node-circle { transition: all 0.15s ease; }
    .node-label {
      font-size: 10px; font-weight: 600; fill: var(--text-secondary);
      text-anchor: middle; pointer-events: none; font-family: 'Inter', sans-serif;
    }
    .node-sublabel {
      font-size: 8px; fill: var(--text-tertiary);
      text-anchor: middle; pointer-events: none; font-family: 'Inter', sans-serif;
    }
    .graph-legend {
      position: absolute; bottom: 12px; left: 12px; display: flex; gap: 14px;
      font-size: 0.6875rem; color: var(--text-tertiary);
    }
    .graph-legend span { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

    /* Table fallback */
    .kb-table-section { margin-top: 4px; }
    .kb-table-section h3 { font-size: 0.8125rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 10px; }
    .kb-table {
      width: 100%; border-collapse: collapse; font-size: 0.75rem;
      background: var(--canvas-subtle); border: 1px solid var(--border-default); border-radius: var(--radius-lg); overflow: hidden;
    }
    .kb-table th {
      text-align: left; padding: 10px 14px; font-weight: 600;
      color: var(--text-tertiary); border-bottom: 1px solid var(--border-default);
      background: var(--canvas-inset); font-size: 0.6875rem; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .kb-table td { padding: 10px 14px; border-bottom: 1px solid var(--border-subtle); color: var(--text-secondary); }
    .kb-table tr:last-child td { border-bottom: none; }
    .kb-table tr:hover td { background: var(--canvas-inset); }
    .kb-table tr.selected td { background: var(--accent-subtle); }
    .kb-table .fact-cell { color: var(--text-primary); max-width: 320px; line-height: 1.5; }

    /* Stat chips at top */
    .stat-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .stat-chip {
      display: flex; align-items: center; gap: 6px; padding: 6px 12px;
      background: var(--canvas-subtle); border: 1px solid var(--border-default);
      border-radius: var(--radius-md); font-size: 0.75rem; color: var(--text-secondary);
    }
    .stat-chip .chip-val { font-weight: 700; color: var(--text-primary); }

    /* Scope/category badges */
    .scope-universal { background: var(--accent-subtle); color: var(--accent-fg); border: 1px solid var(--accent-muted); }
    .scope-repo { background: var(--success-subtle); color: var(--success-fg); border: 1px solid var(--success-muted); }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <div class="page-header-bar">
        <div class="breadcrumb">
          <a href="../orchestration-home/variant-a.html">Orchestration</a>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-current">Knowledge Base</span>
        </div>
        <div style="margin-left:auto;display:flex;gap:8px;">
          <span class="badge badge-accent" style="font-size:0.6875rem;">Graph View</span>
          <a href="variant-b.html" class="btn btn-sm btn-ghost">Card List</a>
        </div>
      </div>
      <div class="page-content">
        <div class="page-content-inner">

          <h1 class="page-title">Knowledge Base</h1>
          <p class="page-subtitle" style="margin-bottom:18px;">Stored memories and facts aggregated across all sessions</p>

          <div class="stat-row" id="statRow" style="margin-bottom:18px;"></div>

          <!-- Toolbar -->
          <div class="kb-toolbar" style="margin-bottom:18px;">
            <div class="kb-search">
              <span class="search-icon">🔍</span>
              <input type="text" id="searchInput" placeholder="Search memories…" oninput="applyFilters()">
            </div>
            <select class="filter-select" id="scopeFilter" onchange="applyFilters()">
              <option value="all">All Scopes</option>
              <option value="universal">Universal</option>
              <option value="repo-specific">Repo-specific</option>
            </select>
            <select class="filter-select" id="categoryFilter" onchange="applyFilters()">
              <option value="all">All Categories</option>
              <option value="general">General</option>
              <option value="user_preferences">User Prefs</option>
              <option value="file_specific">File Specific</option>
            </select>
            <select class="filter-select" id="repoFilter" onchange="applyFilters()">
              <option value="all">All Repos</option>
            </select>
            <span class="kb-count" id="memCount"></span>
          </div>

          <!-- Split layout: graph + detail -->
          <div class="kb-split">
            <div class="kb-main">
              <!-- Graph -->
              <div class="graph-container" id="graphContainer">
                <svg id="graphSvg"></svg>
                <div class="graph-legend">
                  <span><span class="legend-dot" style="background:#818cf8;"></span> Universal</span>
                  <span><span class="legend-dot" style="background:#34d399;"></span> Repo-specific</span>
                  <span><span class="legend-dot" style="background:#71717a;"></span> Subject link</span>
                </div>
              </div>

              <!-- Table fallback -->
              <div class="kb-table-section">
                <h3>All Memories</h3>
                <div style="overflow-x:auto;border-radius:var(--radius-lg);">
                  <table class="kb-table">
                    <thead>
                      <tr>
                        <th>Subject</th>
                        <th>Fact</th>
                        <th>Scope</th>
                        <th>Repo</th>
                        <th>Category</th>
                        <th>Created</th>
                      </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                  </table>
                </div>
              </div>
            </div>

            <!-- Detail panel -->
            <div class="kb-detail empty" id="detailPanel">
              <div style="opacity:0.5;font-size:28px;margin-bottom:8px;">🧠</div>
              <div style="font-size:0.8125rem;">Select a memory node or table row to view details</div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="../orchestration-shared.js"></script>
  <script>
    document.getElementById('sidebar').innerHTML = generateOrchSidebar('knowledge');

    const memories = ORCH_MEMORIES;
    let filtered = [...memories];
    let selectedId = null;

    // Populate repo filter
    const repos = [...new Set(memories.filter(m => m.repo).map(m => m.repo))];
    const repoSel = document.getElementById('repoFilter');
    repos.forEach(r => { const o = document.createElement('option'); o.value = r; o.textContent = r; repoSel.appendChild(o); });

    // Stats
    function renderStats() {
      const universal = memories.filter(m => m.scope === 'universal').length;
      const repoSpec = memories.filter(m => m.scope === 'repo-specific').length;
      const categories = [...new Set(memories.map(m => m.category))].length;
      document.getElementById('statRow').innerHTML = `
        <div class="stat-chip"><span class="chip-val">${memories.length}</span> Total memories</div>
        <div class="stat-chip"><span class="chip-val">${universal}</span> Universal</div>
        <div class="stat-chip"><span class="chip-val">${repoSpec}</span> Repo-specific</div>
        <div class="stat-chip"><span class="chip-val">${categories}</span> Categories</div>
        <div class="stat-chip"><span class="chip-val">${repos.length}</span> Repos</div>
      `;
    }
    renderStats();

    // Filter logic
    function applyFilters() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const scope = document.getElementById('scopeFilter').value;
      const cat = document.getElementById('categoryFilter').value;
      const repo = document.getElementById('repoFilter').value;
      filtered = memories.filter(m => {
        if (q && !m.fact.toLowerCase().includes(q) && !m.subject.toLowerCase().includes(q)) return false;
        if (scope !== 'all' && m.scope !== scope) return false;
        if (cat !== 'all' && m.category !== cat) return false;
        if (repo !== 'all' && m.repo !== repo) return false;
        return true;
      });
      document.getElementById('memCount').textContent = `${filtered.length} of ${memories.length} memories`;
      renderGraph();
      renderTable();
    }

    // Graph rendering
    function renderGraph() {
      const svg = document.getElementById('graphSvg');
      const container = document.getElementById('graphContainer');
      const W = container.clientWidth || 700;
      const H = 380;
      svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

      // Build nodes with positions using a simple force-like layout
      const cx = W / 2, cy = H / 2;
      const nodes = filtered.map((m, i) => {
        const angle = (i / filtered.length) * Math.PI * 2 - Math.PI / 2;
        const rx = Math.min(W * 0.35, 280);
        const ry = Math.min(H * 0.35, 140);
        return {
          ...m,
          x: cx + rx * Math.cos(angle) + (Math.random() - 0.5) * 30,
          y: cy + ry * Math.sin(angle) + (Math.random() - 0.5) * 20,
          r: 24 + m.fact.length / 12,
        };
      });

      // Build edges: connect nodes sharing the same subject or repo
      const edges = [];
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const a = nodes[i], b = nodes[j];
          if (a.subject === b.subject || (a.repo && a.repo === b.repo)) {
            edges.push({ source: i, target: j });
          }
        }
      }

      let svgHtml = '';

      // Edges
      edges.forEach(e => {
        const a = nodes[e.source], b = nodes[e.target];
        const active = selectedId && (a.id === selectedId || b.id === selectedId);
        svgHtml += `<line class="graph-edge${active ? ' active' : ''}" x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}"/>`;
      });

      // Nodes
      nodes.forEach(n => {
        const color = n.scope === 'universal' ? '#818cf8' : '#34d399';
        const sel = selectedId === n.id;
        svgHtml += `
          <g class="graph-node${sel ? ' selected' : ''}" onclick="selectMemory('${n.id}')" transform="translate(${n.x},${n.y})">
            <circle class="node-circle" r="${n.r}" fill="${color}" fill-opacity="0.18" stroke="${color}" stroke-width="${sel ? 3 : 1.5}"/>
            <text class="node-label" y="-2">${n.subject.length > 14 ? n.subject.slice(0, 12) + '…' : n.subject}</text>
            <text class="node-sublabel" y="10">${n.repo || 'universal'}</text>
          </g>
        `;
      });

      svg.innerHTML = svgHtml;
    }

    // Table rendering
    function renderTable() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = filtered.map(m => {
        const scopeCls = m.scope === 'universal' ? 'scope-universal' : 'scope-repo';
        const sel = selectedId === m.id ? ' selected' : '';
        const catLabel = m.category === 'user_preferences' ? 'User Prefs' : m.category === 'file_specific' ? 'File Specific' : 'General';
        const date = new Date(m.createdAt).toLocaleDateString();
        return `<tr class="${sel}" onclick="selectMemory('${m.id}')" style="cursor:pointer;">
          <td><span class="badge badge-neutral">${m.subject}</span></td>
          <td class="fact-cell">${m.fact}</td>
          <td><span class="badge ${scopeCls}" style="font-size:0.625rem;">${m.scope}</span></td>
          <td>${m.repo || '—'}</td>
          <td><span class="badge badge-neutral" style="font-size:0.625rem;">${catLabel}</span></td>
          <td style="white-space:nowrap;">${date}</td>
        </tr>`;
      }).join('');
    }

    // Selection & detail panel
    function selectMemory(id) {
      selectedId = selectedId === id ? null : id;
      renderGraph();
      renderTable();
      renderDetail();
    }

    function renderDetail() {
      const panel = document.getElementById('detailPanel');
      if (!selectedId) {
        panel.className = 'kb-detail empty';
        panel.innerHTML = `
          <div style="opacity:0.5;font-size:28px;margin-bottom:8px;">🧠</div>
          <div style="font-size:0.8125rem;">Select a memory node or table row to view details</div>`;
        return;
      }
      const m = memories.find(x => x.id === selectedId);
      if (!m) return;
      const scopeCls = m.scope === 'universal' ? 'scope-universal' : 'scope-repo';
      const catLabel = m.category === 'user_preferences' ? 'User Prefs' : m.category === 'file_specific' ? 'File Specific' : 'General';
      panel.className = 'kb-detail';
      panel.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span class="badge badge-accent" style="font-size:0.8125rem;">${m.subject}</span>
          <button class="btn btn-sm btn-ghost" onclick="selectedId=null;renderGraph();renderTable();renderDetail();" title="Close">✕</button>
        </div>
        <div class="detail-section">
          <div class="detail-label">Fact</div>
          <div class="detail-value">${m.fact}</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">Citations</div>
          <div class="detail-value" style="font-family:monospace;font-size:0.75rem;color:var(--text-tertiary);">
            ${m.citations || 'No citations recorded'}
          </div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <div class="detail-section" style="flex:1;">
            <div class="detail-label">Scope</div>
            <div><span class="badge ${scopeCls}" style="margin-top:4px;">${m.scope}</span></div>
          </div>
          <div class="detail-section" style="flex:1;">
            <div class="detail-label">Category</div>
            <div><span class="badge badge-neutral" style="margin-top:4px;">${catLabel}</span></div>
          </div>
        </div>
        <div class="detail-section">
          <div class="detail-label">Repository</div>
          <div class="detail-value">${m.repo || '<span style="color:var(--text-tertiary);">Universal — applies to all repos</span>'}</div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <div class="detail-section" style="flex:1;">
            <div class="detail-label">Source Session</div>
            <div class="detail-value" style="font-family:monospace;font-size:0.75rem;">${m.sourceSession}</div>
          </div>
          <div class="detail-section" style="flex:1;">
            <div class="detail-label">Created</div>
            <div class="detail-value">${new Date(m.createdAt).toLocaleDateString()}</div>
          </div>
        </div>
        <div class="detail-section">
          <div class="detail-label">Injection Status</div>
          <div><span class="badge badge-success" style="margin-top:4px;">Active — injected into new sessions</span></div>
        </div>
        <div class="detail-actions">
          <button class="btn btn-sm btn-primary" onclick="alert('Edit modal would open')">Edit</button>
          <button class="btn btn-sm btn-ghost" onclick="alert('Scope changed')">Change Scope</button>
          <button class="btn btn-sm btn-ghost" style="color:var(--danger-fg);" onclick="alert('Delete confirmation')">Delete</button>
        </div>
      `;
    }

    // Initial render
    applyFilters();

    // Resize handling
    window.addEventListener('resize', () => { renderGraph(); });
  </script>
</body>
</html>
