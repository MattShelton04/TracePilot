<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — Mission Control (Kanban)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/design-system-c.css">
  <style>
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 currentColor; }
      50% { opacity: .7; box-shadow: 0 0 0 4px transparent; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .6; }
    }
    @keyframes card-enter {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Stats bar */
    .stats-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px; }

    /* Toolbar */
    .mc-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; gap: 12px; flex-wrap: wrap;
    }
    .mc-toolbar-left { display: flex; align-items: center; gap: 10px; }
    .mc-toolbar-right { display: flex; align-items: center; gap: 10px; }

    .refresh-indicator {
      display: flex; align-items: center; gap: 6px;
      font-size: .6875rem; color: var(--text-tertiary);
    }
    .refresh-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--success-fg); animation: pulse-dot 2s infinite;
    }

    /* Status dots */
    .status-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .status-dot.working { background: var(--success-fg); animation: pulse-dot 2s infinite; color: var(--success-fg); }
    .status-dot.idle { background: var(--warning-fg); }
    .status-dot.error { background: var(--danger-fg); }
    .status-dot.completed { background: var(--done-fg); }

    /* Kanban layout */
    .kanban-board {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
      align-items: start; min-height: 400px;
    }

    .kanban-column {
      background: var(--canvas-inset); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg); display: flex; flex-direction: column;
      min-height: 300px;
    }
    .kanban-column-header {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 14px; border-bottom: 1px solid var(--border-subtle);
    }
    .kanban-column-title {
      font-size: .75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .04em;
    }
    .kanban-column-count {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 20px; height: 20px; padding: 0 6px; border-radius: var(--radius-full);
      font-size: .6875rem; font-weight: 600;
    }
    .col-working .kanban-column-header { border-bottom-color: var(--success-muted); }
    .col-working .kanban-column-title { color: var(--success-fg); }
    .col-working .kanban-column-count { background: var(--success-muted); color: var(--success-fg); }

    .col-idle .kanban-column-header { border-bottom-color: var(--warning-muted); }
    .col-idle .kanban-column-title { color: var(--warning-fg); }
    .col-idle .kanban-column-count { background: var(--warning-muted); color: var(--warning-fg); }

    .col-error .kanban-column-header { border-bottom-color: var(--danger-muted); }
    .col-error .kanban-column-title { color: var(--danger-fg); }
    .col-error .kanban-column-count { background: var(--danger-muted); color: var(--danger-fg); }

    .col-completed .kanban-column-header { border-bottom-color: var(--done-muted); }
    .col-completed .kanban-column-title { color: var(--done-fg); }
    .col-completed .kanban-column-count { background: var(--done-muted); color: var(--done-fg); }

    .kanban-column-body {
      flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 10px;
    }
    .kanban-empty {
      flex: 1; display: flex; align-items: center; justify-content: center;
      font-size: .75rem; color: var(--text-placeholder); font-style: italic;
      border: 1px dashed var(--border-subtle); border-radius: var(--radius-md);
      margin: 4px; padding: 20px; min-height: 80px;
    }

    /* Kanban card */
    .kanban-card {
      background: var(--canvas-subtle); background-image: var(--gradient-card);
      border: 1px solid var(--border-default); border-radius: var(--radius-md);
      padding: 12px; cursor: grab; transition: all var(--transition-normal);
      animation: card-enter .3s ease;
    }
    .kanban-card:hover {
      border-color: var(--border-accent);
      box-shadow: var(--shadow-md), 0 0 0 1px var(--border-glow);
      transform: translateY(-1px);
    }
    .kanban-card:active { cursor: grabbing; }
    .kanban-card-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    }
    .kanban-card-repo { font-weight: 600; font-size: .8125rem; color: var(--text-primary); }
    .kanban-card-branch {
      font-size: .6875rem; color: var(--text-tertiary);
      font-family: "JetBrains Mono", monospace;
    }
    .kanban-card-activity {
      font-size: .75rem; color: var(--text-secondary); margin-bottom: 10px;
      line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .kanban-card-meta {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      font-size: .6875rem; color: var(--text-placeholder);
    }
    .kanban-card-meta .sep { opacity: .4; }

    /* Health badge */
    .health-badge {
      display: inline-flex; align-items: center; padding: 2px 7px;
      border-radius: var(--radius-sm); font-size: .6875rem; font-weight: 600;
    }
    .health-good { background: var(--success-muted); color: var(--success-fg); }
    .health-warn { background: var(--warning-muted); color: var(--warning-fg); }
    .health-bad { background: var(--danger-muted); color: var(--danger-fg); }

    .kanban-card-actions {
      display: flex; gap: 4px; margin-top: 10px; padding-top: 8px;
      border-top: 1px solid var(--border-subtle);
    }
    .kanban-card-actions .btn-sm { flex: 1; justify-content: center; font-size: .6875rem; }

    /* Drag hint overlay */
    .drag-overlay {
      position: absolute; inset: 0; border: 2px dashed var(--accent-fg);
      border-radius: var(--radius-md); background: var(--accent-subtle);
      display: none; align-items: center; justify-content: center;
      font-size: .75rem; color: var(--accent-fg); pointer-events: none;
    }
    .kanban-column.drag-over .drag-overlay { display: flex; }

    /* Activity feed */
    .bottom-section { margin-top: 24px; }
    .activity-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .activity-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid var(--border-subtle);
    }
    .activity-item:last-child { border-bottom: none; }
    .activity-icon {
      width: 28px; height: 28px; border-radius: var(--radius-sm);
      background: var(--neutral-subtle); display: flex; align-items: center;
      justify-content: center; color: var(--text-tertiary); flex-shrink: 0;
    }
    .activity-text { font-size: .8125rem; color: var(--text-secondary); line-height: 1.5; }
    .activity-time { font-size: .6875rem; color: var(--text-placeholder); margin-top: 2px; }

    /* Quick launch */
    .quick-launch-btn {
      position: fixed; bottom: 24px; right: 28px;
      display: flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: var(--radius-full);
      background: var(--gradient-accent); color: white; font-weight: 600;
      font-size: .875rem; border: none; cursor: pointer;
      box-shadow: 0 4px 20px rgba(99,102,241,.4); z-index: 30;
      transition: all var(--transition-normal);
    }
    .quick-launch-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(99,102,241,.5); }

    @media (max-width: 1200px) {
      .kanban-board { grid-template-columns: repeat(2, 1fr); }
      .stats-bar { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 900px) {
      .kanban-board { grid-template-columns: 1fr; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .activity-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <div class="page-header-bar">
        <div class="breadcrumb">
          <a href="../orchestration-home/variant-a.html">Orchestration</a>
          <span class="breadcrumb-sep">›</span>
          <span class="breadcrumb-current">Mission Control</span>
        </div>
        <div style="flex:1"></div>
        <div class="refresh-indicator">
          <span class="refresh-dot"></span>
          <span id="staleness">Last updated 5s ago</span>
        </div>
      </div>
      <div class="page-content">
        <div class="page-content-inner">

          <!-- Page Title -->
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
            <div>
              <h1 class="text-display" style="color:var(--text-primary);">Mission Control</h1>
              <p class="text-body" style="color:var(--text-tertiary);margin-top:4px;">Kanban view — sessions organized by status</p>
            </div>
          </div>

          <!-- Stats Bar -->
          <div class="stats-bar" id="stats-bar"></div>

          <!-- Toolbar -->
          <div class="mc-toolbar">
            <div class="mc-toolbar-left">
              <select class="filter-select" id="filter-model">
                <option value="all">All Models</option>
              </select>
            </div>
            <div class="mc-toolbar-right">
              <span style="font-size:.6875rem;color:var(--text-placeholder);" id="session-count">4 sessions</span>
              <button class="btn btn-sm" onclick="refreshData()">↻ Refresh</button>
            </div>
          </div>

          <!-- Kanban Board -->
          <div class="kanban-board" id="kanban-board">
            <div class="kanban-column col-working" id="col-working">
              <div class="kanban-column-header">
                <span class="status-dot working"></span>
                <span class="kanban-column-title">Working</span>
                <span class="kanban-column-count" id="count-working">0</span>
              </div>
              <div class="kanban-column-body" id="body-working"></div>
            </div>
            <div class="kanban-column col-idle" id="col-idle">
              <div class="kanban-column-header">
                <span class="status-dot idle"></span>
                <span class="kanban-column-title">Idle / Waiting</span>
                <span class="kanban-column-count" id="count-idle">0</span>
              </div>
              <div class="kanban-column-body" id="body-idle"></div>
            </div>
            <div class="kanban-column col-error" id="col-error">
              <div class="kanban-column-header">
                <span class="status-dot error"></span>
                <span class="kanban-column-title">Error / Stuck</span>
                <span class="kanban-column-count" id="count-error">0</span>
              </div>
              <div class="kanban-column-body" id="body-error"></div>
            </div>
            <div class="kanban-column col-completed" id="col-completed">
              <div class="kanban-column-header">
                <span class="status-dot completed"></span>
                <span class="kanban-column-title">Completed</span>
                <span class="kanban-column-count" id="count-completed">0</span>
              </div>
              <div class="kanban-column-body" id="body-completed"></div>
            </div>
          </div>

          <!-- Bottom Section -->
          <div class="bottom-section">
            <div class="activity-grid">
              <div class="section-panel">
                <div class="section-panel-header">Recent Activity</div>
                <div class="section-panel-body" id="activity-feed"></div>
              </div>
              <div class="section-panel">
                <div class="section-panel-header">Budget Overview</div>
                <div class="section-panel-body" id="budget-panel"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <button class="quick-launch-btn" onclick="alert('Launch new session…')">
    🚀 Quick Launch
  </button>

  <script src="../orchestration-shared.js"></script>
  <script>
    document.getElementById('sidebar').innerHTML = generateOrchSidebar('mission-control');

    // Staleness timer
    let lastUpdated = Date.now();
    setInterval(() => {
      const sec = Math.floor((Date.now() - lastUpdated) / 1000);
      document.getElementById('staleness').textContent = `Last updated ${sec}s ago`;
    }, 1000);

    function refreshData() {
      lastUpdated = Date.now();
      document.getElementById('staleness').textContent = 'Last updated just now';
      renderAll();
    }

    // Populate model filter
    const modelSel = document.getElementById('filter-model');
    const uniqueModels = [...new Set(ORCH_ACTIVE_SESSIONS.map(s => s.model))];
    uniqueModels.forEach(m => {
      const mdl = ORCH_MODELS.find(x => x.id === m);
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = mdl ? mdl.name : m;
      modelSel.appendChild(opt);
    });

    function healthBadgeHTML(score) {
      if (score >= 80) return `<span class="health-badge health-good">${score}</span>`;
      if (score >= 50) return `<span class="health-badge health-warn">${score}</span>`;
      return `<span class="health-badge health-bad">${score}</span>`;
    }

    function getFilteredSessions() {
      const model = document.getElementById('filter-model').value;
      return ORCH_ACTIVE_SESSIONS.filter(s => {
        if (model !== 'all' && s.model !== model) return false;
        return true;
      });
    }

    function bucketSessions(sessions) {
      const buckets = { working: [], idle: [], error: [], completed: [] };
      sessions.forEach(s => {
        const key = s.status === 'waiting' ? 'idle' : (buckets[s.status] ? s.status : 'idle');
        buckets[key].push(s);
      });
      return buckets;
    }

    function renderKanbanCard(s) {
      return `
        <div class="kanban-card" draggable="true" data-id="${s.id}">
          <div class="kanban-card-header">
            <span class="kanban-card-repo">${s.repo}</span>
            <div style="flex:1"></div>
            ${healthBadgeHTML(s.healthScore)}
          </div>
          <div class="kanban-card-branch">${s.branch}</div>
          <div class="kanban-card-activity">${s.statusLabel}</div>
          <div class="kanban-card-meta">
            ${modelTierBadge(s.model)}
            <span class="sep">·</span>
            <span>T${s.turn}</span>
            <span class="sep">·</span>
            <span>${formatNumber(s.tokensIn)} in</span>
            <span class="sep">·</span>
            <span>${formatDuration(s.elapsed)}</span>
          </div>
          <div class="kanban-card-meta" style="margin-top:4px;">
            <span>PID ${s.pid}</span>
            <span class="sep">·</span>
            <span>${s.worktree ? 'Worktree' : 'In-place'}</span>
            <span class="sep">·</span>
            <span>${s.premiumReqs.toFixed(2)} premium</span>
          </div>
          <div class="kanban-card-actions">
            <button class="btn btn-sm">${ORCH_ICONS.eye}</button>
            <button class="btn btn-sm">${ORCH_ICONS.terminal}</button>
            <button class="btn btn-sm">Msg</button>
            <button class="btn btn-sm" style="color:var(--danger-fg);">${ORCH_ICONS.stop}</button>
          </div>
        </div>
      `;
    }

    function renderStats() {
      const sessions = ORCH_ACTIVE_SESSIONS;
      const totalIn = sessions.reduce((a, s) => a + s.tokensIn, 0);
      const totalOut = sessions.reduce((a, s) => a + s.tokensOut, 0);
      const totalPremium = sessions.reduce((a, s) => a + s.premiumReqs, 0);
      const activeWt = sessions.filter(s => s.worktree).length;
      const budgetPct = Math.round((ORCH_BUDGET.premiumRequests.used / ORCH_BUDGET.premiumRequests.limit) * 100);

      document.getElementById('stats-bar').innerHTML = `
        <div class="stat-card">
          <div class="stat-card-value accent">${sessions.length}</div>
          <div class="stat-card-label">Active Sessions</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-value">${formatNumber(totalIn)} <span style="font-size:.75rem;color:var(--text-tertiary)">in</span> / ${formatNumber(totalOut)} <span style="font-size:.75rem;color:var(--text-tertiary)">out</span></div>
          <div class="stat-card-label">Total Tokens</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-value warning">${totalPremium.toFixed(2)}</div>
          <div class="stat-card-label">Premium Requests (today)</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-value success">${activeWt}</div>
          <div class="stat-card-label">Active Worktrees</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-value ${budgetPct >= 90 ? 'danger' : budgetPct >= 75 ? 'warning' : ''}">${budgetPct}%</div>
          <div class="stat-card-label">Budget Used (${ORCH_BUDGET.premiumRequests.used}/${ORCH_BUDGET.premiumRequests.limit})</div>
          <div class="progress-bar" style="margin-top:8px;">
            <div class="progress-bar-fill" style="width:${budgetPct}%"></div>
          </div>
        </div>
      `;
    }

    function renderKanban() {
      const sessions = getFilteredSessions();
      const buckets = bucketSessions(sessions);

      document.getElementById('session-count').textContent = `${sessions.length} session${sessions.length !== 1 ? 's' : ''}`;

      ['working', 'idle', 'error', 'completed'].forEach(status => {
        const body = document.getElementById(`body-${status}`);
        const count = document.getElementById(`count-${status}`);
        const items = buckets[status];
        count.textContent = items.length;

        if (items.length === 0) {
          body.innerHTML = `<div class="kanban-empty">No ${status} sessions</div>`;
        } else {
          body.innerHTML = items.map(renderKanbanCard).join('');
        }
      });

      // Set up drag hints (visual only, no actual reorder)
      setupDragHints();
    }

    function setupDragHints() {
      document.querySelectorAll('.kanban-card').forEach(card => {
        card.addEventListener('dragstart', e => {
          e.dataTransfer.setData('text/plain', card.dataset.id);
          card.style.opacity = '0.5';
        });
        card.addEventListener('dragend', () => {
          card.style.opacity = '1';
          document.querySelectorAll('.kanban-column').forEach(c => c.classList.remove('drag-over'));
        });
      });

      document.querySelectorAll('.kanban-column-body').forEach(body => {
        body.addEventListener('dragover', e => {
          e.preventDefault();
          body.closest('.kanban-column').classList.add('drag-over');
        });
        body.addEventListener('dragleave', () => {
          body.closest('.kanban-column').classList.remove('drag-over');
        });
        body.addEventListener('drop', e => {
          e.preventDefault();
          body.closest('.kanban-column').classList.remove('drag-over');
          // Static prototype — no actual move
        });
      });
    }

    function renderActivity() {
      document.getElementById('activity-feed').innerHTML = ORCH_ACTIVITY.map(a => `
        <div class="activity-item">
          <div class="activity-icon">${a.icon}</div>
          <div>
            <div class="activity-text">${a.message}</div>
            <div class="activity-time">${formatRelativeTime(a.time)}</div>
          </div>
        </div>
      `).join('');
    }

    function renderBudget() {
      const b = ORCH_BUDGET;
      const pct = Math.round((b.premiumRequests.used / b.premiumRequests.limit) * 100);
      document.getElementById('budget-panel').innerHTML = `
        <div style="margin-bottom:14px;">
          <div style="display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:6px;">
            <span style="color:var(--text-secondary)">Premium Requests</span>
            <span style="color:var(--text-primary);font-weight:600;">${b.premiumRequests.used} / ${b.premiumRequests.limit}</span>
          </div>
          <div class="progress-bar" style="height:8px;">
            <div class="progress-bar-fill" style="width:${pct}%;${pct >= 90 ? 'background:var(--danger-fg);' : pct >= 75 ? 'background:var(--warning-fg);' : ''}"></div>
          </div>
        </div>
        <div style="font-size:.6875rem;color:var(--text-tertiary);">
          Today's spend: <strong style="color:var(--text-secondary);">${formatCost(b.dailySpend[b.dailySpend.length - 1].cost)}</strong>
        </div>
        <div style="margin-top:14px;">
          <div style="font-size:.6875rem;color:var(--text-placeholder);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;">Model Breakdown</div>
          ${b.modelBreakdown.map(m => `
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:.75rem;">
              <span style="flex:1;color:var(--text-secondary);">${m.model.replace('claude-', 'C. ').replace('gpt-', 'GPT-')}</span>
              <span style="color:var(--text-tertiary);width:40px;text-align:right;">${m.pct}%</span>
              <div class="progress-bar" style="width:80px;"><div class="progress-bar-fill" style="width:${m.pct}%"></div></div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderAll() {
      renderStats();
      renderKanban();
      renderActivity();
      renderBudget();
    }

    // Filter listener
    document.getElementById('filter-model').addEventListener('change', renderKanban);

    setInterval(() => { refreshData(); }, 30000);
    renderAll();
  </script>
</body>
</html>
