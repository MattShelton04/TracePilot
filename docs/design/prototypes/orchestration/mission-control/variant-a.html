<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — Mission Control (Card Grid)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/design-system-c.css">
  <style>
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 currentColor; }
      50% { opacity: .7; box-shadow: 0 0 0 4px transparent; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .6; }
    }

    /* Stats bar */
    .stats-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px; }
    .stats-bar .stat-card { display: flex; flex-direction: column; gap: 2px; }

    /* Toolbar */
    .mc-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; gap: 12px; flex-wrap: wrap;
    }
    .mc-toolbar-left { display: flex; align-items: center; gap: 10px; }
    .mc-toolbar-right { display: flex; align-items: center; gap: 10px; }
    .refresh-indicator {
      display: flex; align-items: center; gap: 6px;
      font-size: .6875rem; color: var(--text-tertiary);
    }
    .refresh-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--success-fg); animation: pulse-dot 2s infinite;
    }

    /* Session cards grid */
    .session-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }

    .session-card {
      background: var(--canvas-subtle); background-image: var(--gradient-card);
      border: 1px solid var(--border-default); border-radius: var(--radius-lg);
      overflow: hidden; transition: all var(--transition-normal);
    }
    .session-card:hover {
      border-color: var(--border-accent);
      box-shadow: var(--shadow-md), 0 0 0 1px var(--border-glow);
      transform: translateY(-1px);
    }
    .session-card-header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px 10px; border-left: 3px solid transparent;
    }
    .session-card-header.working { border-left-color: var(--success-fg); }
    .session-card-header.idle { border-left-color: var(--warning-fg); }
    .session-card-header.error { border-left-color: var(--danger-fg); }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .status-dot.working { background: var(--success-fg); animation: pulse-dot 2s infinite; color: var(--success-fg); }
    .status-dot.idle { background: var(--warning-fg); }
    .status-dot.error { background: var(--danger-fg); }

    .session-repo { font-weight: 600; font-size: .875rem; color: var(--text-primary); }
    .session-branch { font-size: .75rem; color: var(--text-tertiary); font-family: "JetBrains Mono", monospace; }

    .session-card-body { padding: 0 16px 10px; }
    .session-activity {
      font-size: .8125rem; color: var(--text-secondary);
      margin-bottom: 12px; line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    .session-metrics {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
      padding: 10px 0; border-top: 1px solid var(--border-subtle);
    }
    .metric-item { display: flex; flex-direction: column; gap: 1px; }
    .metric-label { font-size: .625rem; color: var(--text-placeholder); text-transform: uppercase; letter-spacing: .03em; font-weight: 500; }
    .metric-value { font-size: .8125rem; font-weight: 600; color: var(--text-primary); font-variant-numeric: tabular-nums; }

    .sparkline-placeholder {
      height: 24px; margin: 8px 0; border-radius: var(--radius-sm);
      background: linear-gradient(90deg, var(--accent-subtle) 0%, var(--accent-muted) 40%, var(--accent-subtle) 100%);
      position: relative; overflow: hidden;
    }
    .sparkline-placeholder::after {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(90deg, transparent, transparent 12px, var(--canvas-subtle) 12px, var(--canvas-subtle) 14px);
    }

    .session-card-footer {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 16px; border-top: 1px solid var(--border-subtle);
    }
    .session-card-footer .btn-sm { flex: 1; justify-content: center; }

    /* Health badge */
    .health-badge {
      display: inline-flex; align-items: center; padding: 2px 7px;
      border-radius: var(--radius-sm); font-size: .6875rem; font-weight: 600;
    }
    .health-good { background: var(--success-muted); color: var(--success-fg); }
    .health-warn { background: var(--warning-muted); color: var(--warning-fg); }
    .health-bad { background: var(--danger-muted); color: var(--danger-fg); }

    /* Bottom section */
    .bottom-section { display: grid; grid-template-columns: 1fr 340px; gap: 16px; margin-top: 24px; }

    /* Activity feed */
    .activity-feed { list-style: none; }
    .activity-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid var(--border-subtle);
    }
    .activity-item:last-child { border-bottom: none; }
    .activity-icon {
      width: 28px; height: 28px; border-radius: var(--radius-sm);
      background: var(--neutral-subtle); display: flex; align-items: center;
      justify-content: center; color: var(--text-tertiary); flex-shrink: 0;
    }
    .activity-text { font-size: .8125rem; color: var(--text-secondary); line-height: 1.5; }
    .activity-time { font-size: .6875rem; color: var(--text-placeholder); margin-top: 2px; }

    /* Quick launch */
    .quick-launch-btn {
      position: fixed; bottom: 24px; right: 28px;
      display: flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: var(--radius-full);
      background: var(--gradient-accent); color: white; font-weight: 600;
      font-size: .875rem; border: none; cursor: pointer;
      box-shadow: 0 4px 20px rgba(99,102,241,.4); z-index: 30;
      transition: all var(--transition-normal);
    }
    .quick-launch-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(99,102,241,.5); }

    @media (max-width: 1100px) {
      .stats-bar { grid-template-columns: repeat(3, 1fr); }
      .session-grid { grid-template-columns: 1fr; }
      .bottom-section { grid-template-columns: 1fr; }
    }
    @media (max-width: 900px) {
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <div class="page-header-bar">
        <div class="breadcrumb">
          <a href="../orchestration-home/variant-a.html">Orchestration</a>
          <span class="breadcrumb-sep">›</span>
          <span class="breadcrumb-current">Mission Control</span>
        </div>
        <div style="flex:1"></div>
        <div class="refresh-indicator">
          <span class="refresh-dot"></span>
          <span id="staleness">Last updated 5s ago</span>
        </div>
      </div>
      <div class="page-content">
        <div class="page-content-inner">

          <!-- Page Title -->
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
            <div>
              <h1 class="text-display" style="color:var(--text-primary);">Mission Control</h1>
              <p class="text-body" style="color:var(--text-tertiary);margin-top:4px;">Fleet management for all active Copilot CLI sessions</p>
            </div>
          </div>

          <!-- Stats Bar -->
          <div class="stats-bar" id="stats-bar"></div>

          <!-- Toolbar -->
          <div class="mc-toolbar">
            <div class="mc-toolbar-left">
              <select class="filter-select" id="filter-status">
                <option value="all">All Statuses</option>
                <option value="working">Working</option>
                <option value="idle">Idle</option>
                <option value="error">Error</option>
              </select>
              <select class="filter-select" id="filter-model">
                <option value="all">All Models</option>
              </select>
            </div>
            <div class="mc-toolbar-right">
              <button class="btn btn-sm" onclick="refreshData()" title="Refresh now">
                <span style="display:flex;align-items:center;">${ORCH_ICONS.refresh}</span> Refresh
              </button>
            </div>
          </div>

          <!-- Session Cards Grid -->
          <div class="session-grid" id="session-grid"></div>

          <!-- Bottom Section -->
          <div class="bottom-section">
            <div class="section-panel">
              <div class="section-panel-header">Recent Activity</div>
              <div class="section-panel-body">
                <ul class="activity-feed" id="activity-feed"></ul>
              </div>
            </div>
            <div class="section-panel">
              <div class="section-panel-header">Budget Overview</div>
              <div class="section-panel-body" id="budget-panel"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <button class="quick-launch-btn" onclick="alert('Launch new session…')">
    <span style="display:flex;align-items:center;">${ORCH_ICONS.rocket}</span> Quick Launch
  </button>

  <script src="../orchestration-shared.js"></script>
  <script>
    document.getElementById('sidebar').innerHTML = generateOrchSidebar('mission-control');

    // Inject icons into elements using template literals
    document.querySelectorAll('.quick-launch-btn span, .mc-toolbar-right .btn span').forEach(el => {
      const raw = el.textContent;
      if (raw.startsWith('${')) {
        const key = raw.replace('${ORCH_ICONS.', '').replace('}', '');
        if (ORCH_ICONS[key]) el.innerHTML = ORCH_ICONS[key];
      }
    });

    // Staleness timer
    let lastUpdated = Date.now();
    setInterval(() => {
      const sec = Math.floor((Date.now() - lastUpdated) / 1000);
      document.getElementById('staleness').textContent = `Last updated ${sec}s ago`;
    }, 1000);

    function refreshData() {
      lastUpdated = Date.now();
      document.getElementById('staleness').textContent = 'Last updated just now';
      renderAll();
    }

    // Populate model filter
    const modelSel = document.getElementById('filter-model');
    const uniqueModels = [...new Set(ORCH_ACTIVE_SESSIONS.map(s => s.model))];
    uniqueModels.forEach(m => {
      const mdl = ORCH_MODELS.find(x => x.id === m);
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = mdl ? mdl.name : m;
      modelSel.appendChild(opt);
    });

    function getFilteredSessions() {
      const status = document.getElementById('filter-status').value;
      const model = document.getElementById('filter-model').value;
      return ORCH_ACTIVE_SESSIONS.filter(s => {
        if (status !== 'all' && s.status !== status) return false;
        if (model !== 'all' && s.model !== model) return false;
        return true;
      });
    }

    function renderHealthBadge(score) {
      if (score >= 80) return `<span class="health-badge health-good">${score}</span>`;
      if (score >= 50) return `<span class="health-badge health-warn">${score}</span>`;
      return `<span class="health-badge health-bad">${score}</span>`;
    }

    function renderStats() {
      const sessions = ORCH_ACTIVE_SESSIONS;
      const totalIn = sessions.reduce((a, s) => a + s.tokensIn, 0);
      const totalOut = sessions.reduce((a, s) => a + s.tokensOut, 0);
      const totalPremium = sessions.reduce((a, s) => a + s.premiumReqs, 0);
      const activeWt = sessions.filter(s => s.worktree).length;
      const budgetPct = Math.round((ORCH_BUDGET.premiumRequests.used / ORCH_BUDGET.premiumRequests.limit) * 100);

      document.getElementById('stats-bar').innerHTML = `
        <div class="stat-card">
          <div class="stat-card-value accent">${sessions.length}</div>
          <div class="stat-card-label">Active Sessions</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-value">${formatNumber(totalIn)} <span style="font-size:.75rem;color:var(--text-tertiary)">in</span> / ${formatNumber(totalOut)} <span style="font-size:.75rem;color:var(--text-tertiary)">out</span></div>
          <div class="stat-card-label">Total Tokens</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-value warning">${totalPremium.toFixed(2)}</div>
          <div class="stat-card-label">Premium Requests (today)</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-value success">${activeWt}</div>
          <div class="stat-card-label">Active Worktrees</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-value ${budgetPct >= 90 ? 'danger' : budgetPct >= 75 ? 'warning' : ''}">${budgetPct}%</div>
          <div class="stat-card-label">Budget Used (${ORCH_BUDGET.premiumRequests.used}/${ORCH_BUDGET.premiumRequests.limit})</div>
          <div class="progress-bar" style="margin-top:8px;">
            <div class="progress-bar-fill" style="width:${budgetPct}%"></div>
          </div>
        </div>
      `;
    }

    function renderSessionCards() {
      const sessions = getFilteredSessions();
      const grid = document.getElementById('session-grid');

      if (sessions.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-tertiary);">No sessions match the current filters.</div>`;
        return;
      }

      grid.innerHTML = sessions.map(s => `
        <div class="session-card" data-session="${s.id}">
          <div class="session-card-header ${s.status}">
            <span class="status-dot ${s.status}"></span>
            <span class="session-repo">${s.repo}</span>
            <span class="session-branch">${s.branch}</span>
            <div style="flex:1"></div>
            ${renderHealthBadge(s.healthScore)}
            ${modelTierBadge(s.model)}
          </div>
          <div class="session-card-body">
            <div class="session-activity">${s.statusLabel}</div>
            <div class="session-metrics">
              <div class="metric-item">
                <span class="metric-label">Turn</span>
                <span class="metric-value">${s.turn}</span>
              </div>
              <div class="metric-item">
                <span class="metric-label">Tokens In</span>
                <span class="metric-value">${formatNumber(s.tokensIn)}</span>
              </div>
              <div class="metric-item">
                <span class="metric-label">Tokens Out</span>
                <span class="metric-value">${formatNumber(s.tokensOut)}</span>
              </div>
              <div class="metric-item">
                <span class="metric-label">Elapsed</span>
                <span class="metric-value">${formatDuration(s.elapsed)}</span>
              </div>
            </div>
            <div class="sparkline-placeholder"></div>
            <div style="display:flex;align-items:center;gap:8px;font-size:.6875rem;color:var(--text-placeholder);">
              <span>PID ${s.pid}</span>
              <span>·</span>
              <span>${s.worktree ? 'Worktree' : 'In-place'}</span>
              <span>·</span>
              <span>${s.premiumReqs.toFixed(2)} premium</span>
            </div>
          </div>
          <div class="session-card-footer">
            <button class="btn btn-sm">View Details</button>
            <button class="btn btn-sm">${ORCH_ICONS.terminal} Terminal</button>
            <button class="btn btn-sm">Message</button>
            <button class="btn btn-sm" style="color:var(--danger-fg);">${ORCH_ICONS.stop} Kill</button>
          </div>
        </div>
      `).join('');
    }

    function renderActivityFeed() {
      document.getElementById('activity-feed').innerHTML = ORCH_ACTIVITY.map(a => `
        <li class="activity-item">
          <div class="activity-icon">${a.icon}</div>
          <div>
            <div class="activity-text">${a.message}</div>
            <div class="activity-time">${formatRelativeTime(a.time)}</div>
          </div>
        </li>
      `).join('');
    }

    function renderBudget() {
      const b = ORCH_BUDGET;
      const pct = Math.round((b.premiumRequests.used / b.premiumRequests.limit) * 100);
      document.getElementById('budget-panel').innerHTML = `
        <div style="margin-bottom:14px;">
          <div style="display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:6px;">
            <span style="color:var(--text-secondary)">Premium Requests</span>
            <span style="color:var(--text-primary);font-weight:600;">${b.premiumRequests.used} / ${b.premiumRequests.limit}</span>
          </div>
          <div class="progress-bar" style="height:8px;">
            <div class="progress-bar-fill" style="width:${pct}%;${pct >= 90 ? 'background:var(--danger-fg);' : pct >= 75 ? 'background:var(--warning-fg);' : ''}"></div>
          </div>
        </div>
        <div style="font-size:.6875rem;color:var(--text-tertiary);">
          Today's spend: <strong style="color:var(--text-secondary);">${formatCost(b.dailySpend[b.dailySpend.length - 1].cost)}</strong> · ${b.dailySpend[b.dailySpend.length - 1].requests} requests
        </div>
        <div style="margin-top:14px;">
          <div style="font-size:.6875rem;color:var(--text-placeholder);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;">Model Breakdown</div>
          ${b.modelBreakdown.map(m => `
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:.75rem;">
              <span style="flex:1;color:var(--text-secondary);">${m.model.replace('claude-', 'C. ').replace('gpt-', 'GPT-')}</span>
              <span style="color:var(--text-tertiary);width:40px;text-align:right;">${m.pct}%</span>
              <div class="progress-bar" style="width:80px;"><div class="progress-bar-fill" style="width:${m.pct}%"></div></div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderAll() {
      renderStats();
      renderSessionCards();
      renderActivityFeed();
      renderBudget();
    }

    // Filter listeners
    document.getElementById('filter-status').addEventListener('change', renderSessionCards);
    document.getElementById('filter-model').addEventListener('change', renderSessionCards);

    // Auto-refresh simulation
    setInterval(() => { refreshData(); }, 30000);

    renderAll();
  </script>
</body>
</html>
