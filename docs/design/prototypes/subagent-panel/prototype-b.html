<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Subagent Panel — Prototype B · Dossier</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
@import url("../shared/design-system-c.css");

html, body { height: 100%; }
body {
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--canvas-default);
  color: var(--text-primary);
}

/* ── Page chrome ── */
.topbar {
  position: sticky; top: 0; z-index: 40;
  display: flex; align-items: center; gap: 12px;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border-default);
  background: rgba(9, 9, 11, 0.85);
  backdrop-filter: blur(12px);
}
[data-theme="light"] .topbar { background: rgba(255,255,255,0.85); }
.topbar .brand-icon {
  width: 26px; height: 26px; border-radius: 7px;
  background: var(--gradient-accent);
  display: grid; place-items: center;
  color: white; font-weight: 700; font-size: 12px;
}
.topbar .brand-name { font-weight: 700; letter-spacing: -0.02em; }
.crumbs {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.8125rem;
  color: var(--text-tertiary);
}
.crumbs a { color: var(--text-link); text-decoration: none; }
.crumbs a:hover { text-decoration: underline; }
.crumbs .sep { color: var(--text-placeholder); }
.crumbs .here { color: var(--text-primary); font-weight: 500; }
.topbar-spacer { flex: 1; }

/* ── Page wrapper ── */
.page {
  max-width: 1180px;
  margin: 0 auto;
  padding: 36px 32px 80px;
}

/* ── Hero ── */
.hero {
  display: flex; align-items: flex-start; gap: 18px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border-muted);
}
.hero-glyph {
  width: 56px; height: 56px;
  border-radius: 14px;
  display: grid; place-items: center;
  font-size: 22px;
  flex-shrink: 0;
  background: var(--accent-muted);
  color: var(--accent-fg);
  border: 1px solid var(--border-accent);
}
.hero-glyph.t-explore { background: rgba(56,189,248,0.12); color: #38bdf8; border-color: rgba(56,189,248,0.25); }
.hero-glyph.t-general { background: rgba(167,139,250,0.14); color: var(--done-fg); border-color: rgba(167,139,250,0.25); }
.hero-glyph.t-review  { background: rgba(251,113,133,0.12); color: var(--danger-fg); border-color: rgba(251,113,133,0.25); }
.hero-glyph.t-main    { background: rgba(52,211,153,0.12); color: var(--success-fg); border-color: rgba(52,211,153,0.25); }

.hero-title-block { flex: 1; min-width: 0; }
.hero-eyebrow {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 6px;
}
.hero-eyebrow .id {
  font-family: "JetBrains Mono", monospace;
  background: var(--canvas-overlay);
  border: 1px solid var(--border-muted);
  color: var(--text-secondary);
  padding: 1px 7px;
  border-radius: 4px;
  letter-spacing: 0;
  text-transform: none;
  font-weight: 400;
}
.hero h1 {
  font-size: 1.75rem;
  font-weight: 600;
  letter-spacing: -0.025em;
  margin-bottom: 6px;
}
.hero-desc {
  font-size: 0.9375rem;
  color: var(--text-secondary);
  line-height: 1.55;
}
.hero-actions {
  display: flex; gap: 6px; flex-shrink: 0;
}
.btn {
  appearance: none;
  background: var(--canvas-overlay);
  border: 1px solid var(--border-muted);
  color: var(--text-secondary);
  padding: 7px 12px;
  border-radius: 8px;
  font-size: 0.8125rem; font-weight: 500;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  transition: all 140ms ease;
}
.btn:hover { background: var(--canvas-raised); color: var(--text-primary); border-color: var(--border-default); }
.btn.primary { background: var(--accent-muted); border-color: var(--border-accent); color: var(--accent-fg); }

/* ── Status banner ── */
.banner {
  margin-top: 18px;
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid var(--border-muted);
  background: var(--canvas-subtle);
  font-size: 0.8125rem;
  line-height: 1.5;
}
.banner.warning { background: var(--warning-subtle); border-color: rgba(251,191,36,0.3); }
.banner.danger  { background: var(--danger-subtle);  border-color: rgba(251,113,133,0.3); }
.banner svg { flex-shrink: 0; margin-top: 2px; }
.banner code {
  font-family: "JetBrains Mono", monospace;
  background: rgba(0,0,0,0.25); padding: 1px 5px; border-radius: 4px;
  font-size: 0.75rem;
}
[data-theme="light"] .banner code { background: rgba(0,0,0,0.06); }

/* ── Two-column layout ── */
.grid {
  display: grid;
  grid-template-columns: 280px minmax(0, 1fr);
  gap: 32px;
  margin-top: 28px;
  align-items: flex-start;
}
@media (max-width: 880px) {
  .grid { grid-template-columns: 1fr; }
  .sidebar-meta { position: static !important; }
}

.sidebar-meta {
  position: sticky;
  top: 80px;
  display: flex; flex-direction: column; gap: 14px;
}

.card {
  background: var(--canvas-subtle);
  border: 1px solid var(--border-muted);
  border-radius: 12px;
  overflow: hidden;
}
.card-head {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border-muted);
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
}
.card-head .count {
  margin-left: auto;
  background: var(--canvas-overlay);
  color: var(--text-secondary);
  border: 1px solid var(--border-muted);
  padding: 1px 7px;
  border-radius: 999px;
  font-size: 0.65rem; font-weight: 500;
  letter-spacing: 0;
}
.card-body { padding: 14px; }

/* KV list */
.kv-list { display: grid; gap: 10px; }
.kv-row {
  display: grid; grid-template-columns: 90px 1fr;
  gap: 10px;
  align-items: center;
  font-size: 0.8125rem;
}
.kv-key {
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--text-tertiary);
}
.kv-val {
  color: var(--text-primary);
  font-variant-numeric: tabular-nums;
  word-break: break-word;
}
.kv-val .mono { font-family: "JetBrains Mono", monospace; font-size: 0.78rem; }

/* Status chip variants */
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 0.7rem; font-weight: 500;
  background: var(--canvas-overlay);
  border: 1px solid var(--border-muted);
  color: var(--text-secondary);
}
.chip-status.completed { background: var(--success-muted); color: var(--success-fg); border-color: rgba(52,211,153,0.25); }
.chip-status.in-progress { background: var(--warning-muted); color: var(--warning-fg); border-color: rgba(251,191,36,0.25); }
.chip-status.failed { background: var(--danger-muted); color: var(--danger-fg); border-color: rgba(251,113,133,0.3); }
.chip-status .pulse {
  width: 6px; height: 6px; border-radius: 999px; background: currentColor;
}
.chip-status.in-progress .pulse {
  animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.25); }
}
.chip.warn { background: var(--warning-muted); color: var(--warning-fg); border-color: rgba(251,191,36,0.25); font-size: 0.65rem; }

/* Content cards */
.content-stack { display: flex; flex-direction: column; gap: 18px; min-width: 0; }

.section-title {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 10px;
}
.section-title h2 {
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.01em;
}
.section-title .lab {
  font-size: 0.65rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  font-weight: 600;
}

/* Prompt card */
.prompt-body, .output-body {
  font-size: 0.8125rem;
  color: var(--text-secondary);
  line-height: 1.65;
  white-space: pre-wrap;
}
.output-body {
  font-family: "JetBrains Mono", monospace;
  font-size: 0.78rem;
}

/* Failure card */
.card.failure { border-color: rgba(251,113,133,0.3); background: var(--danger-subtle); }
.card.failure .card-head { color: var(--danger-fg); border-color: rgba(251,113,133,0.18); }
.card.failure pre {
  font-family: "JetBrains Mono", monospace;
  font-size: 0.78rem;
  color: var(--text-primary);
  white-space: pre-wrap;
}

/* Reasoning toggle */
.reasoning-card .toggle-head {
  cursor: pointer; user-select: none;
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  font-size: 0.8125rem;
}
.reasoning-card .toggle-head .chev { transition: transform 200ms ease; color: var(--text-tertiary); }
.reasoning-card.open .toggle-head .chev { transform: rotate(90deg); }
.reasoning-card .body {
  display: none;
  padding: 0 14px 14px;
  font-size: 0.8125rem;
  color: var(--text-secondary);
  line-height: 1.6;
  white-space: pre-wrap;
  border-top: 1px solid var(--border-muted);
  padding-top: 14px;
}
.reasoning-card.open .body { display: block; }
.reasoning-card .ico {
  width: 20px; height: 20px;
  display: grid; place-items: center;
  background: var(--done-muted);
  color: var(--done-fg);
  border-radius: 6px;
  font-size: 11px;
}

/* Tools list */
.tools-list { display: flex; flex-direction: column; }
.tool-row {
  border-bottom: 1px solid var(--border-muted);
}
.tool-row:last-child { border-bottom: none; }
.tool-row-head {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  cursor: pointer;
  user-select: none;
}
.tool-row-head:hover { background: var(--canvas-overlay); }
.tool-row.expanded .tool-row-head { background: var(--canvas-overlay); }
.tool-idx {
  font-size: 0.7rem; color: var(--text-tertiary);
  font-variant-numeric: tabular-nums;
  width: 22px; text-align: right;
  font-family: "JetBrains Mono", monospace;
}
.tool-icon {
  width: 24px; height: 24px;
  display: grid; place-items: center;
  border-radius: 6px;
  background: var(--canvas-overlay);
  color: var(--text-secondary);
  flex-shrink: 0;
}
.tool-name {
  font-family: "JetBrains Mono", monospace;
  font-size: 0.8125rem;
  font-weight: 500;
  color: var(--text-primary);
}
.tool-args {
  font-size: 0.75rem;
  color: var(--text-tertiary);
  flex: 1; min-width: 0;
  overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
}
.tool-right {
  margin-left: auto;
  display: flex; align-items: center; gap: 10px;
  font-size: 0.75rem;
  color: var(--text-tertiary);
  font-variant-numeric: tabular-nums;
}
.status-ok { color: var(--success-fg); }
.status-fail { color: var(--danger-fg); }
.status-pending { color: var(--warning-fg); }
.spin { animation: spin 1.2s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.agent-badge {
  font-size: 0.65rem;
  background: var(--accent-muted);
  color: var(--accent-fg);
  border: 1px solid var(--border-accent);
  padding: 1px 7px;
  border-radius: 999px;
  font-weight: 500;
}
.pill-badge {
  font-size: 0.65rem;
  background: var(--warning-muted);
  color: var(--warning-fg);
  border: 1px solid rgba(251,191,36,0.3);
  padding: 1px 7px;
  border-radius: 999px;
  font-weight: 500;
}

.tool-row-body {
  display: none;
  padding: 14px 14px 18px 50px;
  background: var(--canvas-default);
  border-top: 1px solid var(--border-muted);
  animation: fade 200ms ease;
}
@keyframes fade { from { opacity: 0; } to { opacity: 1; } }
.tool-row.expanded .tool-row-body { display: block; }

.meta-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px 18px;
  margin-bottom: 12px;
}
.meta-grid .k {
  font-size: 0.65rem;
  color: var(--text-tertiary);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.meta-grid .v {
  font-size: 0.78rem;
  font-family: "JetBrains Mono", monospace;
  color: var(--text-secondary);
  word-break: break-all;
}
.tool-row-body pre {
  font-family: "JetBrains Mono", monospace;
  font-size: 0.75rem;
  background: var(--canvas-inset);
  border: 1px solid var(--border-muted);
  border-radius: 6px;
  padding: 10px;
  white-space: pre-wrap;
  word-break: break-word;
  color: var(--text-secondary);
  margin-top: 8px;
  max-height: 240px;
  overflow: auto;
}
.tool-row-body .lab {
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-top: 8px;
  margin-bottom: 4px;
}
.tool-row-body .err-block {
  background: var(--danger-subtle);
  border: 1px solid rgba(251,113,133,0.3);
  border-radius: 6px;
  padding: 10px;
  color: var(--text-primary);
  font-size: 0.75rem;
  margin-top: 8px;
}
.load-full-btn {
  appearance: none;
  background: var(--accent-muted);
  border: 1px solid var(--border-accent);
  color: var(--accent-fg);
  font-size: 0.72rem; font-weight: 500;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 10px;
  display: inline-flex; gap: 6px; align-items: center;
}
.load-full-btn:hover { background: rgba(99,102,241,0.22); }

/* Switcher */
.switcher {
  position: fixed; right: 16px; bottom: 16px;
  z-index: 60;
  background: var(--canvas-overlay);
  border: 1px solid var(--border-default);
  border-radius: 10px;
  padding: 8px;
  display: flex; gap: 4px;
  box-shadow: var(--shadow-md);
  backdrop-filter: blur(12px);
}
.switcher button {
  appearance: none; cursor: pointer;
  background: transparent; border: 1px solid transparent;
  color: var(--text-secondary);
  font-size: 0.72rem; font-weight: 500;
  padding: 6px 10px;
  border-radius: 6px;
}
.switcher button:hover { background: var(--canvas-raised); color: var(--text-primary); }
.switcher button.active {
  background: var(--accent-muted);
  color: var(--accent-fg);
  border-color: var(--border-accent);
}
.switcher .label {
  font-size: 0.65rem; color: var(--text-tertiary);
  text-transform: uppercase; letter-spacing: 0.08em;
  padding: 6px 6px 6px 8px;
  border-right: 1px solid var(--border-muted);
}

/* Mini progress bar for in-progress card */
.progress {
  height: 4px; border-radius: 999px;
  background: var(--canvas-inset);
  overflow: hidden;
  margin-top: 4px;
  position: relative;
}
.progress::after {
  content: ''; position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, var(--warning-fg), transparent);
  animation: shimmer 1.6s ease-in-out infinite;
}
@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

.ticking { font-variant-numeric: tabular-nums; }
.empty {
  padding: 24px;
  text-align: center;
  font-size: 0.8125rem;
  color: var(--text-tertiary);
}

</style>
</head>
<body>

<header class="topbar">
  <div class="brand-icon">TP</div>
  <div class="brand-name">TracePilot</div>
  <nav class="crumbs">
    <a href="#">Sessions</a>
    <span class="sep">/</span>
    <a href="#">2025-01-14 14:32</a>
    <span class="sep">/</span>
    <a href="#">Agent Tree</a>
    <span class="sep">/</span>
    <span class="here" id="crumb-name">Explore Agent</span>
  </nav>
  <div class="topbar-spacer"></div>
  <button class="btn" onclick="toggleTheme()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
    Theme
  </button>
</header>

<main class="page">
  <!-- Hero -->
  <section class="hero">
    <div class="hero-glyph t-explore" id="hero-glyph">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
    </div>
    <div class="hero-title-block">
      <div class="hero-eyebrow">
        <span id="hero-type">EXPLORE SUBAGENT</span>
        <span class="id" id="hero-id">tool_call_abc</span>
      </div>
      <h1 id="hero-name">Explore Agent</h1>
      <div class="hero-desc" id="hero-desc">Find auth flows in the codebase</div>
    </div>
    <div class="hero-actions">
      <button class="btn">⧉ Copy ID</button>
      <button class="btn primary">↗ Open in tree</button>
    </div>
  </section>

  <!-- Banner area -->
  <div id="banner-slot"></div>

  <!-- Grid -->
  <div class="grid">
    <!-- Metadata sidebar -->
    <aside class="sidebar-meta">
      <div class="card">
        <div class="card-head">Status</div>
        <div class="card-body">
          <div class="kv-list">
            <div class="kv-row">
              <span class="kv-key">State</span>
              <span class="kv-val" id="sb-status"></span>
            </div>
            <div class="kv-row">
              <span class="kv-key">Duration</span>
              <span class="kv-val ticking" id="sb-duration"></span>
            </div>
            <div class="kv-row">
              <span class="kv-key">Tools</span>
              <span class="kv-val" id="sb-tools"></span>
            </div>
            <div class="kv-row">
              <span class="kv-key">Tokens</span>
              <span class="kv-val" id="sb-tokens"></span>
            </div>
          </div>
          <div id="sb-progress"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-head">Identity</div>
        <div class="card-body">
          <div class="kv-list">
            <div class="kv-row">
              <span class="kv-key">Type</span>
              <span class="kv-val" id="sb-type"></span>
            </div>
            <div class="kv-row">
              <span class="kv-key">Model</span>
              <span class="kv-val" id="sb-model"></span>
            </div>
            <div class="kv-row">
              <span class="kv-key">Turn</span>
              <span class="kv-val" id="sb-turn"></span>
            </div>
            <div class="kv-row" id="sb-source-row" style="display: none;">
              <span class="kv-key">Source</span>
              <span class="kv-val" id="sb-source"></span>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-head">Lifecycle</div>
        <div class="card-body">
          <div class="kv-list">
            <div class="kv-row"><span class="kv-key">Started</span><span class="kv-val mono">14:32:08.123</span></div>
            <div class="kv-row"><span class="kv-key">Finished</span><span class="kv-val mono" id="sb-finished">14:32:22.443</span></div>
            <div class="kv-row"><span class="kv-key">Call ID</span><span class="kv-val mono" id="sb-callid">tool_call_abc</span></div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Content -->
    <div class="content-stack" id="content-stack">
      <!-- Populated by JS -->
    </div>
  </div>
</main>

<div class="switcher" role="tablist" aria-label="Example subagent">
  <span class="label">EXAMPLE</span>
  <button class="active" data-example="A" onclick="loadExample('A')">A · Healthy</button>
  <button data-example="B" onclick="loadExample('B')">B · In progress</button>
  <button data-example="C" onclick="loadExample('C')">C · Failed</button>
  <button data-example="M" onclick="loadExample('M')">Main agent</button>
</div>

<script>
const EXAMPLES = {
  A: {
    type: "explore",
    typeLabel: "explore subagent",
    typeShort: "explore",
    id: "tool_call_abc",
    name: "Explore Agent",
    description: "Find auth flows in the codebase",
    status: "completed",
    statusText: "Completed",
    model: "claude-sonnet-4.6",
    requestedModel: "claude-sonnet-4.6",
    modelSubstituted: false,
    durationMs: 14320,
    tokens: 8421,
    toolCount: 7,
    turnIndex: 3,
    sourceTurnIndex: null,
    isCrossTurnParent: false,

const ORDER = ["A", "B", "C", "M"];
let currentKey = "A";
let liveInterval = null;

function fmtDuration(ms) {
  if (ms == null) return "—";
  if (ms < 1000) return `${ms}ms`;
  const s = ms / 1000;
  if (s < 60) return `${s.toFixed(1)}s`;
  const m = Math.floor(s / 60);
  const rs = Math.floor(s % 60);
  return `${m}m ${rs}s`;
}
function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
}
function fmtMd(s) {
  return escapeHtml(s).replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>").replace(/`([^`]+)`/g, '<code style="font-family:JetBrains Mono,monospace;background:rgba(0,0,0,0.25);padding:1px 5px;border-radius:4px;font-size:0.85em;">$1</code>');
}
function fmtArgs(args) {
  if (!args) return "";
  return Object.entries(args).map(([k, v]) => {
    const val = typeof v === "string" ? `"${v}"` : JSON.stringify(v);
    return `${k}=${val}`;
  }).join(" ");
}
function toolIcon(name, isAgent) {
  if (isAgent) return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><path d="M8 16h0M16 16h0"/></svg>';
  const map = {
    grep: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>',
    view: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>',
    edit: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4Z"/></svg>',
    report_intent: '<span style="font-size:13px">📋</span>',
    store_memory: '<span style="font-size:13px">🧠</span>',
    read_agent: '<span style="font-size:13px">📥</span>',
  };
  return map[name] || '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>';
}
function statusIconHtml(status) {
  if (status === "ok") return '<span class="status-ok"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>';
  if (status === "fail") return '<span class="status-fail"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg></span>';
  return '<span class="status-pending spin"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.22-8.56"/></svg></span>';
}

function loadExample(key) {

  document.querySelectorAll(".switcher button[data-example]").forEach(b => {
    b.classList.toggle("active", b.dataset.example === key);
  });

  // Hero
  document.getElementById("hero-glyph").className = "hero-glyph t-" + ex.type;

  document.getElementById("hero-id").textContent = ex.id;

    bannerHtml += `
      <div class="banner">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h13l-3-3M21 17H8l3 3"/></svg>
        <div>Cross-turn agent — launched in <strong>turn ${ex.sourceTurnIndex}</strong>, activity continues to stream into turn ${ex.turnIndex}.</div>
      </div>`;
  }

  // Sidebar
  const statusChip = `<span class="chip chip-status ${ex.status}"><span class="pulse"></span>${ex.statusText}</span>`;

  if (liveInterval) { clearInterval(liveInterval); liveInterval = null; }

  const setDur = () => document.getElementById("sb-duration").textContent = fmtDuration(liveMs);
  setDur();
  if (ex.status === "in-progress") {
    liveInterval = setInterval(() => { liveMs += 1000; setDur(); }, 1000);
  }

  document.getElementById("sb-progress").innerHTML = ex.status === "in-progress" ? '<div class="progress"></div>' : "";
  document.getElementById("sb-tools").textContent = ex.toolCount + (ex.isMainAgent ? " (incl. agents)" : "");
  document.getElementById("sb-tokens").textContent = ex.tokens?.toLocaleString() ?? "—";

  document.getElementById("sb-type").textContent = ex.typeShort;
  let modelHtml = `<span class="mono">${ex.model || "—"}</span>`;
  if (ex.modelSubstituted) modelHtml += ' <span class="chip warn">⚠ substituted</span>';
  document.getElementById("sb-model").innerHTML = modelHtml;
  document.getElementById("sb-turn").textContent = "turn " + ex.turnIndex;

  if (ex.isCrossTurnParent) {
    document.getElementById("sb-source-row").style.display = "grid";
    document.getElementById("sb-source").textContent = "turn " + ex.sourceTurnIndex;
  } else {
    document.getElementById("sb-source-row").style.display = "none";
  }
  document.getElementById("sb-finished").textContent = ex.finishedAt;
  document.getElementById("sb-callid").textContent = ex.id;

  // Content
  const stack = document.getElementById("content-stack");
  const parts = [];

  if (ex.status === "failed" && ex.error) {
    parts.push(`
      <section>
        <div class="card failure">
          <div class="card-head">⨯ Failure reason</div>
          <div class="card-body"><pre>${escapeHtml(ex.error)}</pre></div>
        </div>
      </section>
    `);
  }

  if (ex.prompt) {
    parts.push(`
      <section>
        <div class="section-title"><h2>Prompt</h2><span class="lab">verbatim</span></div>
        <div class="card"><div class="card-body"><div class="prompt-body">${escapeHtml(ex.prompt)}</div></div></div>
      </section>
    `);
  }

  if (ex.output) {
    parts.push(`
      <section>
        <div class="section-title"><h2>Output</h2><span class="lab">final assistant message${ex.isMainAgent ? " (orchestrator)" : ""}</span></div>
        <div class="card"><div class="card-body"><div class="output-body">${fmtMd(ex.output)}</div></div></div>
      </section>
    `);
  }

  if (ex.result) {
    const truncated = ex.result.includes("…[truncated]");
    parts.push(`
      <section>
        <div class="section-title"><h2>Result</h2><span class="lab">parent tool-call result</span></div>
        <div class="card"><div class="card-body">
          <div class="output-body">${escapeHtml(ex.result)}</div>
          ${truncated ? `<button class="load-full-btn" onclick="alert('Would dispatch loadFullResult(${JSON.stringify(ex.id)})')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg> Load full result</button>` : ""}
        </div></div>
      </section>
    `);
  }

  if (ex.reasoning.length) {
    parts.push(`
      <section>
        <div class="section-title"><h2>Reasoning</h2><span class="lab">${ex.reasoning.length} block${ex.reasoning.length > 1 ? "s" : ""}</span></div>
        <div class="card reasoning-card" data-reasoning>
          <div class="toggle-head" onclick="this.parentElement.classList.toggle('open')">
            <span class="ico">💭</span>
            <svg class="chev" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            <span style="color: var(--text-secondary); font-size: 0.8125rem;">${ex.reasoning.length} reasoning block${ex.reasoning.length > 1 ? "s" : ""}</span>
            <span style="margin-left:auto; color: var(--text-tertiary); font-size: 0.72rem;">click to expand</span>
          </div>
          <div class="body">${ex.reasoning.map(r => escapeHtml(r)).join('<hr style="border:none; border-top:1px dashed var(--border-muted); margin: 12px 0;"/>')}</div>
        </div>
      </section>
    `);
  }

  // Tools / Tools & Agents
  const heading = ex.isMainAgent ? "Tools & Agents" : "Tool calls";
  if (ex.tools.length) {
    parts.push(`
      <section>
        <div class="section-title"><h2>${heading}</h2><span class="lab">${ex.tools.length} call${ex.tools.length > 1 ? "s" : ""}</span></div>
        <div class="card">
          <div class="card-head">${heading}<span class="count">${ex.tools.length}</span></div>
          <div class="tools-list">
            ${ex.tools.map(renderTool).join("")}
          </div>
        </div>
      </section>
    `);
  } else if (!ex.error) {
    parts.push(`<section><div class="section-title"><h2>${heading}</h2></div><div class="card"><div class="empty">No tool calls recorded.</div></div></section>`);
  }

  stack.innerHTML = parts.join("");
}

function renderTool(t) {
  const argSummary = fmtArgs(t.args);
  const truncated = t.result && t.result.includes("…[truncated]");
  return `
    <div class="tool-row" data-tool>
      <div class="tool-row-head" onclick="this.parentElement.classList.toggle('expanded')">
        <span class="tool-idx">${t.idx}.</span>
        <span class="tool-icon">${toolIcon(t.tool, t.isAgent)}</span>
        <span class="tool-name">${t.isAgent ? escapeHtml(t.agentName) : t.tool}</span>
        ${t.isAgent ? '<span class="agent-badge">agent</span>' : ""}
        ${t.isPill ? '<span class="pill-badge">pill</span>' : ""}
        <span class="tool-args" title="${escapeHtml(argSummary)}">${escapeHtml(argSummary)}</span>
        <span class="tool-right">
          ${t.durationMs != null ? `<span>${fmtDuration(t.durationMs)}</span>` : `<span class="status-pending">running…</span>`}
          ${statusIconHtml(t.status)}
        </span>
      </div>
      <div class="tool-row-body">
        <div class="meta-grid">
          <div><div class="k">Tool</div><div class="v">${t.tool}</div></div>
          <div><div class="k">Call ID</div><div class="v">${t.meta?.callId ?? "—"}</div></div>
          ${t.meta?.startedAt ? `<div><div class="k">Started</div><div class="v">${t.meta.startedAt}</div></div>` : ""}
          ${t.meta?.completedAt ? `<div><div class="k">Completed</div><div class="v">${t.meta.completedAt}</div></div>` : ""}
          <div><div class="k">Duration</div><div class="v">${fmtDuration(t.durationMs)}</div></div>
          <div><div class="k">Status</div><div class="v">${t.status}</div></div>
        </div>
        ${t.args ? `<div class="lab">Arguments</div><pre>${escapeHtml(JSON.stringify(t.args, null, 2))}</pre>` : ""}
        ${t.result ? `<div class="lab">Result${truncated ? " (truncated)" : ""}</div><pre>${escapeHtml(t.result)}</pre>${truncated ? `<button class="load-full-btn" onclick="event.stopPropagation(); alert('Would dispatch loadFullResult(${JSON.stringify(t.meta?.callId)})')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg> Load full result</button>` : ""}` : ""}
        ${!t.result && t.status === "pending" ? `<div style="color: var(--text-tertiary); font-style: italic; margin-top: 8px;">Call still in flight — result will appear when it returns.</div>` : ""}
        ${t.error ? `<div class="lab">Error</div><div class="err-block">${escapeHtml(t.error)}</div>` : ""}
      </div>
    </div>
  `;
}
