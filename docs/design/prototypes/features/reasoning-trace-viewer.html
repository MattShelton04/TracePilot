<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — Reasoning Trace Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/design-system-c.css">
  <style>
    .page-content { display: flex; flex-direction: column; height: calc(100vh - 48px); padding: 0; overflow: hidden; }
    .page-content-inner { display: flex; flex-direction: column; flex: 1; min-height: 0; max-width: 100%; }

    .turn-nav {
      display: flex; align-items: center; gap: 12px; padding: 12px 24px;
      border-bottom: 1px solid var(--border-default); flex-shrink: 0;
      background: var(--canvas-subtle);
    }
    .turn-nav-btn {
      padding: 5px 12px; border-radius: var(--radius-md);
      background: var(--canvas-overlay); border: 1px solid var(--border-default);
      color: var(--text-secondary); font-size: 0.75rem; font-weight: 500;
      cursor: pointer; transition: all var(--transition-fast);
      display: flex; align-items: center; gap: 4px;
    }
    .turn-nav-btn:hover { background: var(--accent-muted); color: var(--accent-fg); border-color: var(--border-accent); }
    .turn-nav-btn:disabled { opacity: 0.3; cursor: default; }
    .turn-nav-btn:disabled:hover { background: var(--canvas-overlay); color: var(--text-secondary); border-color: var(--border-default); }
    .turn-indicator {
      font-size: 0.8125rem; font-weight: 600; color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }
    .turn-dots {
      display: flex; gap: 4px; margin-left: auto;
    }
    .turn-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--neutral-muted); cursor: pointer; transition: all var(--transition-fast);
    }
    .turn-dot.active { background: var(--accent-fg); box-shadow: 0 0 6px rgba(99,102,241,0.4); }
    .turn-dot:hover { background: var(--accent-fg); }
    .turn-model-badge {
      padding: 2px 8px; border-radius: var(--radius-full);
      background: var(--accent-muted); color: var(--accent-fg);
      font-size: 0.625rem; font-weight: 600;
    }

    .split-container {
      display: flex; flex: 1; min-height: 0; position: relative;
    }

    /* Left Panel: Thinking */
    .thinking-panel {
      width: 60%; border-right: 1px solid var(--border-default);
      display: flex; flex-direction: column; min-width: 0;
    }
    .panel-title-bar {
      padding: 10px 18px; border-bottom: 1px solid var(--border-default);
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
      background: var(--canvas-subtle);
    }
    .panel-title {
      font-size: 0.75rem; font-weight: 600; color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .panel-title-icon { font-size: 14px; opacity: 0.6; }
    .panel-scroll { flex: 1; overflow-y: auto; padding: 18px; }

    .reasoning-block {
      background: var(--canvas-inset); border: 1px solid var(--border-muted);
      border-radius: var(--radius-md); margin-bottom: 14px; overflow: hidden;
      transition: all var(--transition-normal);
    }
    .reasoning-block:hover { border-color: var(--border-default); }
    .reasoning-header {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px;
      cursor: pointer; user-select: none;
    }
    .reasoning-chevron {
      width: 16px; height: 16px; color: var(--text-tertiary);
      transition: transform var(--transition-fast); flex-shrink: 0;
    }
    .reasoning-chevron.expanded { transform: rotate(90deg); }
    .reasoning-label {
      font-size: 0.6875rem; font-weight: 500; color: var(--text-tertiary);
    }
    .reasoning-length {
      margin-left: auto; font-size: 0.625rem; color: var(--text-placeholder);
      font-variant-numeric: tabular-nums;
    }
    .reasoning-body {
      padding: 0 12px 12px; display: none;
    }
    .reasoning-body.visible { display: block; }
    .reasoning-text {
      font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
      line-height: 1.7; color: var(--text-secondary); opacity: 0.85;
      font-style: italic; white-space: pre-wrap; word-break: break-word;
      counter-reset: line;
    }
    .reasoning-line {
      display: flex; padding: 1px 0;
    }
    .reasoning-line-num {
      width: 32px; flex-shrink: 0; text-align: right; padding-right: 10px;
      color: var(--text-placeholder); font-size: 0.625rem; user-select: none;
      font-family: 'JetBrains Mono', monospace; line-height: 1.7;
    }
    .reasoning-line-content { flex: 1; min-width: 0; }
    .highlight-phrase {
      background: var(--accent-subtle); color: var(--accent-fg);
      padding: 1px 3px; border-radius: 3px; font-style: normal;
    }

    .no-reasoning {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; color: var(--text-tertiary); text-align: center; padding: 40px;
    }
    .no-reasoning-icon { font-size: 40px; opacity: 0.3; margin-bottom: 12px; }
    .no-reasoning h3 { font-size: 0.875rem; margin-bottom: 6px; color: var(--text-secondary); }
    .no-reasoning p { font-size: 0.75rem; max-width: 280px; line-height: 1.5; }

    /* Right Panel: Actions */
    .actions-panel {
      width: 40%; display: flex; flex-direction: column; min-width: 0;
    }
    .actions-scroll { flex: 1; overflow-y: auto; padding: 18px; }

    .action-card {
      background: var(--canvas-subtle); border: 1px solid var(--border-default);
      border-radius: var(--radius-md); padding: 12px 14px; margin-bottom: 10px;
      transition: all var(--transition-normal);
    }
    .action-card:hover { border-color: var(--border-accent); }
    .action-card-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    }
    .action-role-icon {
      width: 22px; height: 22px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0;
    }
    .action-role-icon.assistant { background: var(--accent-muted); color: var(--accent-fg); }
    .action-role-icon.tool { background: var(--warning-muted); color: var(--warning-fg); }
    .action-role-label {
      font-size: 0.75rem; font-weight: 600; color: var(--text-primary);
    }
    .action-model-badge {
      margin-left: auto; font-size: 0.5625rem; padding: 1px 6px;
      border-radius: var(--radius-full); background: var(--accent-muted); color: var(--accent-fg);
      font-weight: 600;
    }
    .action-content {
      font-size: 0.75rem; color: var(--text-secondary); line-height: 1.55;
      overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    }

    .tool-call-item {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px;
      background: var(--canvas-inset); border-radius: var(--radius-sm);
      margin-bottom: 4px;
    }
    .tool-call-icon { font-size: 14px; }
    .tool-call-name {
      font-size: 0.75rem; font-weight: 600; color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
    }
    .tool-call-args {
      font-size: 0.6875rem; color: var(--text-tertiary);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
    }
    .tool-call-status {
      font-size: 12px; flex-shrink: 0;
    }
    .tool-call-duration {
      font-size: 0.625rem; color: var(--text-placeholder);
      font-variant-numeric: tabular-nums; flex-shrink: 0;
    }

    .files-modified {
      margin-top: 12px; padding: 10px 12px; background: var(--canvas-inset);
      border-radius: var(--radius-sm); border: 1px solid var(--border-muted);
    }
    .files-modified-title {
      font-size: 0.625rem; font-weight: 600; color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px;
    }
    .file-item {
      display: flex; align-items: center; gap: 6px; padding: 3px 0;
      font-size: 0.6875rem; font-family: 'JetBrains Mono', monospace; color: var(--text-secondary);
    }
    .file-icon { font-size: 10px; color: var(--success-fg); }

    /* SVG Connectors */
    .connector-svg {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 5;
    }
    .connector-line {
      stroke: var(--accent-fg); stroke-width: 1; opacity: 0.25;
      stroke-dasharray: 4 3; fill: none;
    }
    .connector-dot {
      fill: var(--accent-fg); opacity: 0.5;
    }

    /* Link markers on reasoning text */
    .link-marker {
      display: inline-flex; align-items: center; justify-content: center;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--accent-muted); color: var(--accent-fg);
      font-size: 8px; font-weight: 700; cursor: pointer;
      margin-left: 4px; vertical-align: middle; font-style: normal;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" role="navigation" aria-label="Main navigation" id="sidebar"></aside>
    <div class="main-content">
      <div class="page-header-bar">
        <div class="breadcrumb">
          <a href="../variant-c/session-list.html">TracePilot</a>
          <span class="breadcrumb-sep">/</span>
          <a href="../variant-c/session-list.html">Sessions</a>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-current">Reasoning Trace Viewer</span>
        </div>
      </div>
      <div class="page-content">
        <div class="page-content-inner">

          <div class="turn-nav" id="turnNav">
            <button class="turn-nav-btn" id="prevTurn" disabled>← Prev</button>
            <span class="turn-indicator" id="turnIndicator">Turn 1 / 5</span>
            <button class="turn-nav-btn" id="nextTurn">Next →</button>
            <div class="turn-dots" id="turnDots"></div>
            <span class="turn-model-badge" id="turnModel">claude-opus-4.6</span>
          </div>

          <div class="split-container" id="splitContainer">
            <svg class="connector-svg" id="connectorSvg"></svg>

            <div class="thinking-panel">
              <div class="panel-title-bar">
                <span class="panel-title-icon">🧠</span>
                <span class="panel-title">Thinking</span>
              </div>
              <div class="panel-scroll" id="thinkingScroll"></div>
            </div>

            <div class="actions-panel">
              <div class="panel-title-bar">
                <span class="panel-title-icon">⚡</span>
                <span class="panel-title">Actions</span>
              </div>
              <div class="actions-scroll" id="actionsScroll"></div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="../shared/shared.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('sidebar').innerHTML = generateSidebar('sessions');

    // --- Mock Turns with Reasoning ---
    const turns = [
      {
        index: 0,
        model: 'claude-opus-4.6',
        hasReasoning: true,
        reasoning: [
          "The user wants me to implement OAuth login with GitHub and Google providers. I need to first understand the existing auth module structure before making changes.\n\nLet me search for the current authentication implementation to understand what patterns they're using. I should look at:\n1. The main auth index file\n2. Any existing provider implementations\n3. The package.json for current dependencies",
          "I found the auth module at src/auth/. It uses a strategy pattern with a BaseProvider abstract class. Each provider implements `authenticate()`, `refresh()`, and `revoke()` methods.\n\nI need to create two new providers:\n- GitHubProvider extending BaseProvider\n- GoogleProvider extending BaseProvider\n\nI'll also need to install passport-github2 and passport-google-oauth20 packages. Let me check if passport is already a dependency..."
        ],
        assistantMessage: "I'll implement the OAuth login feature. Let me start by examining your existing auth module and then add GitHub and Google providers.\n\nFirst, let me look at the current project structure...",
        toolCalls: [
          { name: 'view', args: 'src/auth/index.ts', success: true, duration: 85 },
          { name: 'view', args: 'src/auth/providers/', success: true, duration: 62 },
          { name: 'view', args: 'package.json', success: true, duration: 91 },
        ],
        filesModified: [],
        links: [
          { phrase: 'search for the current authentication', action: 0 },
          { phrase: 'check if passport is already a dependency', action: 2 },
        ]
      },
      {
        index: 1,
        model: 'claude-opus-4.6',
        hasReasoning: true,
        reasoning: [
          "Now I need to add error handling and rate limiting. The user specifically asked for proper error handling, so I should create custom error types that integrate with their existing error boundary.\n\nLet me think about the error types I need:\n- OAuthError (base class)\n- TokenExpiredError\n- InvalidScopeError\n- ProviderUnavailableError\n- RateLimitExceededError",
          "For rate limiting, I'll use a sliding window algorithm. This is more accurate than fixed windows because it doesn't have the boundary problem. I'll store the window state in Redis since they already have a Redis connection.\n\nThe implementation plan:\n1. Create src/auth/errors.ts with custom error classes\n2. Create src/auth/rate-limiter.ts with sliding window implementation\n3. Edit the GitHub and Google providers to use the new error types\n4. Run the existing tests to make sure nothing breaks",
          "The test failed because I forgot to mock the Redis connection in the test environment. I need to fix the GitHub provider to handle the case where Redis is not available — it should fall back to an in-memory rate limiter.\n\nLet me update the provider and re-run the tests..."
        ],
        assistantMessage: "I'll add comprehensive error handling with custom error types and implement rate limiting using a sliding window approach.",
        toolCalls: [
          { name: 'create', args: 'src/auth/errors.ts', success: true, duration: 120 },
          { name: 'create', args: 'src/auth/rate-limiter.ts', success: true, duration: 145 },
          { name: 'edit', args: 'src/auth/providers/github.ts', success: true, duration: 340 },
          { name: 'edit', args: 'src/auth/providers/google.ts', success: true, duration: 280 },
          { name: 'powershell', args: 'npm test -- --filter auth', success: false, duration: 2100 },
          { name: 'edit', args: 'src/auth/providers/github.ts', success: true, duration: 180 },
          { name: 'powershell', args: 'npm test -- --filter auth', success: true, duration: 1800 },
        ],
        filesModified: ['src/auth/errors.ts', 'src/auth/rate-limiter.ts', 'src/auth/providers/github.ts', 'src/auth/providers/google.ts'],
        links: [
          { phrase: 'Create src/auth/errors.ts', action: 0 },
          { phrase: 'Create src/auth/rate-limiter.ts', action: 1 },
          { phrase: 'Edit the GitHub and Google providers', action: 2 },
          { phrase: 'Run the existing tests', action: 4 },
          { phrase: 'update the provider and re-run', action: 5 },
        ]
      },
      {
        index: 2,
        model: 'claude-opus-4.6',
        hasReasoning: true,
        reasoning: [
          "The user wants integration tests for the OAuth flow. I should create comprehensive tests that cover:\n- Successful authentication flow for both providers\n- Token refresh scenarios\n- Error cases (invalid tokens, expired tokens, rate limiting)\n- Edge cases (missing scopes, malformed responses)\n\nI'll use the existing test framework (vitest) and create mock fixtures for the OAuth tokens and API responses.",
        ],
        assistantMessage: "I'll create comprehensive integration tests covering the full OAuth flow for both providers, including error scenarios and edge cases.",
        toolCalls: [
          { name: 'create', args: 'tests/auth/oauth.test.ts', success: true, duration: 200 },
          { name: 'create', args: 'tests/auth/fixtures/mock-tokens.ts', success: true, duration: 180 },
          { name: 'powershell', args: 'npm test -- --filter oauth', success: true, duration: 4500 },
        ],
        filesModified: ['tests/auth/oauth.test.ts', 'tests/auth/fixtures/mock-tokens.ts'],
        links: [
          { phrase: 'create mock fixtures', action: 1 },
        ]
      },
      {
        index: 3,
        model: 'claude-opus-4.6',
        hasReasoning: false,
        reasoning: [],
        assistantMessage: "All tests are passing. Here's a summary of what was implemented:\n\n1. **GitHub OAuth Provider** — Full OAuth 2.0 flow with token refresh\n2. **Google OAuth Provider** — OpenID Connect integration\n3. **Error Handling** — Custom error hierarchy with proper error codes\n4. **Rate Limiting** — Sliding window algorithm with Redis backend\n5. **Integration Tests** — 24 test cases covering all flows",
        toolCalls: [],
        filesModified: [],
        links: []
      },
      {
        index: 4,
        model: 'claude-opus-4.6',
        hasReasoning: true,
        reasoning: [
          "The user is asking me to commit the changes. I should first check the git status to see what files have been modified, then stage everything and create a descriptive commit message.\n\nI should use conventional commits format since I noticed they use it in their git history. The appropriate prefix would be `feat:` since this is a new feature.",
        ],
        assistantMessage: "I'll commit all the changes with a descriptive message following your conventional commits format.",
        toolCalls: [
          { name: 'powershell', args: 'git add -A', success: true, duration: 120 },
          { name: 'powershell', args: 'git commit -m "feat(auth): implement OAuth login with GitHub and Google providers"', success: true, duration: 340 },
        ],
        filesModified: [],
        links: [
          { phrase: 'check the git status', action: 0 },
        ]
      },
    ];

    let currentTurn = 0;
    const highlightPatterns = [
      /I need to/gi, /Let me/gi, /I should/gi, /I'll/gi, /I found/gi,
      /The user wants/gi, /I forgot/gi, /I noticed/gi,
    ];

    function highlightReasoning(text) {
      let result = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
      highlightPatterns.forEach(pattern => {
        result = result.replace(pattern, match => `<span class="highlight-phrase">${match}</span>`);
      });
      return result;
    }

    function renderTurn(idx) {
      currentTurn = idx;
      const turn = turns[idx];

      // Update nav
      document.getElementById('turnIndicator').textContent = `Turn ${idx + 1} / ${turns.length}`;
      document.getElementById('prevTurn').disabled = idx === 0;
      document.getElementById('nextTurn').disabled = idx === turns.length - 1;
      document.getElementById('turnModel').textContent = turn.model;

      // Update dots
      const dots = document.getElementById('turnDots');
      dots.innerHTML = turns.map((_, i) =>
        `<div class="turn-dot${i === idx ? ' active' : ''}" data-turn="${i}"></div>`
      ).join('');
      dots.querySelectorAll('.turn-dot').forEach(d => {
        d.addEventListener('click', () => renderTurn(parseInt(d.dataset.turn)));
      });

      // Render thinking panel
      const thinkingEl = document.getElementById('thinkingScroll');
      if (!turn.hasReasoning || turn.reasoning.length === 0) {
        thinkingEl.innerHTML = `
          <div class="no-reasoning">
            <div class="no-reasoning-icon">🔒</div>
            <h3>No Reasoning Available</h3>
            <p>This turn did not include extended thinking output. The model may have been configured without chain-of-thought reasoning, or the reasoning was not captured.</p>
          </div>
        `;
      } else {
        thinkingEl.innerHTML = turn.reasoning.map((block, bi) => {
          const lines = block.split('\n');
          const lineHtml = lines.map((line, li) => `
            <div class="reasoning-line">
              <span class="reasoning-line-num">${li + 1}</span>
              <span class="reasoning-line-content">${highlightReasoning(line)}</span>
            </div>
          `).join('');
          return `
            <div class="reasoning-block" data-block="${bi}">
              <div class="reasoning-header" data-toggle="${bi}">
                <svg class="reasoning-chevron expanded" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6,4 10,8 6,12"/></svg>
                <span class="reasoning-label">Reasoning Block ${bi + 1}</span>
                <span class="reasoning-length">${lines.length} lines</span>
              </div>
              <div class="reasoning-body visible" id="reasoning-body-${bi}">
                <div class="reasoning-text">${lineHtml}</div>
              </div>
            </div>
          `;
        }).join('');

        // Add collapse toggles
        thinkingEl.querySelectorAll('.reasoning-header').forEach(header => {
          header.addEventListener('click', () => {
            const bi = header.dataset.toggle;
            const body = document.getElementById(`reasoning-body-${bi}`);
            const chevron = header.querySelector('.reasoning-chevron');
            body.classList.toggle('visible');
            chevron.classList.toggle('expanded');
          });
        });
      }

      // Render actions panel
      const actionsEl = document.getElementById('actionsScroll');
      let actionsHtml = '';

      // Assistant message
      actionsHtml += `
        <div class="action-card">
          <div class="action-card-header">
            <div class="action-role-icon assistant">🤖</div>
            <span class="action-role-label">Assistant</span>
            <span class="action-model-badge">${turn.model}</span>
          </div>
          <div class="action-content">${turn.assistantMessage}</div>
        </div>
      `;

      // Tool calls
      if (turn.toolCalls.length > 0) {
        actionsHtml += `<div class="action-card">
          <div class="action-card-header">
            <div class="action-role-icon tool">🔧</div>
            <span class="action-role-label">Tool Calls</span>
            <span style="margin-left:auto;font-size:0.625rem;color:var(--text-tertiary)">${turn.toolCalls.length} calls</span>
          </div>`;
        turn.toolCalls.forEach(tc => {
          actionsHtml += `
            <div class="tool-call-item" data-tool="${tc.name}">
              <span class="tool-call-icon">${toolIcon(tc.name)}</span>
              <span class="tool-call-name">${tc.name}</span>
              <span class="tool-call-args">${tc.args}</span>
              <span class="tool-call-status">${tc.success ? '<span style="color:var(--success-fg)">✓</span>' : '<span style="color:var(--danger-fg)">✗</span>'}</span>
              <span class="tool-call-duration">${formatDuration(tc.duration)}</span>
            </div>
          `;
        });
        actionsHtml += '</div>';
      }

      // Files modified
      if (turn.filesModified.length > 0) {
        actionsHtml += `
          <div class="files-modified">
            <div class="files-modified-title">Files Modified (${turn.filesModified.length})</div>
            ${turn.filesModified.map(f => `<div class="file-item"><span class="file-icon">●</span>${f}</div>`).join('')}
          </div>
        `;
      }

      actionsEl.innerHTML = actionsHtml;

      // Draw connector lines (simplified — visual markers)
      drawConnectors(turn);
    }

    function drawConnectors(turn) {
      const svg = document.getElementById('connectorSvg');
      svg.innerHTML = '';
      if (!turn.hasReasoning || turn.links.length === 0) return;

      // We draw simple decorative curved connectors
      requestAnimationFrame(() => {
        const container = document.getElementById('splitContainer');
        const containerRect = container.getBoundingClientRect();
        const thinkingBlocks = container.querySelectorAll('.highlight-phrase');
        const toolItems = container.querySelectorAll('.tool-call-item');

        // Map links from highlighted phrases to tool items
        turn.links.forEach((link, i) => {
          const phraseEls = Array.from(thinkingBlocks).filter(el =>
            el.textContent.toLowerCase().includes(link.phrase.toLowerCase().slice(0, 15))
          );
          const actionEl = toolItems[link.action];

          if (phraseEls.length > 0 && actionEl) {
            const pRect = phraseEls[0].getBoundingClientRect();
            const aRect = actionEl.getBoundingClientRect();

            const x1 = pRect.right - containerRect.left;
            const y1 = pRect.top + pRect.height / 2 - containerRect.top;
            const x2 = aRect.left - containerRect.left;
            const y2 = aRect.top + aRect.height / 2 - containerRect.top;
            const mx = (x1 + x2) / 2;

            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`);
            path.setAttribute('class', 'connector-line');
            svg.appendChild(path);

            [{ cx: x1, cy: y1 }, { cx: x2, cy: y2 }].forEach(pt => {
              const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
              circle.setAttribute('cx', pt.cx);
              circle.setAttribute('cy', pt.cy);
              circle.setAttribute('r', '3');
              circle.setAttribute('class', 'connector-dot');
              svg.appendChild(circle);
            });
          }
        });
      });
    }

    // Navigation
    document.getElementById('prevTurn').addEventListener('click', () => {
      if (currentTurn > 0) renderTurn(currentTurn - 1);
    });
    document.getElementById('nextTurn').addEventListener('click', () => {
      if (currentTurn < turns.length - 1) renderTurn(currentTurn + 1);
    });

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft' && currentTurn > 0) renderTurn(currentTurn - 1);
      if (e.key === 'ArrowRight' && currentTurn < turns.length - 1) renderTurn(currentTurn + 1);
    });

    // Initial render
    renderTurn(0);

    // Redraw connectors on scroll
    document.getElementById('thinkingScroll').addEventListener('scroll', () => drawConnectors(turns[currentTurn]));
    document.getElementById('actionsScroll').addEventListener('scroll', () => drawConnectors(turns[currentTurn]));
    window.addEventListener('resize', () => drawConnectors(turns[currentTurn]));
  });
  </script>
</body>
</html>
