<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — Conversation Flow Diagram</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/design-system-c.css">
  <style>
    .page-content { display: flex; flex-direction: column; height: calc(100vh - 48px); }
    .page-content-inner { display: flex; flex-direction: column; flex: 1; min-height: 0; max-width: 100%; }

    .overview-strip {
      display: flex; align-items: center; gap: 18px; padding: 14px 24px;
      border-bottom: 1px solid var(--border-default); flex-shrink: 0;
      background: var(--canvas-subtle); flex-wrap: wrap;
    }
    .overview-stat {
      display: flex; align-items: center; gap: 6px; font-size: 0.75rem;
    }
    .overview-stat-label { color: var(--text-tertiary); }
    .overview-stat-value { color: var(--text-primary); font-weight: 600; font-variant-numeric: tabular-nums; }
    .overview-sep { width: 1px; height: 18px; background: var(--border-default); }
    .overview-models {
      display: flex; gap: 6px; margin-left: auto;
    }
    .model-pill {
      padding: 2px 8px; border-radius: var(--radius-full);
      font-size: 0.625rem; font-weight: 600;
    }
    .model-pill.opus { background: var(--accent-muted); color: var(--accent-fg); }
    .model-pill.haiku { background: var(--done-muted); color: var(--done-fg); }

    .flow-scroll {
      flex: 1; overflow: auto; padding: 30px; position: relative;
    }
    .flow-canvas {
      position: relative; margin: 0 auto; width: 700px; min-height: 100%;
    }

    /* SVG layer for connections */
    .flow-svg {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .flow-arrow { stroke: rgba(255,255,255,0.12); stroke-width: 1.5; fill: none; }
    .flow-arrow-head { fill: rgba(255,255,255,0.12); }
    .flow-branch-line { stroke: rgba(251,191,36,0.2); stroke-width: 1; stroke-dasharray: 4 3; fill: none; }

    /* Node styles */
    .flow-node {
      position: absolute; width: 480px; left: 50%; transform: translateX(-50%);
      background: var(--canvas-subtle); border: 1px solid var(--border-default);
      border-radius: var(--radius-lg); padding: 14px 16px; z-index: 1;
      cursor: pointer; transition: all 0.18s ease;
      background-image: var(--gradient-card);
    }
    .flow-node:hover {
      transform: translateX(-50%) scale(1.02);
      border-color: var(--border-accent);
      box-shadow: var(--shadow-md), 0 0 0 1px var(--border-glow);
    }
    .flow-node.user { border-left: 3px solid #34d399; }
    .flow-node.assistant { border-left: 3px solid #818cf8; }
    .flow-node.tool { border-left: 3px solid #fbbf24; }
    .flow-node.subagent-container {
      width: 540px; background: rgba(167,139,250,0.04);
      border: 1px dashed rgba(167,139,250,0.3); padding: 18px;
    }

    .node-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    }
    .node-icon {
      width: 24px; height: 24px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0;
    }
    .node-icon.user { background: var(--success-muted); color: var(--success-fg); }
    .node-icon.assistant { background: var(--accent-muted); color: var(--accent-fg); }
    .node-icon.tool { background: var(--warning-muted); color: var(--warning-fg); }
    .node-icon.subagent { background: var(--done-muted); color: var(--done-fg); }

    .node-role { font-size: 0.75rem; font-weight: 600; color: var(--text-primary); }
    .node-badges {
      display: flex; gap: 6px; margin-left: auto; align-items: center;
    }
    .node-duration-badge, .node-token-badge {
      padding: 1px 6px; border-radius: var(--radius-full);
      font-size: 0.5625rem; font-weight: 500;
    }
    .node-duration-badge { background: var(--neutral-muted); color: var(--neutral-fg); }
    .node-token-badge { background: var(--accent-subtle); color: var(--accent-fg); font-variant-numeric: tabular-nums; }

    .node-content {
      font-size: 0.75rem; color: var(--text-secondary); line-height: 1.55;
      overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .node-content.expanded { -webkit-line-clamp: unset; }
    .node-expand-btn {
      display: inline-block; margin-top: 4px; font-size: 0.6875rem;
      color: var(--accent-fg); cursor: pointer; font-weight: 500;
    }
    .node-expand-btn:hover { text-decoration: underline; }

    /* Tool call mini nodes (for parallel branching) */
    .parallel-tools {
      display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
    }
    .tool-mini-node {
      background: var(--canvas-inset); border: 1px solid var(--border-muted);
      border-radius: var(--radius-md); padding: 8px 12px; min-width: 140px;
      text-align: center; transition: all 0.18s ease; cursor: pointer;
    }
    .tool-mini-node:hover {
      border-color: var(--warning-fg); transform: scale(1.02);
      box-shadow: 0 0 12px rgba(251,191,36,0.1);
    }
    .tool-mini-name {
      font-size: 0.6875rem; font-weight: 600; color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
    }
    .tool-mini-args {
      font-size: 0.625rem; color: var(--text-tertiary); margin-top: 2px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .tool-mini-status {
      font-size: 10px; margin-top: 4px;
    }

    .subagent-label {
      font-size: 0.625rem; font-weight: 600; color: var(--done-fg);
      text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .subagent-badge {
      padding: 1px 6px; border-radius: var(--radius-full);
      background: var(--done-muted); color: var(--done-fg);
      font-size: 0.5625rem;
    }

    /* Floating detail panel */
    .detail-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
      z-index: var(--z-modal); align-items: center; justify-content: center;
    }
    .detail-overlay.visible { display: flex; animation: fadeIn 0.15s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .detail-modal {
      background: var(--canvas-overlay); border: 1px solid var(--border-default);
      border-radius: var(--radius-xl); width: 560px; max-height: 70vh;
      overflow-y: auto; box-shadow: var(--shadow-lg);
      animation: modalSlide 0.2s ease;
    }
    @keyframes modalSlide { from { transform: translateY(10px); opacity: 0; } }
    .detail-modal-header {
      padding: 16px 20px; border-bottom: 1px solid var(--border-default);
      display: flex; align-items: center; justify-content: space-between;
    }
    .detail-modal-header h3 { font-size: 0.875rem; font-weight: 600; }
    .detail-modal-close {
      width: 28px; height: 28px; border-radius: var(--radius-sm);
      background: none; border: none; color: var(--text-tertiary);
      cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
    }
    .detail-modal-close:hover { background: var(--neutral-muted); color: var(--text-primary); }
    .detail-modal-body {
      padding: 20px; font-size: 0.8125rem; color: var(--text-secondary); line-height: 1.6;
      white-space: pre-wrap; word-break: break-word;
    }
    .detail-modal-body code {
      font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
      background: var(--canvas-inset); padding: 1px 4px; border-radius: 3px;
    }
    .detail-modal-meta {
      padding: 12px 20px; border-top: 1px solid var(--border-default);
      display: flex; gap: 16px; font-size: 0.6875rem; color: var(--text-tertiary);
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" role="navigation" aria-label="Main navigation" id="sidebar"></aside>
    <div class="main-content">
      <div class="page-header-bar">
        <div class="breadcrumb">
          <a href="../variant-c/session-list.html">TracePilot</a>
          <span class="breadcrumb-sep">/</span>
          <a href="../variant-c/session-list.html">Sessions</a>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-current">Conversation Flow Diagram</span>
        </div>
      </div>
      <div class="page-content">
        <div class="page-content-inner">

          <div class="overview-strip">
            <div class="overview-stat">
              <span class="overview-stat-label">Turns</span>
              <span class="overview-stat-value">8</span>
            </div>
            <div class="overview-sep"></div>
            <div class="overview-stat">
              <span class="overview-stat-label">Duration</span>
              <span class="overview-stat-value">2h 15m</span>
            </div>
            <div class="overview-sep"></div>
            <div class="overview-stat">
              <span class="overview-stat-label">Tool Calls</span>
              <span class="overview-stat-value">23</span>
            </div>
            <div class="overview-sep"></div>
            <div class="overview-stat">
              <span class="overview-stat-label">Tokens</span>
              <span class="overview-stat-value">1.2M</span>
            </div>
            <div class="overview-models">
              <span class="model-pill opus">claude-opus-4.6</span>
              <span class="model-pill haiku">claude-haiku-4.5</span>
            </div>
          </div>

          <div class="flow-scroll" id="flowScroll">
            <div class="flow-canvas" id="flowCanvas">
              <svg class="flow-svg" id="flowSvg"></svg>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="detail-overlay" id="detailOverlay">
    <div class="detail-modal">
      <div class="detail-modal-header">
        <h3 id="detailModalTitle">Message Detail</h3>
        <button class="detail-modal-close" id="detailModalClose">✕</button>
      </div>
      <div class="detail-modal-body" id="detailModalBody"></div>
      <div class="detail-modal-meta" id="detailModalMeta"></div>
    </div>
  </div>

  <script src="../shared/shared.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('sidebar').innerHTML = generateSidebar('sessions');

    // --- Mock Conversation Flow ---
    const flowNodes = [
      {
        id: 'u1', type: 'user', role: 'User',
        content: 'Please implement the login feature with OAuth support. We need GitHub and Google providers integrated with our existing auth module.',
        duration: null, tokens: 42, full: 'Please implement the login feature with OAuth support. We need GitHub and Google providers integrated with our existing auth module. Make sure to follow our existing patterns in src/auth/ and add proper TypeScript types.'
      },
      {
        id: 'a1', type: 'assistant', role: 'Assistant',
        content: "I'll implement the OAuth login feature. Let me start by examining your existing auth module structure...",
        duration: 45000, tokens: 1250, model: 'claude-opus-4.6',
        full: "I'll implement the OAuth login feature. Let me start by examining your existing auth module and then add GitHub and Google providers.\n\nFirst, let me look at the current project structure to understand the patterns you're using..."
      },
      {
        id: 't1', type: 'tool-group', role: 'Parallel Tool Calls',
        tools: [
          { name: 'view', args: 'src/auth/index.ts', success: true, duration: 85 },
          { name: 'view', args: 'src/auth/providers/', success: true, duration: 62 },
          { name: 'view', args: 'package.json', success: true, duration: 91 },
        ],
        duration: 91, tokens: 320
      },
      {
        id: 'a2', type: 'assistant', role: 'Assistant',
        content: "I can see you're using a strategy pattern with BaseProvider. I'll create the OAuth providers following this pattern...",
        duration: 28000, tokens: 2100, model: 'claude-opus-4.6',
        full: "I can see you're using a strategy pattern with BaseProvider. Each provider implements authenticate(), refresh(), and revoke() methods.\n\nI'll create the GitHub and Google OAuth providers following this exact pattern, and install the necessary passport packages."
      },
      {
        id: 'u2', type: 'user', role: 'User',
        content: 'Looks good so far. Can you also add proper error handling and rate limiting?',
        duration: null, tokens: 24,
        full: 'Looks good so far. Can you also add proper error handling and rate limiting?'
      },
      {
        id: 'a3', type: 'assistant', role: 'Assistant',
        content: "I'll add comprehensive error handling with custom error types and implement rate limiting using a sliding window approach...",
        duration: 89000, tokens: 3800, model: 'claude-opus-4.6',
        full: "I'll add comprehensive error handling with custom error types and implement rate limiting using a sliding window approach.\n\nLet me create the error types first, then add the rate limiter middleware..."
      },
      {
        id: 'sub1', type: 'subagent', role: 'Sub-Agent: explore',
        label: 'explore — Find rate limiting patterns',
        content: 'Searching codebase for existing rate limiting implementations and middleware patterns...',
        duration: 12000, tokens: 45000, model: 'claude-haiku-4.5',
        innerTools: [
          { name: 'grep', args: 'rate.limit', success: true, duration: 45 },
          { name: 'glob', args: '**/middleware/*.ts', success: true, duration: 32 },
          { name: 'view', args: 'src/middleware/index.ts', success: true, duration: 68 },
        ],
        full: 'Sub-agent explored the codebase to find existing rate limiting patterns. Found middleware base class in src/middleware/ and recommended sliding window approach compatible with existing Redis setup.'
      },
      {
        id: 't2', type: 'tool-group', role: 'Sequential Tool Calls',
        tools: [
          { name: 'create', args: 'src/auth/errors.ts', success: true, duration: 120 },
          { name: 'create', args: 'src/auth/rate-limiter.ts', success: true, duration: 145 },
          { name: 'edit', args: 'src/auth/providers/github.ts', success: true, duration: 340 },
          { name: 'edit', args: 'src/auth/providers/google.ts', success: true, duration: 280 },
        ],
        duration: 885, tokens: 890
      },
      {
        id: 't3', type: 'tool-group', role: 'Test Execution',
        tools: [
          { name: 'powershell', args: 'npm test -- --filter auth', success: false, duration: 2100 },
        ],
        duration: 2100, tokens: 450
      },
      {
        id: 'a4', type: 'assistant', role: 'Assistant',
        content: 'The test failed due to missing Redis mock. Let me fix the provider to fall back to in-memory rate limiting...',
        duration: 15000, tokens: 980, model: 'claude-opus-4.6',
        full: 'The test failed because the Redis connection is not available in the test environment. I need to fix the GitHub provider to handle the case where Redis is not available — it should fall back to an in-memory rate limiter.\n\nLet me update the provider and re-run the tests...'
      },
      {
        id: 't4', type: 'tool-group', role: 'Fix & Retest',
        tools: [
          { name: 'edit', args: 'src/auth/providers/github.ts', success: true, duration: 180 },
          { name: 'powershell', args: 'npm test -- --filter auth', success: true, duration: 1800 },
        ],
        duration: 1980, tokens: 560
      },
      {
        id: 'u3', type: 'user', role: 'User',
        content: 'Perfect. Now let\'s write integration tests for the OAuth flow.',
        duration: null, tokens: 18,
        full: 'Perfect. Now let\'s write integration tests for the OAuth flow.'
      },
      {
        id: 'a5', type: 'assistant', role: 'Assistant',
        content: "I'll create comprehensive integration tests covering the full OAuth flow for both providers, including error scenarios...",
        duration: 67000, tokens: 4200, model: 'claude-opus-4.6',
        full: "I'll create comprehensive integration tests covering the full OAuth flow for both providers, including error scenarios and edge cases.\n\nThe tests will cover:\n- Successful auth flow for GitHub and Google\n- Token refresh\n- Rate limiting behavior\n- Error handling for invalid tokens"
      },
      {
        id: 't5', type: 'tool-group', role: 'Create Tests',
        tools: [
          { name: 'create', args: 'tests/auth/oauth.test.ts', success: true, duration: 200 },
          { name: 'create', args: 'tests/auth/fixtures/mock-tokens.ts', success: true, duration: 180 },
          { name: 'powershell', args: 'npm test -- --filter oauth', success: true, duration: 4500 },
        ],
        duration: 4880, tokens: 720
      },
      {
        id: 'a6', type: 'assistant', role: 'Assistant',
        content: 'All 24 integration tests are passing. The OAuth implementation is complete with full error handling, rate limiting, and test coverage.',
        duration: 8000, tokens: 650, model: 'claude-opus-4.6',
        full: "All 24 integration tests are passing! Here's a summary of what was implemented:\n\n1. GitHub OAuth Provider — Full OAuth 2.0 flow with token refresh\n2. Google OAuth Provider — OpenID Connect integration  \n3. Error Handling — Custom error hierarchy with proper error codes\n4. Rate Limiting — Sliding window algorithm with Redis backend and in-memory fallback\n5. Integration Tests — 24 test cases covering all flows including error scenarios"
      },
    ];

    // --- Layout calculation ---
    const nodeGap = 18;
    const nodeHeight = 80;
    const toolGroupHeight = 50;
    const subagentExtraHeight = 120;
    let yPositions = [];
    let currentY = 20;

    flowNodes.forEach((node, i) => {
      yPositions.push(currentY);
      if (node.type === 'tool-group') {
        currentY += (node.tools.length > 2 ? 130 : 90) + nodeGap;
      } else if (node.type === 'subagent') {
        currentY += 180 + nodeGap;
      } else {
        currentY += nodeHeight + nodeGap;
      }
    });

    const totalHeight = currentY + 40;
    const flowCanvas = document.getElementById('flowCanvas');
    flowCanvas.style.height = totalHeight + 'px';

    // --- Render Nodes ---
    flowNodes.forEach((node, i) => {
      const y = yPositions[i];
      const el = document.createElement('div');

      if (node.type === 'tool-group') {
        el.className = 'flow-node tool';
        el.style.top = y + 'px';
        let toolsHtml = node.tools.map(t => `
          <div class="tool-mini-node" data-detail='${JSON.stringify({ type: "tool", name: t.name, args: t.args, success: t.success, duration: t.duration })}'>
            <div class="tool-mini-name">${toolIcon(t.name)} ${t.name}</div>
            <div class="tool-mini-args">${t.args}</div>
            <div class="tool-mini-status">${t.success ? '<span style="color:var(--success-fg)">✓ passed</span>' : '<span style="color:var(--danger-fg)">✗ failed</span>'}</div>
          </div>
        `).join('');
        el.innerHTML = `
          <div class="node-header">
            <div class="node-icon tool">🔧</div>
            <span class="node-role">${node.role}</span>
            <div class="node-badges">
              <span class="node-duration-badge">${formatDuration(node.duration)}</span>
              <span class="node-token-badge">${formatNumber(node.tokens)} tok</span>
            </div>
          </div>
          <div class="parallel-tools">${toolsHtml}</div>
        `;
      } else if (node.type === 'subagent') {
        el.className = 'flow-node subagent-container';
        el.style.top = y + 'px';
        let innerToolsHtml = (node.innerTools || []).map(t => `
          <div class="tool-mini-node" style="min-width:110px" data-detail='${JSON.stringify({ type: "tool", name: t.name, args: t.args, success: t.success, duration: t.duration })}'>
            <div class="tool-mini-name">${toolIcon(t.name)} ${t.name}</div>
            <div class="tool-mini-args">${t.args}</div>
          </div>
        `).join('');
        el.innerHTML = `
          <div class="subagent-label">
            <div class="node-icon subagent">🤖</div>
            ${node.label}
            <span class="subagent-badge">${node.model}</span>
            <div class="node-badges" style="margin-left:auto">
              <span class="node-duration-badge">${formatDuration(node.duration)}</span>
              <span class="node-token-badge">${formatNumber(node.tokens)} tok</span>
            </div>
          </div>
          <div class="node-content">${node.content}</div>
          <div class="parallel-tools" style="margin-top:12px">${innerToolsHtml}</div>
        `;
        el.dataset.detail = JSON.stringify({ type: 'subagent', role: node.label, content: node.full, model: node.model, duration: node.duration, tokens: node.tokens });
      } else {
        const typeClass = node.type === 'user' ? 'user' : 'assistant';
        el.className = `flow-node ${typeClass}`;
        el.style.top = y + 'px';
        const iconMap = { user: '👤', assistant: '🤖' };
        el.innerHTML = `
          <div class="node-header">
            <div class="node-icon ${typeClass}">${iconMap[node.type]}</div>
            <span class="node-role">${node.role}</span>
            <div class="node-badges">
              ${node.duration ? `<span class="node-duration-badge">${formatDuration(node.duration)}</span>` : ''}
              <span class="node-token-badge">${formatNumber(node.tokens)} tok</span>
              ${node.model ? `<span class="node-duration-badge" style="background:var(--accent-subtle);color:var(--accent-fg)">${node.model}</span>` : ''}
            </div>
          </div>
          <div class="node-content">${node.content}</div>
        `;
        el.dataset.detail = JSON.stringify({ type: node.type, role: node.role, content: node.full, duration: node.duration, tokens: node.tokens, model: node.model || null });
      }

      // Click to expand
      el.addEventListener('click', (e) => {
        if (e.target.closest('.tool-mini-node')) {
          const data = JSON.parse(e.target.closest('.tool-mini-node').dataset.detail);
          showDetailModal(data);
          return;
        }
        const raw = el.dataset.detail;
        if (raw) showDetailModal(JSON.parse(raw));
      });

      flowCanvas.appendChild(el);
    });

    // --- Draw SVG Arrows ---
    function drawArrows() {
      const svg = document.getElementById('flowSvg');
      svg.setAttribute('height', totalHeight);
      let arrowsHtml = '';
      const centerX = 350;

      for (let i = 0; i < flowNodes.length - 1; i++) {
        const y1 = yPositions[i] + getNodeHeight(flowNodes[i]);
        const y2 = yPositions[i + 1];
        const midY = (y1 + y2) / 2;

        // Main vertical arrow
        arrowsHtml += `<path class="flow-arrow" d="M ${centerX} ${y1} C ${centerX} ${midY}, ${centerX} ${midY}, ${centerX} ${y2}" />`;
        // Arrow head
        arrowsHtml += `<polygon class="flow-arrow-head" points="${centerX - 4},${y2 - 2} ${centerX + 4},${y2 - 2} ${centerX},${y2 + 4}" />`;
      }

      // Branching lines for parallel tools
      flowNodes.forEach((node, i) => {
        if (node.type === 'tool-group' && node.tools.length > 1) {
          const baseY = yPositions[i] + 44;
          const spread = Math.min(node.tools.length * 75, 400);
          const startX = centerX - spread / 2 + 70;
          node.tools.forEach((_, ti) => {
            const tx = startX + ti * (spread / node.tools.length);
            arrowsHtml += `<path class="flow-branch-line" d="M ${centerX} ${baseY - 8} Q ${tx} ${baseY - 4}, ${tx} ${baseY + 8}" />`;
          });
        }
      });

      svg.innerHTML = `<defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="rgba(255,255,255,0.12)" /></marker></defs>` + arrowsHtml;
    }

    function getNodeHeight(node) {
      if (node.type === 'tool-group') return node.tools.length > 2 ? 120 : 80;
      if (node.type === 'subagent') return 160;
      return 70;
    }

    drawArrows();

    // --- Detail Modal ---
    const overlay = document.getElementById('detailOverlay');
    document.getElementById('detailModalClose').addEventListener('click', () => overlay.classList.remove('visible'));
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('visible'); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') overlay.classList.remove('visible'); });

    function showDetailModal(data) {
      const titleMap = { user: '👤 User Message', assistant: '🤖 Assistant', tool: '🔧 Tool Call', subagent: '🤖 Sub-Agent' };
      document.getElementById('detailModalTitle').textContent = titleMap[data.type] || 'Details';

      let bodyHtml = '';
      if (data.type === 'tool') {
        bodyHtml = `<strong>${data.name}</strong>\n\nArguments: <code>${data.args}</code>\nStatus: ${data.success ? '✅ Success' : '❌ Failed'}\nDuration: ${formatDuration(data.duration)}`;
      } else {
        bodyHtml = data.content || 'No content available.';
      }
      document.getElementById('detailModalBody').innerHTML = bodyHtml;

      let metaHtml = '';
      if (data.duration) metaHtml += `<span>⏱ ${formatDuration(data.duration)}</span>`;
      if (data.tokens) metaHtml += `<span>📊 ${formatNumber(data.tokens)} tokens</span>`;
      if (data.model) metaHtml += `<span>🤖 ${data.model}</span>`;
      document.getElementById('detailModalMeta').innerHTML = metaHtml;

      overlay.classList.add('visible');
    }
  });
  </script>
</body>
</html>
