<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — Productivity Patterns</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/design-system-c.css">
  <style>
    .page-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .page-title-text {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    .page-subtitle {
      font-size: 0.8125rem;
      color: var(--text-tertiary);
      margin-top: 2px;
    }

    /* Calendar Heatmap */
    .heatmap-container {
      overflow-x: auto;
      padding: 4px 0;
    }
    .heatmap-wrapper {
      display: flex;
      gap: 6px;
    }
    .heatmap-labels {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding-top: 22px;
    }
    .heatmap-day-label {
      font-size: 0.5625rem;
      color: var(--text-tertiary);
      height: 13px;
      line-height: 13px;
      width: 28px;
      text-align: right;
      padding-right: 4px;
    }
    .heatmap-grid-area {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .heatmap-months {
      display: flex;
      gap: 0;
      margin-bottom: 3px;
    }
    .heatmap-month-label {
      font-size: 0.5625rem;
      color: var(--text-tertiary);
      text-align: left;
    }
    .heatmap-grid {
      display: flex;
      gap: 2px;
    }
    .heatmap-week {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .heatmap-cell {
      width: 11px;
      height: 11px;
      border-radius: 2px;
      transition: all 0.1s ease;
      cursor: pointer;
      position: relative;
    }
    .heatmap-cell:hover {
      outline: 1px solid rgba(255,255,255,0.3);
      outline-offset: 1px;
    }
    .heat-0 { background: rgba(255,255,255,0.04); }
    .heat-1 { background: rgba(99,102,241,0.2); }
    .heat-2 { background: rgba(99,102,241,0.4); }
    .heat-3 { background: rgba(99,102,241,0.6); }
    .heat-4 { background: #6366f1; }
    .heatmap-legend {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 10px;
      font-size: 0.625rem;
      color: var(--text-tertiary);
    }
    .heatmap-legend-cell {
      width: 11px;
      height: 11px;
      border-radius: 2px;
    }

    /* Heatmap tooltip */
    .heatmap-tooltip {
      position: fixed;
      z-index: var(--z-tooltip);
      background: var(--canvas-overlay);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      font-size: 0.6875rem;
      color: var(--text-primary);
      box-shadow: var(--shadow-md);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s ease;
      white-space: nowrap;
    }
    .heatmap-tooltip.visible { opacity: 1; }
    .heatmap-tooltip-count { font-weight: 600; color: var(--accent-fg); }
    .heatmap-tooltip-tokens { color: var(--text-tertiary); }

    /* Radar Chart */
    .radar-container {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 0;
    }
    .radar-svg {
      width: 260px;
      height: 260px;
    }

    /* Weekly Pattern */
    .weekly-bars {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 4px 0;
    }
    .weekly-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .weekly-label {
      font-size: 0.6875rem;
      color: var(--text-tertiary);
      width: 30px;
      text-align: right;
      font-weight: 500;
    }
    .weekly-bar-track {
      flex: 1;
      height: 18px;
      background: var(--neutral-subtle);
      border-radius: var(--radius-sm);
      position: relative;
      overflow: hidden;
    }
    .weekly-bar-fill {
      height: 100%;
      border-radius: var(--radius-sm);
      background: rgba(99,102,241,0.3);
      position: absolute;
      left: 0;
      top: 0;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .weekly-bar-current {
      height: 100%;
      border-radius: var(--radius-sm);
      background: var(--gradient-accent);
      position: absolute;
      left: 0;
      top: 0;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0.9;
    }
    .weekly-value {
      font-size: 0.6875rem;
      color: var(--text-secondary);
      min-width: 60px;
      font-variant-numeric: tabular-nums;
    }

    /* Sparklines */
    .sparkline-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
    }
    @media (max-width: 1000px) {
      .sparkline-grid { grid-template-columns: repeat(3, 1fr); }
    }
    .sparkline-card {
      background: var(--canvas-default);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 10px;
    }
    .sparkline-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .sparkline-name {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    .sparkline-trend {
      font-size: 0.6875rem;
      font-weight: 600;
    }
    .sparkline-trend.up { color: var(--success-fg); }
    .sparkline-trend.down { color: var(--danger-fg); }
    .sparkline-trend.flat { color: var(--text-tertiary); }
    .sparkline-svg {
      display: block;
      width: 100%;
      height: 32px;
    }
    .sparkline-count {
      font-size: 0.625rem;
      color: var(--text-tertiary);
      margin-top: 4px;
    }

    /* Insights */
    .insights-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .insight-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 12px 14px;
      background: var(--canvas-default);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      transition: border-color var(--transition-fast);
    }
    .insight-item:hover { border-color: var(--border-accent); }
    .insight-icon {
      font-size: 1rem;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .insight-text {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .insight-text strong {
      color: var(--text-primary);
      font-weight: 600;
    }
    .insight-text .metric {
      color: var(--accent-fg);
      font-weight: 600;
    }

    .section-gap { margin-bottom: 24px; }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" role="navigation" aria-label="Main navigation" id="sidebar"></aside>
    <div class="main-content">
      <div class="page-header-bar">
        <div class="breadcrumb">
          <a href="../variant-c/session-list.html">TracePilot</a>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-current">Productivity Patterns</span>
        </div>
      </div>
      <div class="page-content">
        <div class="page-content-inner">

          <div class="page-title-row">
            <div>
              <div class="page-title-text">Productivity Patterns</div>
              <div class="page-subtitle">Personal coding habits and insights — last 90 days</div>
            </div>
            <span class="badge badge-neutral">90 day window</span>
          </div>

          <!-- Stat Cards -->
          <div class="grid-4 section-gap" id="statCards"></div>

          <!-- Calendar Heatmap -->
          <div class="section-panel section-gap">
            <div class="section-panel-header">Activity Heatmap</div>
            <div class="section-panel-body">
              <div class="heatmap-container" id="heatmapContainer"></div>
            </div>
          </div>

          <!-- Radar + Weekly Pattern side by side -->
          <div class="grid-2 section-gap">
            <div class="section-panel">
              <div class="section-panel-header">Time-of-Day Activity</div>
              <div class="section-panel-body">
                <div class="radar-container" id="radarChart"></div>
              </div>
            </div>
            <div class="section-panel">
              <div class="section-panel-header">Weekly Pattern</div>
              <div class="section-panel-body">
                <div class="weekly-bars" id="weeklyBars"></div>
              </div>
            </div>
          </div>

          <!-- Tool Preference Sparklines -->
          <div class="section-panel section-gap">
            <div class="section-panel-header">Tool Preference Trends</div>
            <div class="section-panel-body">
              <div class="sparkline-grid" id="sparklines"></div>
            </div>
          </div>

          <!-- Insights -->
          <div class="section-panel section-gap">
            <div class="section-panel-header">Auto-Generated Insights</div>
            <div class="section-panel-body">
              <div class="insights-list" id="insights"></div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- Heatmap Tooltip -->
  <div class="heatmap-tooltip" id="heatmapTooltip"></div>

  <script src="../shared/shared.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('sidebar').innerHTML = generateSidebar('analytics');

      // --- Stat Cards ---
      document.getElementById('statCards').innerHTML = `
        <div class="stat-card">
          <div class="stat-card-value accent">2–3 PM</div>
          <div class="stat-card-label">Most Productive Hour</div>
          <div class="stat-card-trend up">↑ Consistent for 3 weeks</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-value success">7 days</div>
          <div class="stat-card-label">Longest Streak</div>
          <div class="stat-card-trend up">↑ Mar 3 – Mar 9</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-value done">32m</div>
          <div class="stat-card-label">Avg Session Duration</div>
          <div class="stat-card-trend down">↓ 4m from last month</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-value warning">grep</div>
          <div class="stat-card-label">Favorite Tool</div>
          <div class="stat-card-trend up">↑ 342 calls this month</div>
        </div>
      `;

      // --- Calendar Heatmap (90 days) ---
      function generateHeatmapData() {
        const data = [];
        const today = new Date();
        for (let i = 89; i >= 0; i--) {
          const d = new Date(today);
          d.setDate(d.getDate() - i);
          const dow = d.getDay();
          // More activity on weekdays, peak Wed-Thu
          let base = 0;
          if (dow >= 1 && dow <= 5) {
            base = Math.random() * 6 + 1;
            if (dow === 3 || dow === 4) base += 2;
          } else {
            base = Math.random() < 0.3 ? Math.random() * 2 : 0;
          }
          const sessions = Math.round(base);
          const tokens = sessions * Math.round(80000 + Math.random() * 120000);
          data.push({ date: d, sessions, tokens });
        }
        return data;
      }

      const heatData = generateHeatmapData();
      const maxSessions = Math.max(...heatData.map(d => d.sessions));

      function heatLevel(s) {
        if (s === 0) return 0;
        if (s <= 2) return 1;
        if (s <= 4) return 2;
        if (s <= 6) return 3;
        return 4;
      }

      // Build heatmap grid organized into weeks
      const weeks = [];
      let currentWeek = [];
      const firstDay = heatData[0].date.getDay();
      // Pad beginning
      for (let p = 0; p < firstDay; p++) currentWeek.push(null);
      heatData.forEach(d => {
        currentWeek.push(d);
        if (currentWeek.length === 7) {
          weeks.push(currentWeek);
          currentWeek = [];
        }
      });
      if (currentWeek.length > 0) {
        while (currentWeek.length < 7) currentWeek.push(null);
        weeks.push(currentWeek);
      }

      // Month labels
      const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      let monthLabelsHtml = '<div class="heatmap-months">';
      let prevMonth = -1;
      weeks.forEach((week, wi) => {
        const validDay = week.find(d => d !== null);
        if (validDay) {
          const m = validDay.date.getMonth();
          if (m !== prevMonth) {
            monthLabelsHtml += `<span class="heatmap-month-label" style="width:${13 * 1 + 2}px;padding-left:2px;">${monthNames[m]}</span>`;
            prevMonth = m;
          } else {
            monthLabelsHtml += `<span style="width:${13}px;"></span>`;
          }
        }
      });
      monthLabelsHtml += '</div>';

      const dayLabels = ['Sun', 'Mon', '', 'Wed', '', 'Fri', ''];
      let labelsHtml = '<div class="heatmap-labels">';
      dayLabels.forEach(l => {
        labelsHtml += `<div class="heatmap-day-label">${l}</div>`;
      });
      labelsHtml += '</div>';

      let gridHtml = '<div class="heatmap-grid">';
      weeks.forEach(week => {
        gridHtml += '<div class="heatmap-week">';
        week.forEach(d => {
          if (d === null) {
            gridHtml += '<div class="heatmap-cell heat-0"></div>';
          } else {
            const lvl = heatLevel(d.sessions);
            const dateStr = d.date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            gridHtml += `<div class="heatmap-cell heat-${lvl}" data-date="${dateStr}" data-sessions="${d.sessions}" data-tokens="${d.tokens}"></div>`;
          }
        });
        gridHtml += '</div>';
      });
      gridHtml += '</div>';

      document.getElementById('heatmapContainer').innerHTML = `
        <div class="heatmap-wrapper">
          ${labelsHtml}
          <div class="heatmap-grid-area">
            ${monthLabelsHtml}
            ${gridHtml}
          </div>
        </div>
        <div class="heatmap-legend">
          Less
          <div class="heatmap-legend-cell heat-0"></div>
          <div class="heatmap-legend-cell heat-1"></div>
          <div class="heatmap-legend-cell heat-2"></div>
          <div class="heatmap-legend-cell heat-3"></div>
          <div class="heatmap-legend-cell heat-4"></div>
          More
        </div>
      `;

      // Heatmap tooltip
      const tooltip = document.getElementById('heatmapTooltip');
      document.getElementById('heatmapContainer').addEventListener('mousemove', (e) => {
        const cell = e.target.closest('.heatmap-cell');
        if (!cell || !cell.dataset.date) {
          tooltip.classList.remove('visible');
          return;
        }
        tooltip.innerHTML = `
          ${cell.dataset.date}<br>
          <span class="heatmap-tooltip-count">${cell.dataset.sessions} sessions</span>
          <span class="heatmap-tooltip-tokens">· ${Number(cell.dataset.tokens).toLocaleString()} tokens</span>
        `;
        tooltip.style.left = (e.clientX + 12) + 'px';
        tooltip.style.top = (e.clientY - 10) + 'px';
        tooltip.classList.add('visible');
      });
      document.getElementById('heatmapContainer').addEventListener('mouseleave', () => {
        tooltip.classList.remove('visible');
      });

      // --- Radar Chart (24h activity) ---
      const hourlyActivity = [
        0, 0, 0, 0, 0, 0,             // 0-5 AM
        2, 8, 18, 35, 42, 38,         // 6-11 AM
        25, 45, 62, 58, 40, 32,       // 12-5 PM
        20, 12, 6, 3, 1, 0            // 6-11 PM
      ];
      const maxActivity = Math.max(...hourlyActivity);

      function buildRadar() {
        const cx = 130, cy = 130, maxR = 100;
        const hours = 24;
        let gridLines = '';
        // Concentric circles
        [0.25, 0.5, 0.75, 1].forEach(frac => {
          gridLines += `<circle cx="${cx}" cy="${cy}" r="${maxR * frac}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>`;
        });
        // Radial lines for each hour
        for (let h = 0; h < hours; h++) {
          const angle = (h / hours) * Math.PI * 2 - Math.PI / 2;
          const x2 = cx + Math.cos(angle) * maxR;
          const y2 = cy + Math.sin(angle) * maxR;
          gridLines += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>`;
        }
        // Data polygon
        let polyPoints = '';
        hourlyActivity.forEach((val, h) => {
          const angle = (h / hours) * Math.PI * 2 - Math.PI / 2;
          const r = (val / maxActivity) * maxR;
          const x = cx + Math.cos(angle) * r;
          const y = cy + Math.sin(angle) * r;
          polyPoints += `${x},${y} `;
        });
        // Hour labels
        let labels = '';
        const labelHours = [0, 3, 6, 9, 12, 15, 18, 21];
        const labelText = ['12AM', '3AM', '6AM', '9AM', '12PM', '3PM', '6PM', '9PM'];
        labelHours.forEach((h, i) => {
          const angle = (h / hours) * Math.PI * 2 - Math.PI / 2;
          const x = cx + Math.cos(angle) * (maxR + 16);
          const y = cy + Math.sin(angle) * (maxR + 16);
          labels += `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="central" 
            fill="${hourlyActivity[h] > maxActivity * 0.6 ? '#818cf8' : '#71717a'}" font-size="9" font-weight="500">${labelText[i]}</text>`;
        });
        // Peak dot
        const peakHour = hourlyActivity.indexOf(maxActivity);
        const peakAngle = (peakHour / hours) * Math.PI * 2 - Math.PI / 2;
        const peakX = cx + Math.cos(peakAngle) * ((maxActivity / maxActivity) * maxR);
        const peakY = cy + Math.sin(peakAngle) * ((maxActivity / maxActivity) * maxR);

        return `
          <svg class="radar-svg" viewBox="0 0 260 260">
            ${gridLines}
            <polygon points="${polyPoints}" fill="rgba(99,102,241,0.15)" stroke="#818cf8" stroke-width="1.5"/>
            <circle cx="${peakX}" cy="${peakY}" r="4" fill="#818cf8" stroke="#111113" stroke-width="2"/>
            <text x="${peakX + 8}" y="${peakY - 6}" fill="#818cf8" font-size="8" font-weight="600">Peak: 2PM</text>
            ${labels}
          </svg>
        `;
      }
      document.getElementById('radarChart').innerHTML = buildRadar();

      // --- Weekly Pattern ---
      const weeklyData = {
        avg: { Mon: 4.2, Tue: 5.1, Wed: 6.3, Thu: 5.8, Fri: 3.9, Sat: 1.2, Sun: 0.8 },
        current: { Mon: 5, Tue: 6, Wed: 7, Thu: 4, Fri: 3, Sat: 2, Sun: 0 }
      };
      const maxWeekly = Math.max(...Object.values(weeklyData.avg), ...Object.values(weeklyData.current));

      document.getElementById('weeklyBars').innerHTML = Object.keys(weeklyData.avg).map(day => {
        const avgPct = (weeklyData.avg[day] / maxWeekly) * 100;
        const curPct = (weeklyData.current[day] / maxWeekly) * 100;
        return `
          <div class="weekly-row">
            <span class="weekly-label">${day}</span>
            <div class="weekly-bar-track">
              <div class="weekly-bar-fill" style="width:${avgPct}%"></div>
              <div class="weekly-bar-current" style="width:${curPct}%"></div>
            </div>
            <span class="weekly-value">${weeklyData.current[day]} / ${weeklyData.avg[day]} avg</span>
          </div>
        `;
      }).join('');

      // --- Tool Preference Sparklines ---
      const toolTrends = [
        { name: 'grep', trend: 'up', arrow: '↑ 12%', data: [20, 22, 18, 24, 30, 28, 32, 36, 34, 38, 42, 40], total: 342, color: '#34d399' },
        { name: 'edit', trend: 'up', arrow: '↑ 8%', data: [14, 16, 15, 18, 20, 22, 19, 24, 22, 26, 24, 28], total: 218, color: '#818cf8' },
        { name: 'view', trend: 'down', arrow: '↓ 5%', data: [40, 38, 42, 36, 34, 32, 35, 30, 28, 32, 26, 24], total: 412, color: '#fbbf24' },
        { name: 'powershell', trend: 'flat', arrow: '→ 0%', data: [15, 16, 14, 17, 15, 16, 18, 15, 17, 16, 18, 16], total: 186, color: '#fb7185' },
        { name: 'create', trend: 'up', arrow: '↑ 22%', data: [4, 5, 6, 5, 7, 8, 6, 9, 10, 8, 12, 14], total: 94, color: '#a78bfa' },
      ];

      function buildSparkline(data, color) {
        const w = 120, h = 32, pad = 2;
        const max = Math.max(...data);
        const min = Math.min(...data);
        const range = max - min || 1;
        const step = (w - pad * 2) / (data.length - 1);
        let path = '';
        let areaPath = '';
        data.forEach((v, i) => {
          const x = pad + i * step;
          const y = pad + (1 - (v - min) / range) * (h - pad * 2);
          if (i === 0) {
            path += `M ${x} ${y}`;
            areaPath += `M ${x} ${h - pad}  L ${x} ${y}`;
          } else {
            const prevX = pad + (i - 1) * step;
            const cpx = (prevX + x) / 2;
            const prevY = pad + (1 - (data[i - 1] - min) / range) * (h - pad * 2);
            path += ` C ${cpx} ${prevY}, ${cpx} ${y}, ${x} ${y}`;
            areaPath += ` C ${cpx} ${prevY}, ${cpx} ${y}, ${x} ${y}`;
          }
        });
        areaPath += ` L ${pad + (data.length - 1) * step} ${h - pad} Z`;
        return `
          <svg class="sparkline-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
            <path d="${areaPath}" fill="${color}" opacity="0.12"/>
            <path d="${path}" fill="none" stroke="${color}" stroke-width="1.5"/>
            <circle cx="${pad + (data.length - 1) * step}" cy="${pad + (1 - (data[data.length - 1] - min) / range) * (h - pad * 2)}" r="2.5" fill="${color}"/>
          </svg>
        `;
      }

      document.getElementById('sparklines').innerHTML = toolTrends.map(t => `
        <div class="sparkline-card">
          <div class="sparkline-header">
            <span class="sparkline-name">${toolIcon(t.name)} ${t.name}</span>
            <span class="sparkline-trend ${t.trend}">${t.arrow}</span>
          </div>
          ${buildSparkline(t.data, t.color)}
          <div class="sparkline-count">${t.total} calls total</div>
        </div>
      `).join('');

      // --- Insights ---
      document.getElementById('insights').innerHTML = `
        <div class="insight-item">
          <span class="insight-icon">🎯</span>
          <div class="insight-text">You're <strong>most productive on Thursdays</strong> between <span class="metric">2–4 PM</span>. Sessions in this window complete <span class="metric">28% faster</span> with fewer retries.</div>
        </div>
        <div class="insight-item">
          <span class="insight-icon">⚡</span>
          <div class="insight-text">Your <strong>grep → edit chain</strong> has improved <span class="metric">15% this month</span>. Average tool-pair latency dropped from 2.4s to 2.0s.</div>
        </div>
        <div class="insight-item">
          <span class="insight-icon">🌅</span>
          <div class="insight-text">Sessions before <strong>9 AM</strong> tend to have <span class="metric">23% higher error rates</span>. Consider tackling complex tasks after your peak hours.</div>
