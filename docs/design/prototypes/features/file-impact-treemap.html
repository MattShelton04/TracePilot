<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — File Impact Treemap</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/design-system-c.css">
  <style>
    .treemap-wrapper {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .treemap-main {
      flex: 1;
      min-width: 0;
    }
    .treemap-side {
      width: 300px;
      flex-shrink: 0;
    }

    .filter-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .filter-btn {
      padding: 4px 10px;
      border-radius: var(--radius-full);
      font-size: 0.6875rem;
      font-weight: 500;
      border: 1px solid var(--border-default);
      background: var(--canvas-subtle);
      color: var(--text-tertiary);
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: "JetBrains Mono", "Fira Code", monospace;
    }
    .filter-btn:hover { border-color: var(--border-accent); color: var(--text-primary); }
    .filter-btn.active {
      background: var(--accent-muted);
      color: var(--accent-fg);
      border-color: var(--accent-emphasis);
    }

    .treemap-breadcrumb {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 10px;
      font-size: 0.75rem;
    }
    .treemap-breadcrumb-item {
      color: var(--text-tertiary);
      cursor: pointer;
      transition: color 0.15s;
      background: none;
      border: none;
      font-size: 0.75rem;
      font-family: inherit;
      padding: 0;
    }
    .treemap-breadcrumb-item:hover { color: var(--accent-fg); }
    .treemap-breadcrumb-sep { color: var(--text-placeholder); font-size: 0.625rem; }
    .treemap-breadcrumb-current { color: var(--text-secondary); font-weight: 500; }

    .treemap-container {
      background: var(--canvas-subtle);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      padding: 4px;
      min-height: 420px;
      position: relative;
      overflow: hidden;
    }
    .treemap-svg {
      display: block;
      width: 100%;
      height: 420px;
    }
    .treemap-rect {
      cursor: pointer;
      transition: filter 0.15s ease, stroke-width 0.15s ease;
    }
    .treemap-rect:hover {
      filter: brightness(1.3);
      stroke-width: 2;
    }
    .treemap-label {
      pointer-events: none;
      font-size: 10px;
      font-weight: 500;
      fill: rgba(255,255,255,0.85);
    }
    .treemap-count {
      pointer-events: none;
      font-size: 9px;
      fill: rgba(255,255,255,0.5);
    }

    .treemap-tooltip {
      position: absolute;
      background: var(--canvas-overlay);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: 10px 12px;
      font-size: 0.75rem;
      box-shadow: var(--shadow-lg);
      pointer-events: none;
      z-index: 50;
      min-width: 180px;
      display: none;
    }
    .tooltip-path {
      font-family: "JetBrains Mono", "Fira Code", monospace;
      color: var(--text-primary);
      font-weight: 500;
      margin-bottom: 6px;
      font-size: 0.6875rem;
    }
    .tooltip-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--text-tertiary);
      font-size: 0.6875rem;
      margin-top: 2px;
    }
    .tooltip-row span:last-child { color: var(--text-primary); font-weight: 500; font-variant-numeric: tabular-nums; }

    /* Side panel */
    .side-panel {
      background: var(--canvas-subtle);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      overflow: hidden;
      position: sticky;
      top: 28px;
    }
    .side-panel-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border-default);
      font-size: 0.6875rem;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .side-panel-body { padding: 14px; }
    .side-field { margin-bottom: 12px; }
    .side-field-label {
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--text-tertiary);
      margin-bottom: 3px;
    }
    .side-field-value {
      font-size: 0.8125rem;
      color: var(--text-primary);
    }
    .side-field-mono {
      font-family: "JetBrains Mono", "Fira Code", monospace;
      font-size: 0.75rem;
      color: var(--accent-fg);
      word-break: break-all;
    }
    .change-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }
    .change-bar-track {
      flex: 1;
      height: 6px;
      background: var(--neutral-muted);
      border-radius: var(--radius-full);
      overflow: hidden;
      display: flex;
    }
    .change-bar-add { background: var(--success-fg); height: 100%; }
    .change-bar-del { background: var(--danger-fg); height: 100%; }
    .session-mini-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 180px;
      overflow-y: auto;
    }
    .session-mini-item {
      font-size: 0.6875rem;
      color: var(--text-secondary);
      padding: 4px 8px;
      background: var(--canvas-default);
      border-radius: var(--radius-sm);
      display: flex;
      justify-content: space-between;
    }

    .empty-side {
      text-align: center;
      padding: 24px 16px;
      color: var(--text-placeholder);
      font-size: 0.75rem;
    }

    @media (max-width: 1100px) {
      .treemap-wrapper { flex-direction: column; }
      .treemap-side { width: 100%; }
    }
  </style>
</head>

      { path:'tests/payments/checkout.test.ts', ext:'.ts', adds:310, dels:35, mods:15, sessions:['b2c3d4'] },
      { path:'tests/payments/refund.test.ts', ext:'.ts', adds:190, dels:15, mods:9, sessions:['b2c3d4'] },
      { path:'tests/payments/fixtures/stripe-mocks.ts', ext:'.ts', adds:80, dels:0, mods:4, sessions:['b2c3d4'] },
      { path:'styles/globals.css', ext:'.css', adds:65, dels:20, mods:8, sessions:['28c9d0','39d0e1'] },
      { path:'styles/components.css', ext:'.css', adds:140, dels:45, mods:10, sessions:['28c9d0','39d0e1'] },
      { path:'styles/dashboard.css', ext:'.css', adds:110, dels:15, mods:6, sessions:['28c9d0'] },
      { path:'infra/Dockerfile', ext:'', adds:45, dels:10, mods:5, sessions:['f6a7b8'] },
      { path:'infra/docker-compose.yml', ext:'.yml', adds:80, dels:15, mods:6, sessions:['f6a7b8'] },
      { path:'infra/ci/build.yml', ext:'.yml', adds:120, dels:0, mods:4, sessions:['f6a7b8'] },
      { path:'infra/ci/deploy.yml', ext:'.yml', adds:95, dels:0, mods:3, sessions:['f6a7b8'] },
      { path:'package.json', ext:'.json', adds:25, dels:8, mods:16, sessions:['c86fe3','a1b2c3','d4e5f6','39d0e1','f6a7b8'] },
      { path:'tsconfig.json', ext:'.json', adds:10, dels:3, mods:5, sessions:['c86fe3','d4e5f6'] },
      { path:'vitest.config.ts', ext:'.ts', adds:15, dels:5, mods:4, sessions:['c86fe3','b2c3d4'] },
      { path:'webpack.config.js', ext:'.js', adds:85, dels:120, mods:9, sessions:['39d0e1'] },
      { path:'README.md', ext:'.md', adds:60, dels:10, mods:7, sessions:['c86fe3','f6a7b8','d4e5f6'] },
    ];

    const EXTENSIONS = ['.ts', '.vue', '.css', '.js', '.json', '.yml', '.md'];
    let activeFilters = new Set();
    let drillPath = [];
    let selectedFile = null;

    // ── Directory grouping ──
    function getDir(path) {
      const parts = path.split('/');
      parts.pop();
      return parts.join('/') || '.';
    }

    function getFilesByDir(files) {
      const groups = {};
      files.forEach(f => {
        const dir = getDir(f.path);
        if (!groups[dir]) groups[dir] = [];
        groups[dir].push(f);
      });
      return groups;
    }

    function getFilteredFiles() {
      let files = FILE_DATA;
      if (activeFilters.size > 0) {
        files = files.filter(f => activeFilters.has(f.ext));
      }
      if (drillPath.length > 0) {
        const prefix = drillPath.join('/');
        files = files.filter(f => f.path.startsWith(prefix + '/'));
      }
      return files;
    }

    // ── Squarified Treemap Layout ──
    function squarify(items, x, y, w, h) {
      if (items.length === 0 || w <= 0 || h <= 0) return [];
      const total = items.reduce((s, i) => s + i.value, 0);
      if (total === 0) return [];

      const rects = [];
      let remaining = [...items];
      let cx = x, cy = y, cw = w, ch = h;

      while (remaining.length > 0) {
        const isWide = cw >= ch;
        const side = isWide ? ch : cw;
        const totalRemaining = remaining.reduce((s, i) => s + i.value, 0);

        let row = [remaining[0]];
        let rowSum = remaining[0].value;
        let bestRatio = Infinity;

        for (let i = 1; i < remaining.length; i++) {
          const testSum = rowSum + remaining[i].value;
          const testRow = [...row, remaining[i]];
          const rowArea = (testSum / totalRemaining) * cw * ch;
          const rowLen = rowArea / side;
          const worstRatio = Math.max(
            ...testRow.map(r => {
              const s = (r.value / testSum) * side;
              return Math.max(rowLen / s, s / rowLen);
            })
          );
          const curRowArea = (rowSum / totalRemaining) * cw * ch;
          const curRowLen = curRowArea / side;
          const curWorst = Math.max(
            ...row.map(r => {
              const s = (r.value / rowSum) * side;
              return Math.max(curRowLen / s, s / curRowLen);
            })
          );
          if (worstRatio > curWorst && row.length > 0) break;
          row.push(remaining[i]);
          rowSum = testSum;
        }

        const rowArea = (rowSum / totalRemaining) * cw * ch;
        const rowLen = isWide ? rowArea / ch : rowArea / cw;

        let offset = 0;
        row.forEach(item => {
          const frac = item.value / rowSum;
          const itemLen = frac * side;
          if (isWide) {
            rects.push({ ...item, x: cx, y: cy + offset, w: rowLen, h: itemLen });
          } else {
            rects.push({ ...item, x: cx + offset, y: cy, w: itemLen, h: rowLen });
          }
          offset += itemLen;
        });

        if (isWide) { cx += rowLen; cw -= rowLen; }
        else { cy += rowLen; ch -= rowLen; }
        remaining = remaining.slice(row.length);
      }

      return rects;
    }

    // ── Color calculation ──
    function getColor(adds, dels) {
      const net = adds - dels;
      const total = adds + dels;
      if (total === 0) return 'rgba(161,161,170,0.25)';
      const ratio = net / total;
      if (ratio > 0.3) return `rgba(52,211,153,${0.15 + Math.min(ratio, 1) * 0.35})`;
      if (ratio < -0.3) return `rgba(251,113,133,${0.15 + Math.min(Math.abs(ratio), 1) * 0.35})`;
      return `rgba(161,161,170,${0.15 + Math.abs(ratio) * 0.2})`;
    }

    // ── Rendering ──
    function renderStats() {
      const totalFiles = FILE_DATA.length;
      const totalChanges = FILE_DATA.reduce((s, f) => s + f.adds + f.dels, 0);
      const allSessions = new Set();
      FILE_DATA.forEach(f => f.sessions.forEach(s => allSessions.add(s)));
      const dirs = {};
      FILE_DATA.forEach(f => {
        const dir = getDir(f.path);
        dirs[dir] = (dirs[dir] || 0) + f.mods;
      });
      const mostImpacted = Object.entries(dirs).sort((a, b) => b[1] - a[1])[0];

      document.getElementById('stats-bar').innerHTML = `
        <div class="stat-card"><div class="stat-card-value accent">${totalFiles}</div><div class="stat-card-label">Files Modified</div></div>
        <div class="stat-card"><div class="stat-card-value success">${formatNumber(totalChanges)}</div><div class="stat-card-label">Total Changes (lines)</div></div>
        <div class="stat-card"><div class="stat-card-value" style="color:var(--done-fg)">${allSessions.size}</div><div class="stat-card-label">Sessions Analyzed</div></div>
        <div class="stat-card"><div class="stat-card-value warning">${mostImpacted[0]}/</div><div class="stat-card-label">Most Impacted Dir</div></div>
      `;
    }

    function renderFilters() {
      const counts = {};
      FILE_DATA.forEach(f => { counts[f.ext] = (counts[f.ext] || 0) + 1; });
      let html = '<span style="font-size:0.6875rem;color:var(--text-tertiary);margin-right:4px;">Filter:</span>';
      EXTENSIONS.forEach(ext => {
        const label = ext || 'other';
        html += `<button class="filter-btn ${activeFilters.has(ext) ? 'active' : ''}" data-ext="${ext}" onclick="toggleFilter('${ext}')">${label} (${counts[ext] || 0})</button>`;
      });
      document.getElementById('filter-bar').innerHTML = html;
    }

    function toggleFilter(ext) {
      if (activeFilters.has(ext)) activeFilters.delete(ext);
      else activeFilters.add(ext);
      renderFilters();
      renderTreemap();
    }

    function renderBreadcrumb() {
      let html = `<button class="treemap-breadcrumb-item" onclick="drillTo(-1)">root</button>`;
      drillPath.forEach((seg, i) => {
        html += `<span class="treemap-breadcrumb-sep">/</span>`;
        if (i < drillPath.length - 1) {
          html += `<button class="treemap-breadcrumb-item" onclick="drillTo(${i})">${seg}</button>`;
        } else {
          html += `<span class="treemap-breadcrumb-current">${seg}</span>`;
        }
      });
      document.getElementById('treemap-breadcrumb').innerHTML = html;
    }

    function drillTo(level) {
      if (level < 0) drillPath = [];
      else drillPath = drillPath.slice(0, level + 1);
      renderBreadcrumb();
      renderTreemap();
    }

    function renderTreemap() {
      const files = getFilteredFiles();
      const svg = document.getElementById('treemap-svg');
      const W = svg.clientWidth || 800;
      const H = 420;

      // Group by top-level dir relative to current drill level
      const groups = {};
      const standalone = [];
      files.forEach(f => {
        const rel = drillPath.length > 0
          ? f.path.slice(drillPath.join('/').length + 1)
          : f.path;
        const parts = rel.split('/');
        if (parts.length > 1) {
          const dir = parts[0];
          if (!groups[dir]) groups[dir] = { files: [], adds: 0, dels: 0, mods: 0 };
          groups[dir].files.push(f);
          groups[dir].adds += f.adds;
          groups[dir].dels += f.dels;
          groups[dir].mods += f.mods;
        } else {
          standalone.push(f);
        }
      });

      const items = [];
      Object.entries(groups).forEach(([dir, g]) => {
        items.push({ id: 'dir:' + dir, label: dir + '/', value: g.mods, adds: g.adds, dels: g.dels, isDir: true, files: g.files });
      });
      standalone.forEach(f => {
        const name = f.path.split('/').pop();
        items.push({ id: 'file:' + f.path, label: name, value: f.mods, adds: f.adds, dels: f.dels, isDir: false, file: f });
      });

      items.sort((a, b) => b.value - a.value);

      const rects = squarify(items, 2, 2, W - 4, H - 4);

      let svgHtml = '';
      rects.forEach(r => {
        const color = getColor(r.adds, r.dels);
        const border = r.isDir ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.06)';
        const truncLabel = r.w > 50 ? (r.label.length > Math.floor(r.w / 7) ? r.label.slice(0, Math.floor(r.w / 7)) + '…' : r.label) : '';
        const showCount = r.w > 40 && r.h > 30;

        svgHtml += `<rect class="treemap-rect" data-id="${r.id}" x="${r.x}" y="${r.y}" width="${r.w}" height="${r.h}" fill="${color}" stroke="${border}" stroke-width="1" rx="3"
          onmouseenter="showTooltip(event, '${r.id}')" onmouseleave="hideTooltip()"
          onclick="handleTreeClick('${r.id}')"/>`;
        if (truncLabel && r.h > 20) {
          svgHtml += `<text class="treemap-label" x="${r.x + 6}" y="${r.y + 16}">${truncLabel}</text>`;
        }
        if (showCount) {
          svgHtml += `<text class="treemap-count" x="${r.x + 6}" y="${r.y + 28}">${r.value} mods</text>`;
        }
      });

      svg.innerHTML = svgHtml;
      // Store rects for tooltip lookup
      svg._rects = rects;
      svg._items = items;
    }

    function showTooltip(event, id) {
      const svg = document.getElementById('treemap-svg');
      const item = svg._items?.find(i => i.id === id);
      if (!item) return;

      const tooltip = document.getElementById('tooltip');
      const container = document.getElementById('treemap-container');
      const rect = container.getBoundingClientRect();

      tooltip.style.display = 'block';
      tooltip.style.left = (event.clientX - rect.left + 12) + 'px';
      tooltip.style.top = (event.clientY - rect.top + 12) + 'px';

      if (item.isDir) {
        tooltip.innerHTML = `
          <div class="tooltip-path">${drillPath.length > 0 ? drillPath.join('/') + '/' : ''}${item.label}</div>
          <div class="tooltip-row"><span>Files</span><span>${item.files.length}</span></div>
          <div class="tooltip-row"><span>Additions</span><span style="color:var(--success-fg)">+${item.adds}</span></div>
          <div class="tooltip-row"><span>Deletions</span><span style="color:var(--danger-fg)">-${item.dels}</span></div>
          <div class="tooltip-row"><span>Modifications</span><span>${item.value}</span></div>
          <div style="font-size:0.625rem;color:var(--text-placeholder);margin-top:4px;">Click to drill down</div>
        `;
      } else {
        tooltip.innerHTML = `
          <div class="tooltip-path">${item.file.path}</div>
          <div class="tooltip-row"><span>Additions</span><span style="color:var(--success-fg)">+${item.adds}</span></div>
          <div class="tooltip-row"><span>Deletions</span><span style="color:var(--danger-fg)">-${item.dels}</span></div>
          <div class="tooltip-row"><span>Modifications</span><span>${item.value}</span></div>
          <div class="tooltip-row"><span>Sessions</span><span>${item.file.sessions.length}</span></div>
        `;
      }
    }

    function hideTooltip() {
      document.getElementById('tooltip').style.display = 'none';
    }

    function handleTreeClick(id) {
      const svg = document.getElementById('treemap-svg');
      const item = svg._items?.find(i => i.id === id);
      if (!item) return;

      if (item.isDir) {
        drillPath.push(item.label.replace('/', ''));
        renderBreadcrumb();
        renderTreemap();
      } else {
        selectFile(item.file);
      }
    }

    function selectFile(file) {
      selectedFile = file;
      const total = file.adds + file.dels;
      const addPct = total > 0 ? (file.adds / total * 100).toFixed(0) : 50;
      const sessionNames = {
        'c86fe3': 'OAuth login impl', 'a1b2c3': 'DB pooling fix', 'b2c3d4': 'Payment tests',
        'd4e5f6': 'GraphQL migration', 'e5f6a7': 'XSS vuln fix', 'f6a7b8': 'CI/CD setup',
        '28c9d0': 'Dashboard widgets', '39d0e1': 'Webpack optimize', '17b8c9': 'WS notifications'
      };

      document.getElementById('side-panel').innerHTML = `
        <div class="side-panel-header">Selected File</div>
        <div class="side-panel-body">
          <div class="side-field">
            <div class="side-field-label">Full Path</div>
            <div class="side-field-mono">${file.path}</div>
          </div>
          <div class="side-field">
            <div class="side-field-label">Total Modifications</div>
            <div class="side-field-value" style="font-weight:600;font-size:1rem;">${file.mods}</div>
          </div>
          <div class="side-field">
            <div class="side-field-label">Changes</div>
            <div style="display:flex;gap:12px;font-size:0.8125rem;">
              <span style="color:var(--success-fg)">+${file.adds}</span>
              <span style="color:var(--danger-fg)">-${file.dels}</span>
            </div>
            <div class="change-bar">
              <div class="change-bar-track">
                <div class="change-bar-add" style="width:${addPct}%"></div>
                <div class="change-bar-del" style="width:${100 - addPct}%"></div>
              </div>
            </div>
          </div>
          <div class="side-field">
            <div class="side-field-label">Sessions (${file.sessions.length})</div>
            <ul class="session-mini-list">
              ${file.sessions.map(s => `<li class="session-mini-item"><span class="font-mono" style="font-size:0.625rem;color:var(--accent-fg)">${s}</span><span>${sessionNames[s] || 'Unknown'}</span></li>`).join('')}
            </ul>
          </div>
        </div>
      `;
    }

    // ── Init ──
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('sidebar').innerHTML = generateSidebar('code');
      renderStats();
      renderFilters();
      renderBreadcrumb();
      renderTreemap();

      window.addEventListener('resize', () => renderTreemap());
    });
  </script>
</body>
</html>
