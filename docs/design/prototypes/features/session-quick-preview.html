<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — Session Quick Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/design-system-c.css">
  <style>
    .sessions-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      position: relative;
    }
    @media (max-width: 1000px) {
      .sessions-grid { grid-template-columns: 1fr; }
    }

    /* Session card in the list */
    .session-card {
      background: var(--canvas-subtle);
      background-image: var(--gradient-card);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      padding: 16px;
      cursor: pointer;
      transition: all var(--transition-normal);
      position: relative;
    }
    .session-card:hover {
      border-color: var(--border-accent);
      box-shadow: var(--shadow-md), 0 0 0 1px var(--border-glow);
      transform: translateY(-1px);
    }
    .session-card-title {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .session-card:hover .session-card-title {
      color: var(--accent-fg);
    }
    .session-card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .session-card-repo {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.6875rem;
      color: var(--done-fg);
      font-weight: 500;
    }
    .session-card-time {
      font-size: 0.6875rem;
      color: var(--text-tertiary);
    }
    .session-card-turns {
      font-size: 0.6875rem;
      color: var(--text-tertiary);
    }
    .session-card-model {
      margin-left: auto;
    }
    .session-card-bottom {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border-subtle);
    }
    .mini-bar {
      flex: 1;
      height: 3px;
      background: var(--neutral-subtle);
      border-radius: 2px;
      overflow: hidden;
    }
    .mini-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--gradient-accent);
    }
    .session-card-health {
      font-size: 0.625rem;
      font-weight: 600;
      color: var(--success-fg);
    }

    /* Quick Preview Card — floating */
    .preview-card {
      position: fixed;
      z-index: var(--z-tooltip);
      width: 380px;
      max-height: 520px;
      background: rgba(17, 17, 19, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-xl);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.04);
      padding: 0;
      overflow: hidden;
      pointer-events: none;
      opacity: 0;
      transform: translateX(-8px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .preview-card.visible {
      opacity: 1;
      transform: translateX(0);
    }

    /* Pointer triangle */
    .preview-pointer {
      position: absolute;
      left: -6px;
      top: 40px;
      width: 12px;
      height: 12px;
      background: rgba(17, 17, 19, 0.92);
      border-left: 1px solid var(--border-default);
      border-bottom: 1px solid var(--border-default);
      transform: rotate(45deg);
    }

    .preview-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .preview-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: 8px;
    }
    .preview-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* Mini stat pills */
    .preview-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .preview-stat {
      text-align: center;
      padding: 6px 4px;
      background: var(--canvas-default);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-subtle);
    }
    .preview-stat-value {
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }
    .preview-stat-value.accent { color: var(--accent-fg); }
    .preview-stat-value.success { color: var(--success-fg); }
    .preview-stat-value.warning { color: var(--warning-fg); }
    .preview-stat-label {
      font-size: 0.5625rem;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      font-weight: 500;
    }

    /* Mini conversation */
    .preview-conversation {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .preview-conv-title {
      font-size: 0.625rem;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 6px;
    }
    .preview-turn {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
    }
    .preview-turn-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }
    .preview-turn-dot.user { background: var(--success-fg); }
    .preview-turn-dot.assistant { background: var(--accent-fg); }
    .preview-turn-text {
      font-size: 0.6875rem;
      color: var(--text-secondary);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Mini waveform */
    .preview-waveform {
      padding: 8px 16px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .preview-waveform svg {
      display: block;
      width: 100%;
      height: 32px;
    }

    /* File changes + health */
    .preview-footer {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .preview-files {
      font-size: 0.6875rem;
      color: var(--text-tertiary);
    }
    .preview-files span { font-weight: 600; }
    .preview-files .added { color: var(--success-fg); }
    .preview-files .removed { color: var(--danger-fg); }

    /* Health ring */
    .health-ring {
      width: 36px;
      height: 36px;
      position: relative;
    }
    .health-ring svg {
      transform: rotate(-90deg);
    }
    .health-ring-value {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.5625rem;
      font-weight: 700;
      color: var(--success-fg);
    }

    /* Nav hint */
    .preview-nav-hint {
      padding: 6px 16px 10px;
      text-align: center;
      font-size: 0.625rem;
      color: var(--text-placeholder);
    }

    /* Page title area */
    .page-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .page-title-text {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    .page-subtitle {
      font-size: 0.8125rem;
      color: var(--text-tertiary);
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" role="navigation" aria-label="Main navigation" id="sidebar"></aside>
    <div class="main-content">
      <div class="page-header-bar">
        <div class="breadcrumb">
          <a href="../variant-c/session-list.html">TracePilot</a>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-current">Sessions</span>
        </div>
      </div>
      <div class="page-content">
        <div class="page-content-inner">

          <div class="page-title-row">
            <div>
              <div class="page-title-text">Sessions</div>
              <div class="page-subtitle">Hover a card to preview · Click to open full session</div>
            </div>
          </div>

          <div class="sessions-grid" id="sessionsGrid"></div>

        </div>
      </div>
    </div>
  </div>

  <!-- Floating Preview Card -->
  <div class="preview-card" id="previewCard">
    <div class="preview-pointer" id="previewPointer"></div>
    <div id="previewContent"></div>
  </div>

  <script src="../shared/shared.js"></script>
  <script>
    const SESSION_LIST = [
      {
        id: 's1',
        title: 'Implemented OAuth login with GitHub and Google providers',

        branch: 'feat/oauth-login',

        linesAdded: 342,

        filesModified: 8,
        conversation: [
          { role: 'user', text: 'Please implement the login feature with OAuth support for GitHub and Google.' },
          { role: 'assistant', text: "I'll implement OAuth login. Let me examine your auth module and set up both providers..." },
          { role: 'user', text: 'Looks good. Can you add error handling and rate limiting?' },
        ],

      },
      {
        id: 's2',
        title: 'Refactored database connection pooling for PostgreSQL',
        repo: 'acme/api-server',
        branch: 'fix/db-pooling',
        model: 'gpt-5.4',
        time: '5h ago',
        turns: 8,
        duration: '1h 30m',
        health: 92,
        tokens: '890K',
        cost: '$0.46',
        linesAdded: 128,
        linesRemoved: 89,

        conversation: [
          { role: 'user', text: 'The DB connection pool is leaking connections. Can you refactor the pooling logic?' },
          { role: 'assistant', text: 'I see the issue — connections aren\'t being properly released. Let me restructure the pool manager...' },
          { role: 'user', text: 'Also add connection timeout handling and health checks.' },
        ],
        waveform: [4, -10, 2, -8, 3, -12, 2, -6],
      },
      {
        id: 's3',
        title: 'Added comprehensive unit tests for payment processing module',
        repo: 'acme/web-platform',
        branch: 'test/payments',
        model: 'claude-sonnet-4.6',
        time: '1d ago',
        turns: 18,
        duration: '3h 20m',
        health: 78,
        tokens: '2.1M',
        cost: '$1.23',
        linesAdded: 890,
        linesRemoved: 12,
        filesModified: 6,
        conversation: [
          { role: 'user', text: 'Write comprehensive tests for the payment processing module including edge cases.' },
          { role: 'assistant', text: 'I\'ll create a full test suite covering happy paths, error handling, webhooks, and currency conversion...' },
          { role: 'user', text: 'Add tests for Stripe webhook signature verification too.' },
        ],
        waveform: [2, -6, 3, -10, 1, -14, 2, -8, 3, -16, 1, -10, 2, -12, 3, -8, 1, -4],
      },
      {
        id: 's4',
        title: 'Migrated legacy REST endpoints to GraphQL schema',
        repo: 'acme/api-server',
        branch: 'feat/graphql-migration',
        model: 'claude-opus-4.6',
        time: '2d ago',
        turns: 22,
        duration: '5h 45m',
        health: 71,
        tokens: '3.4M',
        cost: '$2.10',
        linesAdded: 1240,
        linesRemoved: 680,
        filesModified: 18,
        conversation: null,
        waveform: null,
      },
      {
        id: 's5',
        title: 'Fixed critical XSS vulnerability in user input sanitization',
        repo: 'acme/web-platform',
        branch: 'fix/xss-vuln',
        model: 'claude-opus-4.6',
        time: '8h ago',
        turns: 5,
        duration: '45m',
        health: 95,
        tokens: '320K',
        cost: '$0.12',
        linesAdded: 48,
        linesRemoved: 22,
        filesModified: 3,
        conversation: null,
        waveform: null,
      },
      {
        id: 's6',
        title: 'Set up CI/CD pipeline with GitHub Actions and Docker',
        repo: 'acme/infrastructure',
        branch: 'feat/ci-pipeline',
        model: 'gpt-5.4',
        time: '3d ago',
        turns: 10,
        duration: '2h 30m',
        health: 84,
        tokens: '1.5M',
        cost: '$0.68',
        linesAdded: 320,
        linesRemoved: 0,
        filesModified: 7,
        conversation: null,
        waveform: null,
      },
    ];

    function renderSessionCards() {
      const grid = document.getElementById('sessionsGrid');
      grid.innerHTML = SESSION_LIST.map((s, i) => {
        const healthColor = s.health >= 85 ? 'var(--success-fg)' : s.health >= 70 ? 'var(--warning-fg)' : 'var(--danger-fg)';
        return `
          <div class="session-card" data-idx="${i}">
            <div class="session-card-title">${s.title}</div>
            <div class="session-card-meta">
              <span class="session-card-repo">📦 ${s.repo}</span>
              <span class="session-card-time">${s.time}</span>
              <span class="session-card-turns">${s.turns} turns</span>
              <span class="session-card-model badge badge-accent" style="margin-left:auto;font-size:0.6rem;">${s.model}</span>
            </div>
            <div class="session-card-bottom">
              <div class="mini-bar"><div class="mini-bar-fill" style="width:${s.health}%"></div></div>
              <span class="session-card-health" style="color:${healthColor}">${s.health}%</span>
            </div>
          </div>
        `;
      }).join('');
    }

    function buildMiniWaveform(data) {
      if (!data) return '<svg viewBox="0 0 200 32"><line x1="0" y1="16" x2="200" y2="16" stroke="rgba(255,255,255,0.06)" stroke-width="1"/></svg>';
      const w = 200;
      const h = 32;
      const mid = h / 2;
      const max = Math.max(...data.map(Math.abs));
      const step = w / (data.length + 1);
      let pathU = `M 0 ${mid}`;
      let pathD = `M 0 ${mid}`;
      data.forEach((v, i) => {
        const x = step * (i + 1);
        const amp = (Math.abs(v) / max) * (mid - 2);
        if (v > 0) {
          pathU += ` Q ${x - step/3} ${mid - amp}, ${x} ${mid}`;
        } else {
          pathD += ` Q ${x - step/3} ${mid + amp}, ${x} ${mid}`;
        }
      });
      return `
        <svg viewBox="0 0 ${w} ${h}">
          <line x1="0" y1="${mid}" x2="${w}" y2="${mid}" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
          <path d="${pathU}" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.7"/>
          <path d="${pathD}" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.7"/>
        </svg>
      `;
    }

    function buildHealthRing(value) {
      const r = 14;
      const circ = 2 * Math.PI * r;
      const offset = circ - (value / 100) * circ;
      const color = value >= 85 ? '#34d399' : value >= 70 ? '#fbbf24' : '#fb7185';
      return `
        <div class="health-ring">
          <svg width="36" height="36" viewBox="0 0 36 36">
            <circle cx="18" cy="18" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="3"/>
            <circle cx="18" cy="18" r="${r}" fill="none" stroke="${color}" stroke-width="3"
              stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"/>
          </svg>
          <div class="health-ring-value" style="color:${color}">${value}</div>
        </div>
      `;
    }

    function renderPreview(session) {
      const content = document.getElementById('previewContent');
      let convHtml = '';
      if (session.conversation) {
        convHtml = `
          <div class="preview-conversation">
            <div class="preview-conv-title">Conversation Preview</div>
            ${session.conversation.map(t => `
              <div class="preview-turn">
                <div class="preview-turn-dot ${t.role}"></div>
                <div class="preview-turn-text">${t.text}</div>
              </div>
            `).join('')}
          </div>
        `;
      }

      content.innerHTML = `
        <div class="preview-header">
          <div class="preview-title">${session.title}</div>
          <div class="preview-badges">
            <span class="badge badge-accent">${session.model}</span>
            <span class="badge badge-done">📦 ${session.repo}</span>
            <span class="badge badge-neutral">${session.duration}</span>
          </div>
        </div>
        <div class="preview-stats">
          <div class="preview-stat">
            <div class="preview-stat-value accent">${session.turns}</div>
            <div class="preview-stat-label">Turns</div>
          </div>
          <div class="preview-stat">
            <div class="preview-stat-value">${session.tokens}</div>
            <div class="preview-stat-label">Tokens</div>
          </div>
          <div class="preview-stat">
            <div class="preview-stat-value warning">${session.cost}</div>
            <div class="preview-stat-label">Cost</div>
          </div>
          <div class="preview-stat">
            <div class="preview-stat-value success">${session.duration}</div>
            <div class="preview-stat-label">Duration</div>
          </div>
        </div>
        ${convHtml}
        <div class="preview-waveform">
          ${buildMiniWaveform(session.waveform)}
        </div>
        <div class="preview-footer">
          <div class="preview-files">
            <span class="added">+${session.linesAdded}</span> / <span class="removed">−${session.linesRemoved}</span> · ${session.filesModified} files
          </div>
          ${buildHealthRing(session.health)}
        </div>
        <div class="preview-nav-hint">Click to open full session →</div>
      `;
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('sidebar').innerHTML = generateSidebar('sessions');
      renderSessionCards();

      const previewCard = document.getElementById('previewCard');
      const previewPointer = document.getElementById('previewPointer');
      let hoverTimeout = null;
      let currentIdx = -1;

      document.getElementById('sessionsGrid').addEventListener('mousemove', (e) => {
        const card = e.target.closest('.session-card');
        if (!card) {
          clearTimeout(hoverTimeout);
          previewCard.classList.remove('visible');
          currentIdx = -1;
          return;
        }
        const idx = parseInt(card.dataset.idx);
        if (idx === currentIdx) return;

        clearTimeout(hoverTimeout);
        currentIdx = idx;

        hoverTimeout = setTimeout(() => {
          const session = SESSION_LIST[idx];
          renderPreview(session);

          const rect = card.getBoundingClientRect();
          const previewW = 380;
          const spaceRight = window.innerWidth - rect.right;
          let left, pointerLeft;

          if (spaceRight >= previewW + 16) {
            left = rect.right + 12;
            pointerLeft = -6;
          } else {
            left = rect.left - previewW - 12;
            pointerLeft = previewW - 6;
          }

          let top = rect.top;
          if (top + 520 > window.innerHeight) {
            top = Math.max(10, window.innerHeight - 530);
          }

          previewCard.style.left = left + 'px';
          previewCard.style.top = top + 'px';
          previewPointer.style.left = pointerLeft + 'px';
          previewPointer.style.top = Math.min(40, rect.height / 2) + 'px';
          previewCard.classList.add('visible');
        }, 300);
      });

      document.getElementById('sessionsGrid').addEventListener('mouseleave', () => {
        clearTimeout(hoverTimeout);
        previewCard.classList.remove('visible');
        currentIdx = -1;
      });
    });
  </script>
</body>
</html>
