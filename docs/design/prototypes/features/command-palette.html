<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — Command Palette</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/design-system-c.css">
  <style>
    /* Backdrop overlay */
    .palette-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 18vh;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .palette-backdrop.open {
      opacity: 1;
    }
    .palette-backdrop.closed {
      opacity: 0;
      pointer-events: none;
    }

    /* Palette modal */
    .palette-modal {
      width: 600px;
      max-height: 520px;
      background: var(--canvas-overlay);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-xl);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255,255,255,0.04);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: scale(0.95);
      transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .palette-backdrop.open .palette-modal {
      transform: scale(1);
    }

    /* Search input area */
    .palette-search {
      display: flex;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border-default);
      gap: 10px;
    }
    .palette-search-icon {
      color: var(--text-tertiary);
      flex-shrink: 0;
    }
    .palette-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 0.9375rem;
      font-family: inherit;
      font-weight: 400;
      line-height: 1.4;
    }
    .palette-input::placeholder {
      color: var(--text-placeholder);
    }
    .palette-shortcut {
      display: flex;
      align-items: center;
      gap: 3px;
      flex-shrink: 0;
    }
    .kbd {
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--border-default);
      background: var(--canvas-default);
      font-size: 0.625rem;
      font-weight: 600;
      color: var(--text-tertiary);
      font-family: inherit;
      line-height: 1.4;
    }

    /* Results area */
    .palette-results {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }
    .palette-results::-webkit-scrollbar { width: 6px; }
    .palette-results::-webkit-scrollbar-track { background: transparent; }
    .palette-results::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }

    /* Category section */
    .palette-category {
      padding: 0 6px;
    }
    .palette-category-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px 4px;
      font-size: 0.6875rem;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .palette-category-icon {
      font-size: 0.75rem;
    }

    /* Result item */
    .palette-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      margin: 0 6px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.1s ease;
    }
    .palette-item:hover,
    .palette-item.selected {
      background: var(--accent-muted);
    }
    .palette-item.selected {
      box-shadow: inset 0 0 0 1px var(--border-accent);
    }
    .palette-item-icon {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      background: var(--canvas-default);
      border: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8125rem;
      flex-shrink: 0;
    }
    .palette-item-body {
      flex: 1;
      min-width: 0;
    }
    .palette-item-title {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .palette-item-title .highlight {
      color: var(--accent-fg);
      font-weight: 600;
    }
    .palette-item-desc {
      font-size: 0.6875rem;
      color: var(--text-tertiary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .palette-item-right {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .palette-item-badge {
      font-size: 0.625rem;
      padding: 1px 6px;
      border-radius: var(--radius-sm);
      font-weight: 500;
    }
    .palette-item-shortcut {
      display: flex;
      gap: 3px;
    }

    /* Footer tips */
    .palette-footer {
      border-top: 1px solid var(--border-default);
      padding: 8px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .palette-tips {
      display: flex;
      gap: 14px;
      font-size: 0.6875rem;
      color: var(--text-tertiary);
    }
    .palette-tip-key {
      font-weight: 600;
      color: var(--text-secondary);
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 0.625rem;
    }
    .palette-nav-hints {
      display: flex;
      gap: 10px;
      font-size: 0.625rem;
      color: var(--text-placeholder);
    }
    .palette-nav-hint {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    /* Empty state */
    .palette-empty {
      padding: 32px 18px;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 0.8125rem;
    }

    /* Divider */
    .palette-divider {
      height: 1px;
      background: var(--border-subtle);
      margin: 4px 18px;
    }

    /* Behind the palette — page content dimmed */
    .page-content-inner {
      filter: blur(2px);
      opacity: 0.3;
      pointer-events: none;
    }

    /* Trigger button */
    .palette-trigger {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      padding: 5px 12px;
      background: var(--canvas-default);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      color: var(--text-tertiary);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    .palette-trigger:hover {
      border-color: var(--accent-emphasis);
      color: var(--text-secondary);
    }

    /* Result count */
    .result-count {
      font-size: 0.625rem;
      color: var(--text-placeholder);
      padding: 0 18px 4px;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" role="navigation" aria-label="Main navigation" id="sidebar"></aside>
    <div class="main-content">
      <div class="page-header-bar">
        <div class="breadcrumb">
          <a href="../variant-c/session-list.html">TracePilot</a>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-current">Command Palette</span>
        </div>
        <button class="palette-trigger" id="openPalette">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg>
          Search…
          <span class="kbd">⌘K</span>
        </button>
      </div>
      <div class="page-content">
        <div class="page-content-inner">
          <div style="padding:40px;text-align:center;color:var(--text-tertiary);">
            <p style="font-size:1.125rem;margin-bottom:8px;">Press <span class="kbd" style="font-size:0.75rem;">⌘</span> <span class="kbd" style="font-size:0.75rem;">K</span> to open the command palette</p>
            <p style="font-size:0.8125rem;">Or click the search bar above</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Command Palette Overlay -->
  <div class="palette-backdrop open" id="paletteBackdrop">
    <div class="palette-modal" id="paletteModal">
      <div class="palette-search">
        <div class="palette-search-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg>
        </div>
        <input class="palette-input" id="paletteInput" type="text" placeholder="Search sessions, tools, commands…" autofocus spellcheck="false" autocomplete="off">
        <div class="palette-shortcut">
          <span class="kbd">⌘K</span>
        </div>
      </div>
      <div class="result-count" id="resultCount">18 results</div>
      <div class="palette-results" id="paletteResults"></div>
      <div class="palette-footer">
        <div class="palette-tips">
          <span><span class="palette-tip-key">&gt;</span> commands</span>
          <span><span class="palette-tip-key">#</span> sessions</span>
          <span><span class="palette-tip-key">@</span> repos</span>
          <span><span class="palette-tip-key">:</span> tools</span>
        </div>
        <div class="palette-nav-hints">
          <span class="palette-nav-hint"><span class="kbd">↑↓</span> navigate</span>
          <span class="palette-nav-hint"><span class="kbd">↵</span> select</span>
          <span class="palette-nav-hint"><span class="kbd">esc</span> close</span>
        </div>
      </div>
    </div>
  </div>

  <script src="../shared/shared.js"></script>
  <script>
    // All palette items organized by category
    const PALETTE_DATA = {
      recent: {
        icon: '🕐', label: 'Recent',
        items: [
          { icon: '🗂️', title: 'OAuth login with GitHub and Google', desc: 'acme/web-platform · 2h ago', badge: 'claude-opus-4.6', badgeClass: 'badge-accent' },
          { icon: '🗂️', title: 'Refactored database connection pooling', desc: 'acme/api-server · 5h ago', badge: 'gpt-5.4', badgeClass: 'badge-success' },
          { icon: '🗂️', title: 'Fixed XSS vulnerability in sanitization', desc: 'acme/web-platform · 8h ago', badge: 'claude-opus-4.6', badgeClass: 'badge-accent' },
        ]
      },
      sessions: {
        icon: '🗂️', label: 'Sessions',
        items: [
          { icon: '🗂️', title: 'Implemented OAuth login with GitHub and Google', desc: 'acme/web-platform · feat/oauth-login · 12 turns', badge: '2h 15m', badgeClass: 'badge-neutral' },
          { icon: '🗂️', title: 'Refactored database connection pooling', desc: 'acme/api-server · fix/db-pooling · 8 turns', badge: '1h 30m', badgeClass: 'badge-neutral' },
          { icon: '🗂️', title: 'Added unit tests for payment processing', desc: 'acme/web-platform · test/payments · 18 turns', badge: '3h 20m', badgeClass: 'badge-neutral' },
          { icon: '🗂️', title: 'Migrated REST endpoints to GraphQL', desc: 'acme/api-server · feat/graphql · 22 turns', badge: '5h 45m', badgeClass: 'badge-neutral' },
          { icon: '🗂️', title: 'Fixed critical XSS vulnerability', desc: 'acme/web-platform · fix/xss-vuln · 5 turns', badge: '45m', badgeClass: 'badge-neutral' },
        ]
      },
      navigation: {
        icon: '🧭', label: 'Navigation',
        items: [
          { icon: '📊', title: 'Sessions', desc: 'Browse all sessions', shortcut: ['⌘', '1'] },
          { icon: '📈', title: 'Analytics Dashboard', desc: 'Usage analytics and trends', shortcut: ['⌘', '2'] },
          { icon: '❤️', title: 'Health Scoring', desc: 'Session health metrics', shortcut: ['⌘', '3'] },
          { icon: '🔧', title: 'Tool Analysis', desc: 'Tool usage breakdown', shortcut: ['⌘', '4'] },
          { icon: '💻', title: 'Code Impact', desc: 'Lines changed, files modified', shortcut: ['⌘', '5'] },
          { icon: '⚙️', title: 'Settings', desc: 'App preferences & config', shortcut: ['⌘', ','] },
        ]
      },
      tools: {
        icon: '🔧', label: 'Tools',
        items: [
          { icon: '🔍', title: 'grep', desc: 'Search file contents', badge: '342 calls', badgeClass: 'badge-neutral' },
          { icon: '✏️', title: 'edit', desc: 'Modify file contents', badge: '218 calls', badgeClass: 'badge-neutral' },
          { icon: '💻', title: 'powershell', desc: 'Execute shell commands', badge: '186 calls', badgeClass: 'badge-neutral' },
          { icon: '👁', title: 'view', desc: 'Read file contents', badge: '412 calls', badgeClass: 'badge-neutral' },
          { icon: '📄', title: 'create', desc: 'Create new files', badge: '94 calls', badgeClass: 'badge-neutral' },
          { icon: '📂', title: 'glob', desc: 'Find files by pattern', badge: '156 calls', badgeClass: 'badge-neutral' },
        ]
      },
      commands: {
        icon: '⚡', label: 'Commands',
        items: [
          { icon: '🔄', title: 'Reindex all sessions', desc: 'Scan and reindex session data', shortcut: ['⌘', '⇧', 'R'] },
          { icon: '🌙', title: 'Toggle theme', desc: 'Switch between dark and light mode', shortcut: ['⌘', '⇧', 'T'] },
          { icon: '📦', title: 'Export session', desc: 'Export current session as JSON', shortcut: ['⌘', 'E'] },
          { icon: '🗑️', title: 'Clear cache', desc: 'Remove cached session data' },
          { icon: '📋', title: 'Copy session ID', desc: 'Copy current session UUID to clipboard', shortcut: ['⌘', '⇧', 'C'] },
          { icon: '🔔', title: 'Toggle notifications', desc: 'Enable or disable alert notifications' },
        ]
      }
    };

    let selectedIndex = 0;
    let visibleItems = [];

    function highlightMatch(text, query) {
      if (!query) return text;
      const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      return text.replace(regex, '<span class="highlight">$1</span>');
    }

    function renderResults(query = '') {
      const container = document.getElementById('paletteResults');
      let html = '';
      visibleItems = [];
      const lowerQuery = query.toLowerCase().trim();

      // Determine which categories to show based on prefix
      let categories;
      let filterQuery = lowerQuery;

      if (lowerQuery.startsWith('>')) {
        categories = ['commands'];
        filterQuery = lowerQuery.slice(1).trim();
      } else if (lowerQuery.startsWith('#')) {
        categories = ['sessions'];
        filterQuery = lowerQuery.slice(1).trim();
      } else if (lowerQuery.startsWith('@')) {
        categories = ['sessions'];
        filterQuery = lowerQuery.slice(1).trim();
      } else if (lowerQuery.startsWith(':')) {
        categories = ['tools'];
        filterQuery = lowerQuery.slice(1).trim();
      } else {
        categories = query ? ['sessions', 'navigation', 'tools', 'commands'] : ['recent', 'navigation', 'tools', 'commands'];
      }

      let totalCount = 0;
      categories.forEach(catKey => {
        const cat = PALETTE_DATA[catKey];
        if (!cat) return;
        const filtered = cat.items.filter(item => {
          if (!filterQuery) return true;
          return item.title.toLowerCase().includes(filterQuery) ||
                 (item.desc && item.desc.toLowerCase().includes(filterQuery));
        });
        if (filtered.length === 0) return;
        totalCount += filtered.length;

        html += `<div class="palette-category">`;
        html += `<div class="palette-category-header"><span class="palette-category-icon">${cat.icon}</span>${cat.label}</div>`;
        filtered.forEach(item => {
          const idx = visibleItems.length;
          visibleItems.push(item);
          html += `
            <div class="palette-item${idx === selectedIndex ? ' selected' : ''}" data-idx="${idx}">
              <div class="palette-item-icon">${item.icon}</div>
              <div class="palette-item-body">
                <div class="palette-item-title">${highlightMatch(item.title, filterQuery)}</div>
                ${item.desc ? `<div class="palette-item-desc">${highlightMatch(item.desc, filterQuery)}</div>` : ''}
              </div>
              <div class="palette-item-right">
                ${item.badge ? `<span class="palette-item-badge badge ${item.badgeClass || ''}">${item.badge}</span>` : ''}
                ${item.shortcut ? `<div class="palette-item-shortcut">${item.shortcut.map(k => `<span class="kbd">${k}</span>`).join('')}</div>` : ''}
              </div>
            </div>
          `;
        });
        html += `</div>`;
      });

      if (totalCount === 0) {
        html = `<div class="palette-empty">No results for "${query}"</div>`;
      }

      container.innerHTML = html;
      document.getElementById('resultCount').textContent = `${totalCount} result${totalCount !== 1 ? 's' : ''}`;
    }

    function updateSelection() {
      document.querySelectorAll('.palette-item').forEach((el, i) => {
        el.classList.toggle('selected', i === selectedIndex);
      });
      const sel = document.querySelector('.palette-item.selected');
      if (sel) sel.scrollIntoView({ block: 'nearest' });
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('sidebar').innerHTML = generateSidebar('sessions');

      const backdrop = document.getElementById('paletteBackdrop');
      const input = document.getElementById('paletteInput');

      renderResults('');
      input.focus();

      // Search filtering
      input.addEventListener('input', () => {
        selectedIndex = 0;
        renderResults(input.value);
      });

      // Keyboard navigation
      document.addEventListener('keydown', (e) => {
        if (e.key === 'k' && (e.metaKey || e.ctrlKey)) {
          e.preventDefault();
          backdrop.classList.toggle('open');
          backdrop.classList.toggle('closed');
          if (backdrop.classList.contains('open')) {
            input.focus();
            input.select();
          }
          return;
        }
        if (!backdrop.classList.contains('open')) return;

        if (e.key === 'Escape') {
          backdrop.classList.remove('open');
          backdrop.classList.add('closed');
          return;
        }
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          selectedIndex = Math.min(selectedIndex + 1, visibleItems.length - 1);
          updateSelection();
        }
        if (e.key === 'ArrowUp') {
          e.preventDefault();
          selectedIndex = Math.max(selectedIndex - 1, 0);
          updateSelection();
        }
        if (e.key === 'Enter' && visibleItems[selectedIndex]) {
          const item = visibleItems[selectedIndex];
          alert(`Selected: ${item.title}`);
        }
      });

      // Mouse hover selection
      document.getElementById('paletteResults').addEventListener('mousemove', (e) => {
        const item = e.target.closest('.palette-item');
        if (!item) return;
        selectedIndex = parseInt(item.dataset.idx);
        updateSelection();
      });

      // Click selection
      document.getElementById('paletteResults').addEventListener('click', (e) => {
        const item = e.target.closest('.palette-item');
        if (!item) return;
        const idx = parseInt(item.dataset.idx);
        const data = visibleItems[idx];
        if (data) alert(`Selected: ${data.title}`);
      });

      // Backdrop click to close
      backdrop.addEventListener('click', (e) => {
        if (e.target === backdrop) {
          backdrop.classList.remove('open');
          backdrop.classList.add('closed');
        }
      });

      // Open palette button
      document.getElementById('openPalette').addEventListener('click', () => {
        backdrop.classList.add('open');
        backdrop.classList.remove('closed');
        input.focus();
        input.select();
      });
    });
  </script>
</body>
</html>
