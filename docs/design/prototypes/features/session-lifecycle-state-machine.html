<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — Session Lifecycle State Machine</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/design-system-c.css">
  <style>
    .page-content { display: flex; flex-direction: column; height: calc(100vh - 48px); padding: 0; overflow: hidden; }
    .page-content-inner { display: flex; flex-direction: column; flex: 1; min-height: 0; max-width: 100%; }

    .state-main { display: flex; flex: 1; min-height: 0; }

    /* SVG Diagram Area */
    .diagram-area {
      flex: 1; position: relative; overflow: hidden;
      background: var(--canvas-default);
      background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.03) 1px, transparent 0);
      background-size: 24px 24px;
    }
    .diagram-svg {
      width: 100%; height: 100%;
    }

    /* State nodes */
    .state-node {
      cursor: pointer; transition: filter 0.2s ease;
    }
    .state-node:hover { filter: brightness(1.15); }
    .state-node-bg {
      rx: 12; ry: 12; stroke-width: 1.5;
      transition: all 0.3s ease;
    }
    .state-node.active .state-node-bg {
      stroke-width: 2.5; filter: drop-shadow(0 0 12px var(--glow-color));
    }
    .state-node-label {
      font-family: 'Inter', sans-serif; font-weight: 600; font-size: 11px;
      fill: #fafafa; text-anchor: middle; dominant-baseline: central;
      pointer-events: none;
    }
    .state-node-icon {
      font-size: 16px; text-anchor: middle; dominant-baseline: central;
      pointer-events: none;
    }
    .state-node-count {
      font-family: 'Inter', sans-serif; font-weight: 700; font-size: 9px;
      text-anchor: middle; dominant-baseline: central; pointer-events: none;
    }

    /* Transition arrows */
    .transition-path {
      fill: none; stroke-width: 1.5; opacity: 0.35;
      transition: opacity 0.3s ease;
    }
    .transition-path.active { opacity: 0.8; stroke-width: 2; }
    .transition-label {
      font-family: 'JetBrains Mono', monospace; font-size: 8px;
      fill: var(--text-tertiary); text-anchor: middle; pointer-events: none;
    }

    /* Animated dot on active transitions */
    .flow-dot {
      r: 3; opacity: 0.8;
    }

    /* Side Panel */
    .state-side-panel {
      width: 300px; border-left: 1px solid var(--border-default);
      display: flex; flex-direction: column; background: var(--canvas-subtle);
      overflow: hidden;
    }
    .side-panel-header {
      padding: 14px 16px; border-bottom: 1px solid var(--border-default);
      font-size: 0.75rem; font-weight: 600; color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .side-panel-scroll { flex: 1; overflow-y: auto; padding: 14px; }

    .event-card {
      padding: 10px 12px; border-radius: var(--radius-md);
      border: 1px solid var(--border-muted); margin-bottom: 8px;
      background: var(--canvas-default); transition: all var(--transition-fast);
      cursor: pointer;
    }
    .event-card:hover { border-color: var(--border-accent); }
    .event-card.active { border-color: var(--accent-fg); background: var(--accent-subtle); }
    .event-card-header {
      display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
    }
    .event-card-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .event-card-type {
      font-size: 0.6875rem; font-weight: 600; color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
    }
    .event-card-time {
      margin-left: auto; font-size: 0.625rem; color: var(--text-tertiary);
      font-variant-numeric: tabular-nums;
    }
    .event-card-detail {
      font-size: 0.6875rem; color: var(--text-secondary); line-height: 1.4;
    }
    .event-card-transition {
      display: flex; align-items: center; gap: 4px; margin-top: 4px;
      font-size: 0.625rem; color: var(--text-tertiary);
    }
    .event-card-transition .arrow { color: var(--accent-fg); }

    /* Duration Bars */
    .duration-bars {
      padding: 14px 16px; border-top: 1px solid var(--border-default);
    }
    .duration-bars-title {
      font-size: 0.6875rem; font-weight: 600; color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 10px;
    }
    .duration-bar-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
    }
    .duration-bar-label {
      width: 80px; font-size: 0.625rem; color: var(--text-secondary);
      font-weight: 500; text-align: right; flex-shrink: 0;
    }
    .duration-bar-track {
      flex: 1; height: 6px; background: var(--neutral-subtle);
      border-radius: 3px; overflow: hidden;
    }
    .duration-bar-fill {
      height: 100%; border-radius: 3px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }
    .duration-bar-value {
      width: 40px; font-size: 0.625rem; color: var(--text-tertiary);
      font-variant-numeric: tabular-nums; flex-shrink: 0;
    }

    /* Timeline Scrubber */
    .timeline-bar {
      border-top: 1px solid var(--border-default);
      padding: 12px 24px; background: var(--canvas-subtle);
      flex-shrink: 0;
    }
    .timeline-label-row {
      display: flex; justify-content: space-between; margin-bottom: 6px;
      font-size: 0.625rem; color: var(--text-tertiary);
    }
    .timeline-track {
      position: relative; height: 24px; background: var(--canvas-inset);
      border-radius: 4px; overflow: hidden; cursor: pointer;
    }
    .timeline-segment {
      position: absolute; top: 0; height: 100%;
      transition: opacity 0.2s ease;
    }
    .timeline-segment:hover { opacity: 0.9 !important; }
    .timeline-scrubber {
      position: absolute; top: -2px; width: 3px; height: 28px;
      background: var(--text-primary); border-radius: 2px;
      cursor: grab; z-index: 5; box-shadow: 0 0 6px rgba(0,0,0,0.5);
      transition: left 0.1s ease;
    }
    .timeline-scrubber:active { cursor: grabbing; }
    .timeline-markers {
      display: flex; justify-content: space-between; margin-top: 4px;
    }
    .timeline-marker {
      width: 6px; height: 6px; border-radius: 50%; cursor: pointer;
      transition: transform 0.15s ease;
    }
    .timeline-marker:hover { transform: scale(1.5); }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" role="navigation" aria-label="Main navigation" id="sidebar"></aside>
    <div class="main-content">
      <div class="page-header-bar">
        <div class="breadcrumb">
          <a href="../variant-c/session-list.html">TracePilot</a>
          <span class="breadcrumb-sep">/</span>
          <a href="../variant-c/session-list.html">Sessions</a>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-current">Session Lifecycle</span>
        </div>
      </div>
      <div class="page-content">
        <div class="page-content-inner">

          <div class="state-main">
            <div class="diagram-area" id="diagramArea">
              <svg class="diagram-svg" id="diagramSvg" viewBox="0 0 700 500"></svg>
            </div>

            <div class="state-side-panel">
              <div class="side-panel-header">Transition Events</div>
              <div class="side-panel-scroll" id="eventsScroll"></div>
              <div class="duration-bars" id="durationBars"></div>
            </div>
          </div>

          <div class="timeline-bar" id="timelineBar">
            <div class="timeline-label-row">
              <span id="timeStart">09:30:00</span>
              <span id="timeLabel" style="font-weight:600;color:var(--text-secondary)">09:30:00</span>
              <span id="timeEnd">11:45:00</span>
            </div>
            <div class="timeline-track" id="timelineTrack">
              <div class="timeline-scrubber" id="timelineScrubber" style="left:0%"></div>
            </div>
            <div class="timeline-markers" id="timelineMarkers"></div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="../shared/shared.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('sidebar').innerHTML = generateSidebar('sessions');

    // --- State Definitions ---
    const states = [
      { id: 'start',       label: 'Start',          icon: '🚀', color: '#34d399', count: 1 },
      { id: 'active',      label: 'Active',         icon: '⚡', color: '#818cf8', count: 5 },
      { id: 'tool_exec',   label: 'Tool Execution', icon: '🔧', color: '#fbbf24', count: 8 },
      { id: 'compaction',  label: 'Compaction',     icon: '📦', color: '#a78bfa', count: 1 },
      { id: 'resumed',     label: 'Resumed',        icon: '▶️', color: '#22d3ee', count: 1 },
      { id: 'error',       label: 'Error',          icon: '⚠️', color: '#fb7185', count: 1 },
      { id: 'shutdown',    label: 'Shutdown',        icon: '⏹', color: '#71717a', count: 1 },
    ];

    // Radial layout positions (centered in viewBox 700x500)
    const cx = 350, cy = 235, radius = 170;
    states.forEach((s, i) => {
      const angle = (i / states.length) * Math.PI * 2 - Math.PI / 2;
      s.x = cx + Math.cos(angle) * radius;
      s.y = cy + Math.sin(angle) * radius;
    });

    // --- Transitions ---
    const transitions = [
      { from: 'start', to: 'active', event: 'session.init', time: '09:30:00' },
      { from: 'active', to: 'tool_exec', event: 'tool.call', time: '09:30:15' },
      { from: 'tool_exec', to: 'active', event: 'tool.complete', time: '09:30:45' },
      { from: 'active', to: 'tool_exec', event: 'tool.call', time: '09:31:20' },
      { from: 'tool_exec', to: 'active', event: 'tool.complete', time: '09:35:00' },
      { from: 'active', to: 'tool_exec', event: 'tool.call', time: '09:45:00' },
      { from: 'tool_exec', to: 'error', event: 'tool.error', time: '09:47:10' },
      { from: 'error', to: 'active', event: 'error.recovered', time: '09:47:30' },
      { from: 'active', to: 'tool_exec', event: 'tool.call', time: '09:50:00' },
      { from: 'tool_exec', to: 'active', event: 'tool.complete', time: '10:15:00' },
      { from: 'active', to: 'compaction', event: 'context.compact', time: '10:20:00' },
      { from: 'compaction', to: 'resumed', event: 'context.restored', time: '10:20:30' },
      { from: 'resumed', to: 'active', event: 'session.resume', time: '10:20:35' },
      { from: 'active', to: 'tool_exec', event: 'tool.call', time: '10:30:00' },
      { from: 'tool_exec', to: 'active', event: 'tool.complete', time: '11:15:00' },
      { from: 'active', to: 'shutdown', event: 'session.end', time: '11:45:00' },
    ];

    // Duration in each state (seconds)
    const stateDurations = {
      start: 0, active: 3800, tool_exec: 3200, compaction: 30, resumed: 5, error: 20, shutdown: 0
    };
    const totalDuration = Object.values(stateDurations).reduce((a, b) => a + b, 0);

    const stateMap = {};
    states.forEach(s => stateMap[s.id] = s);

    let activeStateId = 'start';
    let activeTransitionIdx = 0;
    let animTime = 0;

    // --- Render SVG Diagram ---
    function renderDiagram() {
      const svg = document.getElementById('diagramSvg');
      let html = '<defs>';
      // Arrow markers for each state color
      states.forEach(s => {
        html += `<marker id="arrow-${s.id}" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="${s.color}" opacity="0.5" /></marker>`;
      });
      // Glow filters
      states.forEach(s => {
        html += `<filter id="glow-${s.id}" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;
      });
      html += '</defs>';

      // Draw transitions as curved paths
      transitions.forEach((t, i) => {
        const from = stateMap[t.from], to = stateMap[t.to];
        if (!from || !to) return;
        const dx = to.x - from.x, dy = to.y - from.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        // Curve control point perpendicular to line
        const mx = (from.x + to.x) / 2, my = (from.y + to.y) / 2;
        const nx = -dy / dist * 30, ny = dx / dist * 30;
        const cpx = mx + nx, cpy = my + ny;
        const isActive = i === activeTransitionIdx;

        html += `<path class="transition-path${isActive ? ' active' : ''}" 
          d="M ${from.x} ${from.y} Q ${cpx} ${cpy} ${to.x} ${to.y}" 
          stroke="${from.color}" marker-end="url(#arrow-${from.id})"
          id="path-${i}" />`;

        // Label
        const lx = mx + nx * 0.6, ly = my + ny * 0.6;
        html += `<text class="transition-label" x="${lx}" y="${ly}">${t.event}</text>`;

        // Animated dot for active transition
        if (isActive) {
          html += `<circle class="flow-dot" fill="${from.color}"><animateMotion dur="1.5s" repeatCount="indefinite"><mpath href="#path-${i}" /></animateMotion></circle>`;
        }
      });

      // Draw state nodes
      states.forEach(s => {
        const isActive = s.id === activeStateId;
        const w = 110, h = 54;
        html += `<g class="state-node${isActive ? ' active' : ''}" data-state="${s.id}" style="--glow-color:${s.color}">`;
        // Background glow for active
        if (isActive) {
          html += `<rect x="${s.x - w / 2 - 4}" y="${s.y - h / 2 - 4}" width="${w + 8}" height="${h + 8}" rx="16" ry="16" fill="${s.color}" opacity="0.1" />`;
        }
        html += `<rect class="state-node-bg" x="${s.x - w / 2}" y="${s.y - h / 2}" width="${w}" height="${h}" fill="#111113" stroke="${s.color}" ${isActive ? `filter="url(#glow-${s.id})"` : ''} />`;
        // Icon
        html += `<text class="state-node-icon" x="${s.x - 28}" y="${s.y}">${s.icon}</text>`;
        // Label
        html += `<text class="state-node-label" x="${s.x + 8}" y="${s.y - 6}">${s.label}</text>`;
        // Count badge
        html += `<text class="state-node-count" x="${s.x + 8}" y="${s.y + 10}" fill="${s.color}">${s.count}×</text>`;
        html += `</g>`;
      });

      svg.innerHTML = html;

      // State click handlers
      svg.querySelectorAll('.state-node').forEach(el => {
        el.addEventListener('click', () => {
          const sid = el.dataset.state;
          activeStateId = sid;
          renderDiagram();
          highlightEventsForState(sid);
        });
      });
    }

    // --- Side Panel: Events ---
    function renderEvents() {
      const el = document.getElementById('eventsScroll');
      el.innerHTML = transitions.map((t, i) => {
        const fromState = stateMap[t.from], toState = stateMap[t.to];
        const isActive = i === activeTransitionIdx;
        return `
          <div class="event-card${isActive ? ' active' : ''}" data-idx="${i}">
            <div class="event-card-header">
              <div class="event-card-dot" style="background:${fromState.color}"></div>
              <span class="event-card-type">${t.event}</span>
              <span class="event-card-time">${t.time}</span>
            </div>
            <div class="event-card-transition">
              <span style="color:${fromState.color}">${fromState.label}</span>
              <span class="arrow">→</span>
              <span style="color:${toState.color}">${toState.label}</span>
            </div>
          </div>
        `;
      }).join('');

      el.querySelectorAll('.event-card').forEach(card => {
        card.addEventListener('click', () => {
          const idx = parseInt(card.dataset.idx);
          activeTransitionIdx = idx;
          activeStateId = transitions[idx].to;
          renderDiagram();
          renderEvents();
          updateScrubber(idx);
        });
      });
    }

    function highlightEventsForState(stateId) {
      document.querySelectorAll('.event-card').forEach(card => {
        card.classList.remove('active');
        const idx = parseInt(card.dataset.idx);
        const t = transitions[idx];
        if (t.from === stateId || t.to === stateId) {
          card.classList.add('active');
        }
      });
    }

    // --- Duration Bars ---
    function renderDurationBars() {
      const el = document.getElementById('durationBars');
      let html = '<div class="duration-bars-title">Time in Each State</div>';
      states.forEach(s => {
        const dur = stateDurations[s.id] || 0;
        const pct = totalDuration > 0 ? (dur / totalDuration * 100) : 0;
        html += `
          <div class="duration-bar-row">
            <span class="duration-bar-label">${s.label}</span>
            <div class="duration-bar-track">
              <div class="duration-bar-fill" style="width:${pct}%;background:${s.color};opacity:0.7"></div>
            </div>
            <span class="duration-bar-value">${formatDuration(dur * 1000)}</span>
          </div>
        `;
      });
      el.innerHTML = html;
    }

    // --- Timeline Scrubber ---
    function renderTimeline() {
      const track = document.getElementById('timelineTrack');
      // Color segments for time in each state
      let segHtml = '';
      let pos = 0;
      const colorOrder = ['start', 'active', 'tool_exec', 'active', 'tool_exec', 'active', 'tool_exec', 'error', 'active', 'tool_exec', 'active', 'compaction', 'resumed', 'active', 'tool_exec', 'active', 'shutdown'];
      const segDurations = [0, 15, 30, 35, 225, 120, 130, 20, 150, 1500, 300, 30, 5, 570, 2700, 1800, 0];
      const segTotal = segDurations.reduce((a, b) => a + b, 0) || 1;

      colorOrder.forEach((sid, i) => {
        const w = (segDurations[i] / segTotal) * 100;
        const st = stateMap[sid];
        if (st && w > 0) {
          segHtml += `<div class="timeline-segment" style="left:${pos}%;width:${w}%;background:${st.color};opacity:0.25"></div>`;
        }
        pos += w;
      });

      // Keep existing scrubber
      const scrubber = document.getElementById('timelineScrubber');
      track.innerHTML = segHtml;
      track.appendChild(scrubber);

      // Event markers
      const markersEl = document.getElementById('timelineMarkers');
      markersEl.innerHTML = transitions.map((t, i) => {
        const pct = (i / (transitions.length - 1)) * 100;
        return `<div class="timeline-marker" style="background:${stateMap[t.from].color};margin-left:${i === 0 ? '0' : 'auto'}" data-idx="${i}" title="${t.event} @ ${t.time}"></div>`;
      }).join('');

      markersEl.querySelectorAll('.timeline-marker').forEach(m => {
        m.addEventListener('click', () => {
          const idx = parseInt(m.dataset.idx);
          activeTransitionIdx = idx;
          activeStateId = transitions[idx].to;
          renderDiagram();
          renderEvents();
          updateScrubber(idx);
        });
      });

      // Scrubber drag
      let isDragging = false;
      scrubber.addEventListener('mousedown', (e) => { isDragging = true; e.preventDefault(); });
      document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const rect = track.getBoundingClientRect();
        const pct = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
        scrubber.style.left = pct + '%';
        // Find nearest transition
        const idx = Math.round((pct / 100) * (transitions.length - 1));
        if (idx !== activeTransitionIdx) {
          activeTransitionIdx = idx;
          activeStateId = transitions[idx].to;
          renderDiagram();
          renderEvents();
          updateTimeLabel(pct);
        }
      });
      document.addEventListener('mouseup', () => { isDragging = false; });

      // Click on track
      track.addEventListener('click', (e) => {
        if (e.target === scrubber) return;
        const rect = track.getBoundingClientRect();
        const pct = ((e.clientX - rect.left) / rect.width) * 100;
        const idx = Math.round((pct / 100) * (transitions.length - 1));
        activeTransitionIdx = Math.max(0, Math.min(transitions.length - 1, idx));
        activeStateId = transitions[activeTransitionIdx].to;
        scrubber.style.left = pct + '%';
        renderDiagram();
        renderEvents();
        updateTimeLabel(pct);
      });
    }

    function updateScrubber(idx) {
      const pct = (idx / (transitions.length - 1)) * 100;
      document.getElementById('timelineScrubber').style.left = pct + '%';
      updateTimeLabel(pct);
    }

    function updateTimeLabel(pct) {
      // Interpolate time
      const startMs = timeToMs('09:30:00');
      const endMs = timeToMs('11:45:00');
      const currentMs = startMs + (pct / 100) * (endMs - startMs);
      document.getElementById('timeLabel').textContent = msToTime(currentMs);
    }

    function timeToMs(t) {
      const [h, m, s] = t.split(':').map(Number);
      return h * 3600000 + m * 60000 + s * 1000;
    }

    function msToTime(ms) {
      const h = Math.floor(ms / 3600000);
      const m = Math.floor((ms % 3600000) / 60000);
      const s = Math.floor((ms % 60000) / 1000);
      return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    // --- Auto-play animation ---
    let autoplayTimer = null;
    let autoplayIdx = 0;

    function startAutoplay() {
      autoplayIdx = 0;
      autoplayTimer = setInterval(() => {
        if (autoplayIdx >= transitions.length) {
          clearInterval(autoplayTimer);
          return;
        }
        activeTransitionIdx = autoplayIdx;
        activeStateId = transitions[autoplayIdx].to;
        renderDiagram();
        renderEvents();
        updateScrubber(autoplayIdx);
        // Scroll event into view
        const activeCard = document.querySelector(`.event-card[data-idx="${autoplayIdx}"]`);
        if (activeCard) activeCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        autoplayIdx++;
      }, 800);
    }

    // Initial render
    renderDiagram();
    renderEvents();
    renderDurationBars();
    renderTimeline();

    // Auto-play on load after a short delay
    setTimeout(startAutoplay, 500);
  });
  </script>
</body>
</html>
