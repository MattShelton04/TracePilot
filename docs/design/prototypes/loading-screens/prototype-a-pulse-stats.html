<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — Prototype A: Pulse &amp; Stats</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    /* === Logo Pulse & Glow === */
    @keyframes logo-pulse {
      0%, 100% { transform: scale(1.0); filter: drop-shadow(0 0 12px rgba(99, 102, 241, 0.4)); }
      50%      { transform: scale(1.03); filter: drop-shadow(0 0 24px rgba(99, 102, 241, 0.7)); }
    }

    @keyframes glow-ring-breathe {
      0%, 100% { opacity: 0.25; transform: scale(1); }
      50%      { opacity: 0.55; transform: scale(1.08); }
    }

    @keyframes ring-trail-rotate {
      to { transform: rotate(360deg); }
    }

    @keyframes phase-fade-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes complete-exit {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-32px); }
    }

    @keyframes stat-glow-success {
      0%   { box-shadow: 0 0 0 rgba(52, 211, 153, 0); }
      40%  { box-shadow: 0 0 20px rgba(52, 211, 153, 0.4), 0 0 40px rgba(52, 211, 153, 0.15); }
      100% { box-shadow: 0 0 0 rgba(52, 211, 153, 0); }
    }

    /* === Loading Content (centered column) === */
    .loading-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-6);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .loading-content.exit {
      animation: complete-exit 600ms ease-in forwards;
    }

    /* === Logo Area === */
    .logo-area {
      position: relative;
      width: 160px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-glow-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid var(--accent-muted);
      animation: glow-ring-breathe 2s ease-in-out infinite;
      pointer-events: none;
    }

    .logo-glow-ring::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, transparent 70%);
      animation: glow-ring-breathe 2s ease-in-out infinite;
      animation-delay: 0.3s;
    }

    .logo-inner {
      position: relative;
      z-index: 2;
      animation: logo-pulse 2s ease-in-out infinite;
    }

    .logo-inner .logo-svg {
      width: 64px;
      height: 64px;
    }

    /* === SVG Progress Ring === */
    .progress-ring-container {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .progress-ring-svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .progress-ring-track {
      fill: none;
      stroke: var(--color-border-muted);
      stroke-width: 3;
    }

    .progress-ring-fill {
      fill: none;
      stroke: url(#ring-gradient);
      stroke-width: 3.5;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      filter: drop-shadow(0 0 6px rgba(99, 102, 241, 0.5));
    }

    .progress-ring-glow {
      fill: none;
      stroke: var(--accent-fg);
      stroke-width: 8;
      stroke-linecap: round;
      opacity: 0.15;
      transition: stroke-dashoffset 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* === Phase Text === */
    .phase-area {
      text-align: center;
      min-height: 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
    }

    .phase-text {
      font-size: var(--text-lg);
      color: var(--color-fg);
      font-weight: 500;
      animation: phase-fade-in 0.35s ease-out;
    }

    .phase-sub {
      font-family: var(--font-mono);
      font-size: var(--text-base);
      color: var(--color-fg-muted);
      font-variant-numeric: tabular-nums;
      animation: phase-fade-in 0.35s ease-out;
      min-width: 160px;
    }

    /* === Stats Grid === */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-4);
      width: 100%;
      max-width: 540px;
      margin-top: var(--space-2);
    }

    .stat-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--space-4) var(--space-3);
      background: var(--color-canvas-subtle);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      transition: box-shadow 0.4s ease, border-color 0.4s ease;
    }

    .stat-card .stat-value {
      font-family: var(--font-mono);
      font-size: var(--text-2xl);
      font-weight: 600;
      color: var(--color-fg);
      font-variant-numeric: tabular-nums;
      line-height: 1.2;
    }

    .stat-card .stat-label {
      font-size: var(--text-xs);
      color: var(--color-fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: var(--space-2);
      white-space: nowrap;
    }

    .stat-card.glow-success {
      animation: stat-glow-success 0.8s ease-out forwards;
      border-color: var(--success-fg);
    }

    /* === Progress bar glow on complete === */
    .progress-bar-fill.complete {
      background: linear-gradient(90deg, var(--success-emphasis), var(--success-fg));
      box-shadow: 0 0 12px var(--success-muted);
    }

    /* === Ambient background glow === */
    .ambient-glow {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%);
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.06) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>
  <!-- Ambient background glow -->
  <div class="ambient-glow"></div>

  <!-- Top progress bar -->
  <div class="progress-bar-track">
    <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
  </div>

  <!-- Main loading screen -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-content" id="loadingContent">

      <!-- Logo + Progress Ring -->
      <div class="logo-area">
        <div class="logo-glow-ring"></div>

        <svg class="progress-ring-container progress-ring-svg" viewBox="0 0 160 160">
          <defs>
            <linearGradient id="ring-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#6366f1" />
              <stop offset="100%" stop-color="#818cf8" />
            </linearGradient>
          </defs>
          <circle class="progress-ring-track" cx="80" cy="80" r="72" />
          <circle class="progress-ring-glow" id="ringGlow" cx="80" cy="80" r="72"
            stroke-dasharray="452.39" stroke-dashoffset="452.39" />
          <circle class="progress-ring-fill" id="ringFill" cx="80" cy="80" r="72"
            stroke-dasharray="452.39" stroke-dashoffset="452.39" />
        </svg>

        <div class="logo-inner" id="logoInner"></div>
      </div>

      <!-- Phase text -->
      <div class="phase-area">
        <div class="phase-text" id="phaseText">Preparing…</div>
        <div class="phase-sub" id="phaseSub">&nbsp;</div>
      </div>

      <!-- Stat cards -->
      <div class="stats-grid">
        <div class="stat-card" id="statTokens">
          <span class="stat-value" id="valTokens">0</span>
          <span class="stat-label">tokens</span>
        </div>
        <div class="stat-card" id="statEvents">
          <span class="stat-value" id="valEvents">0</span>
          <span class="stat-label">events</span>
        </div>
        <div class="stat-card" id="statTurns">
          <span class="stat-value" id="valTurns">0</span>
          <span class="stat-label">turns</span>
        </div>
        <div class="stat-card" id="statTools">
          <span class="stat-value" id="valTools">0</span>
          <span class="stat-label">tool calls</span>
        </div>
      </div>
    </div>
  </div>

  <script src="mock-data.js"></script>
  <script>
    // --- Inject logo SVG ---
    document.getElementById('logoInner').innerHTML =
      `<div class="logo-svg">${TRACEPILOT_LOGO_SVG}</div>`;

    // --- DOM refs ---
    const progressBar   = document.getElementById('progressBar');
    const ringFill      = document.getElementById('ringFill');
    const ringGlow      = document.getElementById('ringGlow');
    const phaseText     = document.getElementById('phaseText');
    const phaseSub      = document.getElementById('phaseSub');
    const loadingContent = document.getElementById('loadingContent');

    const CIRCUMFERENCE = 2 * Math.PI * 72; // ≈452.39

    // --- Animated counters ---
    const ctrTokens = new AnimatedCounter(document.getElementById('valTokens'), {
      format: formatTokens,
      speed: 0.07,
    });
    const ctrEvents = new AnimatedCounter(document.getElementById('valEvents'), {
      format: n => formatCompact(n),
      speed: 0.07,
    });
    const ctrTurns = new AnimatedCounter(document.getElementById('valTurns'), {
      format: n => formatCompact(n),
      speed: 0.07,
    });
    const ctrTools = new AnimatedCounter(document.getElementById('valTools'), {
      format: n => formatCompact(n),
      speed: 0.07,
    });

    function formatCompact(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 10000)   return (n / 1000).toFixed(1) + 'K';
      return n.toLocaleString();
    }

    // --- Phase labels ---
    const PHASE_LABELS = {
      idle:        'Preparing…',
      discovering: 'Discovering sessions…',
      indexing:    'Indexing sessions…',
      finalizing:  'Finalizing…',
      complete:    'Ready!',
    };

    // --- Update helpers ---
    function setProgress(fraction) {
      const pct = Math.min(fraction * 100, 100);
      progressBar.style.width = pct + '%';
      const offset = CIRCUMFERENCE * (1 - fraction);
      ringFill.style.strokeDashoffset = offset;
      ringGlow.style.strokeDashoffset = offset;
    }

    function setPhase(phase, totalSessions) {
      phaseText.style.animation = 'none';
      // Force reflow to restart animation
      void phaseText.offsetWidth;
      phaseText.textContent = PHASE_LABELS[phase] || phase;
      phaseText.style.animation = 'phase-fade-in 0.35s ease-out';

      if (phase === 'complete') {
        phaseText.style.color = 'var(--success-fg)';
        phaseSub.textContent = '';
      }
    }

    function setSessionProgress(current, total) {
      phaseSub.textContent = `${current} / ${total} sessions`;
    }

    // --- Completion animation ---
    function onComplete() {
      progressBar.classList.add('complete');

      // Brief glow on each stat card
      const cards = document.querySelectorAll('.stat-card');
      cards.forEach((card, i) => {
        setTimeout(() => card.classList.add('glow-success'), i * 80);
      });

      // Fade-out after glow
      setTimeout(() => {
        loadingContent.classList.add('exit');
      }, 1200);
    }

    // --- Reset everything ---
    function resetUI() {
      setProgress(0);
      progressBar.classList.remove('complete');
      phaseText.textContent = PHASE_LABELS.idle;
      phaseText.style.color = '';
      phaseSub.textContent = '\u00A0';
      loadingContent.classList.remove('exit');

      ctrTokens.current = 0; ctrTokens.target = 0;
      ctrEvents.current = 0; ctrEvents.target = 0;
      ctrTurns.current  = 0; ctrTurns.target  = 0;
      ctrTools.current  = 0; ctrTools.target  = 0;

      document.getElementById('valTokens').textContent = '0';
      document.getElementById('valEvents').textContent = '0';
      document.getElementById('valTurns').textContent  = '0';
      document.getElementById('valTools').textContent  = '0';

      document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('glow-success'));
    }

    // --- Simulator instance ---
    let sim = null;

    function startSimulation(durationSec, sessionCount) {
      if (sim) sim.stop();
      resetUI();

      sim = new LoadingSimulator({
        totalSessions: sessionCount,
        durationMs: durationSec * 1000,

        onProgress(fraction, phase) {
          setProgress(fraction);
        },

        onPhaseChange(phase) {
          setPhase(phase, sessionCount);
        },

        onSessionProcessed({ current, total }) {
          setSessionProgress(current, total);
        },

        onStatsUpdate(stats) {
          ctrTokens.set(stats.totalTokens);
          ctrEvents.set(stats.totalEvents);
          ctrTurns.set(stats.totalTurns);
          ctrTools.set(stats.totalToolCalls);
        },

        onComplete() {
          onComplete();
        },
      });

      sim.start();
    }

    // --- Demo controls ---
    createDemoControls(document.body, {
      defaultDuration: 10,
      onStart(duration, sessions) {
        startSimulation(duration, sessions);
      },
      onReset() {
        if (sim) sim.stop();
        resetUI();
      },
    });
  </script>
</body>
</html>
