<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — Prototype D: Constellation Network</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    /* ── Constellation Field ── */
    .constellation-field {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    .constellation-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .constellation-svg line {
      stroke-linecap: round;
    }

    /* ── Nodes ── */
    .constellation-node {
      position: absolute;
      border-radius: 50%;
      z-index: 2;
      pointer-events: none;
      transform: scale(0);
      opacity: 0;
    }

    .constellation-node.active {
      animation: nodePop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .constellation-node .node-core {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      position: relative;
    }

    .constellation-node .node-ring {
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 1px solid currentColor;
      opacity: 0.3;
    }

    @keyframes nodePop {
      0%   { transform: scale(0); opacity: 0; }
      50%  { transform: scale(1.3); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes nodeBreath {
      0%, 100% { opacity: 0.7; }
      50%      { opacity: 1; }
    }

    @keyframes nodeFlash {
      0%   { box-shadow: 0 0 20px 8px currentColor; }
      100% { box-shadow: 0 0 6px 2px currentColor; }
    }

    /* ── Connection line pulse ── */
    @keyframes lineDraw {
      from { stroke-dashoffset: 1; }
      to   { stroke-dashoffset: 0; }
    }

    /* ── Center Card ── */
    .center-card {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-8) var(--space-10);
      min-width: 280px;
      background: rgba(22, 27, 34, 0.72);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg), var(--shadow-glow);
      text-align: center;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .center-card .logo-svg {
      width: 48px;
      height: 48px;
      filter: drop-shadow(0 0 12px rgba(99, 102, 241, 0.5));
    }

    .center-card .app-name {
      font-size: var(--text-lg);
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--color-fg);
    }

    .center-card .phase-text {
      font-size: var(--text-sm);
      color: var(--color-fg-muted);
      min-height: 1.2em;
      transition: opacity 0.3s ease;
    }

    .center-card .session-counter {
      font-family: var(--font-mono);
      font-size: var(--text-xl);
      font-weight: 600;
      color: var(--accent-fg);
      font-variant-numeric: tabular-nums;
    }

    .center-card .stats-row {
      display: flex;
      gap: var(--space-6);
      margin-top: var(--space-1);
    }

    .center-card .mini-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .center-card .mini-stat-value {
      font-family: var(--font-mono);
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--color-fg);
      font-variant-numeric: tabular-nums;
    }

    .center-card .mini-stat-label {
      font-size: var(--text-xs);
      color: var(--color-fg-subtle);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .center-card .card-progress {
      width: 100%;
      height: 3px;
      background: var(--color-border-muted);
      border-radius: 2px;
      overflow: hidden;
      margin-top: var(--space-1);
    }

    .center-card .card-progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent-emphasis), var(--accent-fg));
      border-radius: 2px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Repo Legend ── */
    .repo-legend {
      position: fixed;
      bottom: 72px;
      right: var(--space-5);
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-4);
      background: rgba(22, 27, 34, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--color-border-muted);
      border-radius: var(--radius-md);
      font-size: var(--text-xs);
      color: var(--color-fg-muted);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .repo-legend.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .repo-legend .legend-title {
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-fg-subtle);
      margin-bottom: 2px;
    }

    .repo-legend .legend-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      opacity: 0;
      transform: translateX(8px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .repo-legend .legend-item.visible {
      opacity: 1;
      transform: translateX(0);
    }

    .repo-legend .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .repo-legend .legend-name {
      font-family: var(--font-mono);
      color: var(--color-fg-muted);
    }

    /* ── Background glow ── */
    .bg-glow {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(99, 102, 241, 0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Completion overlay ── */
    @keyframes completionPulse {
      0%   { opacity: 0; }
      40%  { opacity: 0.12; }
      100% { opacity: 0; }
    }

    .completion-flash {
      position: fixed;
      inset: 0;
      background: var(--accent-fg);
      opacity: 0;
      pointer-events: none;
      z-index: 5;
    }

    .completion-flash.active {
      animation: completionPulse 1.2s ease-out forwards;
    }
  </style>
</head>
<body>
  <!-- Progress bar -->
  <div class="progress-bar-track">
    <div class="progress-bar-fill" id="progress-bar"></div>
  </div>

  <!-- Background glow -->
  <div class="bg-glow"></div>

  <!-- Constellation field -->
  <div class="constellation-field" id="constellation-field">
    <svg class="constellation-svg" id="constellation-svg"></svg>
  </div>

  <!-- Center card -->
  <div class="center-card" id="center-card">
    <div class="logo-svg" id="logo"></div>
    <div class="app-name">TracePilot</div>
    <div class="phase-text" id="phase-text">Preparing…</div>
    <div class="session-counter"><span id="sessions-current">0</span> / <span id="sessions-total">0</span> sessions indexed</div>
    <div class="stats-row">
      <div class="mini-stat">
        <span class="mini-stat-value" id="stat-tokens">0</span>
        <span class="mini-stat-label">tokens</span>
      </div>
      <div class="mini-stat">
        <span class="mini-stat-value" id="stat-events">0</span>
        <span class="mini-stat-label">events</span>
      </div>
      <div class="mini-stat">
        <span class="mini-stat-value" id="stat-turns">0</span>
        <span class="mini-stat-label">turns</span>
      </div>
    </div>
    <div class="card-progress">
      <div class="card-progress-fill" id="card-progress"></div>
    </div>
  </div>

  <!-- Repo legend -->
  <div class="repo-legend" id="repo-legend">
    <div class="legend-title">Repositories</div>
  </div>

  <!-- Completion flash -->
  <div class="completion-flash" id="completion-flash"></div>

  <script src="mock-data.js"></script>
  <script>
    // ── Repo color mapping ──
    const REPO_COLORS = {
      'frontend-app':  '#818cf8',
      'api-server':    '#34d399',
      'data-pipeline': '#fbbf24',
      'mobile-app':    '#f87171',
      'infra-config':  '#a78bfa',
      'ml-service':    '#38bdf8',
      'docs-site':     '#fb923c',
    };

    const PHASE_LABELS = {
      idle:        'Preparing…',
      discovering: 'Scanning session directories…',
      indexing:    'Indexing sessions…',
      finalizing:  'Building search index…',
      complete:    'Ready — launching TracePilot',
    };

    // ── State ──
    let nodes = [];
    let connections = [];
    let discoveredRepos = new Set();
    let simulator = null;
    let fieldW, fieldH, centerX, centerY;
    let nodeIndex = 0;

    // ── DOM refs ──
    const field = document.getElementById('constellation-field');
    const svg = document.getElementById('constellation-svg');
    const progressBar = document.getElementById('progress-bar');
    const cardProgress = document.getElementById('card-progress');
    const phaseText = document.getElementById('phase-text');
    const sessionsCurrent = document.getElementById('sessions-current');
    const sessionsTotal = document.getElementById('sessions-total');
    const legend = document.getElementById('repo-legend');
    const completionFlash = document.getElementById('completion-flash');

    // Logo
    document.getElementById('logo').innerHTML = TRACEPILOT_LOGO_SVG;

    // Animated counters
    const tokenCounter = new AnimatedCounter(document.getElementById('stat-tokens'), { format: formatTokens });
    const eventCounter = new AnimatedCounter(document.getElementById('stat-events'), { format: formatNumber });
    const turnCounter  = new AnimatedCounter(document.getElementById('stat-turns'),  { format: formatNumber });

    // ── Layout helpers ──
    function measureField() {
      fieldW = window.innerWidth;
      fieldH = window.innerHeight;
      centerX = fieldW / 2;
      centerY = fieldH / 2;
    }

    function getNodePosition(index, total) {
      // Concentric rings with jitter — avoid center card area
      const cardRadius = 160;
      const maxRadius = Math.min(fieldW, fieldH) * 0.42;
      const rings = Math.ceil(Math.sqrt(total));
      const ring = Math.floor(index / Math.max(rings, 1));
      const posInRing = index % Math.max(rings, 1);
      const ringRadius = cardRadius + ((maxRadius - cardRadius) * (ring + 1)) / (rings + 1);
      const angleStep = (Math.PI * 2) / Math.max(rings, 1);
      const baseAngle = angleStep * posInRing + (ring * 0.618 * Math.PI); // golden angle offset per ring
      const jitterR = (Math.random() - 0.5) * ringRadius * 0.25;
      const jitterA = (Math.random() - 0.5) * angleStep * 0.5;
      const r = ringRadius + jitterR;
      const a = baseAngle + jitterA;
      return {
        x: centerX + r * Math.cos(a),
        y: centerY + r * Math.sin(a),
      };
    }

    function getNodeSize(tokens) {
      const minSize = 6;
      const maxSize = 18;
      const minTokens = 5000;
      const maxTokens = 250000;
      const t = Math.max(0, Math.min(1, (tokens - minTokens) / (maxTokens - minTokens)));
      return minSize + t * (maxSize - minSize);
    }

    // ── Node creation ──
    function createNode(session, index, total) {
      const pos = getNodePosition(index, total);
      const size = getNodeSize(session.tokens);
      const color = REPO_COLORS[session.repo] || '#818cf8';
      const phase = Math.random() * Math.PI * 2; // random breath phase

      const el = document.createElement('div');
      el.className = 'constellation-node';
      el.style.width = size + 'px';
      el.style.height = size + 'px';
      el.style.left = (pos.x - size / 2) + 'px';
      el.style.top = (pos.y - size / 2) + 'px';
      el.style.color = color;

      const core = document.createElement('div');
      core.className = 'node-core';
      core.style.background = `radial-gradient(circle at 35% 35%, ${color}, ${color}88)`;
      core.style.boxShadow = `0 0 ${size}px 3px ${color}66, 0 0 ${size * 2}px ${color}22`;

      const ring = document.createElement('div');
      ring.className = 'node-ring';

      el.appendChild(core);
      el.appendChild(ring);
      field.appendChild(el);

      // Trigger pop animation
      requestAnimationFrame(() => el.classList.add('active'));

      // Flash glow on appear
      core.style.boxShadow = `0 0 24px 10px ${color}aa, 0 0 48px ${color}44`;
      setTimeout(() => {
        core.style.transition = 'box-shadow 1s ease-out';
        core.style.boxShadow = `0 0 ${size}px 3px ${color}55, 0 0 ${size * 2}px ${color}1a`;
      }, 400);

      const node = { el, core, pos, size, color, session, phase };
      nodes.push(node);

      // Start breathing after pop
      startBreathing(node);

      return node;
    }

    function startBreathing(node) {
      const breathe = () => {
        if (!node.el.isConnected) return;
        const t = performance.now() / 1000;
        const opacity = 0.6 + 0.4 * Math.sin(t * 0.8 + node.phase);
        node.core.style.opacity = opacity;

        // Gentle drift
        const dx = Math.sin(t * 0.3 + node.phase) * 1.5;
        const dy = Math.cos(t * 0.25 + node.phase * 1.3) * 1.5;
        node.el.style.transform = `scale(1) translate(${dx}px, ${dy}px)`;

        requestAnimationFrame(breathe);
      };
      setTimeout(() => requestAnimationFrame(breathe), 600);
    }

    // ── Connection creation ──
    function findConnections(newNode) {
      const related = [];
      for (const existing of nodes) {
        if (existing === newNode) continue;
        // Connect if same repo, branch, or model
        const s1 = newNode.session;
        const s2 = existing.session;
        if (s1.repo === s2.repo || s1.branch === s2.branch || s1.model === s2.model) {
          // Limit connections per node to avoid clutter
          const existingConns = connections.filter(c => c.a === existing || c.b === existing).length;
          if (existingConns < 4) {
            related.push(existing);
          }
        }
      }
      // Pick at most 3 connections for the new node
      related.sort(() => Math.random() - 0.5);
      return related.slice(0, 3);
    }

    function createConnection(nodeA, nodeB) {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', nodeA.pos.x);
      line.setAttribute('y1', nodeA.pos.y);
      line.setAttribute('x2', nodeB.pos.x);
      line.setAttribute('y2', nodeB.pos.y);

      // Blend the two node colors
      const isSharedRepo = nodeA.session.repo === nodeB.session.repo;
      const color = isSharedRepo ? nodeA.color : '#30363d';
      const opacity = isSharedRepo ? 0.35 : 0.15;

      line.setAttribute('stroke', color);
      line.setAttribute('stroke-opacity', opacity);
      line.setAttribute('stroke-width', isSharedRepo ? '1.2' : '0.7');

      // Dash animation for "traveling light" effect
      const length = Math.hypot(nodeB.pos.x - nodeA.pos.x, nodeB.pos.y - nodeA.pos.y);
      line.setAttribute('stroke-dasharray', length);
      line.setAttribute('stroke-dashoffset', length);
      line.style.transition = `stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1), stroke-opacity 0.6s ease`;

      svg.appendChild(line);

      // Animate draw-in
      requestAnimationFrame(() => {
        line.setAttribute('stroke-dashoffset', '0');
      });

      // Traveling light pulse
      setTimeout(() => {
        line.setAttribute('stroke-opacity', opacity);
      }, 900);

      connections.push({ a: nodeA, b: nodeB, el: line, color, baseOpacity: opacity });
    }

    // ── Legend ──
    function updateLegend(repo) {
      if (discoveredRepos.has(repo)) return;
      discoveredRepos.add(repo);

      if (discoveredRepos.size === 1) {
        legend.classList.add('visible');
      }

      const color = REPO_COLORS[repo] || '#818cf8';
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `<span class="legend-dot" style="background:${color}; box-shadow: 0 0 6px ${color}88"></span><span class="legend-name">${repo}</span>`;
      legend.appendChild(item);

      requestAnimationFrame(() => item.classList.add('visible'));
    }

    // ── Clear field ──
    function clearConstellation() {
      nodes.forEach(n => n.el.remove());
      nodes = [];
      connections.forEach(c => c.el.remove());
      connections = [];
      discoveredRepos.clear();
      nodeIndex = 0;

      // Clear legend items
      legend.querySelectorAll('.legend-item').forEach(el => el.remove());
      legend.classList.remove('visible');

      completionFlash.classList.remove('active');
    }

    // ── Completion effect ──
    function playCompletion() {
      // Flash overlay
      completionFlash.classList.remove('active');
      void completionFlash.offsetWidth;
      completionFlash.classList.add('active');

      // Pulse all nodes
      nodes.forEach((n, i) => {
        setTimeout(() => {
          n.core.style.transition = 'box-shadow 0.4s ease, opacity 0.4s ease';
          n.core.style.boxShadow = `0 0 24px 8px ${n.color}88, 0 0 48px ${n.color}44`;
          n.core.style.opacity = '1';
          setTimeout(() => {
            n.core.style.boxShadow = `0 0 ${n.size}px 3px ${n.color}55, 0 0 ${n.size * 2}px ${n.color}1a`;
          }, 600);
        }, i * 20);
      });

      // Brighten all connections
      connections.forEach(c => {
        c.el.setAttribute('stroke-opacity', Math.min(c.baseOpacity * 3, 0.7));
        setTimeout(() => {
          c.el.style.transition = 'stroke-opacity 1.5s ease';
          c.el.setAttribute('stroke-opacity', c.baseOpacity);
        }, 800);
      });

      // Graceful fade of entire field
      setTimeout(() => {
        field.style.transition = 'opacity 1.5s ease';
        field.style.opacity = '0.6';
        document.getElementById('center-card').style.transform = 'translate(-50%, -50%) scale(1.02)';
      }, 1500);
    }

    // ── Main simulation ──
    function startSimulation(durationS, totalSessions) {
      clearConstellation();
      measureField();

      field.style.opacity = '1';
      document.getElementById('center-card').style.transform = 'translate(-50%, -50%) scale(1)';

      sessionsTotal.textContent = totalSessions;
      sessionsCurrent.textContent = '0';
      progressBar.style.width = '0%';
      cardProgress.style.width = '0%';
      tokenCounter.set(0);
      eventCounter.set(0);
      turnCounter.set(0);
      phaseText.textContent = PHASE_LABELS.idle;

      if (simulator) simulator.stop();

      simulator = new LoadingSimulator({
        totalSessions,
        durationMs: durationS * 1000,

        onPhaseChange(phase) {
          phaseText.textContent = PHASE_LABELS[phase] || '';
        },

        onProgress(progress) {
          const pct = (progress * 100).toFixed(1) + '%';
          progressBar.style.width = pct;
          cardProgress.style.width = pct;
        },

        onSessionProcessed({ current, total, session }) {
          sessionsCurrent.textContent = current;
          const node = createNode(session, nodeIndex++, total);
          updateLegend(session.repo);

          // Find and draw connections
          const targets = findConnections(node);
          targets.forEach(target => createConnection(node, target));
        },

        onStatsUpdate(stats) {
          tokenCounter.set(stats.totalTokens);
          eventCounter.set(stats.totalEvents);
          turnCounter.set(stats.totalTurns);
        },

        onComplete() {
          playCompletion();
        },
      });

      simulator.start();
    }

    // ── Demo controls ──
    createDemoControls(document.body, {
      defaultDuration: 12,
      onStart(duration, sessions) {
        startSimulation(duration, sessions);
      },
      onReset() {
        if (simulator) simulator.stop();
        clearConstellation();
        progressBar.style.width = '0%';
        cardProgress.style.width = '0%';
        sessionsCurrent.textContent = '0';
        phaseText.textContent = PHASE_LABELS.idle;
        tokenCounter.set(0);
        eventCounter.set(0);
        turnCounter.set(0);
        field.style.opacity = '1';
        document.getElementById('center-card').style.transform = 'translate(-50%, -50%) scale(1)';
      },
    });

    // ── Handle resize ──
    window.addEventListener('resize', measureField);
    measureField();

    // Auto-start after a brief pause
    setTimeout(() => startSimulation(12, 20), 500);
  </script>
</body>
</html>
