<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — Prototype I: Spotlight Reveal</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    /* === Spotlight Layer System === */
    body { background: #000; }

    .darkness-layer {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 100;
      pointer-events: none;
    }

    .homepage-layer {
      position: fixed;
      inset: 0;
      z-index: 50;
      --spot-x: 50%;
      --spot-y: 50%;
      --spot-r: 250px;
      --spot2-opacity: 0;
      --reveal: 0;
      -webkit-mask-image:
        radial-gradient(circle var(--spot-r) at var(--spot-x) var(--spot-y), black 0%, transparent 100%),
        radial-gradient(circle 120px at 50% 88%, rgba(0,0,0,var(--spot2-opacity)) 0%, transparent 100%);
      mask-image:
        radial-gradient(circle var(--spot-r) at var(--spot-x) var(--spot-y), black 0%, transparent 100%),
        radial-gradient(circle 120px at 50% 88%, rgba(0,0,0,var(--spot2-opacity)) 0%, transparent 100%);
      -webkit-mask-composite: source-over;
      mask-composite: add;
      transition: none;
    }

    .homepage-layer.fully-revealed {
      -webkit-mask-image: none;
      mask-image: none;
    }

    /* === Afterglow zones === */
    .afterglow-zone {
      position: absolute;
      opacity: 0;
      background: radial-gradient(circle, rgba(129, 140, 248, 0.06) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      transition: opacity 0.6s ease-out;
      z-index: 51;
    }
    .afterglow-zone.active { opacity: 1; }
    .afterglow-zone.intensify { opacity: 1; background: radial-gradient(circle, rgba(129, 140, 248, 0.14) 0%, transparent 70%); }

    /* === Center Logo Overlay (Phase 1) === */
    .logo-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.8s ease;
    }
    .logo-overlay.hidden { opacity: 0; }

    .logo-overlay .logo-svg {
      width: 72px;
      height: 72px;
      animation: logo-glow-pulse 2s ease-in-out infinite;
    }

    .logo-overlay .preparing-text {
      margin-top: var(--space-4);
      font-size: var(--text-md);
      color: var(--color-fg-muted);
      opacity: 0;
      animation: fadeIn 1s ease-out 0.4s forwards;
    }

    @keyframes logo-glow-pulse {
      0%, 100% { filter: drop-shadow(0 0 16px rgba(99, 102, 241, 0.5)); transform: scale(1); }
      50%      { filter: drop-shadow(0 0 32px rgba(99, 102, 241, 0.8)); transform: scale(1.04); }
    }

    /* === Flash overlay === */
    .flash-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0);
      z-index: 300;
      pointer-events: none;
      transition: background 0.1s ease;
    }
    .flash-overlay.flash {
      background: rgba(255, 255, 255, 0.25);
    }

    /* === Shimmer wave === */
    @keyframes shimmer-wave {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .shimmer-overlay {
      position: fixed;
      inset: 0;
      z-index: 250;
      pointer-events: none;
      overflow: hidden;
      opacity: 0;
    }
    .shimmer-overlay.active { opacity: 1; }
    .shimmer-overlay::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(129, 140, 248, 0.08) 45%,
        rgba(255, 255, 255, 0.12) 50%,
        rgba(129, 140, 248, 0.08) 55%,
        transparent 100%
      );
      animation: shimmer-wave 1s ease-out forwards;
    }

    /* === Convergence ring === */
    .convergence-ring {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 0;
      height: 0;
      border-radius: 50%;
      border: 2px solid rgba(129, 140, 248, 0.3);
      box-shadow: 0 0 30px rgba(99, 102, 241, 0.15), inset 0 0 30px rgba(99, 102, 241, 0.05);
      z-index: 201;
      pointer-events: none;
      opacity: 0;
      transition: width 1.5s ease-out, height 1.5s ease-out, opacity 0.5s ease;
    }
    .convergence-ring.active {
      opacity: 1;
      width: 600px;
      height: 600px;
    }
    .convergence-ring.expand {
      width: 3000px;
      height: 3000px;
      opacity: 0;
      transition: width 0.8s ease-in, height 0.8s ease-in, opacity 0.6s ease 0.4s;
    }

    /* ======================================================================
       MOCK HOMEPAGE
       ====================================================================== */
    .mock-homepage {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      background: var(--color-canvas);
    }

    /* --- Header --- */
    .mock-header {
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 var(--space-4);
      border-bottom: 1px solid var(--color-border);
      background: var(--color-canvas-subtle);
      gap: var(--space-4);
      flex-shrink: 0;
    }

    .mock-header-left {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      flex-shrink: 0;
    }

    .mock-header-left .logo-svg { width: 24px; height: 24px; }
    .mock-header-left span {
      font-weight: 600;
      font-size: var(--text-md);
      color: var(--color-fg);
    }

    .mock-search {
      flex: 1;
      max-width: 400px;
      margin: 0 auto;
      height: 30px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      background: var(--color-canvas);
      display: flex;
      align-items: center;
      padding: 0 var(--space-3);
      color: var(--color-fg-subtle);
      font-size: var(--text-sm);
    }

    .mock-header-right {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-fg-muted);
      font-size: var(--text-lg);
    }

    /* --- Body layout --- */
    .mock-body {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* --- Sidebar --- */
    .mock-sidebar {
      width: 200px;
      border-right: 1px solid var(--color-border);
      background: var(--color-canvas-subtle);
      padding: var(--space-4) 0;
      flex-shrink: 0;
    }

    .sidebar-nav-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-2) var(--space-4);
      font-size: var(--text-sm);
      color: var(--color-fg-muted);
      cursor: default;
      border-left: 3px solid transparent;
      transition: background var(--duration-fast), color var(--duration-fast);
    }

    .sidebar-nav-item.active {
      color: var(--color-fg);
      background: var(--accent-subtle);
      border-left-color: var(--accent-emphasis);
    }

    .sidebar-nav-item .nav-icon {
      width: 16px;
      text-align: center;
      font-size: var(--text-base);
    }

    /* --- Main content --- */
    .mock-main {
      flex: 1;
      padding: var(--space-6);
      overflow-y: auto;
      min-height: 0;
    }

    .main-heading {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }

    .main-heading h2 {
      font-size: var(--text-xl);
      font-weight: 600;
    }

    .session-count-badge {
      padding: 2px var(--space-2);
      background: var(--accent-subtle);
      color: var(--accent-fg);
      border-radius: var(--radius-pill);
      font-size: var(--text-xs);
      font-weight: 600;
      font-family: var(--font-mono);
    }

    /* --- Session Cards Grid --- */
    .session-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-4);
    }

    @media (max-width: 1100px) {
      .session-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .session-card {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      background: var(--color-canvas-subtle);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      transition: border-color var(--duration-normal), box-shadow var(--duration-normal);
    }

    .session-card:hover {
      border-color: var(--accent-muted);
      box-shadow: var(--shadow-md);
    }

    .card-row-1 {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .card-repo {
      font-weight: 600;
      font-size: var(--text-md);
      color: var(--color-fg);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 1px var(--space-2);
      border-radius: var(--radius-pill);
      font-size: var(--text-xs);
      font-weight: 500;
      font-family: var(--font-mono);
    }

    .badge-emerald {
      background: var(--success-subtle);
      color: var(--success-fg);
    }

    .badge-violet {
      background: rgba(167, 139, 250, 0.1);
      color: var(--done-fg);
    }

    .badge-neutral {
      background: rgba(125, 133, 144, 0.15);
      color: var(--color-fg-muted);
    }

    .card-row-2 {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .card-meta {
      font-size: var(--text-sm);
      color: var(--color-fg-muted);
    }

    .card-time {
      font-size: var(--text-xs);
      color: var(--color-fg-subtle);
    }

    /* ======================================================================
       BOTTOM PROGRESS PANEL
       ====================================================================== */
    .progress-panel {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-4) var(--space-8);
      background: rgba(22, 27, 34, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      min-width: 320px;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .progress-panel.visible { opacity: 1; }

    .progress-panel .phase-text {
      font-size: var(--text-sm);
      color: var(--color-fg-muted);
      text-align: center;
    }

    .panel-bar-track {
      width: 100%;
      height: 4px;
      background: var(--color-border-muted);
      border-radius: 2px;
      overflow: hidden;
    }

    .panel-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent-emphasis), var(--accent-fg));
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .panel-stats {
      display: flex;
      gap: var(--space-6);
      font-size: var(--text-sm);
      font-family: var(--font-mono);
    }

    .panel-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .panel-stat-value {
      font-size: var(--text-md);
      font-weight: 600;
      color: var(--color-fg);
      font-variant-numeric: tabular-nums;
    }

    .panel-stat-label {
      font-size: var(--text-xs);
      color: var(--color-fg-subtle);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* === Stats area inside mock homepage === */
    .mock-stats-bar {
      display: flex;
      gap: var(--space-4);
      margin-bottom: var(--space-5);
    }

    .mock-stat-card {
      flex: 1;
      padding: var(--space-3) var(--space-4);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-canvas-subtle);
      text-align: center;
    }

    .mock-stat-card .value {
      font-family: var(--font-mono);
      font-size: var(--text-xl);
      font-weight: 600;
      color: var(--color-fg);
    }

    .mock-stat-card .label {
      font-size: var(--text-xs);
      color: var(--color-fg-muted);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <!-- Top progress bar -->
  <div class="progress-bar-track">
    <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
  </div>

  <!-- Darkness overlay (phase 1 solid black; fades out) -->
  <div class="darkness-layer" id="darknessLayer"></div>

  <!-- Flash overlay for reveal moment -->
  <div class="flash-overlay" id="flashOverlay"></div>

  <!-- Shimmer wave overlay -->
  <div class="shimmer-overlay" id="shimmerOverlay"></div>

  <!-- Convergence ring -->
  <div class="convergence-ring" id="convergenceRing"></div>

  <!-- Center logo overlay (phase 1) -->
  <div class="logo-overlay" id="logoOverlay">
    <div id="logoCenter"></div>
    <div class="preparing-text">Preparing TracePilot…</div>
  </div>

  <!-- Homepage layer (revealed by spotlight mask) -->
  <div class="homepage-layer" id="homepageLayer">
    <div class="mock-homepage">
      <!-- Header -->
      <div class="mock-header">
        <div class="mock-header-left">
          <div id="headerLogo"></div>
          <span>TracePilot</span>
        </div>
        <div class="mock-search">
          <span style="margin-right:6px">🔍</span> Search sessions, repos, tools…
        </div>
        <div class="mock-header-right">⚙</div>
      </div>

      <!-- Body -->
      <div class="mock-body">
        <!-- Sidebar -->
        <div class="mock-sidebar" id="sidebarZone">
          <div class="sidebar-nav-item active">
            <span class="nav-icon">📋</span> Sessions
          </div>
          <div class="sidebar-nav-item">
            <span class="nav-icon">📊</span> Analytics
          </div>
          <div class="sidebar-nav-item">
            <span class="nav-icon">⏱</span> Timeline
          </div>
          <div class="sidebar-nav-item">
            <span class="nav-icon">🔧</span> Tools
          </div>
          <div class="sidebar-nav-item">
            <span class="nav-icon">💻</span> Code
          </div>
          <div class="sidebar-nav-item">
            <span class="nav-icon">⚙</span> Settings
          </div>
        </div>

        <!-- Main content -->
        <div class="mock-main">
          <!-- Stats bar -->
          <div class="mock-stats-bar" id="statsZone">
            <div class="mock-stat-card">
              <div class="value" id="statSessions">0</div>
              <div class="label">Sessions</div>
            </div>
            <div class="mock-stat-card">
              <div class="value" id="statTokens">0</div>
              <div class="label">Tokens</div>
            </div>
            <div class="mock-stat-card">
              <div class="value" id="statEvents">0</div>
              <div class="label">Events</div>
            </div>
            <div class="mock-stat-card">
              <div class="value" id="statTools">0</div>
              <div class="label">Tool Calls</div>
            </div>
          </div>

          <!-- Session list heading -->
          <div class="main-heading">
            <h2>Your Sessions</h2>
            <span class="session-count-badge" id="sessionBadge">0</span>
          </div>

          <!-- Session cards grid -->
          <div class="session-grid" id="sessionGrid">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom progress panel (always illuminated by secondary spotlight) -->
  <div class="progress-panel" id="progressPanel">
    <div class="phase-text" id="panelPhase">Preparing…</div>
    <div class="panel-bar-track">
      <div class="panel-bar-fill" id="panelBarFill"></div>
    </div>
    <div class="panel-stats">
      <div class="panel-stat">
        <span class="panel-stat-value" id="panelSessions">0 / 0</span>
        <span class="panel-stat-label">Sessions</span>
      </div>
      <div class="panel-stat">
        <span class="panel-stat-value" id="panelTokens">0</span>
        <span class="panel-stat-label">Tokens</span>
      </div>
    </div>
  </div>

  <script src="mock-data.js"></script>
  <script>
    /* ==================================================================
       PROTOTYPE I: SPOTLIGHT REVEAL
       ================================================================== */

    // --- Inject logos ---
    document.getElementById('logoCenter').innerHTML = `<div class="logo-svg">${TRACEPILOT_LOGO_SVG}</div>`;
    document.getElementById('headerLogo').innerHTML = `<div class="logo-svg" style="width:24px;height:24px">${TRACEPILOT_LOGO_SVG}</div>`;

    // --- Populate session cards ---
    const CARD_DATA = [
      { repo: 'frontend-app', branch: 'main', model: 'claude-sonnet-4', host: 'Cursor', turns: 24, tokens: 45230, time: '2 hours ago' },
      { repo: 'api-server', branch: 'feat/auth', model: 'gpt-4.1', host: 'VS Code', turns: 38, tokens: 112400, time: '4 hours ago' },
      { repo: 'ml-pipeline', branch: 'develop', model: 'claude-sonnet-4', host: 'Windsurf', turns: 15, tokens: 28900, time: '6 hours ago' },
      { repo: 'docs-site', branch: 'main', model: 'gemini-2.5-pro', host: 'Cursor', turns: 52, tokens: 198000, time: '1 day ago' },
      { repo: 'infra-config', branch: 'hotfix/dns', model: 'gpt-4.1', host: 'VS Code', turns: 11, tokens: 15600, time: '1 day ago' },
      { repo: 'mobile-app', branch: 'feat/nav', model: 'claude-sonnet-4', host: 'Cursor', turns: 29, tokens: 67300, time: '2 days ago' },
    ];

    const grid = document.getElementById('sessionGrid');
    CARD_DATA.forEach(c => {
      const card = document.createElement('div');
      card.className = 'session-card';
      card.innerHTML = `
        <div class="card-row-1">
          <span class="card-repo">${c.repo}</span>
          <span class="badge badge-emerald">${c.branch}</span>
        </div>
        <div class="card-row-2">
          <span class="badge badge-violet">${c.model}</span>
          <span class="badge badge-neutral">${c.host}</span>
        </div>
        <div class="card-meta">${c.turns} turns · ${formatTokens(c.tokens)} tokens</div>
        <div class="card-time">${c.time}</div>
      `;
      grid.appendChild(card);
    });

    // --- References ---
    const homepageLayer = document.getElementById('homepageLayer');
    const darknessLayer = document.getElementById('darknessLayer');
    const logoOverlay = document.getElementById('logoOverlay');
    const flashOverlay = document.getElementById('flashOverlay');
    const shimmerOverlay = document.getElementById('shimmerOverlay');
    const convergenceRing = document.getElementById('convergenceRing');
    const progressBar = document.getElementById('progressBar');
    const progressPanel = document.getElementById('progressPanel');
    const panelPhase = document.getElementById('panelPhase');
    const panelBarFill = document.getElementById('panelBarFill');
    const panelSessions = document.getElementById('panelSessions');
    const panelTokensEl = document.getElementById('panelTokens');

    // Mock homepage stat counters
    const statSessionsEl = document.getElementById('statSessions');
    const statTokensEl = document.getElementById('statTokens');
    const statEventsEl = document.getElementById('statEvents');
    const statToolsEl = document.getElementById('statTools');
    const sessionBadge = document.getElementById('sessionBadge');

    // --- AnimatedCounters for the mock homepage stats ---
    const ctrSessions = new AnimatedCounter(statSessionsEl, { speed: 0.06 });
    const ctrTokens = new AnimatedCounter(statTokensEl, { format: formatTokens, speed: 0.06 });
    const ctrEvents = new AnimatedCounter(statEventsEl, { format: n => n.toLocaleString(), speed: 0.06 });
    const ctrTools = new AnimatedCounter(statToolsEl, { format: n => n.toLocaleString(), speed: 0.06 });
    const ctrPanelTokens = new AnimatedCounter(panelTokensEl, { format: formatTokens, speed: 0.08 });

    // --- Phase labels ---
    const PHASE_LABELS = {
      idle:        'Preparing…',
      discovering: 'Discovering sessions…',
      indexing:    'Indexing sessions…',
      finalizing:  'Finalizing analysis…',
      complete:    'Ready!'
    };

    /* ==================================================================
       SPOTLIGHT ENGINE
       ================================================================== */

    // Bezier waypoints for the wandering spotlight (normalized 0-1 coords)
    const SPOTLIGHT_PATH = [
      { x: 0.50, y: 0.50 },  // center start
      { x: 0.70, y: 0.25 },  // upper-right (stats area)
      { x: 0.55, y: 0.50 },  // center-right (cards)
      { x: 0.30, y: 0.35 },  // mid-left (sidebar area)
      { x: 0.12, y: 0.45 },  // far left (sidebar)
      { x: 0.35, y: 0.65 },  // lower-center (more cards)
      { x: 0.65, y: 0.70 },  // lower-right (chart area)
      { x: 0.75, y: 0.45 },  // right (cards)
      { x: 0.50, y: 0.30 },  // upper-center (stats)
      { x: 0.50, y: 0.50 },  // return to center
    ];

    // Afterglow zone definitions (relative to viewport)
    const AFTERGLOW_ZONES = [
      { id: 'ag-stats',   x: 0.55, y: 0.18, size: 400 },
      { id: 'ag-sidebar', x: 0.08, y: 0.45, size: 350 },
      { id: 'ag-cards1',  x: 0.50, y: 0.50, size: 450 },
      { id: 'ag-cards2',  x: 0.55, y: 0.70, size: 400 },
      { id: 'ag-header',  x: 0.40, y: 0.04, size: 500 },
    ];

    // Create afterglow DOM elements
    const afterglows = [];
    AFTERGLOW_ZONES.forEach(z => {
      const el = document.createElement('div');
      el.className = 'afterglow-zone';
      el.id = z.id;
      el.style.width = z.size + 'px';
      el.style.height = z.size + 'px';
      el.style.left = `calc(${z.x * 100}% - ${z.size / 2}px)`;
      el.style.top = `calc(${z.y * 100}% - ${z.size / 2}px)`;
      homepageLayer.appendChild(el);
      afterglows.push({ el, x: z.x, y: z.y, timer: null });
    });

    // Catmull-Rom spline interpolation for smooth path
    function catmullRom(p0, p1, p2, p3, t) {
      const t2 = t * t, t3 = t2 * t;
      return 0.5 * (
        (2 * p1) +
        (-p0 + p2) * t +
        (2 * p0 - 5 * p1 + 4 * p2 - p3) * t2 +
        (-p0 + 3 * p1 - 3 * p2 + p3) * t3
      );
    }

    function getSpotlightPos(progress) {
      // progress: 0-1 along the path
      const n = SPOTLIGHT_PATH.length;
      const totalSegments = n - 1;
      const scaledT = progress * totalSegments;
      const segment = Math.min(Math.floor(scaledT), totalSegments - 1);
      const localT = scaledT - segment;

      const p0 = SPOTLIGHT_PATH[Math.max(segment - 1, 0)];
      const p1 = SPOTLIGHT_PATH[segment];
      const p2 = SPOTLIGHT_PATH[Math.min(segment + 1, n - 1)];
      const p3 = SPOTLIGHT_PATH[Math.min(segment + 2, n - 1)];

      return {
        x: catmullRom(p0.x, p1.x, p2.x, p3.x, localT),
        y: catmullRom(p0.y, p1.y, p2.y, p3.y, localT)
      };
    }

    function checkAfterglows(spotX, spotY) {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const sx = spotX / vw;
      const sy = spotY / vh;

      afterglows.forEach(ag => {
        const dist = Math.hypot(ag.x - sx, ag.y - sy);
        if (dist < 0.18) {
          ag.el.classList.add('active');
          clearTimeout(ag.timer);
          ag.timer = setTimeout(() => {
            if (!isConverging) ag.el.classList.remove('active');
          }, 2500);
        }
      });
    }

    /* ==================================================================
       STATE
       ================================================================== */
    let sim = null;
    let spotAnimFrame = null;
    let currentPhase = 'idle';
    let simProgress = 0;
    let totalSessions = 20;
    let isConverging = false;
    let isRevealed = false;

    /* ==================================================================
       SIMULATION WIRING
       ================================================================== */

    function resetUI() {
      cancelAnimationFrame(spotAnimFrame);
      isConverging = false;
      isRevealed = false;
      simProgress = 0;

      // Reset darkness & overlays
      darknessLayer.style.opacity = '1';
      darknessLayer.style.transition = '';
      logoOverlay.classList.remove('hidden');
      logoOverlay.style.display = '';
      flashOverlay.classList.remove('flash');
      shimmerOverlay.classList.remove('active');
      convergenceRing.classList.remove('active', 'expand');
      convergenceRing.style.width = '';
      convergenceRing.style.height = '';

      // Reset spotlight mask
      homepageLayer.classList.remove('fully-revealed');
      homepageLayer.style.setProperty('--spot-x', '50%');
      homepageLayer.style.setProperty('--spot-y', '50%');
      homepageLayer.style.setProperty('--spot-r', '250px');
      homepageLayer.style.setProperty('--spot2-opacity', '0');

      // Reset progress elements
      progressBar.style.width = '0%';
      panelBarFill.style.width = '0%';
      progressPanel.classList.remove('visible');
      panelPhase.textContent = 'Preparing…';
      panelPhase.style.color = '';
      panelSessions.textContent = '0 / 0';

      // Reset counters
      ctrSessions.set(0);
      ctrTokens.set(0);
      ctrEvents.set(0);
      ctrTools.set(0);
      ctrPanelTokens.set(0);
      sessionBadge.textContent = '0';

      // Reset afterglows
      afterglows.forEach(ag => {
        ag.el.classList.remove('active', 'intensify');
        clearTimeout(ag.timer);
      });
    }

    function startSimulation(durationSec, sessionCount) {
      if (sim) sim.stop();
      resetUI();
      totalSessions = sessionCount;

      sim = new LoadingSimulator({
        totalSessions: sessionCount,
        durationMs: durationSec * 1000,

        onProgress(fraction, phase) {
          simProgress = fraction;
          const pct = Math.min(fraction * 100, 100);
          progressBar.style.width = pct + '%';
          panelBarFill.style.width = pct + '%';
        },

        onPhaseChange(phase) {
          currentPhase = phase;
          panelPhase.textContent = PHASE_LABELS[phase] || phase;

          if (phase === 'discovering') {
            // Phase 1: fade darkness to allow spotlight through
            darknessLayer.style.transition = 'opacity 1.2s ease';
            darknessLayer.style.opacity = '0';
            progressPanel.classList.add('visible');
            homepageLayer.style.setProperty('--spot2-opacity', '0.7');
          }

          if (phase === 'indexing') {
            // Phase 2: hide center logo, start wandering
            logoOverlay.classList.add('hidden');
            setTimeout(() => { logoOverlay.style.display = 'none'; }, 800);
            startSpotlightWander();
          }

          if (phase === 'finalizing') {
            // Phase 3: convergence
            triggerConvergence();
          }

          if (phase === 'complete') {
            panelPhase.textContent = 'Ready!';
            panelPhase.style.color = 'var(--success-fg)';
            triggerFullReveal();
          }
        },

        onSessionProcessed({ current, total, session }) {
          panelSessions.textContent = `${current} / ${total}`;
          sessionBadge.textContent = current;
        },

        onStatsUpdate(stats) {
          ctrSessions.set(stats.sessionsProcessed);
          ctrTokens.set(stats.totalTokens);
          ctrEvents.set(stats.totalEvents);
          ctrTools.set(stats.totalToolCalls);
          ctrPanelTokens.set(stats.totalTokens);
        },

        onComplete(stats) {
          // Handled in onPhaseChange('complete')
        }
      });

      sim.start();
    }

    /* ==================================================================
       SPOTLIGHT ANIMATION
       ================================================================== */

    function startSpotlightWander() {
      const startTime = performance.now();

      function animate(now) {
        if (isRevealed) return;

        // Map indexing progress (0.08 - 0.90 range) to path progress (0 - 1)
        const indexFraction = Math.max(0, Math.min(1, (simProgress - 0.08) / 0.82));
        const pathProgress = Math.min(indexFraction, 1);

        const pos = getSpotlightPos(pathProgress);
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const spotX = pos.x * vw;
        const spotY = pos.y * vh;

        // Scale spotlight size based on progress
        let spotRadius = 250;
        if (isConverging) {
          // Phase 3: grow the spotlight as it returns to center
          const convergeFrac = Math.max(0, (simProgress - 0.85) / 0.10);
          spotRadius = 250 + convergeFrac * 500;
        }

        homepageLayer.style.setProperty('--spot-x', spotX + 'px');
        homepageLayer.style.setProperty('--spot-y', spotY + 'px');
        homepageLayer.style.setProperty('--spot-r', spotRadius + 'px');

        // Check afterglows
        checkAfterglows(spotX, spotY);

        spotAnimFrame = requestAnimationFrame(animate);
      }

      spotAnimFrame = requestAnimationFrame(animate);
    }

    /* ==================================================================
       PHASE 3: CONVERGENCE
       ================================================================== */

    function triggerConvergence() {
      isConverging = true;

      // Intensify all afterglows
      afterglows.forEach(ag => {
        ag.el.classList.add('active', 'intensify');
        clearTimeout(ag.timer);
      });

      // Show expanding ring
      convergenceRing.classList.add('active');
    }

    /* ==================================================================
       PHASE 4: FULL REVEAL
       ================================================================== */

    function triggerFullReveal() {
      isRevealed = true;
      cancelAnimationFrame(spotAnimFrame);

      // Rapidly expand spotlight to cover entire screen
      const maxDim = Math.max(window.innerWidth, window.innerHeight) * 1.5;
      homepageLayer.style.setProperty('--spot-x', '50%');
      homepageLayer.style.setProperty('--spot-y', '50%');
      homepageLayer.style.setProperty('--spot-r', maxDim + 'px');
      homepageLayer.style.setProperty('--spot2-opacity', '1');

      // Expand convergence ring
      convergenceRing.classList.remove('active');
      convergenceRing.classList.add('expand');

      // Flash
      setTimeout(() => {
        flashOverlay.classList.add('flash');
        setTimeout(() => flashOverlay.classList.remove('flash'), 200);
      }, 150);

      // Remove mask entirely after transition
      setTimeout(() => {
        homepageLayer.classList.add('fully-revealed');
      }, 400);

      // Shimmer wave
      setTimeout(() => {
        shimmerOverlay.classList.add('active');
      }, 500);

      // Fade out progress panel
      setTimeout(() => {
        progressPanel.style.transition = 'opacity 0.8s ease';
        progressPanel.style.opacity = '0';
      }, 600);

      // Clean up afterglow overlays
      setTimeout(() => {
        afterglows.forEach(ag => {
          ag.el.style.transition = 'opacity 0.6s ease';
          ag.el.style.opacity = '0';
        });
      }, 800);
    }

    /* ==================================================================
       DEMO CONTROLS
       ================================================================== */

    createDemoControls(document.body, {
      defaultDuration: 12,
      onStart(duration, sessions) {
        startSimulation(duration, sessions);
      },
      onReset() {
        if (sim) sim.stop();
        resetUI();
      }
    });
  </script>
</body>
