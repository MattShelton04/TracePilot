<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — Prototype E: Timeline Builder</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    /* === Layout === */
    .loading-screen {
      justify-content: flex-start;
      padding-top: 40px;
      gap: 0;
    }

    /* === Header === */
    .header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-4) var(--space-6);
      width: 100%;
      max-width: 960px;
    }

    .header .logo-svg {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
    }

    .header-title {
      font-size: var(--text-md);
      font-weight: 600;
      color: var(--color-fg);
    }

    .header-sep {
      color: var(--color-fg-subtle);
      font-size: var(--text-md);
    }

    .header-phase {
      font-size: var(--text-sm);
      color: var(--color-fg-muted);
      transition: color 0.3s;
    }

    .header-phase.active {
      color: var(--accent-fg);
    }

    /* === Aggregate Bar === */
    .aggregate-bar {
      width: 100%;
      max-width: 960px;
      padding: 0 var(--space-6);
      margin-bottom: var(--space-3);
    }

    .aggregate-label {
      font-size: var(--text-xs);
      color: var(--color-fg-subtle);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: var(--space-1);
      font-family: var(--font-mono);
    }

    .aggregate-track {
      height: 14px;
      background: var(--color-canvas-subtle);
      border: 1px solid var(--color-border-muted);
      border-radius: var(--radius-sm);
      overflow: hidden;
      display: flex;
      position: relative;
    }

    .aggregate-segment {
      height: 100%;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      min-width: 0;
    }

    .aggregate-segment.read    { background: var(--accent-emphasis); }
    .aggregate-segment.write   { background: var(--success-emphasis); }
    .aggregate-segment.terminal { background: var(--warning-emphasis); }
    .aggregate-segment.search  { background: var(--done-emphasis); }
    .aggregate-segment.web     { background: #0ea5e9; }

    .aggregate-legend {
      display: flex;
      gap: var(--space-4);
      margin-top: var(--space-1);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: var(--text-xs);
      color: var(--color-fg-subtle);
      font-family: var(--font-mono);
    }

    .legend-dot {
      width: 7px;
      height: 7px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* === Waterfall Container === */
    .waterfall-container {
      width: 100%;
      max-width: 960px;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 0 var(--space-6);
      margin-top: var(--space-2);
    }

    .waterfall-header {
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--color-border-muted);
      padding-bottom: var(--space-1);
      margin-bottom: var(--space-1);
    }

    .waterfall-header-label {
      width: 200px;
      flex-shrink: 0;
      font-size: var(--text-xs);
      color: var(--color-fg-subtle);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-family: var(--font-mono);
    }

    .waterfall-header-timeline {
      flex: 1;
      display: flex;
      justify-content: space-between;
      font-size: var(--text-xs);
      color: var(--color-fg-subtle);
      font-family: var(--font-mono);
    }

    .waterfall-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      min-height: 0;
      scroll-behavior: smooth;
      /* Hide scrollbar for cleaner look but keep functionality */
      scrollbar-width: thin;
      scrollbar-color: var(--color-border) transparent;
    }

    .waterfall-scroll::-webkit-scrollbar {
      width: 4px;
    }

    .waterfall-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .waterfall-scroll::-webkit-scrollbar-thumb {
      background: var(--color-border);
      border-radius: 2px;
    }

    .waterfall-rows {
      display: flex;
      flex-direction: column;
    }

    /* === Waterfall Row === */
    .waterfall-row {
      display: flex;
      align-items: center;
      height: 28px;
      padding: 0;
      opacity: 0;
      transform: translateX(40px);
      animation: rowSlideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      border-bottom: 1px solid transparent;
    }

    .waterfall-row:nth-child(odd) {
      background: var(--color-canvas-subtle);
    }

    .waterfall-row:nth-child(even) {
      background: var(--color-canvas);
    }

    @keyframes rowSlideIn {
      0%   { opacity: 0; transform: translateX(40px); }
      100% { opacity: 1; transform: translateX(0); }
    }

    .row-label {
      width: 200px;
      flex-shrink: 0;
      padding: 0 var(--space-2);
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-fg-muted);
      overflow: hidden;
      white-space: nowrap;
      position: relative;
    }

    .row-label-text {
      display: inline;
    }

    .row-label .typing-cursor {
      display: inline-block;
      width: 1px;
      height: 12px;
      background: var(--accent-fg);
      margin-left: 1px;
      vertical-align: middle;
      animation: cursorBlink 0.6s step-end infinite;
    }

    @keyframes cursorBlink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0; }
    }

    .row-label.highlight {
      animation: labelFlash 0.6s ease-out;
    }

    @keyframes labelFlash {
      0%   { background: var(--accent-muted); }
      100% { background: transparent; }
    }

    .row-bars {
      flex: 1;
      height: 100%;
      position: relative;
      display: flex;
      align-items: center;
      padding: 0 var(--space-2);
      gap: 3px;
    }

    /* === Tool Call Bar === */
    .tool-bar {
      height: 16px;
      border-radius: 2px;
      position: relative;
      opacity: 0;
      transform: scaleX(0);
      transform-origin: left center;
      animation: barGrow 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      cursor: default;
      transition: filter 0.15s;
    }

    .tool-bar:hover {
      filter: brightness(1.3);
    }

    .tool-bar::after {
      content: attr(data-tool);
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      font-family: var(--font-mono);
      color: var(--color-fg-muted);
      background: var(--color-canvas-subtle);
      border: 1px solid var(--color-border);
      padding: 1px 4px;
      border-radius: 3px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      z-index: 10;
    }

    .tool-bar:hover::after {
      opacity: 1;
    }

    @keyframes barGrow {
      0%   { opacity: 0; transform: scaleX(0); }
      60%  { opacity: 1; }
      100% { opacity: 1; transform: scaleX(1); }
    }

    .tool-bar.read     { background: linear-gradient(90deg, var(--accent-emphasis), var(--accent-fg)); }
    .tool-bar.write    { background: linear-gradient(90deg, var(--success-emphasis), var(--success-fg)); }
    .tool-bar.terminal { background: linear-gradient(90deg, var(--warning-emphasis), var(--warning-fg)); }
    .tool-bar.search   { background: linear-gradient(90deg, var(--done-emphasis), var(--done-fg)); }
    .tool-bar.web      { background: linear-gradient(90deg, #0284c7, #38bdf8); }

    /* === Bottom Stats === */
    .stats-bar {
      width: 100%;
      max-width: 960px;
      display: flex;
      justify-content: center;
      gap: var(--space-8);
      padding: var(--space-4) var(--space-6);
      border-top: 1px solid var(--color-border-muted);
      margin-top: var(--space-2);
    }

    .stat-item {
      display: flex;
      align-items: baseline;
      gap: var(--space-2);
    }

    .stat-item .stat-value {
      font-family: var(--font-mono);
      font-size: var(--text-lg);
      font-weight: 600;
      color: var(--color-fg);
      font-variant-numeric: tabular-nums;
    }

    .stat-item .stat-label {
      font-size: var(--text-xs);
      color: var(--color-fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 0;
    }

    /* === Empty State === */
    .waterfall-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-fg-subtle);
      font-size: var(--text-sm);
      font-family: var(--font-mono);
    }

    .waterfall-empty .dot-pulse {
      display: inline-flex;
      gap: 3px;
      margin-left: var(--space-2);
    }

    .waterfall-empty .dot-pulse span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--color-fg-subtle);
      animation: dotBounce 1.2s ease-in-out infinite;
    }

    .waterfall-empty .dot-pulse span:nth-child(2) { animation-delay: 0.15s; }
    .waterfall-empty .dot-pulse span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes dotBounce {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1.2); }
    }

    /* === Completion === */
    .waterfall-row.complete .tool-bar {
      animation: barPulse 0.6s ease-in-out;
    }

    @keyframes barPulse {
      0%, 100% { filter: brightness(1); }
      50%      { filter: brightness(1.6); }
    }

    .loading-screen.fade-out {
      animation: screenFadeOut 0.8s ease-in forwards;
    }

    @keyframes screenFadeOut {
      0%   { opacity: 1; }
      100% { opacity: 0; transform: scale(1.02); }
    }

    /* Responsive: keep waterfall usable at smaller widths */
    @media (max-width: 700px) {
      .row-label { width: 120px; }
      .waterfall-header-label { width: 120px; }
      .stats-bar { gap: var(--space-4); }
    }
  </style>
</head>
<body>
  <div class="loading-screen" id="loading-screen">
    <!-- Thin progress bar -->
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progress-fill" style="width: 0%"></div>
    </div>

    <!-- Header: Logo + phase -->
    <div class="header">
      <div class="logo-svg" id="logo-mount"></div>
      <span class="header-title">TracePilot</span>
      <span class="header-sep">·</span>
      <span class="header-phase active" id="phase-text">Preparing…</span>
    </div>

    <!-- Aggregate stacked bar -->
    <div class="aggregate-bar">
      <div class="aggregate-label">Tool call distribution</div>
      <div class="aggregate-track" id="aggregate-track">
        <div class="aggregate-segment read"    id="agg-read"     style="width:0%"></div>
        <div class="aggregate-segment write"   id="agg-write"    style="width:0%"></div>
        <div class="aggregate-segment terminal" id="agg-terminal" style="width:0%"></div>
        <div class="aggregate-segment search"  id="agg-search"   style="width:0%"></div>
        <div class="aggregate-segment web"     id="agg-web"      style="width:0%"></div>
      </div>
      <div class="aggregate-legend">
        <span class="legend-item"><span class="legend-dot" style="background:var(--accent-emphasis)"></span>Read</span>
        <span class="legend-item"><span class="legend-dot" style="background:var(--success-emphasis)"></span>Write</span>
        <span class="legend-item"><span class="legend-dot" style="background:var(--warning-emphasis)"></span>Terminal</span>
        <span class="legend-item"><span class="legend-dot" style="background:var(--done-emphasis)"></span>Search</span>
        <span class="legend-item"><span class="legend-dot" style="background:#0ea5e9"></span>Web</span>
      </div>
    </div>

    <!-- Waterfall chart -->
    <div class="waterfall-container">
      <div class="waterfall-header">
        <div class="waterfall-header-label">Session</div>
        <div class="waterfall-header-timeline">
          <span>0 s</span><span>5 s</span><span>10 s</span><span>15 s</span><span>20 s</span>
        </div>
      </div>
      <div class="waterfall-scroll" id="waterfall-scroll">
        <div class="waterfall-rows" id="waterfall-rows"></div>
        <div class="waterfall-empty" id="waterfall-empty">
          Waiting for sessions<div class="dot-pulse"><span></span><span></span><span></span></div>
        </div>
      </div>
    </div>

    <!-- Bottom stats -->
    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-value" id="stat-sessions">0</span>
        <span class="stat-label">Sessions</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-tokens">0</span>
        <span class="stat-label">Tokens</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-events">0</span>
        <span class="stat-label">Events</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-tools">0</span>
        <span class="stat-label">Tool Calls</span>
      </div>
    </div>
  </div>

  <script src="mock-data.js"></script>
  <script>
    // ============================================================
    // DOM references
    // ============================================================
    const $screen       = document.getElementById('loading-screen');
    const $progressFill = document.getElementById('progress-fill');
    const $phaseText    = document.getElementById('phase-text');
    const $logoMount    = document.getElementById('logo-mount');
    const $waterfallRows   = document.getElementById('waterfall-rows');
    const $waterfallScroll = document.getElementById('waterfall-scroll');
    const $waterfallEmpty  = document.getElementById('waterfall-empty');

    // Aggregate segments
    const $aggRead     = document.getElementById('agg-read');
    const $aggWrite    = document.getElementById('agg-write');
    const $aggTerminal = document.getElementById('agg-terminal');
    const $aggSearch   = document.getElementById('agg-search');
    const $aggWeb      = document.getElementById('agg-web');

    // Mount logo
    $logoMount.innerHTML = TRACEPILOT_LOGO_SVG;

    // ============================================================
    // Animated counters
    // ============================================================
    const counters = {
      sessions: new AnimatedCounter(document.getElementById('stat-sessions')),
      tokens:   new AnimatedCounter(document.getElementById('stat-tokens'), { format: formatTokens }),
      events:   new AnimatedCounter(document.getElementById('stat-events'), { format: n => n >= 1000 ? (n / 1000).toFixed(1) + 'K' : n.toLocaleString() }),
      tools:    new AnimatedCounter(document.getElementById('stat-tools'),  { format: n => n.toLocaleString() }),
    };

    // ============================================================
    // Tool classification helpers
    // ============================================================
    const TOOL_CATEGORIES = {
      read:     ['read_file', 'list_directory'],
      write:    ['edit_file', 'create_file'],
      terminal: ['run_terminal_command'],
      search:   ['grep_search', 'file_search', 'semantic_search', 'code_analysis'],
      web:      ['web_search'],
    };

    function classifyTool(toolName) {
      for (const [cat, tools] of Object.entries(TOOL_CATEGORIES)) {
        if (tools.includes(toolName)) return cat;
      }
      // Fallback: map remaining tools to categories by heuristic
      if (toolName.includes('git'))  return 'terminal';
      if (toolName.includes('test')) return 'terminal';
      if (toolName.includes('search')) return 'search';
      return 'read';
    }

    function pickRandomTools(count) {
      const tools = [];
      for (let i = 0; i < count; i++) {
        tools.push(MOCK_TOOL_NAMES[Math.floor(Math.random() * MOCK_TOOL_NAMES.length)]);
      }
      return tools;
    }

    // ============================================================
    // Aggregate tracking
    // ============================================================
    const aggCounts = { read: 0, write: 0, terminal: 0, search: 0, web: 0 };

    function updateAggregate(tools) {
      tools.forEach(t => {
        const cat = classifyTool(t);
        aggCounts[cat]++;
      });
      const total = Object.values(aggCounts).reduce((a, b) => a + b, 0) || 1;
      $aggRead.style.width     = (aggCounts.read     / total * 100) + '%';
      $aggWrite.style.width    = (aggCounts.write    / total * 100) + '%';
      $aggTerminal.style.width = (aggCounts.terminal / total * 100) + '%';
      $aggSearch.style.width   = (aggCounts.search   / total * 100) + '%';
      $aggWeb.style.width      = (aggCounts.web      / total * 100) + '%';
    }

    // ============================================================
    // Typewriter effect for session labels
    // ============================================================
    function typeLabel(textEl, cursorEl, text, callback) {
      let i = 0;
      const truncated = text.length > 25 ? text.slice(0, 24) + '…' : text;
      cursorEl.style.display = 'inline-block';

      function tick() {
        if (i <= truncated.length) {
          textEl.textContent = truncated.slice(0, i);
          i++;
          setTimeout(tick, 12 + Math.random() * 18);
        } else {
          // Remove cursor after brief pause
          setTimeout(() => {
            cursorEl.style.display = 'none';
            if (callback) callback();
          }, 250);
        }
      }
      tick();
    }

    // ============================================================
    // Build a waterfall row
    // ============================================================
    function addWaterfallRow(session) {
      // Hide empty state
      $waterfallEmpty.style.display = 'none';

      const row = document.createElement('div');
      row.className = 'waterfall-row';

      // Label
      const label = document.createElement('div');
      label.className = 'row-label highlight';
      const labelText = document.createElement('span');
      labelText.className = 'row-label-text';
      const cursor = document.createElement('span');
      cursor.className = 'typing-cursor';
      cursor.style.display = 'none';
      label.appendChild(labelText);
      label.appendChild(cursor);

      // Bars container
      const barsContainer = document.createElement('div');
      barsContainer.className = 'row-bars';

      row.appendChild(label);
      row.appendChild(barsContainer);
      $waterfallRows.appendChild(row);

      // Auto-scroll to bottom
      requestAnimationFrame(() => {
        $waterfallScroll.scrollTop = $waterfallScroll.scrollHeight;
      });

      // Type in the label
      const labelStr = `${session.repo}/${session.branch}`;
      typeLabel(labelText, cursor, labelStr, () => {
        label.classList.remove('highlight');
      });

      // Generate random tool bars for this session
      const barCount = 3 + Math.floor(Math.random() * 6); // 3-8 bars
      const tools = pickRandomTools(barCount);
      updateAggregate(tools);

      // Stagger bar animations
      tools.forEach((toolName, i) => {
        const bar = document.createElement('div');
        const cat = classifyTool(toolName);
        bar.className = `tool-bar ${cat}`;
        bar.setAttribute('data-tool', toolName);

        // Vary widths: short (20-40px), medium (40-80px), long (80-140px)
        const widthRoll = Math.random();
        let width;
        if (widthRoll < 0.35) width = 20 + Math.random() * 20;       // short
        else if (widthRoll < 0.75) width = 40 + Math.random() * 40;  // medium
        else width = 80 + Math.random() * 60;                         // long
        bar.style.width = width + 'px';

        // Stagger each bar's animation
        bar.style.animationDelay = (i * 0.07 + 0.1) + 's';

        barsContainer.appendChild(bar);
      });

      return row;
    }

    // ============================================================
    // Phase text mapping
    // ============================================================
    const PHASE_LABELS = {
      idle:         'Preparing…',
      discovering:  'Discovering sessions…',
      indexing:     'Indexing sessions',
      finalizing:   'Building timeline…',
      complete:     'Ready',
    };

    // ============================================================
    // Simulator setup
    // ============================================================
    let simulator = null;
    let allRows = [];

    function resetUI() {
      $progressFill.style.width = '0%';
      $phaseText.textContent = PHASE_LABELS.idle;
      $phaseText.classList.add('active');
      $waterfallRows.innerHTML = '';
      $waterfallEmpty.style.display = 'flex';
      $screen.classList.remove('fade-out');
      allRows = [];

      // Reset aggregate
      aggCounts.read = aggCounts.write = aggCounts.terminal = aggCounts.search = aggCounts.web = 0;
      $aggRead.style.width = $aggWrite.style.width = $aggTerminal.style.width = $aggSearch.style.width = $aggWeb.style.width = '0%';

      // Reset counters
      counters.sessions.set(0);
      counters.tokens.set(0);
      counters.events.set(0);
      counters.tools.set(0);
    }

    function startSimulation(durationSec, sessionCount) {
      if (simulator) simulator.stop();
      resetUI();

      simulator = new LoadingSimulator({
        totalSessions: sessionCount,
        durationMs: durationSec * 1000,

        onProgress(progress) {
          $progressFill.style.width = (progress * 100) + '%';
        },

        onPhaseChange(phase) {
          $phaseText.textContent = PHASE_LABELS[phase] || phase;
          $phaseText.classList.toggle('active', phase === 'indexing' || phase === 'discovering');
        },

        onSessionProcessed({ current, total, session }) {
          const row = addWaterfallRow(session);
          allRows.push(row);
        },

        onStatsUpdate(stats) {
          counters.sessions.set(stats.sessionsProcessed);
          counters.tokens.set(stats.totalTokens);
          counters.events.set(stats.totalEvents);
          counters.tools.set(stats.totalToolCalls);
        },

        onComplete() {
          // Brief pulse on all bars, then fade
          allRows.forEach(row => row.classList.add('complete'));
          setTimeout(() => {
            $screen.classList.add('fade-out');
          }, 900);
        },
      });

      simulator.start();
    }

    // ============================================================
    // Demo controls
    // ============================================================
    createDemoControls(document.body, {
      defaultDuration: 10,
      onStart(duration, sessions) {
        startSimulation(duration, sessions);
      },
      onReset() {
        if (simulator) simulator.stop();
        resetUI();
      },
    });

    // Auto-start on load
    startSimulation(10, 20);
  </script>
</body>
</html>
