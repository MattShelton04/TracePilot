<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — Prototype J: Portal</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    /* ═══════════════════════════════════════════
       PORTAL LOADING SCREEN
       ═══════════════════════════════════════════ */

    .loading-screen {
      perspective: 1200px;
      overflow: hidden;
    }

    /* ── Scene container (for zoom effect) ── */
    .portal-scene {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-style: preserve-3d;
      transition: transform 0.1s linear;
      will-change: transform;
    }

    .portal-scene.zoom-through {
      animation: zoomThrough 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes zoomThrough {
      0%   { transform: scale(1) translateZ(0); }
      40%  { transform: scale(2.5) translateZ(200px); }
      70%  { transform: scale(6) translateZ(600px); }
      100% { transform: scale(12) translateZ(1200px); }
    }

    /* ── White flash overlay ── */
    .flash-overlay {
      position: fixed;
      inset: 0;
      background: white;
      opacity: 0;
      z-index: 9998;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }

    .flash-overlay.active {
      animation: flashPulse 0.8s ease-out forwards;
    }

    @keyframes flashPulse {
      0%   { opacity: 0; }
      30%  { opacity: 0.95; }
      60%  { opacity: 1; }
      100% { opacity: 1; }
    }

    /* ── Portal center (the "hole") ── */
    .portal-center {
      position: absolute;
      width: 60px;
      height: 60px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
    }

    .portal-center-inner {
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, #0d1117 0%, #000 60%, transparent 100%);
      clip-path: polygon(50% 0%, 93.3% 25%, 93.3% 75%, 50% 100%, 6.7% 75%, 6.7% 25%);
      transition: background 0.8s ease, filter 0.4s ease;
    }

    .portal-center-inner.brightening {
      background: radial-gradient(circle, rgba(129,140,248,0.8) 0%, rgba(99,102,241,0.4) 40%, transparent 100%);
      filter: blur(2px) brightness(2);
    }

    /* ── Logo (center, large) ── */
    .portal-logo {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      opacity: 0;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .portal-logo.visible {
      opacity: 1;
    }

    .portal-logo.hollow {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.6);
    }

    .portal-logo svg {
      width: 120px;
      height: 120px;
      filter: drop-shadow(0 0 20px rgba(99,102,241,0.5));
    }

    /* ── Hexagonal rings ── */
    .hex-ring {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) rotate(0deg);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.6s ease;
      will-change: transform, opacity;
    }

    .hex-ring.visible {
      opacity: 1;
    }

    .hex-ring svg {
      display: block;
    }

    .hex-ring-1 {
      z-index: 4;
      animation: ringRotateCW 40s linear infinite;
    }
    .hex-ring-2 {
      z-index: 3;
      animation: ringRotateCCW 55s linear infinite;
    }
    .hex-ring-3 {
      z-index: 2;
      animation: ringRotateCW 70s linear infinite;
    }
    .hex-ring-4 {
      z-index: 1;
      animation: ringRotateCCW 90s linear infinite;
    }

    @keyframes ringRotateCW {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
    }
    @keyframes ringRotateCCW {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(-360deg); }
    }

    .hex-ring .ring-path {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke-opacity 0.4s ease, filter 0.4s ease;
    }

    .hex-ring-1 .ring-path { stroke: #818cf8; stroke-width: 2; stroke-opacity: 0.8; }
    .hex-ring-2 .ring-path { stroke: #818cf8; stroke-width: 1.5; stroke-opacity: 0.5; }
    .hex-ring-3 .ring-path { stroke: #6366f1; stroke-width: 1; stroke-opacity: 0.3; }
    .hex-ring-4 .ring-path { stroke: #6366f1; stroke-width: 0.8; stroke-opacity: 0.15; }

    /* Ring pulse animation per ring */
    .hex-ring-1 .ring-path { animation: ringPulse1 3s ease-in-out infinite; }
    .hex-ring-2 .ring-path { animation: ringPulse2 3s ease-in-out infinite 0.75s; }
    .hex-ring-3 .ring-path { animation: ringPulse3 3s ease-in-out infinite 1.5s; }
    .hex-ring-4 .ring-path { animation: ringPulse4 3s ease-in-out infinite 2.25s; }

    @keyframes ringPulse1 {
      0%, 100% { stroke-opacity: 0.8; filter: drop-shadow(0 0 4px rgba(129,140,248,0.3)); }
      50%      { stroke-opacity: 1;   filter: drop-shadow(0 0 12px rgba(129,140,248,0.6)); }
    }
    @keyframes ringPulse2 {
      0%, 100% { stroke-opacity: 0.5; filter: drop-shadow(0 0 3px rgba(129,140,248,0.2)); }
      50%      { stroke-opacity: 0.8; filter: drop-shadow(0 0 10px rgba(129,140,248,0.5)); }
    }
    @keyframes ringPulse3 {
      0%, 100% { stroke-opacity: 0.3; filter: drop-shadow(0 0 2px rgba(99,102,241,0.15)); }
      50%      { stroke-opacity: 0.5; filter: drop-shadow(0 0 8px rgba(99,102,241,0.35)); }
    }
    @keyframes ringPulse4 {
      0%, 100% { stroke-opacity: 0.15; }
      50%      { stroke-opacity: 0.3; filter: drop-shadow(0 0 6px rgba(99,102,241,0.2)); }
    }

    /* Intensified ring glow for later phases */
    .portal-scene.intensified .hex-ring-1 .ring-path { animation: ringIntense1 1.5s ease-in-out infinite; }
    .portal-scene.intensified .hex-ring-2 .ring-path { animation: ringIntense2 1.5s ease-in-out infinite 0.35s; }
    .portal-scene.intensified .hex-ring-3 .ring-path { animation: ringIntense3 1.5s ease-in-out infinite 0.7s; }
    .portal-scene.intensified .hex-ring-4 .ring-path { animation: ringIntense4 1.5s ease-in-out infinite 1.05s; }

    @keyframes ringIntense1 {
      0%, 100% { stroke-opacity: 0.9; filter: drop-shadow(0 0 10px rgba(129,140,248,0.6)); }
      50%      { stroke-opacity: 1;   filter: drop-shadow(0 0 25px rgba(129,140,248,0.9)); }
    }
    @keyframes ringIntense2 {
      0%, 100% { stroke-opacity: 0.7; filter: drop-shadow(0 0 8px rgba(129,140,248,0.5)); }
      50%      { stroke-opacity: 1;   filter: drop-shadow(0 0 20px rgba(129,140,248,0.8)); }
    }
    @keyframes ringIntense3 {
      0%, 100% { stroke-opacity: 0.5; filter: drop-shadow(0 0 6px rgba(99,102,241,0.4)); }
      50%      { stroke-opacity: 0.8; filter: drop-shadow(0 0 16px rgba(99,102,241,0.7)); }
    }
    @keyframes ringIntense4 {
      0%, 100% { stroke-opacity: 0.3; filter: drop-shadow(0 0 4px rgba(99,102,241,0.3)); }
      50%      { stroke-opacity: 0.6; filter: drop-shadow(0 0 12px rgba(99,102,241,0.5)); }
    }

    /* ── Particles ── */
    .particle-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 6;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      will-change: transform, opacity;
    }

    .particle-label {
      position: absolute;
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--color-fg-muted);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0.7;
    }

    /* ── Particle flash on arrival ── */
    @keyframes particleFlash {
      0%   { transform: scale(1); opacity: 1; }
      50%  { transform: scale(2.5); opacity: 0.8; }
      100% { transform: scale(0); opacity: 0; }
    }

    /* ── Stats around portal ── */
    .portal-stats {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 8;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .portal-stats.visible { opacity: 1; }

    .portal-stats.flash-out {
      animation: statsFlashOut 0.5s ease-out forwards;
    }

    @keyframes statsFlashOut {
      0%   { opacity: 1; }
      30%  { opacity: 1; filter: brightness(2); }
      100% { opacity: 0; filter: brightness(1); }
    }

    .portal-stat {
      position: absolute;
      text-align: center;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    /* compass positioning */
    .portal-stat.top {
      top: calc(50% - 220px);
      left: 50%;
      transform: translateX(-50%);
    }
    .portal-stat.right {
      top: 50%;
      left: calc(50% + 220px);
      transform: translateY(-50%);
    }
    .portal-stat.bottom {
      top: calc(50% + 210px);
      left: 50%;
      transform: translateX(-50%);
    }
    .portal-stat.left {
      top: 50%;
      right: calc(50% + 220px);
      transform: translateY(-50%);
    }

    .portal-stat .stat-value {
      font-size: var(--text-xl);
      display: block;
    }

    .portal-stat .stat-label {
      font-size: var(--text-xs);
      display: block;
    }

    /* ── Status text below portal ── */
    .portal-status {
      position: absolute;
      bottom: calc(50% - 280px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 9;
      text-align: center;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .portal-status.visible { opacity: 1; }

    .portal-status-text {
      font-size: var(--text-sm);
      color: var(--color-fg-muted);
      font-family: var(--font-mono);
      letter-spacing: 0.04em;
    }

    /* ── Speed lines (for zoom phase) ── */
    .speed-lines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9997;
      opacity: 0;
      overflow: hidden;
    }

    .speed-lines.active {
      animation: speedLinesIn 1.0s ease-out forwards;
    }

    @keyframes speedLinesIn {
      0%   { opacity: 0; }
      20%  { opacity: 0.8; }
      100% { opacity: 0; }
    }

    .speed-line {
      position: absolute;
      background: linear-gradient(to bottom, transparent, rgba(129,140,248,0.6), transparent);
      width: 1px;
      transform-origin: 50% 50%;
    }

    /* ═══════════════════════════════════════════
       MOCK HOMEPAGE
       ═══════════════════════════════════════════ */
    .mock-homepage {
      position: fixed;
      inset: 0;
      background: var(--color-canvas);
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      display: flex;
      transition: opacity 0.5s ease;
    }

    .mock-homepage.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* Sidebar */
    .mock-sidebar {
      width: 240px;
      border-right: 1px solid var(--color-border);
      background: var(--color-canvas-subtle);
      padding: var(--space-4);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      flex-shrink: 0;
    }

    .mock-sidebar-brand {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) 0;
      margin-bottom: var(--space-3);
      border-bottom: 1px solid var(--color-border-muted);
    }

    .mock-sidebar-brand svg { width: 24px; height: 24px; }

    .mock-sidebar-brand span {
      font-weight: 600;
      font-size: var(--text-md);
    }

    .mock-sidebar-item {
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
      color: var(--color-fg-muted);
      cursor: default;
    }

    .mock-sidebar-item.active {
      background: var(--accent-subtle);
      color: var(--accent-fg);
    }

    /* Main content area */
    .mock-main {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-6);
    }

    .mock-header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-6);
    }

    .mock-header-bar h1 {
      font-size: var(--text-xl);
      font-weight: 600;
    }

    .mock-search-bar {
      width: 280px;
      height: 32px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      background: var(--color-canvas-subtle);
    }

    .mock-card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--space-4);
    }

    .mock-card {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      background: var(--color-canvas-subtle);
      padding: var(--space-4);
      min-height: 140px;
      position: relative;
      overflow: hidden;
    }

    .mock-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(129,140,248,0.04) 40%,
        rgba(129,140,248,0.08) 50%,
        rgba(129,140,248,0.04) 60%,
        transparent 100%
      );
      background-size: 200% 100%;
      animation: shimmer 2s ease-in-out infinite;
    }

    .mock-card-header {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-3);
    }

    .mock-card-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .mock-card-title {
      font-size: var(--text-sm);
      font-weight: 600;
    }

    .mock-card-meta {
      font-size: var(--text-xs);
      color: var(--color-fg-muted);
      margin-bottom: var(--space-2);
      font-family: var(--font-mono);
    }

    .mock-card-bar {
      height: 4px;
      background: var(--color-border-muted);
      border-radius: 2px;
      margin-top: var(--space-3);
      overflow: hidden;
    }

    .mock-card-bar-fill {
      height: 100%;
      border-radius: 2px;
    }
  </style>
</head>
<body>

  <div class="progress-bar-track">
    <div class="progress-bar-fill" id="progress-bar"></div>
  </div>

  <!-- ── Loading screen ── -->
  <div class="loading-screen" id="loading-screen">
    <div class="portal-scene" id="portal-scene">

      <!-- Logo (large, center) -->
      <div class="portal-logo" id="portal-logo"></div>

      <!-- Portal center (the "hole") -->
      <div class="portal-center" id="portal-center">

  <!-- ── Speed lines overlay ── -->

  <!-- ── Flash overlay ── -->

  <!-- ── Mock Homepage ── -->

    <aside class="mock-sidebar">
      <div class="mock-sidebar-brand" id="sidebar-logo"></div>

      <div class="mock-sidebar-item">⏱ Timelines</div>
      <div class="mock-sidebar-item">🔧 Tools</div>
      <div class="mock-sidebar-item">🔍 Search</div>
      <div class="mock-sidebar-item" style="margin-top:auto; border-top: 1px solid var(--color-border-muted); padding-top: var(--space-3);">⚙ Settings</div>
    </aside>
    <main class="mock-main">
      <div class="mock-header-bar">

      </div>
      <div class="mock-card-grid" id="card-grid"></div>

  </div>

  <script src="mock-data.js"></script>
  <script>
    // ════════════════════════════════════════════
    // Constants & Repo Colors
    // ════════════════════════════════════════════

    const REPO_COLORS = {
      'frontend-app':  '#818cf8',
      'api-server':    '#34d399',
      'data-pipeline': '#fbbf24',
      'mobile-app':    '#f87171',
      'infra-config':  '#a78bfa',
      'ml-service':    '#38bdf8',
      'docs-site':     '#fb923c',
    };

    const PHASE_LABELS = {
      idle:        'Initializing TracePilot...',
      discovering: 'Scanning session directories…',
      indexing:    'Indexing sessions through portal…',
      finalizing:  'Locking coordinates…',
      complete:    'Portal ready — entering TracePilot',
    };

    // ════════════════════════════════════════════
    // DOM refs
    // ════════════════════════════════════════════

    const progressBar     = document.getElementById('progress-bar');
    const loadingScreen   = document.getElementById('loading-screen');
    const portalScene     = document.getElementById('portal-scene');
    const portalLogo      = document.getElementById('portal-logo');
    const portalCenter    = document.getElementById('portal-center');
    const portalCenterIn  = document.getElementById('portal-center-inner');
    const ring1           = document.getElementById('ring-1');
    const ring2           = document.getElementById('ring-2');
    const ring3           = document.getElementById('ring-3');
    const ring4           = document.getElementById('ring-4');
    const particleLayer   = document.getElementById('particle-layer');
    const portalStats     = document.getElementById('portal-stats');
    const portalStatus    = document.getElementById('portal-status');
    const statusText      = document.getElementById('portal-status-text');
    const flashOverlay    = document.getElementById('flash-overlay');
    const speedLinesEl    = document.getElementById('speed-lines');
    const mockHomepage    = document.getElementById('mock-homepage');
    const statSessions    = document.getElementById('stat-sessions');
    const statTokens      = document.getElementById('stat-tokens');
    const statEvents      = document.getElementById('stat-events');
    const statTools       = document.getElementById('stat-tools');

    // ════════════════════════════════════════════
    // SVG Hexagon ring generator
    // ════════════════════════════════════════════

    function hexPoints(cx, cy, r) {
      const pts = [];
      for (let i = 0; i < 6; i++) {
        const angle = (Math.PI / 3) * i - Math.PI / 2;
        pts.push(`${cx + r * Math.cos(angle)},${cy + r * Math.sin(angle)}`);
      }
      return pts.join(' ');
    }

    function createRingSVG(size, ringClass) {
      const half = size / 2;
      const r = half - 4;
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('width', size);
      svg.setAttribute('height', size);
      svg.setAttribute('viewBox', `0 0 ${size} ${size}`);
      const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      polygon.setAttribute('points', hexPoints(half, half, r));
      polygon.classList.add('ring-path');
      svg.appendChild(polygon);
      return svg;
    }

    // Ring sizes: 80, 140, 220, 320
    ring1.appendChild(createRingSVG(80, 'ring-1'));
    ring2.appendChild(createRingSVG(140, 'ring-2'));
    ring3.appendChild(createRingSVG(220, 'ring-3'));
    ring4.appendChild(createRingSVG(320, 'ring-4'));

    // Logo
    portalLogo.innerHTML = TRACEPILOT_LOGO_SVG;

    // Sidebar logo
    document.getElementById('sidebar-logo').innerHTML =
      `<span style="width:24px;height:24px;display:inline-flex">${TRACEPILOT_LOGO_SVG}</span><span>TracePilot</span>`;

    // ════════════════════════════════════════════
    // Animated counters
    // ════════════════════════════════════════════

    const counterTokens = new AnimatedCounter(statTokens, { format: formatTokens });
    const counterEvents = new AnimatedCounter(statEvents, { format: formatTokens });
    const counterTools  = new AnimatedCounter(statTools, { format: formatTokens });

    let totalSessions = 20;

    function updateSessionStat(processed) {
      statSessions.textContent = `${processed} / ${totalSessions}`;
    }

    // ════════════════════════════════════════════
    // Speed lines generator
    // ════════════════════════════════════════════

    function generateSpeedLines() {
      speedLinesEl.innerHTML = '';
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const count = 40;
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.3;
        const dist = 60 + Math.random() * 80;
        const len = 80 + Math.random() * 200;
        const x = cx + Math.cos(angle) * dist;
        const y = cy + Math.sin(angle) * dist;
        const line = document.createElement('div');
        line.className = 'speed-line';
        const deg = (angle * 180 / Math.PI) + 90;
        line.style.cssText = `
          left: ${x}px; top: ${y}px;
          height: ${len}px;
          transform: rotate(${deg}deg);
          opacity: ${0.3 + Math.random() * 0.5};
        `;
        speedLinesEl.appendChild(line);
      }
    }

    // ════════════════════════════════════════════
    // Particle system
    // ════════════════════════════════════════════

    let particleCount = 0;
    const MAX_PARTICLES = 120;
    let particleSpeedMultiplier = 1;

    function spawnParticle(session) {
      if (particleCount >= MAX_PARTICLES) return;
      particleCount++;

      const color = REPO_COLORS[session?.repo] || '#818cf8';
      const size = 3 + Math.random() * 5;
      const hasLabel = Math.random() < 0.15 && session;

      // Spawn from random edge
      const edge = Math.floor(Math.random() * 4);
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      let sx, sy;
      switch (edge) {
        case 0: sx = Math.random() * vw; sy = -10; break;        // top
        case 1: sx = vw + 10; sy = Math.random() * vh; break;    // right
        case 2: sx = Math.random() * vw; sy = vh + 10; break;    // bottom
        case 3: sx = -10; sy = Math.random() * vh; break;        // left
      }

      const cx = vw / 2;
      const cy = vh / 2;

      // Slight curve offset
      const curveX = (Math.random() - 0.5) * 80;
      const curveY = (Math.random() - 0.5) * 80;

      const duration = (1.5 + Math.random() * 1.5) / particleSpeedMultiplier;

      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.cssText = `
        width: ${size}px; height: ${size}px;
        background: ${color};
        box-shadow: 0 0 ${size * 2}px ${color}88;
        left: ${sx}px; top: ${sy}px;
      `;
      particleLayer.appendChild(particle);

      let labelEl = null;
      if (hasLabel) {
        labelEl = document.createElement('div');
        labelEl.className = 'particle-label';
        const labels = [
          session.repo,
          formatTokens(session.tokens) + ' tokens',
          session.events + ' events',
          session.branch,
        ];
        labelEl.textContent = labels[Math.floor(Math.random() * labels.length)];
        labelEl.style.cssText = `left: ${sx + size + 4}px; top: ${sy - 2}px;`;
        particleLayer.appendChild(labelEl);
      }

      const startTime = performance.now();
      const durationMs = duration * 1000;

      function animateParticle(now) {
        const elapsed = now - startTime;
        const t = Math.min(elapsed / durationMs, 1);
        // Ease-in (accelerate toward center)
        const eased = t * t;

        // Quadratic bezier-ish path
        const mt = 1 - eased;
        const midX = (sx + cx) / 2 + curveX;
        const midY = (sy + cy) / 2 + curveY;
        const px = mt * mt * sx + 2 * mt * eased * midX + eased * eased * cx;
        const py = mt * mt * sy + 2 * mt * eased * midY + eased * eased * cy;

        // Shrink & brighten as it approaches center
        const scale = 1 - eased * 0.7;
        const brightness = 1 + eased * 1.5;

        particle.style.transform = `translate(${px - sx}px, ${py - sy}px) scale(${scale})`;
        particle.style.filter = `brightness(${brightness})`;

        if (labelEl) {
          labelEl.style.transform = `translate(${px - sx}px, ${py - sy}px)`;
          labelEl.style.opacity = Math.max(0, 1 - eased * 2);
        }

        if (t < 1) {
          requestAnimationFrame(animateParticle);
        } else {
          // Flash on arrival
          particle.style.animation = 'particleFlash 0.2s ease-out forwards';
          if (labelEl) labelEl.remove();
          setTimeout(() => {
            particle.remove();
            particleCount--;
          }, 200);
        }
      }

      requestAnimationFrame(animateParticle);
    }

    // Ambient particle spawning during indexing
    let ambientInterval = null;
    function startAmbientParticles(rate) {
      stopAmbientParticles();
      ambientInterval = setInterval(() => {
        const session = MOCK_SESSIONS[Math.floor(Math.random() * MOCK_SESSIONS.length)];
        spawnParticle(session);
      }, rate);
    }
    function stopAmbientParticles() {
      if (ambientInterval) { clearInterval(ambientInterval); ambientInterval = null; }
    }

    // ════════════════════════════════════════════
    // Mock homepage cards
    // ════════════════════════════════════════════

    function renderHomepageCards() {
      const grid = document.getElementById('card-grid');
      grid.innerHTML = '';
      const sessions = MOCK_SESSIONS.slice(0, 8);
      sessions.forEach(s => {
        const color = REPO_COLORS[s.repo] || '#818cf8';
        const card = document.createElement('div');
        card.className = 'mock-card';
        card.innerHTML = `
          <div class="mock-card-header">
            <div class="mock-card-dot" style="background:${color}; box-shadow: 0 0 6px ${color}88"></div>
            <div class="mock-card-title">${s.repo}</div>
          </div>
          <div class="mock-card-meta">${s.branch} • ${s.model} • ${formatTokens(s.tokens)} tokens</div>
          <div class="mock-card-meta">${s.turns} turns • ${s.tools} tool calls • ${s.events} events</div>
          <div class="mock-card-bar">
            <div class="mock-card-bar-fill" style="width:${30 + Math.random()*60}%; background:${color}; opacity:0.6"></div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    renderHomepageCards();

    // ════════════════════════════════════════════
    // Phase-driven animation orchestration
    // ════════════════════════════════════════════

    let simulator = null;
    let currentPhase = 'idle';
    let zoomTriggered = false;

    function resetAll() {
      if (simulator) simulator.stop();
      stopAmbientParticles();
      zoomTriggered = false;
      currentPhase = 'idle';
      particleSpeedMultiplier = 1;

      // Reset visuals
      progressBar.style.width = '0%';
      portalLogo.classList.remove('visible', 'hollow');
      [ring1, ring2, ring3, ring4].forEach(r => r.classList.remove('visible'));
      portalStats.classList.remove('visible', 'flash-out');
      portalStatus.classList.remove('visible');
      portalScene.classList.remove('intensified', 'zoom-through');
      portalCenterIn.classList.remove('brightening');
      flashOverlay.classList.remove('active');
      flashOverlay.style.opacity = '0';
      speedLinesEl.classList.remove('active');
      mockHomepage.classList.remove('visible');
      loadingScreen.style.display = '';
      loadingScreen.style.opacity = '1';
      statusText.textContent = PHASE_LABELS.idle;

      // Reset counters
      counterTokens.set(0); counterEvents.set(0); counterTools.set(0);
      updateSessionStat(0);

      // Clear particles
      particleLayer.innerHTML = '';
      particleCount = 0;
    }

    function startSimulation(duration, sessions) {
      resetAll();
      totalSessions = sessions;
      updateSessionStat(0);

      simulator = new LoadingSimulator({
        totalSessions: sessions,
        durationMs: duration * 1000,

        onProgress(pct, phase) {
          const pctVal = (pct * 100).toFixed(1);
          progressBar.style.width = pctVal + '%';

          // Phase 1: Logo formation (0-8%)
          if (pct < 0.08) {
            if (!portalLogo.classList.contains('visible')) {
              portalLogo.classList.add('visible');
              portalStatus.classList.add('visible');
            }
          }

          // Phase 2: Portal opens (8-15%)
          if (pct >= 0.08 && pct < 0.15) {
            if (!portalLogo.classList.contains('hollow')) {
              portalLogo.classList.add('hollow');
              // Show rings sequentially
              setTimeout(() => ring1.classList.add('visible'), 0);
              setTimeout(() => ring2.classList.add('visible'), 150);
              setTimeout(() => ring3.classList.add('visible'), 300);
              setTimeout(() => ring4.classList.add('visible'), 450);
              // Show stats
              setTimeout(() => portalStats.classList.add('visible'), 400);
            }
          }

          // Phase 3: Data stream (15-85%) — particles started via phase change
          if (pct >= 0.15 && pct < 0.85) {
            // Increase particle rate as progress advances
            const intensity = (pct - 0.15) / 0.70;
            const rate = Math.max(40, 200 - intensity * 160);
            if (ambientInterval) {
              // Dynamically adjust rate
            }
          }

          // Phase 4: Acceleration (85-92%)
          if (pct >= 0.85 && pct < 0.92) {
            if (!portalScene.classList.contains('intensified')) {
              portalScene.classList.add('intensified');
              particleSpeedMultiplier = 3;
              startAmbientParticles(30);
            }
            // Subtle pre-zoom scale
            const accelT = (pct - 0.85) / 0.07;
            const s = 1 + accelT * 0.15;
            portalScene.style.transform = `scale(${s})`;

            // Flash stats out
            if (accelT > 0.3 && !portalStats.classList.contains('flash-out')) {
              portalStats.classList.add('flash-out');
              portalStatus.classList.remove('visible');
            }
          }

          // Phase 5: Zoom through (92-100%)
          if (pct >= 0.92 && !zoomTriggered) {
            zoomTriggered = true;
            triggerZoomThrough();
          }
        },

        onPhaseChange(phase) {
          currentPhase = phase;
          statusText.textContent = PHASE_LABELS[phase] || '';

          if (phase === 'indexing') {
            startAmbientParticles(120);
          }
        },

        onSessionProcessed({ current, total, session }) {
          updateSessionStat(current);
          // Burst of particles for each session
          for (let i = 0; i < 3; i++) {
            setTimeout(() => spawnParticle(session), i * 60);
          }
        },

        onStatsUpdate(stats) {
          counterTokens.set(stats.totalTokens);
          counterEvents.set(stats.totalEvents);
          counterTools.set(stats.totalToolCalls);
        },

        onComplete() {},
      });

      simulator.start();
    }

    // ════════════════════════════════════════════
    // Zoom-through sequence
    // ════════════════════════════════════════════

    function triggerZoomThrough() {
      stopAmbientParticles();

      // Brighten the portal center
      portalCenterIn.classList.add('brightening');

      // Generate and show speed lines
      generateSpeedLines();

      // Short delay then full zoom
      setTimeout(() => {
        portalScene.style.transform = '';
        portalScene.classList.add('zoom-through');
        speedLinesEl.classList.add('active');
      }, 100);

      // Flash at peak
      setTimeout(() => {
        flashOverlay.classList.add('active');
      }, 600);

      // Show homepage after flash
      setTimeout(() => {
        loadingScreen.style.display = 'none';
        mockHomepage.classList.add('visible');
      }, 1000);

      // Fade out flash
      setTimeout(() => {
        flashOverlay.style.transition = 'opacity 0.6s ease';
        flashOverlay.style.opacity = '0';
      }, 1200);
    }

    // ════════════════════════════════════════════
    // Demo controls
    // ════════════════════════════════════════════

    createDemoControls(document.body, {
      defaultDuration: 12,
      onStart(duration, sessions) {
        startSimulation(duration, sessions);
      },
      onReset() {
        resetAll();
      },
    });

    // ════════════════════════════════════════════
    // Boot
    // ════════════════════════════════════════════

    startSimulation(12, 20);
  </script>
