<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — Prototype F: Stats + Feature Hybrid</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    /* ===== Phase 1: Centered Discovery Layout ===== */
    .loading-screen {
      justify-content: center;
      align-items: center;
      transition: opacity 0.6s ease, transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform, opacity;
    }

    .loading-screen.zoom-out {
      transform: scale(1.15);
      opacity: 0;
      filter: blur(4px);
    }

    /* ===== Discovery Phase (Phase 1) ===== */
    .discovery-phase {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-6);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .discovery-phase.hidden {
      opacity: 0;
      transform: translateY(-20px);
      pointer-events: none;
      position: absolute;
    }

    .discovery-logo {
      position: relative;
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .discovery-logo .logo-svg {
      width: 64px;
      height: 64px;
    }

    @keyframes breathing-glow {
      0%, 100% {
        filter: drop-shadow(0 0 12px rgba(99, 102, 241, 0.3));
        transform: scale(1);
      }
      50% {
        filter: drop-shadow(0 0 28px rgba(99, 102, 241, 0.6));
        transform: scale(1.03);
      }
    }

    .discovery-logo .logo-inner {
      animation: breathing-glow 2s ease-in-out infinite;
    }

    .discovery-logo .glow-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid var(--accent-muted);
      animation: breathing-glow 2s ease-in-out infinite;
      animation-delay: 0.3s;
      pointer-events: none;
    }

    .discovery-logo .glow-ring::before {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
    }

    .discovery-text {
      font-size: var(--text-lg);
      color: var(--color-fg-muted);
      animation: pulse 2s ease-in-out infinite;
    }

    .discovery-count {
      font-family: var(--font-mono);
      font-size: var(--text-md);
      color: var(--accent-fg);
      font-weight: 500;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .discovery-count.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ===== Indexing Phase (Phase 2): Split Layout ===== */
    .indexing-phase {
      display: none;
      width: 100%;
      height: 100%;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .indexing-phase.active {
      display: flex;
      opacity: 1;
    }

    /* Top bar: small logo + branding */
    .top-bar {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-4) var(--space-6);
      flex-shrink: 0;
    }

    .top-bar .logo-svg {
      width: 28px;
      height: 28px;
    }

    .top-bar-title {
      font-size: var(--text-md);
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .top-bar-phase {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* Main content area */
    .indexing-content {
      display: flex;
      flex: 1;
      gap: var(--space-8);
      padding: 0 var(--space-8);
      min-height: 0;
      align-items: center;
      justify-content: center;
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
    }

    /* ===== Left: Stats Panel ===== */
    .stats-panel {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      width: 280px;
      flex-shrink: 0;
    }

    .stats-panel-title {
      font-size: var(--text-xs);
      color: var(--color-fg-subtle);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: var(--space-1);
    }

    .stat-row {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
      padding: var(--space-3) var(--space-4);
      background: var(--color-canvas-subtle);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      transition: border-color 0.4s ease, box-shadow 0.4s ease;
    }

    .stat-row.glow-success {
      animation: stat-glow-success 0.8s ease-out forwards;
      border-color: var(--success-fg);
    }

    @keyframes stat-glow-success {
      0%   { box-shadow: 0 0 0 rgba(52, 211, 153, 0); }
      40%  { box-shadow: 0 0 16px rgba(52, 211, 153, 0.35), 0 0 32px rgba(52, 211, 153, 0.1); }
      100% { box-shadow: 0 0 0 rgba(52, 211, 153, 0); }
    }

    .stat-row-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stat-row-label {
      font-size: var(--text-xs);
      color: var(--color-fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .stat-row-value {
      font-family: var(--font-mono);
      font-size: var(--text-lg);
      font-weight: 600;
      color: var(--color-fg);
      font-variant-numeric: tabular-nums;
    }

    /* Mini progress bar inside sessions stat */
    .stat-mini-progress {
      height: 3px;
      background: var(--color-border-muted);
      border-radius: 2px;
      overflow: hidden;
      margin-top: var(--space-1);
    }

    .stat-mini-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-emphasis), var(--accent-fg));
      border-radius: 2px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .stat-row-secondary {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-fg-subtle);
      font-variant-numeric: tabular-nums;
    }

    /* ===== Right: Feature Showcase ===== */
    .feature-panel {
      flex: 1;
      min-width: 0;
      max-width: 480px;
    }

    .feature-card-container {
      position: relative;
      border-radius: var(--radius-xl);
      border: 1px solid var(--color-border);
      background: var(--color-canvas-subtle);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      min-height: 320px;
    }

    .feature-card {
      position: absolute;
      inset: 0;
      padding: var(--space-5) var(--space-6);
      display: flex;
      flex-direction: column;
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .feature-card.active {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      position: relative;
    }

    .feature-card.exiting {
      opacity: 0;
      transform: translateY(-12px);
    }

    .feature-card-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-1);
    }

    .feature-icon {
      font-size: 1.3rem;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      background: var(--accent-subtle);
      flex-shrink: 0;
    }

    .feature-title {
      font-size: var(--text-md);
      font-weight: 600;
    }

    .feature-description {
      font-size: var(--text-xs);
      color: var(--color-fg-muted);
      line-height: 1.5;
      margin-bottom: var(--space-4);
    }

    .feature-preview {
      flex: 1;
      border-radius: var(--radius-md);
      background: var(--color-canvas-inset);
      border: 1px solid var(--color-border-muted);
      overflow: hidden;
      position: relative;
      min-height: 170px;
    }

    .feature-dots {
      display: flex;
      justify-content: center;
      gap: var(--space-2);
      margin-top: var(--space-4);
    }

    .feature-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--color-border);
      border: none;
      cursor: pointer;
      padding: 0;
      transition: background 0.3s ease, transform 0.3s ease;
    }

    .feature-dot:hover { background: var(--color-fg-muted); }
    .feature-dot.active {
      background: var(--accent-fg);
      transform: scale(1.4);
    }

    /* ===== Bottom: Full-width progress ===== */
    .bottom-progress {
      flex-shrink: 0;
      padding: var(--space-4) var(--space-8) var(--space-5);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
    }

    .bottom-progress-track {
      height: 3px;
      background: var(--color-border-muted);
      border-radius: 2px;
      overflow: hidden;
    }

    .bottom-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-emphasis), var(--accent-fg));
      border-radius: 2px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      width: 0%;
    }

    .bottom-progress-fill.complete {
      background: linear-gradient(90deg, var(--success-emphasis), var(--success-fg));
      box-shadow: 0 0 8px var(--success-muted);
    }

    .bottom-progress-text {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-fg-muted);
      text-align: center;
    }

    /* ===== Phase 3: Completion Summary ===== */
    .completion-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 5;
    }

    .completion-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .completion-check {
      font-size: 2.5rem;
      animation: completionPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes completionPop {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }

    .completion-title {
      font-size: var(--text-xl);
      font-weight: 600;
      color: var(--success-fg);
    }

    .completion-summary {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      color: var(--color-fg-muted);
    }

    .completion-summary span {
      color: var(--color-fg);
      font-weight: 500;
    }

    /* ===== Phase 4: Mock Homepage (behind) ===== */
    .mock-homepage {
      position: fixed;
      inset: 0;
      background: var(--color-canvas);
      z-index: 1;
      opacity: 0;
      transition: opacity 0.8s ease;
      display: flex;
      flex-direction: column;
    }

    .mock-homepage.visible {
      opacity: 1;
    }

    .mock-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-5);
      border-bottom: 1px solid var(--color-border);
      background: var(--color-canvas-subtle);
      flex-shrink: 0;
    }

    .mock-header .logo-svg {
      width: 24px;
      height: 24px;
    }

    .mock-header-brand {
      font-size: var(--text-md);
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .mock-header-spacer { flex: 1; }

    .mock-header-search {
      width: 200px;
      height: 28px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      background: var(--color-canvas);
      display: flex;
      align-items: center;
      padding: 0 var(--space-2);
      gap: var(--space-2);
    }

    .mock-header-search-icon {
      font-size: 11px;
      color: var(--color-fg-subtle);
    }

    .mock-header-search-text {
      font-size: var(--text-xs);
      color: var(--color-fg-subtle);
    }

    .mock-header-icon {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      background: var(--color-canvas);
      border: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--color-fg-muted);
    }

    .mock-body {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .mock-sidebar {
      width: 200px;
      border-right: 1px solid var(--color-border);
      padding: var(--space-4) var(--space-3);
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
      flex-shrink: 0;
    }

    .mock-nav-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
      color: var(--color-fg-muted);
      cursor: default;
    }

    .mock-nav-item.active {
      background: var(--accent-subtle);
      color: var(--accent-fg);
    }

    .mock-nav-icon {
      font-size: 13px;
      width: 18px;
      text-align: center;
    }

    .mock-main {
      flex: 1;
      padding: var(--space-6);
      overflow: hidden;
    }

    .mock-main-title {
      font-size: var(--text-xl);
      font-weight: 600;
      margin-bottom: var(--space-5);
    }

    .mock-sessions-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-4);
    }

    .mock-session-card {
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border);
      background: var(--color-canvas-subtle);
      padding: var(--space-4);
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      overflow: hidden;
      position: relative;
    }

    .mock-session-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.04), transparent);
      background-size: 200% 100%;
      animation: shimmer 2s ease-in-out infinite;
    }

    .mock-card-top {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .mock-card-badge {
      font-size: 9px;
      font-family: var(--font-mono);
      padding: 2px 6px;
      border-radius: var(--radius-pill);
      font-weight: 500;
    }

    .mock-card-badge.accent {
      background: var(--accent-subtle);
      color: var(--accent-fg);
      border: 1px solid rgba(99, 102, 241, 0.2);
    }

    .mock-card-badge.success {
      background: var(--success-subtle);
      color: var(--success-fg);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .mock-card-badge.warning {
      background: rgba(251, 191, 36, 0.1);
      color: var(--warning-fg);
      border: 1px solid rgba(251, 191, 36, 0.2);
    }

    .mock-card-badge.done {
      background: rgba(167, 139, 250, 0.1);
      color: var(--done-fg);
      border: 1px solid rgba(167, 139, 250, 0.2);
    }

    .mock-card-repo {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--color-fg);
    }

    .mock-card-meta {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--color-fg-subtle);
    }

    .mock-card-shimmer {
      height: 6px;
      border-radius: 3px;
      background: var(--color-border-muted);
      overflow: hidden;
    }

    .mock-card-shimmer-inner {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.15), transparent);
      animation: shimmer 1.8s ease-in-out infinite;
    }

    /* ===== Feature Preview Mini-Animations ===== */

    /* Chat preview */
    .preview-chat {
      padding: var(--space-3);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      height: 100%;
    }

    .chat-msg {
      display: flex;
      gap: var(--space-2);
      opacity: 0;
      transform: translateY(8px);
      max-width: 85%;
    }

    .chat-msg.visible {
      animation: chatMsgIn 0.4s ease forwards;
    }

    .chat-msg.user { align-self: flex-start; }
    .chat-msg.assistant { align-self: flex-end; flex-direction: row-reverse; }

    .chat-avatar {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      flex-shrink: 0;
      font-weight: 600;
    }

    .chat-msg.user .chat-avatar { background: var(--accent-muted); color: var(--accent-fg); }
    .chat-msg.assistant .chat-avatar { background: var(--success-muted); color: var(--success-fg); }

    .chat-bubble {
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-md);
      font-size: 10px;
      line-height: 1.4;
      color: var(--color-fg);
    }

    .chat-msg.user .chat-bubble {
      background: var(--accent-subtle);
      border: 1px solid rgba(99, 102, 241, 0.15);
    }

    .chat-msg.assistant .chat-bubble {
      background: var(--color-canvas-subtle);
      border: 1px solid var(--color-border-muted);
    }

    @keyframes chatMsgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Analytics preview */
    .preview-analytics {
      padding: var(--space-3);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
      height: 100%;
      align-items: end;
    }

    .analytics-bars {
      display: flex;
      align-items: flex-end;
      gap: 5px;
      height: 100%;
      padding-top: var(--space-3);
    }

    .analytics-bar {
      flex: 1;
      border-radius: 3px 3px 0 0;
      min-height: 0;
      transition: height 1s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .analytics-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      height: 100%;
    }

    .analytics-pct {
      font-family: var(--font-mono);
      font-size: var(--text-lg);
      font-weight: 600;
      color: var(--accent-fg);
    }

    .analytics-pct-label {
      font-size: 9px;
      color: var(--color-fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* Timeline preview */
    .preview-timeline {
      padding: var(--space-3) var(--space-4);
      display: flex;
      flex-direction: column;
      gap: 5px;
      height: 100%;
      justify-content: center;
    }

    .timeline-row {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      height: 14px;
    }

    .timeline-label {
      font-family: var(--font-mono);
      font-size: 8px;
      color: var(--color-fg-muted);
      width: 48px;
      text-align: right;
      flex-shrink: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .timeline-track {
      flex: 1;
      height: 10px;
      position: relative;
      border-radius: 2px;
    }

    .timeline-bar {
      position: absolute;
      top: 0;
      height: 100%;
      border-radius: 2px;
      width: 0;
      transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* Tool Analysis preview */
    .preview-tools {
      padding: var(--space-3) var(--space-4);
      display: flex;
      flex-direction: column;
      gap: 6px;
      height: 100%;
      justify-content: center;
    }

    .tool-row {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .tool-name {
      font-family: var(--font-mono);
      font-size: 8px;
      color: var(--color-fg-muted);
      width: 60px;
      text-align: right;
      flex-shrink: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tool-bar-track {
      flex: 1;
      height: 12px;
      background: var(--color-border-muted);
      border-radius: 3px;
      overflow: hidden;
    }

    .tool-bar-fill {
      height: 100%;
      border-radius: 3px;
      width: 0;
      transition: width 1s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .tool-pct {
      font-family: var(--font-mono);
      font-size: 8px;
      color: var(--color-fg-muted);
      width: 28px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ===== Ambient Glow ===== */
    .ambient-glow {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.05) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>
  <!-- Ambient background glow -->
  <div class="ambient-glow"></div>

  <!-- ===== Mock Homepage (Phase 4 — behind the loading screen) ===== -->
  <div class="mock-homepage" id="mockHomepage">
    <div class="mock-header">
      <div class="logo-svg" id="mockLogo"></div>
      <span class="mock-header-brand">TracePilot</span>
      <div class="mock-header-spacer"></div>
      <div class="mock-header-search">
        <span class="mock-header-search-icon">🔍</span>
        <span class="mock-header-search-text">Search sessions…</span>
      </div>
      <div class="mock-header-icon">⚙</div>
    </div>
    <div class="mock-body">
      <div class="mock-sidebar">
        <div class="mock-nav-item active">
          <span class="mock-nav-icon">💬</span> Sessions
        </div>
        <div class="mock-nav-item">
          <span class="mock-nav-icon">📊</span> Analytics
        </div>
        <div class="mock-nav-item">
          <span class="mock-nav-icon">⏱️</span> Timelines
        </div>
        <div class="mock-nav-item">
          <span class="mock-nav-icon">🔧</span> Tools
        </div>
        <div class="mock-nav-item">
          <span class="mock-nav-icon">🔍</span> Search
        </div>
      </div>
      <div class="mock-main">
        <div class="mock-main-title">Your Sessions</div>
        <div class="mock-sessions-grid" id="mockSessionsGrid">
          <!-- JS fills these -->
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Loading Screen (Phase 1–3) ===== -->
  <div class="loading-screen" id="loadingScreen">

    <!-- Phase 1: Discovery -->
    <div class="discovery-phase" id="discoveryPhase">
      <div class="discovery-logo">
        <div class="glow-ring"></div>
        <div class="logo-inner" id="discoveryLogo"></div>
      </div>
      <div class="discovery-text" id="discoveryText">Discovering sessions…</div>
      <div class="discovery-count" id="discoveryCount"></div>
    </div>

    <!-- Phase 2: Indexing (stats + features split) -->
    <div class="indexing-phase" id="indexingPhase">
      <div class="top-bar">
        <div class="logo-svg" id="topBarLogo"></div>
        <span class="top-bar-title">TracePilot</span>
        <span class="top-bar-phase" id="topBarPhase">Indexing…</span>
      </div>

      <div class="indexing-content">
        <!-- Left: Live stats -->
        <div class="stats-panel">
          <div class="stats-panel-title">Indexing Progress</div>
          <div class="stat-row" id="statSessions">
            <div class="stat-row-header">
              <span class="stat-row-label">Sessions</span>
              <span class="stat-row-value" id="valSessions">0 / 0</span>
            </div>
            <div class="stat-mini-progress">
              <div class="stat-mini-progress-fill" id="sessionProgressFill"></div>
            </div>
          </div>
          <div class="stat-row" id="statTokens">
            <div class="stat-row-header">
              <span class="stat-row-label">Tokens processed</span>
              <span class="stat-row-value" id="valTokens">0</span>
            </div>
          </div>
          <div class="stat-row" id="statEvents">
            <div class="stat-row-header">
              <span class="stat-row-label">Events parsed</span>
              <span class="stat-row-value" id="valEvents">0</span>
            </div>
          </div>
          <div class="stat-row" id="statTools">
            <div class="stat-row-header">
              <span class="stat-row-label">Tool calls</span>
              <span class="stat-row-value" id="valTools">0</span>
            </div>
          </div>
          <div class="stat-row" id="statRepos">
            <div class="stat-row-header">
              <span class="stat-row-label">Repositories</span>
              <span class="stat-row-value" id="valRepos">0</span>
            </div>
          </div>
        </div>

        <!-- Right: Feature showcase -->
        <div class="feature-panel">
          <div class="feature-card-container" id="featureContainer">
            <!-- JS builds cards from FEATURES -->
          </div>
          <div class="feature-dots" id="featureDots"></div>
        </div>
      </div>

      <div class="bottom-progress">
        <div class="bottom-progress-track">
          <div class="bottom-progress-fill" id="bottomProgressFill"></div>
        </div>
        <div class="bottom-progress-text" id="bottomProgressText">&nbsp;</div>
      </div>

      <!-- Completion overlay (Phase 3) -->
      <div class="completion-overlay" id="completionOverlay">
        <div class="completion-check">✓</div>
        <div class="completion-title">All sessions indexed</div>
        <div class="completion-summary" id="completionSummary"></div>
      </div>
    </div>
  </div>

  <script src="mock-data.js"></script>
  <script>
    // ============================================================
    // DOM References
    // ============================================================
    const discoveryPhase    = document.getElementById('discoveryPhase');
    const discoveryText     = document.getElementById('discoveryText');
    const discoveryCount    = document.getElementById('discoveryCount');
    const indexingPhase     = document.getElementById('indexingPhase');
    const topBarPhase       = document.getElementById('topBarPhase');
    const bottomProgressFill = document.getElementById('bottomProgressFill');
    const bottomProgressText = document.getElementById('bottomProgressText');
    const sessionProgressFill = document.getElementById('sessionProgressFill');
    const loadingScreen     = document.getElementById('loadingScreen');
    const mockHomepage      = document.getElementById('mockHomepage');
    const completionOverlay = document.getElementById('completionOverlay');
    const completionSummary = document.getElementById('completionSummary');
    const featureContainer  = document.getElementById('featureContainer');
    const featureDots       = document.getElementById('featureDots');

    // ============================================================
    // Inject logos
    // ============================================================
    document.getElementById('discoveryLogo').innerHTML = `<div class="logo-svg">${TRACEPILOT_LOGO_SVG}</div>`;
    document.getElementById('topBarLogo').innerHTML = TRACEPILOT_LOGO_SVG;
    document.getElementById('mockLogo').innerHTML = TRACEPILOT_LOGO_SVG;

    // ============================================================
    // Animated Counters
    // ============================================================
    function formatCompact(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 10000) return (n / 1000).toFixed(1) + 'K';
      return n.toLocaleString();
    }

    const ctrTokens = new AnimatedCounter(document.getElementById('valTokens'), {
      format: formatTokens,
      speed: 0.07,
    });
    const ctrEvents = new AnimatedCounter(document.getElementById('valEvents'), {
      format: formatCompact,
      speed: 0.07,
    });
    const ctrTools = new AnimatedCounter(document.getElementById('valTools'), {
      format: formatCompact,
      speed: 0.07,
    });

    // Repos: track unique repos
    let uniqueRepos = new Set();

    // ============================================================
    // Feature Cards — Build from FEATURES array (first 4 only)
    // ============================================================
    const FEATURE_SUBSET = FEATURES.slice(0, 4); // Conversation, Analytics, Timeline, Tool Analysis
    let currentFeature = 0;
    let featureInterval = null;

    function buildFeatureCards() {
      featureContainer.innerHTML = '';
      featureDots.innerHTML = '';

      FEATURE_SUBSET.forEach((feat, i) => {
        const card = document.createElement('div');
        card.className = 'feature-card' + (i === 0 ? ' active' : '');
        card.dataset.index = i;
        card.innerHTML = `
          <div class="feature-card-header">
            <div class="feature-icon" style="background: ${feat.color}22;">${feat.icon}</div>
            <span class="feature-title">${feat.title}</span>
          </div>
          <div class="feature-description">${feat.description}</div>
          <div class="feature-preview" id="preview-${i}"></div>
        `;
        featureContainer.appendChild(card);

        const dot = document.createElement('button');
        dot.className = 'feature-dot' + (i === 0 ? ' active' : '');
        dot.addEventListener('click', () => goToFeature(i));
        featureDots.appendChild(dot);
      });

      // Build preview contents
      buildChatPreview(document.getElementById('preview-0'));
      buildAnalyticsPreview(document.getElementById('preview-1'));
      buildTimelinePreview(document.getElementById('preview-2'));
      buildToolsPreview(document.getElementById('preview-3'));
    }

    function goToFeature(index) {
      if (index === currentFeature) return;
      const cards = featureContainer.querySelectorAll('.feature-card');
      const dots = featureDots.querySelectorAll('.feature-dot');

      // Exit current
      cards[currentFeature].classList.remove('active');
      cards[currentFeature].classList.add('exiting');
      dots[currentFeature].classList.remove('active');

      // Enter new
      setTimeout(() => {
        cards[currentFeature].classList.remove('exiting');
        currentFeature = index;
        cards[currentFeature].classList.add('active');
        dots[currentFeature].classList.add('active');
        animatePreview(currentFeature);
      }, 250);
    }

    function startFeatureRotation() {
      if (featureInterval) clearInterval(featureInterval);
      featureInterval = setInterval(() => {
        const next = (currentFeature + 1) % FEATURE_SUBSET.length;
        goToFeature(next);
      }, 5000);
    }

    function stopFeatureRotation() {
      if (featureInterval) clearInterval(featureInterval);
    }

    // ============================================================
    // Mini Preview Builders
    // ============================================================
    function buildChatPreview(container) {
      container.innerHTML = '<div class="preview-chat" id="chatPreview"></div>';
      const chat = container.querySelector('.preview-chat');
      const msgs = MOCK_CONVERSATIONS.slice(0, 3);
      msgs.forEach((m, i) => {
        const div = document.createElement('div');
        div.className = `chat-msg ${m.role}`;
        div.innerHTML = `
          <div class="chat-avatar">${m.role === 'user' ? 'U' : 'A'}</div>
          <div class="chat-bubble">${m.text.substring(0, 60)}${m.text.length > 60 ? '…' : ''}</div>
        `;
        chat.appendChild(div);
      });
    }

    function buildAnalyticsPreview(container) {
      container.innerHTML = `
        <div class="preview-analytics">
          <div class="analytics-bars" id="analyticsBars">
            <div class="analytics-bar" style="background: var(--accent-fg); height: 0;" data-h="65%"></div>
            <div class="analytics-bar" style="background: var(--success-fg); height: 0;" data-h="85%"></div>
            <div class="analytics-bar" style="background: var(--warning-fg); height: 0;" data-h="45%"></div>
            <div class="analytics-bar" style="background: var(--done-fg); height: 0;" data-h="72%"></div>
          </div>
          <div class="analytics-right">
            <div class="analytics-pct" id="analyticsPct">0%</div>
            <div class="analytics-pct-label">Efficiency</div>
          </div>
        </div>
      `;
    }

    function buildTimelinePreview(container) {
      const rows = [
        { label: 'read_file', width: '75%', color: 'var(--accent-fg)', delay: 0 },
        { label: 'edit_file', width: '55%', color: 'var(--success-fg)', delay: 100 },
        { label: 'grep', width: '40%', color: 'var(--warning-fg)', delay: 200 },
        { label: 'terminal', width: '85%', color: 'var(--done-fg)', delay: 300 },
        { label: 'git_diff', width: '30%', color: 'var(--danger-fg)', delay: 400 },
      ];
      container.innerHTML = `<div class="preview-timeline" id="timelinePreview">${
        rows.map(r => `
          <div class="timeline-row">
            <span class="timeline-label">${r.label}</span>
            <div class="timeline-track">
              <div class="timeline-bar" data-w="${r.width}" data-d="${r.delay}" style="background: ${r.color};"></div>
            </div>
          </div>
        `).join('')
      }</div>`;
    }

    function buildToolsPreview(container) {
      const tools = [
        { name: 'edit_file', pct: 82, color: 'var(--accent-fg)' },
        { name: 'read_file', pct: 65, color: 'var(--success-fg)' },
        { name: 'terminal', pct: 41, color: 'var(--warning-fg)' },
      ];
      container.innerHTML = `<div class="preview-tools" id="toolsPreview">${
        tools.map(t => `
          <div class="tool-row">
            <span class="tool-name">${t.name}</span>
            <div class="tool-bar-track">
              <div class="tool-bar-fill" data-w="${t.pct}%" style="background: ${t.color};"></div>
            </div>
            <span class="tool-pct" data-v="${t.pct}">0%</span>
          </div>
        `).join('')
      }</div>`;
    }

    // ============================================================
    // Animate Previews
    // ============================================================
    function animatePreview(index) {
      switch (index) {
        case 0: animateChat(); break;
        case 1: animateAnalytics(); break;
        case 2: animateTimeline(); break;
        case 3: animateTools(); break;
      }
    }

    function animateChat() {
      const msgs = document.querySelectorAll('#chatPreview .chat-msg');
      msgs.forEach(m => m.classList.remove('visible'));
      msgs.forEach((m, i) => {
        setTimeout(() => m.classList.add('visible'), 300 + i * 500);
      });
    }

    function animateAnalytics() {
      const bars = document.querySelectorAll('#analyticsBars .analytics-bar');
      bars.forEach(b => { b.style.height = '0'; });
      setTimeout(() => {
        bars.forEach(b => { b.style.height = b.dataset.h; });
      }, 200);

      // Count up percentage
      const pctEl = document.getElementById('analyticsPct');
      if (pctEl) {
        let c = 0;
        const target = 87;
        const interval = setInterval(() => {
          c += 2;
          if (c >= target) { c = target; clearInterval(interval); }
          pctEl.textContent = c + '%';
        }, 30);
      }
    }

    function animateTimeline() {
      const bars = document.querySelectorAll('#timelinePreview .timeline-bar');
      bars.forEach(b => { b.style.width = '0'; });
      setTimeout(() => {
        bars.forEach(b => {
          const delay = parseInt(b.dataset.d) || 0;
          setTimeout(() => { b.style.width = b.dataset.w; }, delay);
        });
      }, 200);
    }

    function animateTools() {
      const fills = document.querySelectorAll('#toolsPreview .tool-bar-fill');
      const pcts = document.querySelectorAll('#toolsPreview .tool-pct');
      fills.forEach(f => { f.style.width = '0'; });
      pcts.forEach(p => { p.textContent = '0%'; });
      setTimeout(() => {
        fills.forEach((f, i) => {
          setTimeout(() => { f.style.width = f.dataset.w; }, i * 150);
        });
        pcts.forEach((p, i) => {
          const target = parseInt(p.dataset.v);
          let c = 0;
          setTimeout(() => {
            const interval = setInterval(() => {
              c += 2;
              if (c >= target) { c = target; clearInterval(interval); }
              p.textContent = c + '%';
            }, 25);
          }, i * 150);
        });
      }, 200);
    }

    // ============================================================
    // Build Mock Homepage Session Cards
    // ============================================================
    function buildMockHomepage() {
      const grid = document.getElementById('mockSessionsGrid');
      const mockCards = [
        { repo: 'frontend-app', branch: 'main', badge: 'accent', badgeText: 'claude-sonnet-4', tokens: '45.2K', turns: 18 },
        { repo: 'api-server', branch: 'feat/auth', badge: 'success', badgeText: 'gpt-4.1', tokens: '78.5K', turns: 32 },
        { repo: 'data-pipeline', branch: 'develop', badge: 'accent', badgeText: 'claude-sonnet-4', tokens: '23.1K', turns: 8 },
        { repo: 'mobile-app', branch: 'feat/ui', badge: 'warning', badgeText: 'claude-opus-4', tokens: '91.2K', turns: 45 },
        { repo: 'infra-config', branch: 'main', badge: 'done', badgeText: 'claude-sonnet-4', tokens: '34.5K', turns: 14 },
      ];

      grid.innerHTML = mockCards.map(c => `
        <div class="mock-session-card">
          <div class="mock-card-top">
            <span class="mock-card-badge ${c.badge}">${c.badgeText}</span>
          </div>
          <div class="mock-card-repo">${c.repo}<span style="color: var(--color-fg-subtle); font-weight: 400; font-size: 11px;"> / ${c.branch}</span></div>
          <div class="mock-card-meta">${c.tokens} tokens · ${c.turns} turns</div>
          <div class="mock-card-shimmer">
            <div class="mock-card-shimmer-inner"></div>
          </div>
        </div>
      `).join('');
    }

    // ============================================================
    // Phase Management
    // ============================================================
    let totalSessions = 20;

    function showDiscoveryPhase() {
      discoveryPhase.classList.remove('hidden');
      indexingPhase.classList.remove('active');
      discoveryText.textContent = 'Discovering sessions…';
      discoveryCount.classList.remove('visible');
    }

    function showDiscoveryCount(count) {
      discoveryCount.textContent = `Found ${count} sessions`;
      discoveryCount.classList.add('visible');
    }

    function showIndexingPhase() {
      discoveryPhase.classList.add('hidden');
      indexingPhase.classList.add('active');
      indexingPhase.style.opacity = '0';
      requestAnimationFrame(() => {
        indexingPhase.style.opacity = '1';
      });
      startFeatureRotation();
      animatePreview(0);
    }

    function showCompletionSummary(stats) {
      stopFeatureRotation();
      topBarPhase.textContent = 'Complete';
      topBarPhase.style.color = 'var(--success-fg)';

      bottomProgressFill.classList.add('complete');

      // Glow on stat rows
      const rows = document.querySelectorAll('.stat-row');
      rows.forEach((r, i) => {
        setTimeout(() => r.classList.add('glow-success'), i * 100);
      });

      completionSummary.innerHTML = `
        <span>${formatTokens(stats.totalTokens)}</span> tokens ·
        <span>${uniqueRepos.size}</span> repos ·
        <span>${formatCompact(stats.totalToolCalls)}</span> tool calls
      `;
      setTimeout(() => {
        completionOverlay.classList.add('visible');
      }, 400);
    }

    function zoomInReveal() {
      mockHomepage.classList.add('visible');
      setTimeout(() => {
        loadingScreen.classList.add('zoom-out');
      }, 200);
    }

    // ============================================================
    // Main Simulation
    // ============================================================
    let sim = null;

    function resetUI() {
      // Reset loading screen
      loadingScreen.classList.remove('zoom-out');
      loadingScreen.style.display = '';
      mockHomepage.classList.remove('visible');
      completionOverlay.classList.remove('visible');
      bottomProgressFill.style.width = '0%';
      bottomProgressFill.classList.remove('complete');
      bottomProgressText.textContent = '\u00A0';
      sessionProgressFill.style.width = '0%';
      topBarPhase.textContent = 'Indexing…';
      topBarPhase.style.color = '';

      // Reset counters
      ctrTokens.current = 0; ctrTokens.target = 0;
      ctrEvents.current = 0; ctrEvents.target = 0;
      ctrTools.current = 0; ctrTools.target = 0;
      document.getElementById('valTokens').textContent = '0';
      document.getElementById('valEvents').textContent = '0';
      document.getElementById('valTools').textContent = '0';
      document.getElementById('valSessions').textContent = '0 / 0';
      document.getElementById('valRepos').textContent = '0';
      uniqueRepos = new Set();

      // Reset stat row glow
      document.querySelectorAll('.stat-row').forEach(r => r.classList.remove('glow-success'));

      // Reset feature cards
      currentFeature = 0;
      stopFeatureRotation();

      showDiscoveryPhase();
    }

    function startSimulation(durationSec, sessionCount) {
      if (sim) sim.stop();
      resetUI();
      totalSessions = sessionCount;

      sim = new LoadingSimulator({
        totalSessions: sessionCount,
        durationMs: durationSec * 1000,

        onProgress(fraction, phase) {
          if (phase === 'indexing' || phase === 'finalizing') {
            bottomProgressFill.style.width = (fraction * 100) + '%';
          }
        },

        onPhaseChange(phase) {
          if (phase === 'discovering') {
            showDiscoveryPhase();
            // Show count midway through discovery
            setTimeout(() => showDiscoveryCount(sessionCount), durationSec * 50);
          }

          if (phase === 'indexing') {
            showIndexingPhase();
          }

          if (phase === 'finalizing') {
            topBarPhase.textContent = 'Finalizing…';
          }

          if (phase === 'complete') {
            // handled by onComplete
          }
        },

        onSessionProcessed({ current, total, session }) {
          document.getElementById('valSessions').textContent = `${current} / ${total}`;
          sessionProgressFill.style.width = ((current / total) * 100) + '%';
          bottomProgressText.textContent = `Indexing session ${current} of ${total}…`;

          // Track unique repos
          if (session && session.repo) {
            uniqueRepos.add(session.repo);
            document.getElementById('valRepos').textContent = uniqueRepos.size;
          }
        },

        onStatsUpdate(stats) {
          ctrTokens.set(stats.totalTokens);
          ctrEvents.set(stats.totalEvents);
          ctrTools.set(stats.totalToolCalls);
        },

        onComplete(stats) {
          // Phase 3: completion summary
          document.getElementById('valSessions').textContent = `${totalSessions} / ${totalSessions}`;
          sessionProgressFill.style.width = '100%';
          bottomProgressText.textContent = 'All sessions indexed';

          showCompletionSummary(stats);

          // Phase 4: zoom-in reveal after 1.5s
          setTimeout(() => {
            zoomInReveal();
          }, 1500);
        },
      });

      sim.start();
    }

    // ============================================================
    // Initialize
    // ============================================================
    buildFeatureCards();
    buildMockHomepage();
    showDiscoveryPhase();

    // ============================================================
    // Demo Controls
    // ============================================================
    createDemoControls(document.body, {
      defaultDuration: 12,
      onStart(duration, sessions) {
        startSimulation(duration, sessions);
      },
      onReset() {
        if (sim) sim.stop();
        resetUI();
      },
    });
  </script>
</body>
</html>
