<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TracePilot — Prototype K: Constellation V2</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    /* ── Star field background ── */
    .starfield {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 1px;
      height: 1px;
      background: #e6edf3;
      border-radius: 50%;
      animation: starTwinkle var(--dur, 3s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }

    .star.bright {
      width: 2px;
      height: 2px;
      box-shadow: 0 0 3px rgba(230, 237, 243, 0.4);
    }

    @keyframes starTwinkle {
      0%, 100% { opacity: var(--min-o, 0.15); }
      50%      { opacity: var(--max-o, 0.5); }
    }

    /* ── Grid overlay (star chart feel) ── */
    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    .grid-overlay.visible {
      opacity: 1;
    }

    .grid-overlay svg {
      width: 100%;
      height: 100%;
    }

    /* ── Constellation Field ── */
    .constellation-field {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 1;
    }

    .constellation-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .constellation-svg line {
      stroke-linecap: round;
    }

    /* ── Connection labels ── */
    .connection-label {
      position: absolute;
      font-size: 9px;
      font-family: var(--font-mono);
      color: var(--color-fg-subtle);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.6s ease;
      white-space: nowrap;
      z-index: 2;
    }

    .connection-label.visible {
      opacity: 0.5;
    }

    /* ── Cluster Labels ── */
    .cluster-label {
      position: absolute;
      z-index: 3;
      pointer-events: none;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: var(--radius-sm);
      background: rgba(22, 27, 34, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(48, 54, 61, 0.4);
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .cluster-label.visible {
      opacity: 0.7;
      transform: translateY(0);
    }

    /* ── Nodes ── */
    .constellation-node {
      position: absolute;
      z-index: 4;
      pointer-events: auto;
      cursor: default;
    }

    /* Dot state (initial) */
    .node-dot {
      width: var(--dot-size, 8px);
      height: var(--dot-size, 8px);
      border-radius: 50%;
      background: var(--node-color, #818cf8);
      box-shadow: 0 0 8px 2px var(--node-glow, rgba(129, 140, 248, 0.4));
      transform: scale(0);
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease, box-shadow 0.6s ease;
    }

    .constellation-node.active .node-dot {
      animation: dotPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes dotPop {
      0%   { transform: scale(0); opacity: 0; }
      50%  { transform: scale(1.6); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Ring around dot */
    .node-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1.5px solid var(--node-color, #818cf8);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .constellation-node.active .node-ring {
      opacity: 0.25;
      animation: ringPulse 3s ease-in-out infinite;
      animation-delay: var(--ring-delay, 0s);
    }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: 0.2; }
      50%      { transform: scale(1.3); opacity: 0.35; }
    }

    /* Mini card state (expanded) */
    .node-card {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 6px 10px;
      white-space: nowrap;
      pointer-events: auto;
      transition: transform 0.4s cubic-bezier(0.34, 1.2, 0.64, 1),
                  opacity 0.3s ease,
                  border-color 0.2s ease,
                  width 0.6s ease,
                  height 0.6s ease;
      min-width: 120px;
    }

    .node-card.visible {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }

    .node-card:hover {
      border-color: var(--node-color, #818cf8);
    }

    .node-card .card-repo {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 500;
      color: #e6edf3;
    }

    .node-card .card-repo-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--node-color, #818cf8);
      flex-shrink: 0;
    }

    .node-card .card-meta {
      font-size: 10px;
      font-family: var(--font-mono);
      color: #7d8590;
      margin-top: 2px;
      display: flex;
      gap: 6px;
    }

    /* ── Center Logo (Phase 1) ── */
    .center-logo {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-3);
      opacity: 0;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .center-logo.visible {
      opacity: 1;
    }

    .center-logo.fade-up {
      opacity: 0;
      transform: translate(-50%, -55%);
    }

    .center-logo .logo-svg {
      width: 56px;
      height: 56px;
      filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.6));
    }

    .center-logo .logo-glow {
      position: absolute;
      width: 120px;
      height: 120px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -65%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
      animation: glow-pulse 3s ease-in-out infinite;
    }

    .center-logo .scan-text {
      font-size: var(--text-sm);
      color: var(--color-fg-muted);
      letter-spacing: 0.04em;
    }

    /* ── Stats Panel (bottom center) ── */
    .stats-panel {
      position: fixed;
      bottom: 72px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      align-items: center;
      gap: var(--space-6);
      padding: var(--space-3) var(--space-6);
      background: rgba(22, 27, 34, 0.7);
      backdrop-filter: blur(20px) saturate(1.3);
      -webkit-backdrop-filter: blur(20px) saturate(1.3);
      border: 1px solid var(--color-border-muted);
      border-radius: var(--radius-lg);
      font-size: var(--text-sm);
      opacity: 0;
      transform: translateX(-50%) translateY(12px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .stats-panel.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .stats-panel .stat-group {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .stats-panel .stat-main {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .stats-panel .stat-current {
      font-family: var(--font-mono);
      font-size: var(--text-md);
      font-weight: 600;
      color: var(--accent-fg);
      font-variant-numeric: tabular-nums;
    }

    .stats-panel .stat-total {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      color: var(--color-fg-subtle);
      font-variant-numeric: tabular-nums;
    }

    .stats-panel .stat-mini-bar {
      width: 60px;
      height: 3px;
      background: var(--color-border-muted);
      border-radius: 2px;
      overflow: hidden;
    }

    .stats-panel .stat-mini-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-emphasis), var(--accent-fg));
      border-radius: 2px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      width: 0%;
    }

    .stats-panel .stat-divider {
      width: 1px;
      height: 20px;
      background: var(--color-border-muted);
    }

    .stats-panel .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }

    .stats-panel .stat-item-value {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--color-fg);
      font-variant-numeric: tabular-nums;
    }

    .stats-panel .stat-item-label {
      font-size: 9px;
      color: var(--color-fg-subtle);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .stats-panel .phase-label {
      font-size: var(--text-xs);
      color: var(--color-fg-muted);
      max-width: 150px;
      text-align: right;
    }

    /* ── Morph: Final App Chrome ── */
    .app-chrome {
      position: fixed;
      inset: 0;
      z-index: 50;
      pointer-events: none;
      opacity: 0;
    }

    .app-chrome.visible {
      pointer-events: auto;
      opacity: 1;
    }

    .app-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 52px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      z-index: 52;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      transform: translateY(-100%);
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .app-header.visible {
      transform: translateY(0);
    }

    .app-header .header-logo {
      width: 28px;
      height: 28px;
    }

    .app-header .header-title {
      font-size: var(--text-md);
      font-weight: 600;
      color: var(--color-fg);
    }

    .app-header .header-search {
      margin-left: auto;
      width: 260px;
      height: 32px;
      border-radius: var(--radius-sm);
      background: var(--color-canvas);
      border: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      padding: 0 10px;
      font-size: var(--text-sm);
      color: var(--color-fg-subtle);
    }

    .app-sidebar {
      position: fixed;
      top: 52px;
      left: 0;
      bottom: 0;
      width: 220px;
      background: #161b22;
      border-right: 1px solid #30363d;
      z-index: 51;
      padding: 16px 0;
      transform: translateX(-100%);
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .app-sidebar.visible {
      transform: translateX(0);
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      font-size: var(--text-sm);
      color: var(--color-fg-muted);
    }

    .sidebar-item.active {
      color: var(--color-fg);
      background: rgba(99, 102, 241, 0.1);
      border-right: 2px solid var(--accent-fg);
    }

    .sidebar-item .sidebar-icon {
      font-size: 14px;
      width: 20px;
      text-align: center;
    }

    /* ── Session grid (morph target) ── */
    .session-grid-container {
      position: fixed;
      top: 52px;
      left: 220px;
      right: 0;
      bottom: 0;
      padding: 24px;
      z-index: 50;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .session-grid-container.visible {
      opacity: 1;
    }

    .grid-header {
      font-size: var(--text-lg);
      font-weight: 600;
      color: var(--color-fg);
      margin-bottom: 16px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .grid-header.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Final session card (post-morph) ── */
    .session-card-final {
      position: absolute;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 14px 16px;
      width: var(--card-w, 280px);
      opacity: 0;
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .session-card-final.placed {
      opacity: 1;
    }

    .session-card-final .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 8px;
    }

    .session-card-final .card-badges {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .session-card-final .badge {
      font-size: 10px;
      font-family: var(--font-mono);
      padding: 2px 8px;
      border-radius: 9999px;
      font-weight: 500;
    }

    .session-card-final .badge-branch {
      background: rgba(99, 102, 241, 0.15);
      color: #818cf8;
      border: 1px solid rgba(99, 102, 241, 0.25);
    }

    .session-card-final .badge-model {
      background: rgba(167, 139, 250, 0.15);
      color: #a78bfa;
      border: 1px solid rgba(167, 139, 250, 0.25);
    }

    .session-card-final .card-stats {
      font-size: 11px;
      color: #7d8590;
      margin-bottom: 4px;
    }

    .session-card-final .card-time {
      font-size: 10px;
      color: #484f58;
    }

    /* ── Polish shimmer effect ── */
    @keyframes shimmerWave {
      0%   { left: -100%; }
      100% { left: 200%; }
    }

    .shimmer-overlay {
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
      pointer-events: none;
      border-radius: inherit;
    }

    .session-card-final.shimmer .shimmer-overlay {
      animation: shimmerWave 0.8s ease-out forwards;
    }

    /* ── Breathing dot animation ── */
    @keyframes dotBreathe {
      0%, 100% { opacity: 0.6; box-shadow: 0 0 6px 2px var(--node-glow); }
      50%      { opacity: 1; box-shadow: 0 0 12px 4px var(--node-glow); }
    }

    .constellation-node.breathing .node-dot {
      animation: dotBreathe 2.5s ease-in-out infinite;
      animation-delay: var(--breath-delay, 0s);
    }

    /* ── Completion flash ── */
    @keyframes completionPulse {
      0%   { opacity: 0; }
      30%  { opacity: 0.08; }
      100% { opacity: 0; }
    }

    .completion-flash {
      position: fixed;
      inset: 0;
      background: var(--accent-fg);
      opacity: 0;
      pointer-events: none;
      z-index: 45;
    }

    .completion-flash.active {
      animation: completionPulse 1s ease-out forwards;
    }

    /* ── Morph state transitions on nodes ── */
    .constellation-node.morphing {
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1) !important;
      z-index: 40;
    }

    .constellation-node.morphing .node-dot {
      transition: opacity 0.3s ease;
      opacity: 0 !important;
    }

    .constellation-node.morphing .node-ring {
      transition: opacity 0.3s ease;
      opacity: 0 !important;
    }

    .constellation-node.morphing .node-card {
      transition: opacity 0.3s ease;
      opacity: 0 !important;
    }
  </style>
</head>
<body>
  <!-- Progress bar -->
  <div class="progress-bar-track">
    <div class="progress-bar-fill" id="progress-bar"></div>
  </div>

  <!-- Star field -->
  <div class="starfield" id="starfield"></div>

  <!-- Grid overlay -->
  <div class="grid-overlay" id="grid-overlay"></div>

  <!-- Constellation field -->
  <div class="constellation-field" id="constellation-field">
    <svg class="constellation-svg" id="constellation-svg"></svg>
  </div>

  <!-- Center logo (Phase 1) -->
  <div class="center-logo" id="center-logo">
    <div class="logo-glow"></div>
    <div class="logo-svg" id="logo"></div>
    <div class="scan-text" id="scan-text">Scanning session state…</div>
  </div>

  <!-- Stats panel (bottom center) -->
  <div class="stats-panel" id="stats-panel">
    <div class="stat-group">
      <div class="stat-main">
        <span class="stat-current" id="stat-sessions-current">0</span>
        <span class="stat-total"> / <span id="stat-sessions-total">0</span></span>
      </div>
      <div class="stat-mini-bar">
        <div class="stat-mini-fill" id="stat-mini-fill"></div>
      </div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-item-value" id="stat-tokens">0</span>
      <span class="stat-item-label">Tokens</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-item-value" id="stat-events">0</span>
      <span class="stat-item-label">Events</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-item-value" id="stat-repos">0</span>
      <span class="stat-item-label">Repos</span>
    </div>
    <div class="stat-divider"></div>
    <div class="phase-label" id="phase-label">Discovering…</div>
  </div>

  <!-- App chrome (morphs in at end) -->
  <div class="app-chrome" id="app-chrome">
    <div class="app-header" id="app-header">
      <div class="header-logo" id="header-logo"></div>
      <span class="header-title">TracePilot</span>
      <div class="header-search">⌘K  Search sessions…</div>
    </div>
    <div class="app-sidebar" id="app-sidebar">
      <div class="sidebar-item active"><span class="sidebar-icon">📋</span> Sessions</div>
      <div class="sidebar-item"><span class="sidebar-icon">📊</span> Analytics</div>
      <div class="sidebar-item"><span class="sidebar-icon">⏱️</span> Timeline</div>
      <div class="sidebar-item"><span class="sidebar-icon">🔧</span> Tools</div>
      <div class="sidebar-item"><span class="sidebar-icon">💻</span> Code Impact</div>
      <div class="sidebar-item"><span class="sidebar-icon">⚙️</span> Settings</div>
    </div>
    <div class="session-grid-container" id="session-grid-container">
      <div class="grid-header" id="grid-header">All Sessions</div>
    </div>
  </div>

  <!-- Completion flash -->
  <div class="completion-flash" id="completion-flash"></div>

  <script src="mock-data.js"></script>
  <script>
    // ── Repo colors ──
    const REPO_COLORS = {
      'frontend-app':  '#818cf8',
      'api-server':    '#34d399',
      'data-pipeline': '#fbbf24',
      'mobile-app':    '#f87171',
      'infra-config':  '#a78bfa',
      'ml-service':    '#38bdf8',
      'docs-site':     '#fb923c',
    };

    // Cluster centers (% of viewport)
    const CLUSTER_CENTERS = {
      'frontend-app':  { x: 0.20, y: 0.25 },
      'api-server':    { x: 0.70, y: 0.20 },
      'data-pipeline': { x: 0.15, y: 0.55 },
      'mobile-app':    { x: 0.50, y: 0.45 },
      'infra-config':  { x: 0.30, y: 0.75 },
      'ml-service':    { x: 0.75, y: 0.65 },
      'docs-site':     { x: 0.55, y: 0.80 },
    };

    const PHASE_LABELS = {
      idle:        'Preparing…',
      discovering: 'Scanning session directories…',
      indexing:    'Indexing sessions…',
      finalizing:  'Building search index…',
      complete:    'Ready — launching TracePilot',
    };

    const TIME_LABELS = ['just now', '5 min ago', '1 hour ago', '2 hours ago', '3 hours ago', 'yesterday', '2 days ago', 'last week'];

    // ── State ──
    let nodes = [];
    let connections = [];
    let clusterLabels = {};
    let clusterCounts = {};
    let discoveredRepos = new Set();
    let simulator = null;
    let fieldW, fieldH;
    let nodeIndex = 0;
    let morphing = false;

    // ── DOM refs ──
    const field = document.getElementById('constellation-field');
    const svg = document.getElementById('constellation-svg');
    const progressBar = document.getElementById('progress-bar');
    const centerLogo = document.getElementById('center-logo');
    const scanText = document.getElementById('scan-text');
    const statsPanel = document.getElementById('stats-panel');
    const phaseLabel = document.getElementById('phase-label');
    const statMiniFill = document.getElementById('stat-mini-fill');
    const completionFlash = document.getElementById('completion-flash');
    const appChrome = document.getElementById('app-chrome');
    const appHeader = document.getElementById('app-header');
    const appSidebar = document.getElementById('app-sidebar');
    const gridContainer = document.getElementById('session-grid-container');
    const gridHeader = document.getElementById('grid-header');

    // Logo
    document.getElementById('logo').innerHTML = TRACEPILOT_LOGO_SVG;
    document.getElementById('header-logo').innerHTML = TRACEPILOT_LOGO_SVG;

    // Animated counters
    const tokenCounter = new AnimatedCounter(document.getElementById('stat-tokens'), { format: formatTokens });
    const eventCounter = new AnimatedCounter(document.getElementById('stat-events'), { format: n => formatTokens(n) });
    const repoCounter  = new AnimatedCounter(document.getElementById('stat-repos'),  { format: n => String(Math.round(n)) });
    const sessionsCurrentCounter = new AnimatedCounter(document.getElementById('stat-sessions-current'), { format: n => String(Math.round(n)) });

    // ── Stars ──
    function generateStars() {
      const starfield = document.getElementById('starfield');
      starfield.innerHTML = '';
      for (let i = 0; i < 120; i++) {
        const star = document.createElement('div');
        const isBright = Math.random() < 0.15;
        star.className = 'star' + (isBright ? ' bright' : '');
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.setProperty('--dur', (2 + Math.random() * 4) + 's');
        star.style.setProperty('--delay', (Math.random() * 4) + 's');
        star.style.setProperty('--min-o', (0.05 + Math.random() * 0.15).toFixed(2));
        star.style.setProperty('--max-o', (0.3 + Math.random() * 0.4).toFixed(2));
        starfield.appendChild(star);
      }
    }

    // ── Grid Overlay ──
    function generateGridOverlay() {
      const gridOv = document.getElementById('grid-overlay');
      const w = window.innerWidth;
      const h = window.innerHeight;
      const spacing = 80;
      let lines = '';
      for (let x = spacing; x < w; x += spacing) {
        lines += `<line x1="${x}" y1="0" x2="${x}" y2="${h}" stroke="#21262d" stroke-width="0.5" stroke-opacity="0.2"/>`;
      }
      for (let y = spacing; y < h; y += spacing) {
        lines += `<line x1="0" y1="${y}" x2="${w}" y2="${y}" stroke="#21262d" stroke-width="0.5" stroke-opacity="0.2"/>`;
      }
      // Coordinate axes through center
      lines += `<line x1="${w/2}" y1="0" x2="${w/2}" y2="${h}" stroke="#30363d" stroke-width="0.7" stroke-opacity="0.3"/>`;
      lines += `<line x1="0" y1="${h/2}" x2="${w}" y2="${h/2}" stroke="#30363d" stroke-width="0.7" stroke-opacity="0.3"/>`;
      gridOv.innerHTML = `<svg width="${w}" height="${h}">${lines}</svg>`;
    }

    // ── Layout ──
    function measureField() {
      fieldW = window.innerWidth;
      fieldH = window.innerHeight;
    }

    function getClusterPosition(repo) {
      const center = CLUSTER_CENTERS[repo] || { x: 0.5, y: 0.5 };
      const margin = 80;
      return {
        cx: margin + center.x * (fieldW - margin * 2),
        cy: margin + center.y * (fieldH - margin * 2),
      };
    }

    function getNodePosition(session) {
      const cluster = getClusterPosition(session.repo);
      const spread = 70 + Math.random() * 50;
      const angle = Math.random() * Math.PI * 2;
      const r = Math.random() * spread;
      return {
        x: cluster.cx + r * Math.cos(angle),
        y: cluster.cy + r * Math.sin(angle),
      };
    }

    function getNodeDotSize(tokens) {
      const min = 6, max = 14;
      const minT = 5000, maxT = 250000;
      const t = Math.max(0, Math.min(1, (tokens - minT) / (maxT - minT)));
      return min + t * (max - min);
    }

    // ── Node creation ──
    function createNode(session, index, total) {
      const pos = getNodePosition(session);
      const dotSize = getNodeDotSize(session.tokens);
      const color = REPO_COLORS[session.repo] || '#818cf8';
      const phase = Math.random() * Math.PI * 2;

      const el = document.createElement('div');
      el.className = 'constellation-node';
      el.style.left = pos.x + 'px';
      el.style.top = pos.y + 'px';
      el.style.setProperty('--node-color', color);
      el.style.setProperty('--node-glow', color + '66');
      el.style.setProperty('--dot-size', dotSize + 'px');
      el.style.setProperty('--ring-delay', (Math.random() * 2) + 's');
      el.style.setProperty('--breath-delay', (Math.random() * 2.5) + 's');

      // Dot
      const dot = document.createElement('div');
      dot.className = 'node-dot';
      el.appendChild(dot);

      // Ring
      const ring = document.createElement('div');
      ring.className = 'node-ring';
      el.appendChild(ring);

      // Mini card (hidden initially)
      const card = document.createElement('div');
      card.className = 'node-card';
      card.style.setProperty('--node-color', color);
      card.innerHTML = `
        <div class="card-repo">
          <span class="card-repo-dot"></span>
          ${session.repo}
        </div>
        <div class="card-meta">
          <span>${session.branch}</span>
          <span>·</span>
          <span>${formatTokens(session.tokens)} tok</span>
        </div>
      `;
      el.appendChild(card);

      field.appendChild(el);

      // Pop animation
      requestAnimationFrame(() => {
        el.classList.add('active');
        // Start breathing after pop
        setTimeout(() => el.classList.add('breathing'), 600);
      });

      const node = {
        el, dot, ring, card, pos, dotSize, color, session, phase,
        expanded: false, index,
      };
      nodes.push(node);

      // Schedule expand to card after 1s (if indexing phase, expand progressively)
      const expandDelay = 800 + Math.random() * 400;
      setTimeout(() => expandNode(node), expandDelay);

      // Update cluster tracking
      if (!clusterCounts[session.repo]) clusterCounts[session.repo] = 0;
      clusterCounts[session.repo]++;
      if (clusterCounts[session.repo] >= 2) {
        showClusterLabel(session.repo);
      }

      return node;
    }

    function expandNode(node) {
      if (node.expanded || morphing) return;
      node.expanded = true;
      node.card.classList.add('visible');
      // Fade dot slightly
      node.dot.style.opacity = '0.4';
      node.dot.style.transform = 'scale(0.6)';
    }

    function expandAllNodes() {
      nodes.forEach(n => {
        if (!n.expanded) expandNode(n);
      });
    }

    // ── Cluster labels ──
    function showClusterLabel(repo) {
      if (clusterLabels[repo]) return;
      const cluster = getClusterPosition(repo);
      const color = REPO_COLORS[repo] || '#818cf8';

      const label = document.createElement('div');
      label.className = 'cluster-label';
      label.style.left = (cluster.cx - 40) + 'px';
      label.style.top = (cluster.cy - 70) + 'px';
      label.style.color = color;
      label.style.borderColor = color + '30';
      label.textContent = repo;
      field.appendChild(label);

      clusterLabels[repo] = label;
      requestAnimationFrame(() => label.classList.add('visible'));
    }

    // ── Connections ──
    function findConnections(newNode) {
      const related = [];
      for (const existing of nodes) {
        if (existing === newNode) continue;
        const s1 = newNode.session;
        const s2 = existing.session;
        if (s1.repo === s2.repo) {
          related.push({ node: existing, type: 'repo' });
        } else if (s1.model === s2.model) {
          related.push({ node: existing, type: 'model' });
        }
      }
      // Limit: 2 repo + 1 model connections max per new node
      const repoConns = related.filter(r => r.type === 'repo').slice(0, 2);
      const modelConns = related.filter(r => r.type === 'model').slice(0, 1);
      return [...repoConns, ...modelConns];
    }

    function createConnection(nodeA, nodeB, type) {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', nodeA.pos.x);
      line.setAttribute('y1', nodeA.pos.y);
      line.setAttribute('x2', nodeB.pos.x);
      line.setAttribute('y2', nodeB.pos.y);

      const isRepo = type === 'repo';
      const color = isRepo ? nodeA.color : '#484f58';
      const opacity = isRepo ? 0.3 : 0.15;

      line.setAttribute('stroke', color);
      line.setAttribute('stroke-opacity', '0');
      line.setAttribute('stroke-width', isRepo ? '1.2' : '0.6');
      if (!isRepo) {
        line.setAttribute('stroke-dasharray', '4 4');
      }

      const length = Math.hypot(nodeB.pos.x - nodeA.pos.x, nodeB.pos.y - nodeA.pos.y);
      line.setAttribute('stroke-dasharray', isRepo ? length : `4 4`);
      line.setAttribute('stroke-dashoffset', isRepo ? length : '0');
      line.style.transition = 'stroke-dashoffset 0.7s cubic-bezier(0.4, 0, 0.2, 1), stroke-opacity 0.5s ease';

      svg.appendChild(line);

      // Animate in
      requestAnimationFrame(() => {
        if (isRepo) line.setAttribute('stroke-dashoffset', '0');
        line.setAttribute('stroke-opacity', String(opacity));
      });

      const conn = { a: nodeA, b: nodeB, el: line, type, color, baseOpacity: opacity };
      connections.push(conn);
      return conn;
    }

    // ── Morphing End Sequence ──
    function startMorphSequence() {
      morphing = true;

      // Calculate grid positions for final session cards
      const gridCols = 3;
      const gridTop = 52 + 24 + 36; // header + padding + grid-header
      const gridLeft = 220 + 24;    // sidebar + padding
      const gridRight = fieldW - 24;
      const availW = gridRight - gridLeft;
      const cardW = Math.min(280, (availW - (gridCols - 1) * 16) / gridCols);
      const cardH = 120;
      const gapX = 16;
      const gapY = 16;

      const gridPositions = nodes.map((n, i) => {
        const col = i % gridCols;
        const row = Math.floor(i / gridCols);
        return {
          x: gridLeft + col * (cardW + gapX),
          y: gridTop + row * (cardH + gapY),
        };
      });

      // === Step 1: Grid formation (0 - 800ms) ===
      // Fade connections and cluster labels
      connections.forEach(c => {
        c.el.style.transition = 'stroke-opacity 0.5s ease';
        c.el.setAttribute('stroke-opacity', '0');
      });
      Object.values(clusterLabels).forEach(label => {
        label.style.transition = 'opacity 0.4s ease';
        label.classList.remove('visible');
      });

      // Hide stats panel and center logo
      statsPanel.classList.remove('visible');
      centerLogo.classList.add('fade-up');

      // Fade grid overlay and stars
      document.getElementById('grid-overlay').classList.remove('visible');
      document.getElementById('starfield').style.transition = 'opacity 0.5s ease';
      document.getElementById('starfield').style.opacity = '0';

      // Move nodes to grid positions
      nodes.forEach((node, i) => {
        if (i >= gridPositions.length) return;
        const target = gridPositions[i];
        node.el.classList.add('morphing');
        node.el.style.left = target.x + 'px';
        node.el.style.top = target.y + 'px';
      });

      // === Step 2: Card transformation (800ms) ===
      setTimeout(() => {
        // Create final session cards
        nodes.forEach((node, i) => {
          if (i >= gridPositions.length) return;
          const target = gridPositions[i];
          const s = node.session;
          const color = REPO_COLORS[s.repo] || '#818cf8';
          const timeLabel = TIME_LABELS[i % TIME_LABELS.length];

          const finalCard = document.createElement('div');
          finalCard.className = 'session-card-final';
          finalCard.style.setProperty('--card-w', cardW + 'px');
          finalCard.style.left = target.x + 'px';
          finalCard.style.top = target.y + 'px';
          finalCard.innerHTML = `
            <div class="card-title" style="color:${color}">${s.repo}</div>
            <div class="card-badges">
              <span class="badge badge-branch">${s.branch}</span>
              <span class="badge badge-model">${s.model.replace('claude-', '').replace('gpt-', 'gpt')}</span>
            </div>
            <div class="card-stats">${s.turns} turns · ${formatTokens(s.tokens)} tokens</div>
            <div class="card-time">${timeLabel}</div>
            <div class="shimmer-overlay"></div>
          `;
          gridContainer.appendChild(finalCard);

          // Fade in with stagger
          setTimeout(() => {
            finalCard.classList.add('placed');
          }, i * 30);

          // Hide the constellation node
          node.el.style.opacity = '0';
        });
      }, 800);

      // === Step 3: Chrome appears (1400ms) ===
      setTimeout(() => {
        appChrome.classList.add('visible');
        appHeader.classList.add('visible');
        gridContainer.classList.add('visible');

        setTimeout(() => {
          appSidebar.classList.add('visible');
        }, 100);

        setTimeout(() => {
          gridHeader.classList.add('visible');
        }, 250);
      }, 1400);

      // === Step 4: Polish (1800ms) ===
      setTimeout(() => {
        // Shimmer wave across cards
        const cards = gridContainer.querySelectorAll('.session-card-final');
        cards.forEach((card, i) => {
          setTimeout(() => card.classList.add('shimmer'), i * 60);
        });

        // Subtle scale-up effect
        gridContainer.style.transition = 'transform 0.3s ease';
        gridContainer.style.transform = 'scale(0.98)';
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            gridContainer.style.transform = 'scale(1)';
          });
        });
      }, 1800);

      // Clean up SVG after morph
      setTimeout(() => {
        svg.innerHTML = '';
        connections = [];
        field.style.pointerEvents = 'none';
      }, 2200);
    }

    // ── Clear ──
    function clearConstellation() {
      morphing = false;
      nodes.forEach(n => n.el.remove());
      nodes = [];
      connections.forEach(c => c.el.remove());
      connections = [];
      Object.values(clusterLabels).forEach(l => l.remove());
      clusterLabels = {};
      clusterCounts = {};
      discoveredRepos.clear();
      nodeIndex = 0;
      svg.innerHTML = '';

      // Reset chrome
      appChrome.classList.remove('visible');
      appHeader.classList.remove('visible');
      appSidebar.classList.remove('visible');
      gridContainer.classList.remove('visible');
      gridHeader.classList.remove('visible');
      gridContainer.querySelectorAll('.session-card-final').forEach(el => el.remove());
      gridContainer.style.transform = '';

      // Reset starfield
      document.getElementById('starfield').style.opacity = '1';
      document.getElementById('starfield').style.transition = '';

      completionFlash.classList.remove('active');
      field.style.pointerEvents = '';
      field.style.opacity = '1';
    }

    // ── Simulation ──
    function startSimulation(durationS, totalSessions) {
      clearConstellation();
      measureField();
      generateStars();
      generateGridOverlay();

      // Reset UI
      progressBar.style.width = '0%';
      statMiniFill.style.width = '0%';
      document.getElementById('stat-sessions-total').textContent = totalSessions;
      sessionsCurrentCounter.set(0);
      tokenCounter.set(0);
      eventCounter.set(0);
      repoCounter.set(0);
      phaseLabel.textContent = PHASE_LABELS.idle;

      // Phase 1: Show logo and stars
      centerLogo.classList.remove('fade-up');
      centerLogo.classList.add('visible');
      scanText.textContent = 'Scanning session state…';
      statsPanel.classList.remove('visible');

      if (simulator) simulator.stop();

      simulator = new LoadingSimulator({
        totalSessions,
        durationMs: durationS * 1000,

        onPhaseChange(phase) {
          phaseLabel.textContent = PHASE_LABELS[phase] || '';

          if (phase === 'discovering') {
            // Show grid overlay
            document.getElementById('grid-overlay').classList.add('visible');
            scanText.textContent = 'Scanning session directories…';
          }

          if (phase === 'indexing') {
            // Fade logo up, show stats panel
            centerLogo.classList.add('fade-up');
            setTimeout(() => statsPanel.classList.add('visible'), 300);
          }

          if (phase === 'finalizing') {
            // Expand all remaining nodes
            expandAllNodes();
            // Brighten connections slightly
            connections.forEach(c => {
              c.el.style.transition = 'stroke-opacity 0.8s ease';
              c.el.setAttribute('stroke-opacity', String(Math.min(c.baseOpacity * 1.5, 0.5)));
            });
          }

          if (phase === 'complete') {
            // Brief pause then morph
            completionFlash.classList.remove('active');
            void completionFlash.offsetWidth;
            completionFlash.classList.add('active');

            setTimeout(() => startMorphSequence(), 600);
          }
        },

        onProgress(progress) {
          const pct = (progress * 100).toFixed(1) + '%';
          progressBar.style.width = pct;
          statMiniFill.style.width = pct;
        },

        onSessionProcessed({ current, total, session }) {
          sessionsCurrentCounter.set(current);
          const node = createNode(session, nodeIndex++, total);

          // Update discovered repos
          discoveredRepos.add(session.repo);
          repoCounter.set(discoveredRepos.size);

          // Find and draw connections
          const targets = findConnections(node);
          targets.forEach(t => createConnection(node, t.node, t.type));
        },

        onStatsUpdate(stats) {
          tokenCounter.set(stats.totalTokens);
          eventCounter.set(stats.totalEvents);
        },

        onComplete() {
          // handled in onPhaseChange('complete')
        },
      });

      simulator.start();
    }

    // ── Demo controls ──
    createDemoControls(document.body, {
      defaultDuration: 12,
      onStart(duration, sessions) {
        startSimulation(duration, sessions);
      },
      onReset() {
        if (simulator) simulator.stop();
        clearConstellation();
        progressBar.style.width = '0%';
        statMiniFill.style.width = '0%';
        sessionsCurrentCounter.set(0);
        tokenCounter.set(0);
        eventCounter.set(0);
        repoCounter.set(0);
        phaseLabel.textContent = PHASE_LABELS.idle;
        centerLogo.classList.remove('fade-up');
        centerLogo.classList.remove('visible');
        statsPanel.classList.remove('visible');
        document.getElementById('grid-overlay').classList.remove('visible');
      },
    });

    // ── Handle resize ──
    window.addEventListener('resize', () => {
      measureField();
      generateGridOverlay();
    });
    measureField();

    // Auto-start after a brief pause
    setTimeout(() => startSimulation(12, 20), 500);
  </script>
</body>
