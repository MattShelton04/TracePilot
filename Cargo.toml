[workspace]
resolver = "2"
members = [
    "crates/tracepilot-core",
    "crates/tracepilot-indexer",
    "crates/tracepilot-export",
    "crates/tracepilot-tauri-bindings",
    "apps/desktop/src-tauri",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["TracePilot Contributors"]
license = "MIT"
repository = "https://github.com/MattShelton04/TracePilot"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
rusqlite = { version = "0.32", features = ["bundled"] }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
thiserror = "2"
anyhow = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = "0.3"
clap = { version = "4", features = ["derive"] }
toml = "0.8"
tempfile = "3"

# Internal crates
tracepilot-core = { path = "crates/tracepilot-core" }
tracepilot-indexer = { path = "crates/tracepilot-indexer" }
tracepilot-export = { path = "crates/tracepilot-export" }
