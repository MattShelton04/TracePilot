[workspace]
resolver = "2"
members = [
    "crates/tracepilot-core",
    "crates/tracepilot-indexer",
    "crates/tracepilot-export",
    "crates/tracepilot-orchestrator",
    "crates/tracepilot-tauri-bindings",
    "crates/tracepilot-bench",
    "apps/desktop/src-tauri",
]

[workspace.package]
version = "0.4.0"
edition = "2024"
authors = ["TracePilot Contributors"]
license = "GPL-3.0-or-later"
repository = "https://github.com/MattShelton04/TracePilot"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
rusqlite = { version = "0.32", features = ["bundled"] }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
thiserror = "2"
anyhow = "1"
tokio = { version = "1", features = ["full"] }
tracing = { version = "0.1", features = ["log"] }
clap = { version = "4", features = ["derive"] }
toml = "0.8"
tempfile = "3"
strum = { version = "0.27", features = ["derive"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
semver = "1"

# Internal crates
tracepilot-core = { path = "crates/tracepilot-core" }
tracepilot-indexer = { path = "crates/tracepilot-indexer" }
tracepilot-export = { path = "crates/tracepilot-export" }
tracepilot-orchestrator = { path = "crates/tracepilot-orchestrator" }

[profile.release]
lto = "thin"
strip = true
codegen-units = 1
opt-level = "s"
