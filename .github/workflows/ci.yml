name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ───────────────────────────────────────────────────────────────
  # Cross-platform build + test matrix.
  # Linux stays first (fast + cheapest), macOS + Windows added to
  # catch platform-specific regressions before release.
  # ───────────────────────────────────────────────────────────────
  check:
    name: check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      # NOTE: all third-party actions are pinned to full commit SHAs per the
      # tech-debt plan (Phase 0.3). Renovate / Dependabot will propose SHA
      # bumps; *never* relax to a floating tag. The `# vX.Y.Z` comment is
      # purely informational.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        with:
          version: 9

      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: 20
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2025-02-12)
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@400e7407cfd7a091e5fbb6afec01ec146c432b7c # v2.7.7

      - name: Install Tauri system dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: pnpm install --frozen-lockfile

      # Verify all version fields are in sync (Linux only — need python3)
      - name: Check version consistency
        if: runner.os == 'Linux'
        run: |
          CARGO_VER=$(cargo metadata --no-deps --format-version 1 \
            | python3 -c "import sys,json; d=json.load(sys.stdin); \
              print(next(p['version'] for p in d['packages'] if p['name']=='tracepilot-desktop'))")
          PKG_VER=$(node -p "require('./package.json').version")
          if [ "$CARGO_VER" != "$PKG_VER" ]; then
            echo "::error::Version mismatch: Cargo=$CARGO_VER, package.json=$PKG_VER"
            exit 1
          fi
          echo "✓ Version OK: $CARGO_VER"

      # ── Build checks (fast fail before slower tests) ────────
      - name: Rust build check
        run: cargo check --workspace --exclude tracepilot-desktop

      - name: Typecheck
        run: pnpm typecheck

      - name: Frontend build
        run: pnpm build

      # ── Tests ───────────────────────────────────────────────
      - name: Rust tests
        run: cargo test --workspace --exclude tracepilot-desktop

      - name: Frontend tests
        run: pnpm test

      # ── Lint + format (Linux only — single source of truth) ─
      - name: Rust format check
        if: runner.os == 'Linux'
        run: cargo fmt --all -- --check

      - name: Rust lint (clippy)
        if: runner.os == 'Linux'
        run: cargo clippy --workspace --exclude tracepilot-desktop --all-targets -- -D warnings

      - name: Frontend lint (biome)
        if: runner.os == 'Linux'
        run: pnpm lint

      # ── File-size guard-rails ───────────────────────────────
      - name: File size budgets
        if: runner.os == 'Linux'
        run: node scripts/check-file-sizes.mjs

  # ───────────────────────────────────────────────────────────────
  # Security + supply-chain gates (Linux, separate job so failure
  # is highlighted independently of build/test).
  # ───────────────────────────────────────────────────────────────
  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2025-02-12)

      - uses: Swatinem/rust-cache@400e7407cfd7a091e5fbb6afec01ec146c432b7c # v2.7.7

      - uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        with:
          version: 9

      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Rust security audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # RUSTSEC-2026-0097: rand unsound w/ custom logger — not applicable (TracePilot has no custom rand logger).
          # RUSTSEC-2025-0068: serde_yml unmaintained — direct dep of tracepilot-core; migration tracked separately.
          args: --ignore RUSTSEC-2026-0097 --ignore RUSTSEC-2025-0068

      - name: pnpm audit (production)
        run: pnpm audit --prod --audit-level=high
        continue-on-error: true # gate softly until baseline vulnerabilities are triaged
