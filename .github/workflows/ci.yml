name: CI

on:
  push:
    branches: [main]
  # Uncomment to enable CI on pull requests:
  # pull_request:
  #   branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: pnpm install --frozen-lockfile

      # Verify all version fields are in sync
      - name: Check version consistency
        run: |
          CARGO_VER=$(cargo metadata --no-deps --format-version 1 \
            | python3 -c "import sys,json; d=json.load(sys.stdin); \
              print(next(p['version'] for p in d['packages'] if p['name']=='tracepilot-desktop'))")
          PKG_VER=$(node -p "require('./package.json').version")
          if [ "$CARGO_VER" != "$PKG_VER" ]; then
            echo "::error::Version mismatch: Cargo=$CARGO_VER, package.json=$PKG_VER"
            exit 1
          fi
          echo "✓ Version OK: $CARGO_VER"

      # ── Build checks (fast fail before slower tests) ────────
      - name: Rust build check
        run: cargo check --workspace --exclude tracepilot-desktop

      - name: Typecheck
        run: pnpm typecheck

      - name: Frontend build
        run: pnpm build

      # ── Tests ───────────────────────────────────────────────
      - name: Rust tests
        run: cargo test --workspace --exclude tracepilot-desktop

      - name: Frontend tests
        run: pnpm test

      # ── Security ────────────────────────────────────────────
      - name: Security audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Temporarily disabled lint steps.
      # - name: Rust lint
      #   run: cargo clippy --workspace --exclude tracepilot-desktop -- -D warnings
      # - name: Frontend lint
      #   run: pnpm lint