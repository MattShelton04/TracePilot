name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Benchmark run name (e.g. "pre-refactor", "v0.3.0")'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    name: Run Criterion Benchmarks
    # Disabled as not valuable currently. Keep this workflow manual-only so PRs
    # don't show a benchmark workflow whose only job is intentionally skipped.
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)

      - uses: Swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3 # v2.7.7
        with:
          cache-on-failure: true
          shared-key: rust-${{ runner.os }}-stable
          key: cargo-lock-${{ hashFiles('Cargo.lock') }}

      - name: Run benchmarks
        run: cargo bench -p tracepilot-bench

      - name: Extract benchmark results
        run: |
          python3 -c "
          import json, glob, os

          results = []
          base = os.path.join('target', 'criterion')
          for path in sorted(glob.glob(os.path.join(base, '**', 'new', 'estimates.json'), recursive=True)):
              rel = os.path.relpath(path, base)
              name = os.path.dirname(os.path.dirname(rel)).replace(os.sep, '/')
              with open(path) as f:
                  data = json.load(f)
              results.append({
                  'name': name,
                  'unit': 'ns/iter',
                  'value': data['mean']['point_estimate']
              })

          with open('benchmark-output.json', 'w') as f:
              json.dump(results, f, indent=2)

          print(f'Extracted {len(results)} benchmark results')
          for r in results:
              print(f'  {r[\"name\"]}: {r[\"value\"]:.2f} ns/iter')
          "

      - name: Check Rust perf budget
        if: always()
        run: |
          python3 -c "
          import json, glob, os, sys

          if not os.path.exists('perf-budget.json'):
              print('No perf-budget.json — skipping')
              sys.exit(0)

          with open('perf-budget.json') as f:
              budget = json.load(f)

          rust_budget = budget.get('rust', {})
          if not rust_budget:
              print('No rust budgets defined — skipping')
              sys.exit(0)

          base = os.path.join('target', 'criterion')
          results = {}
          for path in glob.glob(os.path.join(base, '**', 'new', 'estimates.json'), recursive=True):
              rel = os.path.relpath(path, base)
              name = os.path.dirname(os.path.dirname(rel)).replace(os.sep, '/')
              with open(path) as f:
                  data = json.load(f)
              results[name] = data['mean']['point_estimate']

          # Map budget keys to benchmark names
          mapping = {
              'parseEventsJsonl100kbNs': 'parse_typed_events/1000',
              'computeAnalytics100sessionsNs': 'compute_analytics/100',
          }

          violations = []
          for budget_key, bench_name in mapping.items():
              limit = rust_budget.get(budget_key)
              actual = results.get(bench_name)
              if limit is None or actual is None:
                  continue
              if actual > limit:
                  violations.append(f'{bench_name}: {actual:.0f} ns > budget {limit} ns')
                  print(f'⚠️  {bench_name}: {actual:.0f} ns exceeds budget {limit} ns')
              else:
                  print(f'✅ {bench_name}: {actual:.0f} ns within budget {limit} ns')

          if violations:
              print(f'::error::{len(violations)} benchmark(s) exceed perf budget')
              sys.exit(1)
          else:
              print('All benchmarks within budget')
          "

      - name: Upload Criterion HTML reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: criterion-reports-${{ github.run_number }}${{ inputs.name && format('-{0}', inputs.name) || '' }}
          path: target/criterion
          retention-days: 90

      - name: Store benchmark results
        if: github.event_name == 'workflow_dispatch'
        uses: benchmark-action/github-action-benchmark@a60cea5bc7b49e15c1f58f411161f99e0df48372 # v1.22.0
        with:
          tool: 'customSmallerIsBetter'
          output-file-path: benchmark-output.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          benchmark-data-dir-path: dev/bench
          alert-threshold: '200%'
          comment-on-alert: true
          fail-on-alert: false
          summary-always: true
