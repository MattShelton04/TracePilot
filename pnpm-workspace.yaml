packages:
  - "packages/*"
  - "apps/*"
allowBuilds:
  better-sqlite3: true
  esbuild: true
# Shared dependency versions (Plan §6.6 / Wave 48).
# Only deps shared by 3+ workspace packages are catalogued here; the rest stay
# pinned per-package to avoid coupling unrelated apps to a single version bump.
# Reference from a package.json as: "typescript": "catalog:" (default catalog).
catalog:
  typescript: "^6.0.3"
  vitest: "^3.2.4"
  vue: "^3.5.0"
