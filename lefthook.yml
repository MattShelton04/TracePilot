# Lefthook — Git hooks manager
# Install: cargo install lefthook && lefthook install
# See https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    # Biome: lint + format check on staged JS/TS/Vue/JSON.
    # Auto-generated bindings are excluded (also honoured by biome.json).
    biome:
      glob: "*.{ts,tsx,vue,js,jsx,json}"
      exclude: "packages/client/src/generated/.*"
      run: npx @biomejs/biome check --error-on-warnings --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
    # rustfmt on staged .rs files only — per-file invocation avoids a full
    # `cargo fmt --all` sweep on every commit.
    rustfmt:
      glob: "*.rs"
      run: rustfmt --check --edition 2024 {staged_files}
    # File-size guard-rails — fast (<300ms) full-repo enumeration.
    filesize:
      run: node scripts/check-file-sizes.mjs

# Heavier checks that shouldn't block every commit but should run before
# sharing work with the remote. Skip with `git push --no-verify` if urgent.
pre-push:
  parallel: true
  commands:
    typecheck:
      run: pnpm -r --filter "./apps/*" --filter "./packages/*" typecheck
    rustfmt-all:
      run: cargo fmt --all -- --check
    filesize:
      run: node scripts/check-file-sizes.mjs

commit-msg:
  commands:
    conventional-commit:
      run: node scripts/check-commit-msg.mjs {1}

# Named "fix" bundle — run manually with `lefthook run fix` for a one-shot
# auto-fix pass. Intentionally NOT wired to any git hook.
fix:
  commands:
    biome-fix:
      run: npx @biomejs/biome check --write .
    rustfmt-fix:
      run: cargo fmt --all
    clippy-fix:
      run: cargo clippy --workspace --exclude tracepilot-desktop --all-targets --fix --allow-dirty --allow-staged

