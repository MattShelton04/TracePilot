# git-cliff configuration
# ---------------------------------------------------------------------------
# STATUS: committed-but-unused (as of Wave 48 / Plan §6.1).
# This config is NOT wired into any CI workflow or `package.json` script; no
# automation currently runs `git-cliff` against it. It is intentionally kept
# in-tree as an opinionated starting point for whoever wires up automated
# changelog generation in a future release-pipeline wave. Until then,
# `CHANGELOG.md` is maintained by hand. Do not delete without owner review.
# ---------------------------------------------------------------------------
# See https://git-cliff.org/docs/configuration for full reference

[changelog]
header = """
# Changelog\n
All notable changes to TracePilot will be documented in this file.\n
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
            {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Changed" },
    { message = "^doc", group = "Documentation" },
    { message = "^style", group = "Styling" },
    { message = "^test", group = "Testing" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore", group = "Miscellaneous" },
    { message = "^ci", group = "CI" },
    { message = "^build", group = "Build" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "oldest"
